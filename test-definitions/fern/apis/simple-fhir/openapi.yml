openapi: 3.0.1
info:
  title: simple-fhir
  version: ''
paths:
  /account/{account_id}:
    get:
      operationId: getAccount
      tags:
        - ''
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
components:
  schemas:
    Memo:
      title: Memo
      type: object
      properties:
        description:
          type: string
        account:
          $ref: '#/components/schemas/Account'
          nullable: true
      required:
        - description
    BaseResource:
      title: BaseResource
      type: object
      properties:
        id:
          type: string
        related_resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceList'
        memo:
          $ref: '#/components/schemas/Memo'
      required:
        - id
        - related_resources
        - memo
    ResourceList:
      title: ResourceList
      oneOf:
        - $ref: '#/components/schemas/Account'
        - $ref: '#/components/schemas/Patient'
        - $ref: '#/components/schemas/Practitioner'
        - $ref: '#/components/schemas/Script'
    Account:
      title: Account
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          properties:
            resource_type:
              type: string
              const: Account
            name:
              type: string
            patient:
              $ref: '#/components/schemas/Patient'
              nullable: true
            practitioner:
              $ref: '#/components/schemas/Practitioner'
              nullable: true
          required:
            - resource_type
            - name
    Patient:
      title: Patient
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          properties:
            resource_type:
              type: string
              const: Patient
            name:
              type: string
            scripts:
              type: array
              items:
                $ref: '#/components/schemas/Script'
          required:
            - resource_type
            - name
            - scripts
    Practitioner:
      title: Practitioner
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          properties:
            resource_type:
              type: string
              const: Practitioner
            name:
              type: string
          required:
            - resource_type
            - name
    Script:
      title: Script
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          properties:
            resource_type:
              type: string
              const: Script
            name:
              type: string
          required:
            - resource_type
            - name
  securitySchemes: {}
