openapi: 3.2.0
info:
  title: server-sent-events-openapi
  description: >
    Test fixture for SSE handling via OpenAPI 3.2's itemSchema.

    Endpoints 1-2 test context=protocol with the full range of data types that
    protocol-level discrimination enables: heartbeat (no data), string literal,
    number literal, and object. These vary on field collision (B dimension).

    Endpoints 3-6 test context=data (explicit and absent) where the discriminant
    lives inside the data payload. All event variants use object-typed data with
    the discriminant field inside the payload, since context=data requires the
    data field to be an object. These vary on collision (B) and context (C).

    Endpoint 7 tests the OAS 3.2 spec-native pattern: inline oneOf variants
    extending a base Event schema, using const on event fields and
    contentSchema/contentMediaType on data fields. No discriminator object.
  version: "0.1.0"

paths:
  # ==========================================================================
  # Endpoints 1-2: context=protocol (full data type range)
  # ==========================================================================
  /stream/protocol-no-collision:
    post:
      operationId: streamProtocolNoCollision
      summary: Protocol context with no field collision and mixed data types
      description: >
        B1-C1.
        Uses discriminator with mapping, x-fern-discriminator-context set to protocol.
        Because the discriminant is at the protocol level, the data field can be any
        type or absent entirely. Demonstrates heartbeat (no data), string literal,
        number literal, and object data payloads.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with protocol-level discrimination and mixed data types
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/ProtocolHeartbeat"
                  - $ref: "#/components/schemas/ProtocolStringEvent"
                  - $ref: "#/components/schemas/ProtocolNumberEvent"
                  - $ref: "#/components/schemas/ProtocolObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/ProtocolHeartbeat"
                    string_data: "#/components/schemas/ProtocolStringEvent"
                    number_data: "#/components/schemas/ProtocolNumberEvent"
                    object_data: "#/components/schemas/ProtocolObjectEvent"

  /stream/protocol-collision:
    post:
      operationId: streamProtocolCollision
      summary: Protocol context with event field collision and mixed data types
      description: >
        B2-C1.
        Same as endpoint 1, but the object data payload contains its own "event"
        property, which collides with the SSE envelope's "event" discriminator field.
        Tests whether generators correctly separate the protocol-level discriminant from
        the data-level field when context=protocol is specified.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with protocol context and event field collision
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/ProtocolHeartbeat"
                  - $ref: "#/components/schemas/ProtocolStringEvent"
                  - $ref: "#/components/schemas/ProtocolNumberEvent"
                  - $ref: "#/components/schemas/ProtocolCollisionObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/ProtocolHeartbeat"
                    string_data: "#/components/schemas/ProtocolStringEvent"
                    number_data: "#/components/schemas/ProtocolNumberEvent"
                    object_data: "#/components/schemas/ProtocolCollisionObjectEvent"

  # ==========================================================================
  # Endpoints 3-6: context=data and context=absent (B x C matrix)
  # All events have object-typed data with discriminant inside the payload
  # ==========================================================================
  /stream/data-context-no-collision:
    post:
      operationId: streamDataContextNoCollision
      summary: Explicit data context with no field collision
      description: >
        B1-C2.
        x-fern-discriminator-context is explicitly set to "data" (the default value).
        The discriminant lives inside each event's data payload. All event variants
        use object-typed data since the discriminant must be a field within the data.
        Uses create/update/delete event types with distinct payload shapes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with discriminator context explicitly set to data
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextCreateEvent"
                  - $ref: "#/components/schemas/DataContextUpdateEvent"
                  - $ref: "#/components/schemas/DataContextDeleteEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: data
                  mapping:
                    create: "#/components/schemas/DataContextCreateEvent"
                    update: "#/components/schemas/DataContextUpdateEvent"
                    delete: "#/components/schemas/DataContextDeleteEvent"

  /stream/data-context-collision:
    post:
      operationId: streamDataContextCollision
      summary: Explicit data context with event field collision
      description: >
        B2-C2.
        Combines explicit context=data with a data payload that has its own "event"
        property (in addition to the discriminant "event" field that context=data
        flattens into the payload). Tests how generators handle the collision when
        the discriminant is explicitly within the data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with explicit data context and field collision
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextCollisionCreateEvent"
                  - $ref: "#/components/schemas/DataContextCollisionUpdateEvent"
                  - $ref: "#/components/schemas/DataContextCollisionDeleteEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: data
                  mapping:
                    create: "#/components/schemas/DataContextCollisionCreateEvent"
                    update: "#/components/schemas/DataContextCollisionUpdateEvent"
                    delete: "#/components/schemas/DataContextCollisionDeleteEvent"

  /stream/no-context-no-collision:
    post:
      operationId: streamNoContextNoCollision
      summary: No context extension with no collision
      description: >
        B1-C3.
        The x-fern-discriminator-context extension is omitted entirely. Tests whether
        Fern correctly infers the default behavior (context=data) when the extension
        is absent. Uses object-typed data payloads appropriate for data-level discrimination.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with no discriminator context hint
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextCreateEvent"
                  - $ref: "#/components/schemas/DataContextUpdateEvent"
                  - $ref: "#/components/schemas/DataContextDeleteEvent"
                discriminator:
                  propertyName: event
                  mapping:
                    create: "#/components/schemas/DataContextCreateEvent"
                    update: "#/components/schemas/DataContextUpdateEvent"
                    delete: "#/components/schemas/DataContextDeleteEvent"

  /stream/no-context-collision:
    post:
      operationId: streamNoContextCollision
      summary: No context extension with event field collision
      description: >
        B2-C3.
        Combines the collision scenario (data payload has its own "event" field) with
        the absence of x-fern-discriminator-context. The generator has no hint about
        where the discriminant lives, and the field collision makes flattening ambiguous.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with field collision and no context hint
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextCollisionCreateEvent"
                  - $ref: "#/components/schemas/DataContextCollisionUpdateEvent"
                  - $ref: "#/components/schemas/DataContextCollisionDeleteEvent"
                discriminator:
                  propertyName: event
                  mapping:
                    create: "#/components/schemas/DataContextCollisionCreateEvent"
                    update: "#/components/schemas/DataContextCollisionUpdateEvent"
                    delete: "#/components/schemas/DataContextCollisionDeleteEvent"

  # ==========================================================================
  # Endpoint 7: OAS 3.2 spec-native pattern
  # ==========================================================================
  /stream/oas-spec-native:
    post:
      operationId: streamOasSpecNative
      summary: OAS 3.2 spec-native SSE pattern with inline variants and contentSchema
      description: >
        Follows the pattern from the OAS 3.2 specification's own SSE example.
        The itemSchema extends a base Event schema via $ref and uses inline oneOf
        variants with const on the event field to distinguish event types. Data fields
        use contentSchema/contentMediaType for structured payloads. No discriminator
        object is used — event type resolution relies on const matching.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream following the OAS 3.2 spec example pattern
          content:
            text/event-stream:
              itemSchema:
                $ref: "#/components/schemas/Event"
                required: [event]
                oneOf:
                  - properties:
                      event:
                        const: heartbeat
                  - properties:
                      event:
                        const: string_data
                      data:
                        type: string
                  - properties:
                      event:
                        const: number_data
                      data:
                        format: int64
                  - properties:
                      event:
                        const: object_data
                      data:
                        contentMediaType: application/json
                        contentSchema:
                          $ref: "#/components/schemas/StatusPayload"

components:
  schemas:
    StreamRequest:
      type: object
      properties:
        query:
          type: string

    # ==========================================================================
    # Base SSE event schema (used by endpoint 7, per OAS 3.2 spec pattern)
    # ==========================================================================
    Event:
      type: object
      required:
        - data
      properties:
        data:
          type: string
        event:
          type: string
        id:
          type: string
        retry:
          type: integer
          minimum: 0

    # ==========================================================================
    # Data payloads
    # ==========================================================================
    StatusPayload:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    CreatePayload:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string

    UpdatePayload:
      type: object
      required:
        - id
        - fields
      properties:
        id:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string

    DeletePayload:
      type: object
      required:
        - id
      properties:
        id:
          type: string

    CollisionCreatePayload:
      type: object
      required:
        - id
        - name
        - event
      properties:
        id:
          type: string
        name:
          type: string
        event:
          type: string
          description: >
            An event type field inside the data payload that collides with
            the SSE envelope's event field used for discrimination.

    CollisionUpdatePayload:
      type: object
      required:
        - id
        - fields
        - event
      properties:
        id:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
        event:
          type: string
          description: >
            An event type field inside the data payload that collides with
            the SSE envelope's event field used for discrimination.

    CollisionDeletePayload:
      type: object
      required:
        - id
        - event
      properties:
        id:
          type: string
        event:
          type: string
          description: >
            An event type field inside the data payload that collides with
            the SSE envelope's event field used for discrimination.

    ObjectPayloadWithEventField:
      type: object
      required:
        - id
        - name
        - event
      properties:
        id:
          type: string
        name:
          type: string
        event:
          type: string
          description: >
            An event type field inside the data payload that collides with
            the SSE envelope's event field used for discrimination.

    # ==========================================================================
    # Protocol-context envelope schemas (used by endpoints 1-2)
    # Discriminant at protocol level, data can be any type or absent
    # ==========================================================================
    ProtocolHeartbeat:
      type: object
      required:
        - event
      properties:
        event:
          type: string
          enum:
            - heartbeat

    ProtocolStringEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - string_data
        data:
          type: string

    ProtocolNumberEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - number_data
        data:
          type: number

    ProtocolObjectEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - object_data
        data:
          $ref: "#/components/schemas/StatusPayload"

    ProtocolCollisionObjectEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - object_data
        data:
          $ref: "#/components/schemas/ObjectPayloadWithEventField"

    # ==========================================================================
    # Data-context envelope schemas (used by endpoints 3-6)
    # Discriminant inside data payload, all data must be object-typed
    # ==========================================================================
    DataContextCreateEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - create
        data:
          $ref: "#/components/schemas/CreatePayload"

    DataContextUpdateEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - update
        data:
          $ref: "#/components/schemas/UpdatePayload"

    DataContextDeleteEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - delete
        data:
          $ref: "#/components/schemas/DeletePayload"

    DataContextCollisionCreateEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - create
        data:
          $ref: "#/components/schemas/CollisionCreatePayload"

    DataContextCollisionUpdateEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - update
        data:
          $ref: "#/components/schemas/CollisionUpdatePayload"

    DataContextCollisionDeleteEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - delete
        data:
          $ref: "#/components/schemas/CollisionDeletePayload"
