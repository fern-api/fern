openapi: 3.2.0
info:
  title: server-sent-events-openapi
  description: >
    Test fixture for SSE handling via OpenAPI 3.2's itemSchema.

    Endpoints 1-2 test context=protocol with the full range of data types that
    protocol-level discrimination enables: heartbeat (no data), string literal,
    number literal, and object. These vary on field collision (B dimension).

    Endpoints 3-4 test context=data (explicit and absent) where the discriminant
    lives inside the data payload. The envelope's event field is set to a generic
    value ("message") for all variants — the SDK should ignore it and discriminate
    using the event field inside the data payload instead.

    Endpoint 5 tests the OAS 3.2 spec-native pattern: inline oneOf variants
    extending a base Event schema, using const on event fields and
    contentSchema/contentMediaType on data fields. No discriminator object.
  version: "0.1.0"

paths:
  # ==========================================================================
  # Endpoints 1-2: context=protocol (full data type range)
  # ==========================================================================
  /stream/protocol-no-collision:
    post:
      operationId: streamProtocolNoCollision
      summary: Protocol context with no field collision and mixed data types
      description: >
        B1-C1.
        Uses discriminator with mapping, x-fern-discriminator-context set to protocol.
        Because the discriminant is at the protocol level, the data field can be any
        type or absent entirely. Demonstrates heartbeat (no data), string literal,
        number literal, and object data payloads.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with protocol-level discrimination and mixed data types
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/ProtocolHeartbeat"
                  - $ref: "#/components/schemas/ProtocolStringEvent"
                  - $ref: "#/components/schemas/ProtocolNumberEvent"
                  - $ref: "#/components/schemas/ProtocolObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/ProtocolHeartbeat"
                    string_data: "#/components/schemas/ProtocolStringEvent"
                    number_data: "#/components/schemas/ProtocolNumberEvent"
                    object_data: "#/components/schemas/ProtocolObjectEvent"

  /stream/protocol-collision:
    post:
      operationId: streamProtocolCollision
      summary: Protocol context with event field collision and mixed data types
      description: >
        B2-C1.
        Same as endpoint 1, but the object data payload contains its own "event"
        property, which collides with the SSE envelope's "event" discriminator field.
        Tests whether generators correctly separate the protocol-level discriminant from
        the data-level field when context=protocol is specified.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with protocol context and event field collision
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/ProtocolHeartbeat"
                  - $ref: "#/components/schemas/ProtocolStringEvent"
                  - $ref: "#/components/schemas/ProtocolNumberEvent"
                  - $ref: "#/components/schemas/ProtocolCollisionObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/ProtocolHeartbeat"
                    string_data: "#/components/schemas/ProtocolStringEvent"
                    number_data: "#/components/schemas/ProtocolNumberEvent"
                    object_data: "#/components/schemas/ProtocolCollisionObjectEvent"

  # ==========================================================================
  # Endpoints 3-4: context=data (explicit and absent)
  # Discriminant lives inside the data payload, envelope event is ignored
  # ==========================================================================
  /stream/data-context:
    post:
      operationId: streamDataContext
      summary: Explicit data context — discriminant inside data payload
      description: >
        C2.
        x-fern-discriminator-context is explicitly set to "data" (the default value).
        The discriminant lives inside each event's data payload as the "type" field.
        The envelope's event field is set to "message" for all variants — a generic
        value that would produce incorrect discrimination if the SDK mistakenly used
        the envelope instead of the data payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with discriminator context set to data
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextCreateEvent"
                  - $ref: "#/components/schemas/DataContextUpdateEvent"
                  - $ref: "#/components/schemas/DataContextDeleteEvent"
                discriminator:
                  propertyName: type
                  x-fern-discriminator-context: data
                  mapping:
                    create: "#/components/schemas/DataContextCreateEvent"
                    update: "#/components/schemas/DataContextUpdateEvent"
                    delete: "#/components/schemas/DataContextDeleteEvent"

  /stream/no-context:
    post:
      operationId: streamNoContext
      summary: No context extension — defaults to data context
      description: >
        C3.
        The x-fern-discriminator-context extension is omitted entirely. Tests whether
        Fern correctly infers the default behavior (context=data) when the extension
        is absent. Same event schemas as endpoint 3 — the envelope's event field is
        "message" for all variants, and the real discriminant is inside the data payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with no discriminator context hint
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextCreateEvent"
                  - $ref: "#/components/schemas/DataContextUpdateEvent"
                  - $ref: "#/components/schemas/DataContextDeleteEvent"
                discriminator:
                  propertyName: type
                  mapping:
                    create: "#/components/schemas/DataContextCreateEvent"
                    update: "#/components/schemas/DataContextUpdateEvent"
                    delete: "#/components/schemas/DataContextDeleteEvent"

  # ==========================================================================
  # Endpoint 5: OAS 3.2 spec-native pattern
  # ==========================================================================
  /stream/oas-spec-native:
    post:
      operationId: streamOasSpecNative
      summary: OAS 3.2 spec-native SSE pattern with inline variants and contentSchema
      description: >
        Follows the pattern from the OAS 3.2 specification's own SSE example.
        The itemSchema extends a base Event schema via $ref and uses inline oneOf
        variants with const on the event field to distinguish event types. Data fields
        use contentSchema/contentMediaType for structured payloads. No discriminator
        object is used — event type resolution relies on const matching.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream following the OAS 3.2 spec example pattern
          content:
            text/event-stream:
              itemSchema:
                $ref: "#/components/schemas/Event"
                required: [event]
                oneOf:
                  - properties:
                      event:
                        const: heartbeat
                  - properties:
                      event:
                        const: string_data
                      data:
                        type: string
                  - properties:
                      event:
                        const: number_data
                      data:
                        format: int64
                  - properties:
                      event:
                        const: object_data
                      data:
                        contentMediaType: application/json
                        contentSchema:
                          $ref: "#/components/schemas/StatusPayload"

components:
  schemas:
    StreamRequest:
      type: object
      properties:
        query:
          type: string

    # ==========================================================================
    # Base SSE event schema (used by endpoint 5, per OAS 3.2 spec pattern)
    # ==========================================================================
    Event:
      type: object
      required:
        - data
      properties:
        data:
          type: string
        event:
          type: string
        id:
          type: string
        retry:
          type: integer
          minimum: 0

    # ==========================================================================
    # Data payloads
    # ==========================================================================
    StatusPayload:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ObjectPayloadWithEventField:
      type: object
      required:
        - id
        - name
        - event
      properties:
        id:
          type: string
        name:
          type: string
        event:
          type: string
          description: >
            An event type field inside the data payload that collides with
            the SSE envelope's event field used for discrimination.

    CreatePayload:
      type: object
      required:
        - type
        - id
        - name
      properties:
        type:
          type: string
          enum:
            - create
        id:
          type: string
        name:
          type: string

    UpdatePayload:
      type: object
      required:
        - type
        - id
        - fields
      properties:
        type:
          type: string
          enum:
            - update
        id:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string

    DeletePayload:
      type: object
      required:
        - type
        - id
      properties:
        type:
          type: string
          enum:
            - delete
        id:
          type: string

    # ==========================================================================
    # Protocol-context envelope schemas (used by endpoints 1-2)
    # Discriminant at protocol level, data can be any type or absent
    # ==========================================================================
    ProtocolHeartbeat:
      type: object
      required:
        - event
      properties:
        event:
          type: string
          enum:
            - heartbeat

    ProtocolStringEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - string_data
        data:
          type: string

    ProtocolNumberEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - number_data
        data:
          type: number

    ProtocolObjectEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - object_data
        data:
          $ref: "#/components/schemas/StatusPayload"

    ProtocolCollisionObjectEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - object_data
        data:
          $ref: "#/components/schemas/ObjectPayloadWithEventField"

    # ==========================================================================
    # Data-context envelope schemas (used by endpoints 3-4)
    # Envelope event is a generic "message" for all variants — SDK should ignore
    # it and use the discriminant ("type") inside the data payload instead
    # ==========================================================================
    DataContextCreateEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - message
        data:
          $ref: "#/components/schemas/CreatePayload"

    DataContextUpdateEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - message
        data:
          $ref: "#/components/schemas/UpdatePayload"

    DataContextDeleteEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - message
        data:
          $ref: "#/components/schemas/DeletePayload"
