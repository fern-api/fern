openapi: 3.1.0
info:
  title: server-sent-events-openapi
  description: >
    Test fixture for SSE handling via OpenAPI's itemSchema property (introduced
    in OAS 3.2). Although itemSchema originates from the 3.2 spec, Fern does not
    yet claim exhaustive OAS 3.2 support, so this file's version is set to 3.1.0.
    You should keep your spec version at 3.1 or below even when using itemSchema.

    Endpoints 1-2 test context=protocol with the envelope+data schema pattern
    and the full range of data types that protocol-level discrimination enables:
    heartbeat (no data), string literal, number literal, and object. These vary
    on whether the data payload has a field name collision with the envelope's
    event discriminant.

    Endpoints 3-4 test context=data (explicit and absent), the default behavior.
    The discriminant ("event") and the payload fields are flattened together via
    allOf, with no separate "data" wrapper. Each variant uses allOf to extend
    a payload schema and adds an "event" discriminant at the same level. This
    matches the real-world pattern where context=data is used.

    Endpoints 5-6 test mismatched context/schema combinations to show what the
    output looks like when the schema pattern doesn't match the context value.
    Endpoint 5 uses context=protocol with the flat allOf pattern. Endpoint 6
    uses context=data with the envelope+data pattern.

    Endpoint 7 tests the OAS 3.2 spec-native pattern: inline oneOf variants
    extending a base Event schema, using const on event fields and
    contentSchema/contentMediaType on data fields. No discriminator object.
  version: "0.1.0"

paths:
  # ==========================================================================
  # Endpoints 1-2: context=protocol with envelope+data pattern
  # ==========================================================================
  /stream/protocol-no-collision:
    post:
      operationId: streamProtocolNoCollision
      summary: Protocol context with no field collision and mixed data types
      description: >
        Uses discriminator with mapping, x-fern-discriminator-context set to protocol.
        Because the discriminant is at the protocol level, the data field can be any
        type or absent entirely. Demonstrates heartbeat (no data), string literal,
        number literal, and object data payloads.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with protocol-level discrimination and mixed data types
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/ProtocolHeartbeat"
                  - $ref: "#/components/schemas/ProtocolStringEvent"
                  - $ref: "#/components/schemas/ProtocolNumberEvent"
                  - $ref: "#/components/schemas/ProtocolObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/ProtocolHeartbeat"
                    string_data: "#/components/schemas/ProtocolStringEvent"
                    number_data: "#/components/schemas/ProtocolNumberEvent"
                    object_data: "#/components/schemas/ProtocolObjectEvent"

  /stream/protocol-collision:
    post:
      operationId: streamProtocolCollision
      summary: Protocol context with event field collision and mixed data types
      description: >
        Same as endpoint 1, but the object data payload contains its own "event"
        property, which collides with the SSE envelope's "event" discriminator field.
        Tests whether generators correctly separate the protocol-level discriminant
        from the data-level field when context=protocol is specified.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with protocol context and event field collision
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/ProtocolHeartbeat"
                  - $ref: "#/components/schemas/ProtocolStringEvent"
                  - $ref: "#/components/schemas/ProtocolNumberEvent"
                  - $ref: "#/components/schemas/ProtocolCollisionObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/ProtocolHeartbeat"
                    string_data: "#/components/schemas/ProtocolStringEvent"
                    number_data: "#/components/schemas/ProtocolNumberEvent"
                    object_data: "#/components/schemas/ProtocolCollisionObjectEvent"

  # ==========================================================================
  # Endpoints 3-4: context=data with flat allOf pattern
  # ==========================================================================
  /stream/data-context:
    post:
      operationId: streamDataContext
      summary: Explicit data context with discriminant flattened via allOf
      description: >
        x-fern-discriminator-context is explicitly set to "data" (the default value).
        Each variant uses allOf to extend a payload schema and adds the "event"
        discriminant property at the same level. There is no "data" wrapper. The
        discriminant and payload fields coexist in a single flat object. This matches
        the real-world pattern used by customers with context=data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with discriminator context set to data
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextHeartbeat"
                  - $ref: "#/components/schemas/DataContextEntityEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: data
                  mapping:
                    heartbeat: "#/components/schemas/DataContextHeartbeat"
                    entity: "#/components/schemas/DataContextEntityEvent"

  /stream/no-context:
    post:
      operationId: streamNoContext
      summary: No context extension, defaults to data context
      description: >
        The x-fern-discriminator-context extension is omitted entirely. Tests whether
        Fern correctly infers the default behavior (context=data) when the extension
        is absent. Same flat allOf pattern as endpoint 3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with no discriminator context hint
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextHeartbeat"
                  - $ref: "#/components/schemas/DataContextEntityEvent"
                discriminator:
                  propertyName: event
                  mapping:
                    heartbeat: "#/components/schemas/DataContextHeartbeat"
                    entity: "#/components/schemas/DataContextEntityEvent"

  # ==========================================================================
  # Endpoints 5-6: Mismatched context/schema combinations
  # ==========================================================================
  /stream/protocol-with-flat-schema:
    post:
      operationId: streamProtocolWithFlatSchema
      summary: Protocol context with flat allOf schema pattern
      description: >
        Mismatched combination: context=protocol with the flat allOf schema pattern
        that is normally used with context=data. Shows what happens when the
        discriminant is declared as protocol-level but the schema uses allOf to
        flatten the event field alongside payload fields instead of wrapping them
        in a data field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with protocol context but flat allOf schemas
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/DataContextHeartbeat"
                  - $ref: "#/components/schemas/DataContextEntityEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/DataContextHeartbeat"
                    entity: "#/components/schemas/DataContextEntityEvent"

  /stream/data-context-with-envelope-schema:
    post:
      operationId: streamDataContextWithEnvelopeSchema
      summary: Data context with envelope+data schema pattern
      description: >
        Mismatched combination: context=data with the envelope+data schema pattern
        that is normally used with context=protocol. Shows what happens when the
        discriminant is declared as data-level but the schema separates the event
        field and data field into an envelope structure.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with data context but envelope+data schemas
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/ProtocolHeartbeat"
                  - $ref: "#/components/schemas/ProtocolStringEvent"
                  - $ref: "#/components/schemas/ProtocolNumberEvent"
                  - $ref: "#/components/schemas/ProtocolObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: data
                  mapping:
                    heartbeat: "#/components/schemas/ProtocolHeartbeat"
                    string_data: "#/components/schemas/ProtocolStringEvent"
                    number_data: "#/components/schemas/ProtocolNumberEvent"
                    object_data: "#/components/schemas/ProtocolObjectEvent"

  # ==========================================================================
  # Endpoint 7: OAS 3.2 spec-native pattern
  # ==========================================================================
  /stream/oas-spec-native:
    post:
      operationId: streamOasSpecNative
      summary: OAS 3.2 spec-native SSE pattern with inline variants and contentSchema
      description: >
        Follows the pattern from the OAS 3.2 specification's own SSE example.
        The itemSchema extends a base Event schema via $ref and uses inline oneOf
        variants with const on the event field to distinguish event types. Data fields
        use contentSchema/contentMediaType for structured payloads. No discriminator
        object is used. Event type resolution relies on const matching.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream following the OAS 3.2 spec example pattern
          content:
            text/event-stream:
              itemSchema:
                $ref: "#/components/schemas/Event"
                required: [event]
                oneOf:
                  - properties:
                      event:
                        const: heartbeat
                  - properties:
                      event:
                        const: string_data
                      data:
                        type: string
                  - properties:
                      event:
                        const: number_data
                      data:
                        format: int64
                  - properties:
                      event:
                        const: object_data
                      data:
                        contentMediaType: application/json
                        contentSchema:
                          $ref: "#/components/schemas/StatusPayload"

components:
  schemas:
    StreamRequest:
      type: object
      properties:
        query:
          type: string

    # ==========================================================================
    # Base SSE event schema (used by endpoint 7, per OAS 3.2 spec pattern)
    # ==========================================================================
    Event:
      type: object
      required:
        - data
      properties:
        data:
          type: string
        event:
          type: string
        id:
          type: string
        retry:
          type: integer
          minimum: 0

    # ==========================================================================
    # Data payloads
    # ==========================================================================
    StatusPayload:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ObjectPayloadWithEventField:
      type: object
      required:
        - id
        - name
        - event
      properties:
        id:
          type: string
        name:
          type: string
        event:
          type: string
          description: >
            An event type field inside the data payload that collides with
            the SSE envelope's event field used for discrimination.

    HeartbeatPayload:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time

    EntityEventPayload:
      type: object
      properties:
        entityId:
          type: string
        eventType:
          type: string
          enum:
            - CREATED
            - UPDATED
            - DELETED
            - PREEXISTING
        updatedTime:
          type: string
          format: date-time

    # ==========================================================================
    # Protocol-context envelope schemas (used by endpoints 1-2 and 6)
    # ==========================================================================
    ProtocolHeartbeat:
      type: object
      required:
        - event
      properties:
        event:
          type: string
          enum:
            - heartbeat

    ProtocolStringEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - string_data
        data:
          type: string

    ProtocolNumberEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - number_data
        data:
          type: number

    ProtocolObjectEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - object_data
        data:
          $ref: "#/components/schemas/StatusPayload"

    ProtocolCollisionObjectEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - object_data
        data:
          $ref: "#/components/schemas/ObjectPayloadWithEventField"

    # ==========================================================================
    # Data-context schemas (used by endpoints 3-5)
    # ==========================================================================
    DataContextHeartbeat:
      type: object
      required:
        - event
      allOf:
        - $ref: "#/components/schemas/HeartbeatPayload"
      properties:
        event:
          type: string
          enum:
            - heartbeat

    DataContextEntityEvent:
      type: object
      required:
        - event
      allOf:
        - $ref: "#/components/schemas/EntityEventPayload"
      properties:
        event:
          type: string
          enum:
            - entity
