openapi: 3.2.0
info:
  title: server-sent-events-openapi
  description: >
    Test fixture for SSE handling via OpenAPI 3.2's itemSchema.

    Endpoints 1-6 test the named-envelope-schema pattern used by real customers:
    named $ref'd schemas for each event type, discriminator with mapping, and
    x-fern-discriminator-context. These vary across two dimensions:
      B: Field name collision (event field in both envelope and data payload)
      C: x-fern-discriminator-context (protocol, data, absent)

    Endpoint 7 tests the OAS 3.2 spec-native pattern: inline oneOf variants
    extending a base Event schema, using const on event fields and
    contentSchema/contentMediaType on data fields. No discriminator object.

    All endpoints share the same four event types: heartbeat (no data),
    string literal data, number literal data, and object data.
  version: "0.1.0"

paths:
  # ==========================================================================
  # Endpoints 1-6: Named envelope schema pattern (B x C matrix)
  # ==========================================================================
  /stream/discriminated-no-collision-protocol:
    post:
      operationId: streamDiscriminatedNoCollisionProtocol
      summary: Named envelopes with protocol context and no field collision
      description: >
        B1-C1.
        Uses discriminator with mapping, x-fern-discriminator-context set to protocol,
        and data fields reference schemas via $ref. The envelope's event field does not
        collide with any field in the data payloads. This is the standard happy-path
        pattern for SSE with typed event discrimination.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with discriminated event types
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/EnvelopeHeartbeat"
                  - $ref: "#/components/schemas/EnvelopeStringEvent"
                  - $ref: "#/components/schemas/EnvelopeNumberEvent"
                  - $ref: "#/components/schemas/EnvelopeObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/EnvelopeHeartbeat"
                    string_data: "#/components/schemas/EnvelopeStringEvent"
                    number_data: "#/components/schemas/EnvelopeNumberEvent"
                    object_data: "#/components/schemas/EnvelopeObjectEvent"

  /stream/discriminated-collision-protocol:
    post:
      operationId: streamDiscriminatedCollisionProtocol
      summary: Named envelopes with protocol context and event field collision
      description: >
        B2-C1.
        The object data payload (ObjectPayloadWithEventField) contains its own "event"
        property, which collides with the SSE envelope's "event" discriminator field.
        Tests whether generators correctly separate the protocol-level discriminant from
        the data-level field when context=protocol is specified.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream where one data payload has a colliding "event" field
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/EnvelopeHeartbeat"
                  - $ref: "#/components/schemas/EnvelopeStringEvent"
                  - $ref: "#/components/schemas/EnvelopeNumberEvent"
                  - $ref: "#/components/schemas/EnvelopeCollisionObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: protocol
                  mapping:
                    heartbeat: "#/components/schemas/EnvelopeHeartbeat"
                    string_data: "#/components/schemas/EnvelopeStringEvent"
                    number_data: "#/components/schemas/EnvelopeNumberEvent"
                    object_data: "#/components/schemas/EnvelopeCollisionObjectEvent"

  /stream/discriminated-no-collision-data-context:
    post:
      operationId: streamDiscriminatedNoCollisionDataContext
      summary: Named envelopes with explicit data context and no collision
      description: >
        B1-C2.
        x-fern-discriminator-context is explicitly set to "data" (the default value).
        The discriminant should be flattened into the data payload rather than treated
        as a protocol-level SSE envelope field. Verifies that explicitly setting the
        default produces the same behavior as the implicit default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with discriminator context explicitly set to data
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/EnvelopeHeartbeat"
                  - $ref: "#/components/schemas/EnvelopeStringEvent"
                  - $ref: "#/components/schemas/EnvelopeNumberEvent"
                  - $ref: "#/components/schemas/EnvelopeObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: data
                  mapping:
                    heartbeat: "#/components/schemas/EnvelopeHeartbeat"
                    string_data: "#/components/schemas/EnvelopeStringEvent"
                    number_data: "#/components/schemas/EnvelopeNumberEvent"
                    object_data: "#/components/schemas/EnvelopeObjectEvent"

  /stream/discriminated-collision-data-context:
    post:
      operationId: streamDiscriminatedCollisionDataContext
      summary: Named envelopes with explicit data context and event field collision
      description: >
        B2-C2.
        Combines explicit context=data with a data payload that has its own "event" field.
        Since context=data means the discriminant is flattened into the data, the collision
        between the envelope's event field and the payload's event field should surface
        directly in the generated types.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with explicit data context and field collision
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/EnvelopeHeartbeat"
                  - $ref: "#/components/schemas/EnvelopeStringEvent"
                  - $ref: "#/components/schemas/EnvelopeNumberEvent"
                  - $ref: "#/components/schemas/EnvelopeCollisionObjectEvent"
                discriminator:
                  propertyName: event
                  x-fern-discriminator-context: data
                  mapping:
                    heartbeat: "#/components/schemas/EnvelopeHeartbeat"
                    string_data: "#/components/schemas/EnvelopeStringEvent"
                    number_data: "#/components/schemas/EnvelopeNumberEvent"
                    object_data: "#/components/schemas/EnvelopeCollisionObjectEvent"

  /stream/discriminated-no-collision-no-context:
    post:
      operationId: streamDiscriminatedNoCollisionNoContext
      summary: Named envelopes with no context extension and no collision
      description: >
        B1-C3.
        The x-fern-discriminator-context extension is omitted entirely. Tests whether
        Fern correctly infers the default behavior (context=data) when the extension
        is absent. No field collision, so the default should work without issues.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with no discriminator context hint
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/EnvelopeHeartbeat"
                  - $ref: "#/components/schemas/EnvelopeStringEvent"
                  - $ref: "#/components/schemas/EnvelopeNumberEvent"
                  - $ref: "#/components/schemas/EnvelopeObjectEvent"
                discriminator:
                  propertyName: event
                  mapping:
                    heartbeat: "#/components/schemas/EnvelopeHeartbeat"
                    string_data: "#/components/schemas/EnvelopeStringEvent"
                    number_data: "#/components/schemas/EnvelopeNumberEvent"
                    object_data: "#/components/schemas/EnvelopeObjectEvent"

  /stream/discriminated-collision-no-context:
    post:
      operationId: streamDiscriminatedCollisionNoContext
      summary: Named envelopes with event field collision and no context hint
      description: >
        B2-C3.
        Combines the collision scenario (data payload has its own "event" field) with
        the absence of x-fern-discriminator-context. This is the worst case for
        inference — the generator has no hint that the discriminant is protocol-level,
        yet the field collision makes flattening into data incorrect.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream with field collision and no context hint
          content:
            text/event-stream:
              itemSchema:
                oneOf:
                  - $ref: "#/components/schemas/EnvelopeHeartbeat"
                  - $ref: "#/components/schemas/EnvelopeStringEvent"
                  - $ref: "#/components/schemas/EnvelopeNumberEvent"
                  - $ref: "#/components/schemas/EnvelopeCollisionObjectEvent"
                discriminator:
                  propertyName: event
                  mapping:
                    heartbeat: "#/components/schemas/EnvelopeHeartbeat"
                    string_data: "#/components/schemas/EnvelopeStringEvent"
                    number_data: "#/components/schemas/EnvelopeNumberEvent"
                    object_data: "#/components/schemas/EnvelopeCollisionObjectEvent"

  # ==========================================================================
  # Endpoint 7: OAS 3.2 spec-native pattern
  # ==========================================================================
  /stream/oas-spec-native:
    post:
      operationId: streamOasSpecNative
      summary: OAS 3.2 spec-native SSE pattern with inline variants and contentSchema
      description: >
        Follows the pattern from the OAS 3.2 specification's own SSE example.
        The itemSchema extends a base Event schema via $ref and uses inline oneOf
        variants with const on the event field to distinguish event types. Data fields
        use contentSchema/contentMediaType for structured payloads. No discriminator
        object is used — event type resolution relies on const matching.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamRequest"
      responses:
        "200":
          description: SSE stream following the OAS 3.2 spec example pattern
          content:
            text/event-stream:
              itemSchema:
                $ref: "#/components/schemas/Event"
                required: [event]
                oneOf:
                  - properties:
                      event:
                        const: heartbeat
                  - properties:
                      event:
                        const: string_data
                      data:
                        type: string
                  - properties:
                      event:
                        const: number_data
                      data:
                        format: int64
                  - properties:
                      event:
                        const: object_data
                      data:
                        contentMediaType: application/json
                        contentSchema:
                          $ref: "#/components/schemas/StatusPayload"

components:
  schemas:
    StreamRequest:
      type: object
      properties:
        query:
          type: string

    # ==========================================================================
    # Base SSE event schema (used by endpoint 7, per OAS 3.2 spec pattern)
    # ==========================================================================
    Event:
      type: object
      required:
        - data
      properties:
        data:
          type: string
        event:
          type: string
        id:
          type: string
        retry:
          type: integer
          minimum: 0

    # ==========================================================================
    # Data payloads
    # ==========================================================================
    StatusPayload:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ObjectPayloadWithEventField:
      type: object
      required:
        - id
        - name
        - event
      properties:
        id:
          type: string
        name:
          type: string
        event:
          type: string
          description: >
            An event type field inside the data payload that collides with
            the SSE envelope's event field used for discrimination.

    # ==========================================================================
    # Named envelope schemas (used by endpoints 1-6)
    # ==========================================================================
    EnvelopeHeartbeat:
      type: object
      required:
        - event
      properties:
        event:
          type: string
          enum:
            - heartbeat

    EnvelopeStringEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - string_data
        data:
          type: string

    EnvelopeNumberEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - number_data
        data:
          type: number

    EnvelopeObjectEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - object_data
        data:
          $ref: "#/components/schemas/StatusPayload"

    EnvelopeCollisionObjectEvent:
      type: object
      required:
        - event
        - data
      properties:
        event:
          type: string
          enum:
            - object_data
        data:
          $ref: "#/components/schemas/ObjectPayloadWithEventField"
