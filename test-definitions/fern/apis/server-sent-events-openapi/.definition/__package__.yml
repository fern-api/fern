types:
  DataContextEntityEvent:
    extends:
      - EntityEventPayload
    properties: {}
    source:
      openapi: openapi.yml
  DataContextHeartbeat:
    extends:
      - HeartbeatPayload
    properties: {}
    source:
      openapi: openapi.yml
  EntityEventPayload:
    properties:
      entityId: optional<string>
      eventType: optional<EntityEventPayloadEventType>
      updatedTime: optional<datetime>
    source:
      openapi: openapi.yml
  EntityEventPayloadEventType:
    enum:
      - CREATED
      - UPDATED
      - DELETED
      - PREEXISTING
    inline: true
    source:
      openapi: openapi.yml
  Event:
    properties:
      data: string
      event: optional<string>
      id: optional<string>
      retry:
        type: optional<integer>
        validation:
          min: 0
    source:
      openapi: openapi.yml
  HeartbeatPayload:
    properties:
      timestamp: optional<datetime>
    source:
      openapi: openapi.yml
  ObjectPayloadWithEventField:
    properties:
      event:
        docs: >
          An event type field inside the data payload that collides with the SSE
          envelope's event field used for discrimination.
        type: string
      id: string
      name: string
    source:
      openapi: openapi.yml
  ProtocolCollisionObjectEvent:
    properties:
      data: ObjectPayloadWithEventField
    source:
      openapi: openapi.yml
  ProtocolHeartbeat:
    properties: {}
    source:
      openapi: openapi.yml
  ProtocolNumberEvent:
    properties:
      data: double
    source:
      openapi: openapi.yml
  ProtocolObjectEvent:
    properties:
      data: StatusPayload
    source:
      openapi: openapi.yml
  ProtocolStringEvent:
    properties:
      data: string
    source:
      openapi: openapi.yml
  StatusPayload:
    properties:
      message: string
      timestamp: datetime
    source:
      openapi: openapi.yml
  StreamDataContextResponse:
    base-properties: {}
    context: data
    discriminant: event
    source:
      openapi: openapi.yml
    union:
      entity: DataContextEntityEvent
      heartbeat: DataContextHeartbeat
  StreamDataContextWithEnvelopeSchemaResponse:
    base-properties: {}
    context: data
    discriminant: event
    source:
      openapi: openapi.yml
    union:
      heartbeat: ProtocolHeartbeat
      number_data: ProtocolNumberEvent
      object_data: ProtocolObjectEvent
      string_data: ProtocolStringEvent
  StreamNoContextResponse:
    base-properties: {}
    context: data
    discriminant: event
    source:
      openapi: openapi.yml
    union:
      entity: DataContextEntityEvent
      heartbeat: DataContextHeartbeat
  StreamProtocolCollisionResponse:
    base-properties: {}
    context: protocol
    discriminant: event
    source:
      openapi: openapi.yml
    union:
      heartbeat: ProtocolHeartbeat
      number_data: ProtocolNumberEvent
      object_data: ProtocolCollisionObjectEvent
      string_data: ProtocolStringEvent
  StreamProtocolNoCollisionResponse:
    base-properties: {}
    context: protocol
    discriminant: event
    source:
      openapi: openapi.yml
    union:
      heartbeat: ProtocolHeartbeat
      number_data: ProtocolNumberEvent
      object_data: ProtocolObjectEvent
      string_data: ProtocolStringEvent
  StreamProtocolWithFlatSchemaResponse:
    base-properties: {}
    context: protocol
    discriminant: event
    source:
      openapi: openapi.yml
    union:
      entity: DataContextEntityEvent
      heartbeat: DataContextHeartbeat
  StreamRequest:
    properties:
      query: optional<string>
    source:
      openapi: openapi.yml
service:
  auth: false
  base-path: ''
  endpoints:
    streamDataContext:
      display-name: Explicit data context with discriminant flattened via allOf
      docs: >
        x-fern-discriminator-context is explicitly set to "data" (the default
        value). Each variant uses allOf to extend a payload schema and adds the
        "event" discriminant property at the same level. There is no "data"
        wrapper. The discriminant and payload fields coexist in a single flat
        object. This matches the real-world pattern used by customers with
        context=data.
      examples:
        - request: {}
          response:
            stream:
              - data:
                  event: heartbeat
                  timestamp: '2024-01-15T09:30:00Z'
                event: ''
      method: POST
      path: /stream/data-context
      request:
        body: StreamRequest
        content-type: application/json
      response-stream:
        docs: SSE stream with discriminator context set to data
        format: sse
        type: StreamDataContextResponse
      source:
        openapi: openapi.yml
    streamDataContextWithEnvelopeSchema:
      display-name: Data context with envelope+data schema pattern
      docs: >
        Mismatched combination: context=data with the envelope+data schema
        pattern that is normally used with context=protocol. Shows what happens
        when the discriminant is declared as data-level but the schema separates
        the event field and data field into an envelope structure.
      examples:
        - request: {}
          response:
            stream:
              - data:
                  event: heartbeat
                event: ''
      method: POST
      path: /stream/data-context-with-envelope-schema
      request:
        body: StreamRequest
        content-type: application/json
      response-stream:
        docs: SSE stream with data context but envelope+data schemas
        format: sse
        type: StreamDataContextWithEnvelopeSchemaResponse
      source:
        openapi: openapi.yml
    streamNoContext:
      display-name: No context extension, defaults to data context
      docs: >
        The x-fern-discriminator-context extension is omitted entirely. Tests
        whether Fern correctly infers the default behavior (context=data) when
        the extension is absent. Same flat allOf pattern as endpoint 3.
      examples:
        - request: {}
          response:
            stream:
              - data:
                  event: heartbeat
                  timestamp: '2024-01-15T09:30:00Z'
                event: ''
      method: POST
      path: /stream/no-context
      request:
        body: StreamRequest
        content-type: application/json
      response-stream:
        docs: SSE stream with no discriminator context hint
        format: sse
        type: StreamNoContextResponse
      source:
        openapi: openapi.yml
    streamOasSpecNative:
      display-name: OAS 3.2 spec-native SSE pattern with inline variants and contentSchema
      docs: >
        Follows the pattern from the OAS 3.2 specification's own SSE example.
        The itemSchema extends a base Event schema via $ref and uses inline
        oneOf variants with const on the event field to distinguish event types.
        Data fields use contentSchema/contentMediaType for structured payloads.
        No discriminator object is used. Event type resolution relies on const
        matching.
      examples:
        - request: {}
          response:
            stream:
              - data:
                  data: data
                  event: event
                  id: id
                  retry: 1
                event: ''
      method: POST
      path: /stream/oas-spec-native
      request:
        body: StreamRequest
        content-type: application/json
      response-stream:
        docs: SSE stream following the OAS 3.2 spec example pattern
        format: sse
        type: Event
      source:
        openapi: openapi.yml
    streamProtocolCollision:
      display-name: Protocol context with event field collision and mixed data types
      docs: >
        Same as endpoint 1, but the object data payload contains its own "event"
        property, which collides with the SSE envelope's "event" discriminator
        field. Tests whether generators correctly separate the protocol-level
        discriminant from the data-level field when context=protocol is
        specified.
      examples:
        - request: {}
          response:
            stream:
              - data:
                  event: heartbeat
                event: ''
      method: POST
      path: /stream/protocol-collision
      request:
        body: StreamRequest
        content-type: application/json
      response-stream:
        docs: SSE stream with protocol context and event field collision
        format: sse
        type: StreamProtocolCollisionResponse
      source:
        openapi: openapi.yml
    streamProtocolNoCollision:
      display-name: Protocol context with no field collision and mixed data types
      docs: >
        Uses discriminator with mapping, x-fern-discriminator-context set to
        protocol. Because the discriminant is at the protocol level, the data
        field can be any type or absent entirely. Demonstrates heartbeat (no
        data), string literal, number literal, and object data payloads.
      examples:
        - request: {}
          response:
            stream:
              - data:
                  event: heartbeat
                event: ''
      method: POST
      path: /stream/protocol-no-collision
      request:
        body: StreamRequest
        content-type: application/json
      response-stream:
        docs: SSE stream with protocol-level discrimination and mixed data types
        format: sse
        type: StreamProtocolNoCollisionResponse
      source:
        openapi: openapi.yml
    streamProtocolWithFlatSchema:
      display-name: Protocol context with flat allOf schema pattern
      docs: >
        Mismatched combination: context=protocol with the flat allOf schema
        pattern that is normally used with context=data. Shows what happens when
        the discriminant is declared as protocol-level but the schema uses allOf
        to flatten the event field alongside payload fields instead of wrapping
        them in a data field.
      examples:
        - request: {}
          response:
            stream:
              - data:
                  event: heartbeat
                  timestamp: '2024-01-15T09:30:00Z'
                event: ''
      method: POST
      path: /stream/protocol-with-flat-schema
      request:
        body: StreamRequest
        content-type: application/json
      response-stream:
        docs: SSE stream with protocol context but flat allOf schemas
        format: sse
        type: StreamProtocolWithFlatSchemaResponse
      source:
        openapi: openapi.yml
  source:
    openapi: openapi.yml
