openapi: 3.0.1
info:
  title: objects-with-imports
  version: ""
paths: {}
components:
  schemas:
    Node:
      title: Node
      type: object
      properties:
        id:
          type: string
        label:
          type: string
          nullable: true
        metadata:
          $ref: "#/components/schemas/commonsMetadata"
          nullable: true
      required:
        - id
    Tree:
      title: Tree
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
          nullable: true
    commonsMetadata:
      title: commonsMetadata
      type: object
      properties:
        id:
          type: string
        data:
          type: object
          additionalProperties:
            type: string
          nullable: true
      required:
        - id
    File:
      title: File
      type: object
      properties:
        name:
          type: string
        contents:
          type: string
        info:
          $ref: "#/components/schemas/FileInfo"
      required:
        - name
        - contents
        - info
    FileInfo:
      title: FileInfo
      type: string
      enum:
        - REGULAR
        - DIRECTORY
    fileDirectory:
      title: fileDirectory
      type: object
      properties:
        name:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/File"
          nullable: true
        directories:
          type: array
          items:
            $ref: "#/components/schemas/fileDirectory"
          nullable: true
      required:
        - name
  securitySchemes: {}
