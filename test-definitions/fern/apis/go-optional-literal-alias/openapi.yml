openapi: 3.1.0
info:
  title: api
  version: 0.0.0
paths:
  /search:
    post:
      operationId: search
      tags:
      - GoOptionalLiteralAlias
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              examples:
                Example1:
                  value:
                    result: search result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              Example1:
                value:
                  sortField: DEFAULT
                  query: test query
components:
  schemas:
    SortField:
      title: SortField
      type: string
      const: DEFAULT
      description: A sort field that only allows the value "DEFAULT"
    SearchRequest:
      title: SearchRequest
      type: object
      properties:
        sortField:
          anyOf:
          - $ref: '#/components/schemas/SortField'
          - type: 'null'
          description: The sort field to use
        query:
          type: string
          description: The search query
          examples:
          - test query
      required:
      - query
    SearchResponse:
      title: SearchResponse
      type: object
      properties:
        result:
          type: string
          examples:
          - search result
      required:
      - result
  securitySchemes: {}
