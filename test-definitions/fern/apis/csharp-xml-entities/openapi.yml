openapi: 3.0.1
info:
  title: csharp-xml-entities
  version: ""
paths:
  /timezone:
    get:
      description: Get timezone information with &plus; offset
      operationId: getTimeZone
      tags:
        - ""
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeZoneModel"
components:
  schemas:
    TimeZoneModel:
      title: TimeZoneModel
      type: object
      description: |-
        Model demonstrating HTML entity bug in C# XML documentation.
        This description contains HTML entities that are not valid in XML.
      properties:
        timeZoneOffset:
          type: string
          description: Format is UTC &plus; offset notation (e.g., &plus;05:30)
        mathExpression:
          type: string
          description: "Expression: A &plus; B &minus; C &times; D &divide; E"
        validEntity:
          type: string
          description: "This uses valid XML entity: A &lt; B &amp; C &gt; D"
        specialChars:
          type: string
          nullable: true
          description: "Special characters: &nbsp; &hellip; &middot; &copy;"
      required:
        - timeZoneOffset
        - mathExpression
        - validEntity
  securitySchemes: {}
