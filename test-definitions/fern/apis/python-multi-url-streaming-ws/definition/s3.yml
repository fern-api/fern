service:
  auth: true
  url: s3
  base-path: /s3
  endpoints:
    getPresignedUrl:
      auth: true
      path: /presigned-url
      method: POST
      request:
        name: GetPresignedUrlRequest
        body:
          properties:
            s3Key: string
      response: string
    downloadFile:
      auth: true
      path: /file
      method: POST
      request:
        name: DownloadFileRequest
        body:
          properties:
            fileKey: string
      response:
        type: file

channel:
  path: /s3/events
  auth: false
  url: ws
  messages:
    send:
      origin: client
      body: SendRequest
    receive:
      origin: server
      body: S3ReceiveEvent

types:
  SendRequest:
    properties:
      data: string
  S3ReceiveEvent:
    properties:
      payload: string
