openapi: 3.1.0
info:
  title: package-yml
  version: 0.0.0
paths:
  /{id}/:
    post:
      operationId: echo
      tags:
        - ''
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: id-ksfd9c1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: Hello world!
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EchoRequest'
            examples:
              Example1:
                value:
                  name: Hello world!
                  size: 20
  /{id}//{nestedId}:
    get:
      operationId: service_nop
      tags:
        - Service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: id-a2ijs82
        - name: nestedId
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: id-219xca8
      responses:
        '204':
          description: No content
components:
  schemas:
    EchoRequest:
      title: EchoRequest
      type: object
      properties:
        name:
          type: string
          examples:
            - Hello world!
        size:
          type: integer
          examples:
            - 20
      required:
        - name
        - size
  securitySchemes: {}
