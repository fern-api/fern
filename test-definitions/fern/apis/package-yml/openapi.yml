openapi: 3.0.1
info:
  title: package-yml
  version: ""
paths:
  /{id}/:
    post:
      operationId: echo
      tags:
        - ""
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EchoRequest"
  /{id}//{nestedId}:
    get:
      operationId: service_nop
      tags:
        - Service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: nestedId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: ""
components:
  schemas:
    EchoRequest:
      title: EchoRequest
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
      required:
        - name
        - size
  securitySchemes: {}
