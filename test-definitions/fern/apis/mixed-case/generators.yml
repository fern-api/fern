# yaml-language-server: $schema=../../../../generators-yml.schema.json
api:
  specs:
    - openapi: ./openapi.yml
groups:
  java-sdk:
    generators:
      - name: fernapi/fern-java-sdk
        version: latest
        config:
          use-default-request-parameter-values: true
  php-sdk:
    generators:
      - name: fernapi/fern-php-sdk
        version: latest
        ir-version: v61
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/php-sdk-tests
          branch: mixed-case
  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: latest
        ir-version: v61
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/go-sdk-tests
          branch: mixed-case
