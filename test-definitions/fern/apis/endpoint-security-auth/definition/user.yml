# yaml-language-server: $schema=../../../../../fern.schema.json
types:
  User:
    properties:
      id: string
      name: string

service:
  auth: true
  base-path: ""
  endpoints:
    getWithBearer:
      path: /users/get-with-bearer
      method: GET
      response: list<User>
      auth:
        - Bearer: []
    getWithApiKey:
      path: /users/get-with-api-key
      method: GET
      response: list<User>
      auth:
        - ApiKey: []
    getWithOAuth:
      path: /users/get-with-o-auth
      method: GET
      response: list<User>
      auth:
        - OAuth: [read-only]
    getWithBasic:
      path: /users/get-with-basic
      method: GET
      response: list<User>
      auth:
        - Basic: []
    getWithInferredAuth:
      path: /users/get-with-inferred-auth
      method: GET
      response: list<User>
      auth:
        - InferredAuth: []
    getWithAnyAuth:
      path: /users/get-with-any-auth
      method: GET
      response: list<User>
      auth:
        - Bearer: []
        - ApiKey: []
        - OAuth: [read-only]
        - Basic: []
        - InferredAuth: []
    getWithAllAuth:
      path: /users/get-with-all-auth
      method: GET
      response: list<User>
      auth:
        - Bearer: []
          ApiKey: []
          OAuth: [read-only]
          Basic: []
          InferredAuth: []
