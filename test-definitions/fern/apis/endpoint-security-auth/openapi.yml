openapi: 3.1.0
info:
  title: endpoint-security-auth
  version: 0.0.0
paths:
  /token:
    post:
      operationId: auth_getToken
      tags:
        - Auth
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                client_secret:
                  type: string
                audience:
                  type: string
                  const: https://api.example.com
                grant_type:
                  type: string
                  const: client_credentials
              required:
                - client_id
                - client_secret
                - audience
                - grant_type
  /users/get-with-bearer:
    get:
      operationId: user_getWithBearer
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security:
        - Bearer: []
          APIKey: []
          OAuth: []
          Basic: []
          InferredAuth: []
  /users/get-with-api-key:
    get:
      operationId: user_getWithApiKey
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security:
        - Bearer: []
          APIKey: []
          OAuth: []
          Basic: []
          InferredAuth: []
  /users/get-with-o-auth:
    get:
      operationId: user_getWithOAuth
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security:
        - Bearer: []
          APIKey: []
          OAuth: []
          Basic: []
          InferredAuth: []
  /users/get-with-basic:
    get:
      operationId: user_getWithBasic
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security:
        - Bearer: []
          APIKey: []
          OAuth: []
          Basic: []
          InferredAuth: []
  /users/get-with-inferred-auth:
    get:
      operationId: user_getWithInferredAuth
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security:
        - Bearer: []
          APIKey: []
          OAuth: []
          Basic: []
          InferredAuth: []
  /users/get-with-any-auth:
    get:
      operationId: user_getWithAnyAuth
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security:
        - Bearer: []
          APIKey: []
          OAuth: []
          Basic: []
          InferredAuth: []
  /users/get-with-all-auth:
    get:
      operationId: user_getWithAllAuth
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security:
        - Bearer: []
          APIKey: []
          OAuth: []
          Basic: []
          InferredAuth: []
components:
  schemas:
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type:
            - string
            - "null"
      required:
        - access_token
        - expires_in
    User:
      title: User
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
    APIKey:
      type: apiKey
      in: header
      name: X-Api-Key
    OAuth:
      type: http
      scheme: bearer
    Basic:
      type: http
      scheme: basic
    InferredAuth:
      type: http
      scheme: bearer
