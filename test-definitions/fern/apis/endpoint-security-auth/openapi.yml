openapi: 3.0.1
info:
  title: endpoint-security-auth
  version: ""
paths:
  /token:
    post:
      operationId: auth_getToken
      tags:
        - Auth
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                client_secret:
                  type: string
                audience:
                  type: string
                  const: https://api.example.com
                grant_type:
                  type: string
                  const: client_credentials
              required:
                - client_id
                - client_secret
                - audience
                - grant_type
  /users/bearer:
    get:
      operationId: user_getWithBearer
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security: &ref_0 []
  /users/api-key:
    get:
      operationId: user_getWithApiKey
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security: *ref_0
  /users/oauth:
    get:
      operationId: user_getWithOAuth
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security: *ref_0
  /users/basic:
    get:
      operationId: user_getWithBasic
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security: *ref_0
  /users/inferred:
    get:
      operationId: user_getWithInferredAuth
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security: *ref_0
  /users/any-auth:
    get:
      operationId: user_getWithAnyAuth
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security: *ref_0
  /users/all-auth:
    get:
      operationId: user_getWithAllAuth
      tags:
        - User
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
      security: *ref_0
components:
  schemas:
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
          nullable: true
      required:
        - access_token
        - expires_in
    User:
      title: User
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BasicAuth:
      type: http
      scheme: basic
