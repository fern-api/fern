imports:
  root: __package__.yml

types:
  Task:
    properties:
      name: string
      user: User
      owner: root.User

  User:
    properties:
      line1: string
      line2: optional<string>
      city: string
      state: string
      zip: string
      country: literal<"USA">

service:
  auth: false
  base-path: /users
  endpoints:
    createUser:
      method: POST
      path: ""
      request: User
      response: User
    createTask:
      method: POST
      path: ""
      request: Task
      response: Task
    getUser:
      method: GET
      path: /{userId}
      path-parameters:
        userId: string
      response: root.User
