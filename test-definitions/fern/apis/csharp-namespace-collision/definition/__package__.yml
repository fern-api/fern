types:
  User:
    properties:
      id:
        type: string
        access: read-only
      name: string
      email: string
      password:
        type: string
        access: write-only
  Task:
    properties:
      id:
        type: string
        access: read-only
      name: string
      email: string
      password:
        type: string
        access: write-only

service:
  auth: false
  base-path: /root-users
  endpoints:
    createUser:
      method: POST
      path: ""
      request: User
      response: User
    createTask:
      method: POST
      path: /tasks
      request: Task
      response: Task
