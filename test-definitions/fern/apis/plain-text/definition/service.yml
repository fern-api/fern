service:
  auth: false
  base-path: ""
  endpoints:
    getText:
      path: /text
      method: POST
      response: text
    getCsv:
      path: /csv
      method: GET
      response:
        type: text
        content-type: text/csv
    getXml:
      path: /xml
      method: GET
      response:
        type: text
        content-type: text/xml
