openapi: 3.1.0
info:
  title: java-optional-nullable-query-params
  version: 0.0.0
paths:
  /api/search:
    get:
      description: Search endpoint with optional nullable query params with defaults
      operationId: search
      tags:
        - ''
      parameters:
        - name: query
          in: query
          description: Search query - defaults to empty string when absent
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: limit
          in: query
          description: Max results - defaults to 10 when absent
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: includeArchived
          in: query
          description: Include archived items - defaults to false when absent
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: sortOrder
          in: query
          description: Sort order - defaults to ASC when absent
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/SortOrder'
              - type: 'null'
        - name: optionalWithoutDefault
          in: query
          description: Optional nullable without default - should check wasSpecified
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: regularOptional
          in: query
          description: Another optional nullable with default for comparison
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: regularOptionalNoDefault
          in: query
          description: Another optional nullable without default for comparison
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
components:
  schemas:
    SortOrder:
      title: SortOrder
      type: string
      enum:
        - ASC
        - DESC
      description: Sort order enum
    SearchResponse:
      title: SearchResponse
      type: object
      description: Search response
      properties:
        results:
          type: array
          items:
            type: string
        totalCount:
          type: integer
        query:
          type:
            - string
            - 'null'
        limit:
          type:
            - integer
            - 'null'
        includeArchived:
          type:
            - boolean
            - 'null'
        sortOrder:
          anyOf:
            - $ref: '#/components/schemas/SortOrder'
            - type: 'null'
      required:
        - results
        - totalCount
  securitySchemes: {}
