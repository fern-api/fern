  # Transfer Out Query Response types

  TransferOutQueryResponse:
    docs: Response body for queries about outbound transfers.
    properties:
      Summary:
        docs: Summary information about the transfers.
        type: TransferOutSummary
      Records:
        docs: List of outbound transfer records.
        type: list<TransferOutRecord>

  TransferOutSummary:
    docs: Summary information for outbound transfer queries.
    properties:
      totalPages:
        docs: Number of pages in the response.
        type: nullable<integer>
      totalRecords:
        docs: Number of records in the response.
        type: nullable<integer>
      pageSize:
        docs: Number of records per page.
        type: nullable<integer>

  TransferOutBankAccount:
    docs: Bank account information for an outbound transfer.
    properties:
      accountNumber:
        docs: The masked bank account number.
        type: nullable<string>
      routingNumber:
        docs: The bank routing number.
        type: nullable<string>
      bankName:
        docs: The bank name.
        type: nullable<string>

  TransferOutEventData:
    docs: Event data associated with an outbound transfer.
    properties:
      description:
        docs: Description of the event.
        type: nullable<string>
      eventTime:
        docs: The time the event occurred.
        type: nullable<string>
      refData:
        docs: Reference data for the event.
        type: nullable<string>
      extraData:
        docs: Additional event data, which may contain detailed transaction information.
        type: nullable<unknown>
      source:
        docs: The source of the event.
        type: nullable<string>

  TransferOutMessageProperties:
    docs: Properties associated with a transfer message.
    properties:
      originalTransferStatus:
        docs: The original status of the transfer before the message.
        type: nullable<string>
      currentTransferStatus:
        docs: The current status of the transfer after the message.
        type: nullable<string>

  TransferOutMessage:
    docs: A message associated with an outbound transfer.
    properties:
      Id:
        docs: Unique identifier for the message.
        type: nullable<integer>
      RoomId:
        docs: The ID of the room where the message was sent.
        type: nullable<integer>
      UserId:
        docs: The ID of the user who sent the message.
        type: nullable<integer>
      UserName:
        docs: The name of the user who sent the message.
