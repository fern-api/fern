imports:
  root: __package__.yml
  moneyIn: moneyIn.yml

errors:
## BadRequest Errors for V2 Money In Endpoints

  BadRequestAuthResponseErrorV2: # Bad Request specific to Authorizations and transactions
    docs: >-
      Bad request error for v2 Money In auth endpoint (HTTP 400). Returned when request validation fails.
      Follows RFC 7807 Problem Details format with Payabli-specific unified response codes. See the [Pay In unified response codes reference](/developers/references/pay-in-unified-response-codes-reference) for the complete list of codes.
    status-code: 400
    type: V2BadRequestError
    examples:
      - name: InvalidCVV
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "Invalid CVV number"
          instance: "/api/v2/MoneyIn/auth"
          code: "E7016"
          errors:
            "paymentMethod.cvv":
              - message: "Invalid CVV number provided"
                suggestion: "Provide a valid CVV number in payment method object"
          token: null
      - name: InvalidCardNumber
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "Invalid card number"
          instance: "/api/v2/MoneyIn/getpaid"
          code: "E7015"
          errors:
            "paymentMethod.cardnumber":
              - message: "Invalid card number provided"
                suggestion: "Provide a valid card number in payment method object"
          token: null
  
  BadRequestCaptureResponseErrorV2: ## Bad Request specific to Captures
    docs: >-
      Bad request error for v2 Money In capture endpoint (HTTP 400). Returned when request validation fails.
      Follows RFC 7807 Problem Details format with Payabli-specific unified response codes. See the [Pay In unified response codes reference](/guides/pay-in-unified-response-codes-reference) for the complete list of codes.
    status-code: 400
    type: V2BadRequestError
    examples:
      - name: CaptureAmountExceedsAuthorized
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "Invalid Amount"
          instance: "/api/v2/MoneyIn/capture/10-3ffa27df-b171-44e0-b251-e95fbfc7a723/999999"
          code: "E8012"
          errors:
            "amount":
              - message: "Amount value is greater than authorized amount for action"
                suggestion: "Provide a valid amount"
          token: null
      - name: TransactionNotAuthorized
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "Capture not allowed"
          instance: "/api/v2/MoneyIn/capture/10-3ffa27df-b171-44e0-b251-e95fbfc7a723/100"
          code: "D0330"
          errors:
            "transId":
              - message: "The transaction is not authorized for capture This error may occur because the transaction was captured, declined, or already reversed"
                suggestion: "Conntact support for assistance"
          token: null
    
  BadRequestRefundResponseErrorV2: # Bad Request specific to Refunds
    docs: >-
      Bad request error for v2 Money In refund endpoint (HTTP 400). Returned when request validation fails.
      Follows RFC 7807 Problem Details format with Payabli-specific unified response codes. See the [Pay In unified response codes reference](/guides/pay-in-unified-response-codes-reference) for the complete list of codes.
    status-code: 400
    type: V2BadRequestError
    examples:
      - name: RefundAmountExceedsAvailable
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "Invalid Amount"
          instance: "/api/v2/MoneyIn/refund/10-3ffa27df-b171-44e0-b251-e95fbfc7a723/999999"
          code: "E3012"
          errors:
            "amount":
              - message: "Amount value is greater than available amount for action"
                suggestion: "Provide a valid amount"
          token: null
      - name: TransactionCannotBeRefunded
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "The transaction cannot be refunded"
          instance: "/api/v2/MoneyIn/refund/10-3ffa27df-b171-44e0-b251-e95fbfc7a723/100"
          code: "E3007"
          errors:
            "transId":
              - message: "We can't refund this transaction because it already has an associated chargeback or return"
                suggestion: "Contact support with questions"
          token: null
      - name: InvalidTransactionStatus
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "Invalid transaction status"
          instance: "/api/v2/MoneyIn/capture/10-3ffa27df-b171-44e0-b251-e95fbfc7a723"
          code: "E7002"
          errors:
            "transId":
              - message: "The status of the transaction does not allow the action requested"
                suggestion: "Verify the status of the transaction. For refunds, the transaction must be settled. When voiding or canceling a sale, auth, or a refund transaction, the status must be Approved (1) or Authorized (11)."
          token: null

  BadRequestVoidResponseErrorV2: # Bad Request specific to Voids
    docs: >-
      Bad request error for v2 Money In void endpoint (HTTP 400). Returned when request validation fails.
      Follows RFC 7807 Problem Details format with Payabli-specific unified response codes. See the [Pay In unified response codes reference](/guides/pay-in-unified-response-codes-reference) for the complete list of codes.
    status-code: 400
    type: V2BadRequestError
    examples:
      - name: VoidDecline
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "Void is declined"
          instance: "/api/v2/MoneyIn/void/10-3ffa27df-b171-44e0-b251-e95fbfc7a723"
          code: "E7043"
          errors:
            "transId":
              - message: "Void is not allowed after the batch is closed"
                suggestion: "Perform a refund instead. A transaction can't be voided after batch close."
          token: null
      - name: InvalidTransactionStatus
        value:
          type: "https://docs.payabli.com/developers/references/pay-in-unified-response-codes"
          title: "Bad Request"
          status: 400
          detail: "Invalid transaction status"
          instance: "/api/v2/MoneyIn/capture/10-3ffa27df-b171-44e0-b251-e95fbfc7a723"
          code: "E7002"
          errors:
            "transId":
              - message: "The status of the transaction does not allow the action requested"
                suggestion: "Verify the status of the transaction. For refunds, the transaction must be settled. When voiding or canceling a sale, auth, or a refund transaction, the status must be Approved (1) or Authorized (11)."
          token: null

