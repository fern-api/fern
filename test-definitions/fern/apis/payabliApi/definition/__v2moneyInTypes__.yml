# V2 Error Response Types

  V2BadRequestErrorDetail:
    docs: Individual field error detail for bad request responses.
    properties:
      message:
        docs: Description of the validation error.
        type: string
      suggestion:
        docs: Suggested action to fix the error.
        type: string

  V2BadRequestError:
    docs: >-
      Bad request error response (HTTP 400) returned when request validation fails.
      Follows RFC 7807 Problem Details format with additional Payabli-specific fields.
    properties:
      type:
        docs: >-
          A URI reference that identifies the problem type. Points to human-readable
          documentation for this error type.
        type: string
      title:
        docs: Always "Bad Request" for 400 errors.
        type: string
      status:
        docs: HTTP status code, always 400 for bad requests.
        type: integer
      detail:
        docs: Short description of the error.
        type: string
      instance:
        docs: Request URL that caused the error.
        type: string
      code:
        docs: >-
          Payabli's unified response code for validation errors. Starts with 'E'.
          See [Pay In unified response codes reference](/guides/pay-in-unified-response-codes-reference) for more information.
        type: string
      errors:
        docs: >-
          Dictionary of field-specific validation errors. Keys are field paths
          (e.g., "paymentMethod.cardnumber") and values are arrays of error details.
        type: map<string, list<V2BadRequestErrorDetail>>
      token:
        docs: >-
          Pagination token (equivalent to pageIdentifier in v1 APIs). Usually null for errors.
        type: nullable<string>

  V2InternalServerError:
    docs: >-
      Internal server error response (HTTP 500) returned when an unexpected error occurs.
      Follows RFC 7807 Problem Details format.
    examples:
      - name: Server error
        value:
          title: "Internal Server Error"
          status: 500
          detail: "An unexpected error occurred while processing your request"
          instance: "/api/v2/MoneyIn/getpaid"
    properties:
      title:
        docs: Always "Internal Server Error" for 500 errors.
        type: string
      status:
        docs: HTTP status code, always 500 for internal errors.
        type: integer
      detail:
        docs: Additional details about the internal error.
        type: string
      instance:
        docs: Request URL that caused the error.
        type: string

