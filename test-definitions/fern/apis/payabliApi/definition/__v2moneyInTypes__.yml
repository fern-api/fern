  InternalServerResponseErrorV2:
    docs: >-
      Internal server error for v2 Money In endpoints (HTTP 500). Returned when an unexpected
      error occurs. Follows RFC 7807 Problem Details format.
    status-code: 500
    type: V2InternalServerError

types:

  # V2 Money In Transaction Response Types
  # These types reuse existing definitions from root and moneyIn where possible


# V2 Response Wrapper Types (Success/Decline)

  V2ResponseCode:
    docs: >-
      Payabli's unified response code. Starts with `A` (Approved) or `D` (Declined) followed
      by a four-digit code that provides specific details about the transaction result.
      See [Pay In unified response codes reference](/guides/pay-in-unified-response-codes-reference) for more information.
    type: string

  V2ResponseReason:
    docs: Human-readable reason corresponding to the response code.
    type: string

  V2ResponseExplanation:
    docs: Detailed description of the response code.
    type: string

  V2ResponseAction:
    docs: Recommended resolution approach or next steps based on the response.
    type: string

  V2TransactionResponseWrapper:
    docs: >-
      Standard response wrapper for v2 Money In transaction endpoints. All v2 transaction
      endpoints return responses in this format with consistent `code`, `reason`, `explanation`,
      and `action` fields. The `data` field contains transaction details.
    properties:
      code: V2ResponseCode
      reason: V2ResponseReason
      explanation: V2ResponseExplanation
      action: V2ResponseAction
      data: V2TransactionDetails
      token:
        docs: >-
          Pagination token (equivalent to `pageIdentifier` in v1 APIs). Returns `null` when
          pagination is not applicable.
        type: nullable<string>

  V2DeclinedTransactionResponseWrapper:
    docs: >-
      Response wrapper for declined v2 Money In transaction endpoints (HTTP 402). Returned when
      a transaction is declined by the card network or issuer. All decline responses use this format
      with unified response codes starting with 'D'. The `data` field contains transaction details.
    properties:
      code: V2ResponseCode
      reason: V2ResponseReason
      explanation: V2ResponseExplanation
      action: V2ResponseAction
      data: V2TransactionDetails
      token:
        docs: >-
          Pagination token (equivalent to `pageIdentifier` in v1 APIs). Returns `null` when
          pagination is not applicable.
        type: nullable<string>
    examples:
      - name: DoNotHonor
        value:
          code: "D0100"
          reason: "Declined"
