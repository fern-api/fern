# yaml-language-server: $schema=../../../../generators-yml.schema.json
api:
  specs:
    - openapi: ./openapi.yml
groups:
  php-sdk:
    generators:
      - name: fernapi/fern-php-sdk
        version: latest
        ir-version: v62
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/php-sdk-tests
          branch: no-content-response
