openapi: 3.1.0
info:
  title: no-content-response
  description: Tests endpoints that return both 200 with a JSON body and 204 with no content
  version: ""
paths:
  /contacts:
    post:
      tags:
        - Contacts
      summary: Create Contact
      description: Creates a new contact. Returns 200 with the contact or 204 with no content.
      operationId: contacts_create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "204":
          description: No Content
          content: {}
      x-fern-sdk-group-name: contacts
      x-fern-sdk-method-name: create
  /contacts/{id}:
    get:
      tags:
        - Contacts
      summary: Get Contact
      description: Gets a contact by ID. Returns 200 with the contact.
      operationId: contacts_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
      x-fern-sdk-group-name: contacts
      x-fern-sdk-method-name: get
components:
  schemas:
    CreateContactRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
      required:
        - name
    Contact:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
      required:
        - id
        - name
