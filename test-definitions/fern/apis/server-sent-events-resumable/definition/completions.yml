types:
  StreamedCompletion:
    properties:
      delta: string
      tokens: optional<integer>

service:
  auth: false
  base-path: ""
  endpoints:
    stream:
      method: POST
      path: /stream
      request:
        name: StreamCompletionRequest
        body:
          properties:
            query: string
      response-stream:
        type: StreamedCompletion
        format: sse
        terminator: "[[DONE]]"
        resumable: true
      examples:
        - name: "Stream completions (resumable)"
          request:
            query: "foo"
          response:
            stream:
              - event: completion
                data:
                  delta: "hello"
                  tokens: 1
              - event: completion
                data:
                  delta: " world"
                  tokens: 2

    streamNonResumable:
      method: POST
      path: /stream-non-resumable
      request:
        name: StreamCompletionRequestNonResumable
        body:
          properties:
            query: string
      response-stream:
        type: StreamedCompletion
        format: sse
        terminator: "[[DONE]]"
        resumable: false
      examples:
        - name: "Stream completions (non-resumable)"
          request:
            query: "bar"
          response:
            stream:
              - event: completion
                data:
                  delta: "no resume"
                  tokens: 1
