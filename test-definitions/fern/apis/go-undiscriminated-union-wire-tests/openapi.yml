openapi: 3.1.0
info:
  title: api
  version: 0.0.0
paths:
  /rerank:
    post:
      description: Rerank documents based on relevance to a query
      operationId: service_rerank
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RerankResponse'
              examples:
                Example1:
                  value:
                    results:
                      - Washington, D.C. is the capital of the United States.
                      - >-
                        Carson City is the capital city of the American state of
                        Nevada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerankRequest'
            examples:
              Example1:
                value:
                  documents:
                    - text: >-
                        Carson City is the capital city of the American state of
                        Nevada.
                    - text: Washington, D.C. is the capital of the United States.
                  query: What is the capital of the United States?
components:
  schemas:
    DocumentItem:
      title: DocumentItem
      oneOf:
        - type: string
        - $ref: '#/components/schemas/DocumentObject'
    DocumentObject:
      title: DocumentObject
      type: object
      properties:
        text:
          type: string
      required:
        - text
    RerankRequest:
      title: RerankRequest
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentItem'
        query:
          type: string
          examples:
            - What is the capital of the United States?
      required:
        - documents
        - query
    RerankResponse:
      title: RerankResponse
      type: object
      properties:
        results:
          type: array
          items:
            type: string
          examples:
            - - Washington, D.C. is the capital of the United States.
              - Carson City is the capital city of the American state of Nevada.
      required:
        - results
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
