openapi: 3.1.0
info:
  title: builder-extension
  version: 0.0.0
paths:
  /api/hello:
    get:
      operationId: service_hello
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloResponse'
      security:
        - Bearer: []
components:
  schemas:
    HelloResponse:
      title: HelloResponse
      type: object
      properties:
        message:
          type: string
      required:
        - message
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
servers:
  - url: https://api.example.com
    description: Production
  - url: https://api.{DEV_NAMESPACE}.example.com
    description: Development
    variables:
      DEV_NAMESPACE:
        default: ''
  - url: https://api.{STAGE_ENV}.example.com
    description: Staging
    variables:
      STAGE_ENV:
        default: ''
