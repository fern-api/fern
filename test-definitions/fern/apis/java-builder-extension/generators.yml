# yaml-language-server: $schema=../../../../generators-yml.schema.json
api:
  specs:
    - openapi: ./openapi.yml
default-group: local
groups:
  local:
    generators:
      - name: fernapi/fern-java-sdk
        version: 2.38.1
        output:
          location: local-file-system
          path: ../../../../../../seed/java-sdk/builder-extension
        config:
          client-class-name: BaseClient
  php-sdk:
    generators:
      - name: fernapi/fern-php-sdk
        version: latest
        ir-version: v61
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/php-sdk-tests
          branch: java-builder-extension
  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: latest
        ir-version: v61
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/go-sdk-tests
          branch: java-builder-extension
