types:
  StreamedCompletion:
    properties:
      delta: string
      tokens: optional<integer>

  CompletionEvent:
    properties:
      content: string

  EventEvent:
    properties:
      event: string

  ErrorEvent:
    properties:
      error: string
      code: optional<integer>

  StreamEventContextProtocol:
    discriminant:
      value: event
      context: protocol
    union:
      completion: CompletionEvent
      error: ErrorEvent
      event: EventEvent

  StreamEvent:
    discriminant:
      value: event
    union:
      completion: CompletionEvent
      error: ErrorEvent

errors:
  BadRequestError:
    status-code: 400
    type: string

service:
  auth: false
  base-path: ""
  endpoints:
    stream:
      method: POST
      path: /stream
      request:
        name: StreamCompletionRequest
        body:
          properties:
            query: string
      response-stream:
        type: StreamedCompletion
        format: sse
        terminator: "[[DONE]]"
      errors:
        - BadRequestError
      examples:
        - name: "Stream completions"
          request:
            query: "foo"
          response:
            stream:
              - event: completion
                data:
                  delta: "foo"
                  tokens: 1
              - event: completion
                data:
                  delta: "bar"
                  tokens: 2
        - name: "Bad request"
          request:
            query: ""
          response:
            error: BadRequestError
            body: "bad request"

    streamEvents:
      method: POST
      path: /stream-events
      request:
        name: StreamEventsRequest
        body:
          properties:
            query: string
      response-stream:
        type: StreamEvent
        format: sse
        terminator: "[DONE]"
      errors:
        - BadRequestError
      examples:
        - name: "Stream events"
          request:
            query: "query"
          response:
            stream:
              - data:
                  event: completion
                  content: "content"
        - name: "Bad request"
          request:
            query: ""
          response:
            error: BadRequestError
            body: "bad request"

    streamEventsContextProtocol:
      method: POST
      path: /stream-events-context-protocol
      request:
        name: StreamEventsRequest
        body:
          properties:
            query: string
      response-stream:
        type: StreamEventContextProtocol
        format: sse
        terminator: "[DONE]"
      errors:
        - BadRequestError
      examples:
        - name: "Stream events"
          request:
            query: "query"
          response:
            stream:
              - event: completion
                data:
                  content: "content"
              - event: event
                data:
                  event: "event"
        - name: "Bad request"
          request:
            query: ""
          response:
            error: BadRequestError
            body: "bad request"
