types:
  StreamedCompletion:
    properties:
      delta: string
      tokens: optional<integer>

  CompletionEvent:
    properties:
      content: string

  ErrorEvent:
    properties:
      error: string
      code: optional<integer>

  StreamEvent:
    discriminant:
      value: event
      context: protocol
    union:
      completion: CompletionEvent
      error: ErrorEvent

service:
  auth: false
  base-path: ""
  endpoints:
    stream:
      method: POST
      path: /stream
      request:
        name: StreamCompletionRequest
        body:
          properties:
            query: string
      response-stream:
        type: StreamedCompletion
        format: sse
        terminator: "[[DONE]]"
      examples:
        - name: "Stream completions"
          request:
            query: "foo"
          response:
            stream:
              - event: discriminant-1
                data:
                  delta: "foo"
                  tokens: 1
              - event: discriminant-2
                data:
                  delta: "bar"
                  tokens: 2

    streamEvents:
      method: POST
      path: /stream-events
      request:
        name: StreamEventsRequest
        body:
          properties:
            query: string
      response-stream:
        type: StreamEvent
        format: sse
        terminator: "[DONE]"
