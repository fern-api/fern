openapi: 3.0.1
info:
  title: server-sent-event-examples
  version: ''
paths:
  /stream:
    post:
      operationId: completions_stream
      tags:
        - Completions
      parameters: []
      responses:
        '200':
          description: ''
          content:
            text/event-stream:
              schema:
                type: string
                format: binary
        '400':
          description: ''
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required:
                - query
  /stream-events:
    post:
      operationId: completions_streamEvents
      tags:
        - Completions
      parameters: []
      responses:
        '200':
          description: ''
          content:
            text/event-stream:
              schema:
                type: string
                format: binary
        '400':
          description: ''
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required:
                - query
  /stream-events-context-protocol:
    post:
      operationId: completions_streamEventsContextProtocol
      tags:
        - Completions
      parameters: []
      responses:
        '200':
          description: ''
          content:
            text/event-stream:
              schema:
                type: string
                format: binary
        '400':
          description: ''
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required:
                - query
components:
  schemas:
    StreamedCompletion:
      title: StreamedCompletion
      type: object
      properties:
        delta:
          type: string
        tokens:
          type: integer
          nullable: true
      required:
        - delta
    CompletionEvent:
      title: CompletionEvent
      type: object
      properties:
        content:
          type: string
      required:
        - content
    EventEvent:
      title: EventEvent
      type: object
      properties:
        event:
          type: string
        name:
          type: string
      required:
        - event
        - name
    ErrorEvent:
      title: ErrorEvent
      type: object
      properties:
        error:
          type: string
        code:
          type: integer
          nullable: true
      required:
        - error
    StreamEventContextProtocol:
      title: StreamEventContextProtocol
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - completion
            - $ref: '#/components/schemas/CompletionEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - error
            - $ref: '#/components/schemas/ErrorEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - event
            - $ref: '#/components/schemas/EventEvent'
          required:
            - event
    StreamEvent:
      title: StreamEvent
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - completion
            - $ref: '#/components/schemas/CompletionEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - error
            - $ref: '#/components/schemas/ErrorEvent'
          required:
            - event
  securitySchemes: {}
