openapi: 3.1.0
info:
  title: server-sent-events
  version: 0.0.0
paths:
  /stream:
    post:
      operationId: completions_stream
      tags:
        - Completions
      parameters: []
      responses:
        '204':
          description: No content
        '400':
          description: BadRequestError
          content:
            application/json:
              schema:
                type: string
              examples:
                Bad request:
                  value: bad request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  examples:
                    - foo
              required:
                - query
            examples:
              Stream completions:
                value:
                  query: foo
              Bad request:
                value:
                  query: ''
  /stream-events:
    post:
      operationId: completions_streamEvents
      tags:
        - Completions
      parameters: []
      responses:
        '204':
          description: No content
        '400':
          description: BadRequestError
          content:
            application/json:
              schema:
                type: string
              examples:
                Bad request:
                  value: bad request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  examples:
                    - query
              required:
                - query
            examples:
              Stream events:
                value:
                  query: query
              Bad request:
                value:
                  query: ''
  /stream-events-context-protocol:
    post:
      operationId: completions_streamEventsContextProtocol
      tags:
        - Completions
      parameters: []
      responses:
        '204':
          description: No content
        '400':
          description: BadRequestError
          content:
            application/json:
              schema:
                type: string
              examples:
                Bad request context protocol:
                  value: bad request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  examples:
                    - query
              required:
                - query
            examples:
              Stream events context protocol:
                value:
                  query: query
              Bad request context protocol:
                value:
                  query: ''
components:
  schemas:
    StreamedCompletion:
      title: StreamedCompletion
      type: object
      properties:
        delta:
          type: string
        tokens:
          type:
            - integer
            - 'null'
      required:
        - delta
    CompletionEvent:
      title: CompletionEvent
      type: object
      properties:
        content:
          type: string
      required:
        - content
    EventEvent:
      title: EventEvent
      type: object
      properties:
        event:
          type: string
        name:
          type: string
      required:
        - event
        - name
    ErrorEvent:
      title: ErrorEvent
      type: object
      properties:
        error:
          type: string
        code:
          type:
            - integer
            - 'null'
      required:
        - error
    StreamEventContextProtocol:
      title: StreamEventContextProtocol
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  const: completion
            - $ref: '#/components/schemas/CompletionEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  const: error
            - $ref: '#/components/schemas/ErrorEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  const: event
            - $ref: '#/components/schemas/EventEvent'
          required:
            - event
    StreamEvent:
      title: StreamEvent
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  const: completion
            - $ref: '#/components/schemas/CompletionEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  const: error
            - $ref: '#/components/schemas/ErrorEvent'
          required:
            - event
  securitySchemes: {}
