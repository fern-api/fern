types:
  MovieId: string

  Movie:
    availability: generally-available
    properties:
      id: MovieId
      title: string
      rating:
        type: double
        docs: The rating scale is one to five stars
        availability: deprecated

  CreateMovieRequest:
    properties:
      title: string
      rating: double

service:
  auth: false
  base-path: /movies
  endpoints:
    createMovie:
      docs: Add a movie to the database using the movies/*/... path.
      method: POST
      path: /create-movie
      request: CreateMovieRequest
      response:
        type: MovieId
        status-code: 201
      availability: pre-release

    getMovie:
      method: GET
      path: /{movieId}
      path-parameters:
        movieId: MovieId
      response: Movie
      availability: deprecated
      errors:
        - MovieDoesNotExistError

errors:
  MovieDoesNotExistError:
    status-code: 404
    type: MovieId
