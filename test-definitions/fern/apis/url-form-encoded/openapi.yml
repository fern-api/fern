openapi: 3.0.3
info:
  title: URL Form Encoded API
  version: "1.0.0"
paths:
  /submit:
    post:
      summary: "Submit form data"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: "The user's username"
                  example: johndoe
                email:
                  type: string
                  format: email
                  description: "The user's email address"
                  example: john@example.com
              required:
                - username
                - email
      responses:
        "200":
          description: "Successful operation"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Data received successfully."
  /token:
    post:
      operationId: get_token
      summary: "Get OAuth token"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        "200":
          description: "Token issued successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
components:
  schemas:
    TokenRequest:
      type: object
      required:
        - client_id
        - client_secret
      properties:
        client_id:
          type: string
          description: "Client identifier"
        client_secret:
          type: string
          description: "Client secret"
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
