openapi: 3.0.1
info:
  title: ts-express-casing
  version: ''
paths:
  /movies/create-movie:
    post:
      description: Add a movie to the database
      operationId: imdb_create_movie
      tags:
        - Imdb
      parameters: []
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/MovieId'
                movie_title:
                  type: string
                movie_rating:
                  type: number
                  format: double
                  description: The rating scale is one to five stars
              required:
                - id
                - movie_title
                - movie_rating
  /movies/{movie_id}:
    get:
      operationId: imdb_get_movie
      tags:
        - Imdb
      parameters:
        - name: movie_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MovieId'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieId'
components:
  schemas:
    MovieId:
      title: MovieId
      type: string
    Movie:
      title: Movie
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MovieId'
        title:
          type: string
        rating:
          type: number
          format: double
          description: The rating scale is one to five stars
      required:
        - id
        - title
        - rating
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
