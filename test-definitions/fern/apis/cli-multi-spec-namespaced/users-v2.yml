openapi: 3.0.0
info:
  title: Users API (v2)
  version: "2.0.0"
  description: v2 users surface with richer fields and pagination.
servers:
  - url: https://api.example.com/v2
paths:
  /users:
    get:
      operationId: listUsers
      summary: List users (v2 shape)
      parameters:
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserV2"
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    UserV2:
      type: object
      required:
        - id
        - profile
      properties:
        id:
          type: string
        profile:
          type: object
          properties:
            email:
              type: string
            displayName:
              type: string
