openapi: 3.0.3
info:
  title: Server URL Templating API
  description: API demonstrating server URL templating with variables
  version: 1.0.0
servers:
  - url: https://api.{region}.{environment}.example.com/v1
    description: Regional API server
    variables:
      region:
        default: us-east-1
        description: The AWS region
        enum:
          - us-east-1
          - us-west-2
          - eu-west-1
      environment:
        default: prod
        description: The deployment environment
        enum:
          - prod
          - staging
          - dev
paths:
  /users:
    get:
      operationId: getUsers
      summary: Get all users
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /users/{userId}:
    get:
      operationId: getUser
      summary: Get a user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
