# yaml-language-server: $schema=../../../../generators-yml.schema.json
api:
  specs:
    - openapi: ./openapi.yml
groups:
  php-sdk:
    generators:
      - name: fernapi/fern-php-sdk
        version: latest
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/php-sdk-tests
          branch: basic-auth-pw-omitted
  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: latest
        ir-version: v63
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/go-sdk-tests
          branch: basic-auth-pw-omitted
