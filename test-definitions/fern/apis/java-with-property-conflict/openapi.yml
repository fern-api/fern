openapi: 3.1.0
info:
  title: java-with-property-conflict
  version: 0.0.0
paths: {}
components:
  schemas:
    ConfigurableProp:
      title: ConfigurableProp
      type: object
      description: >-
        A type with both 'label' and 'withLabel' properties that triggers
        Jackson conflict
      properties:
        name:
          type: string
          description: The name of the prop
        label:
          type:
            - string
            - 'null'
          description: The display label
        withLabel:
          type:
            - boolean
            - 'null'
          description: If true, requires label-value format
        description:
          type:
            - string
            - 'null'
          description: A description of the prop
      required:
        - name
  securitySchemes: {}
