types:
  ObjectWithOptionalField: #generic object that supports any type, makes it easier to use when testing
    properties:
      string:
        type: optional<string>
        docs: This is a rather long descriptor of this single field in a more complex type. If you ask me I think this is a pretty good description for this field all things considered.
      integer: optional<integer>
      long: optional<long>
      double: optional<double>
      bool: optional<boolean>
      datetime: optional<datetime>
      date: optional<date>
      uuid: optional<uuid>
      base64: optional<base64>
      list: optional<list<string>>
      set: optional<set<string>>
      map: optional<map<integer, string>>
      bigint: optional<bigint>

  ObjectWithRequiredField:
    properties:
      string: string

  ObjectWithMapOfMap:
    properties:
      map: map<string, map<string, string>>

  NestedObjectWithOptionalField:
    properties:
      string: optional<string>
      NestedObject: optional<ObjectWithOptionalField>

  NestedObjectWithRequiredField:
    properties:
      string: string
      NestedObject: ObjectWithOptionalField

  DoubleOptional:
    properties:
      optionalAlias: optional<OptionalAlias>

  OptionalAlias: optional<string>

  ObjectWithDatetimeLikeString:
    docs: |
      This type tests that string fields containing datetime-like values
      are NOT reformatted by the wire test generator. The string field
      should preserve its exact value even if it looks like a datetime.
    properties:
      datetimeLikeString:
        type: string
        docs: A string field that happens to contain a datetime-like value
      actualDatetime:
        type: datetime
        docs: An actual datetime field for comparison

  ObjectWithUnknownField:
    docs: |
      Tests that unknown/any values containing backslashes in map keys
      are properly escaped in Go string literals.
    properties:
      unknown: unknown

  ObjectWithDocumentedUnknownType:
    docs: |
      Tests that unknown types are able to preserve their type names.
    properties:
      documentedUnknownType: DocumentedUnknownType

  DocumentedUnknownType:
    docs: |
      Tests that unknown types are able to preserve their docstrings.
    type: unknown

  MapOfDocumentedUnknownType:
    docs: Tests that map value types with unknown types don't get spurious | undefined.
    type: map<string, DocumentedUnknownType>

errors:
  ObjectWithOptionalFieldError:
    status-code: 400
    type: ObjectWithOptionalField

  ObjectWithRequiredFieldError:
    status-code: 400
    type: ObjectWithRequiredField

  NestedObjectWithOptionalFieldError:
    status-code: 400
    type: NestedObjectWithOptionalField

  NestedObjectWithRequiredFieldError:
    status-code: 400
    type: NestedObjectWithRequiredField
