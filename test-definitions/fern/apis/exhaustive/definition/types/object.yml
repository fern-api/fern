imports:
  enums: enum.yml

types:
  ObjectWithOptionalField: #generic object that supports any type, makes it easier to use when testing
    properties:
      string:
        type: optional<string>
        docs: This is a rather long descriptor of this single field in a more complex type. If you ask me I think this is a pretty good description for this field all things considered.
      integer: optional<integer>
      long: optional<long>
      double: optional<double>
      bool: optional<boolean>
      datetime: optional<datetime>
      date: optional<date>
      uuid: optional<uuid>
      base64: optional<base64>
      list: optional<list<string>>
      set: optional<set<string>>
      map: optional<map<integer, string>>
      bigint: optional<bigint>

  ObjectWithRequiredField:
    properties:
      string: string

  ObjectWithMapOfMap:
    properties:
      map: map<string, map<string, string>>

  NestedObjectWithOptionalField:
    properties:
      string: optional<string>
      NestedObject: optional<ObjectWithOptionalField>

  NestedObjectWithRequiredField:
    properties:
      string: string
      NestedObject: ObjectWithOptionalField

  DoubleOptional:
    properties:
      optionalAlias: optional<OptionalAlias>

  OptionalAlias: optional<string>

  ObjectWithDatetimeLikeString:
    docs: |
      This type tests that string fields containing datetime-like values
      are NOT reformatted by the wire test generator. The string field
      should preserve its exact value even if it looks like a datetime.
    properties:
      datetimeLikeString:
        type: string
        docs: A string field that happens to contain a datetime-like value
      actualDatetime:
        type: datetime
        docs: An actual datetime field for comparison

  ObjectWithMalformedDatetimeExample:
    docs: |
      Tests that malformed date-time examples (e.g. space instead of "T" separator)
      are normalized to valid ISO 8601 before being emitted into wire test mock
      responses, so strict SDK parsers (Go, Java) do not fail at deserialization.
    properties:
      datetimeField:
        type: datetime
        docs: A datetime field whose example uses a non-RFC3339 format
      stringField:
        type: string
        docs: A plain string field to confirm non-datetime values are untouched

  ObjectWithUnknownField:
    docs: |
      Tests that unknown/any values containing backslashes in map keys
      are properly escaped in Go string literals.
    properties:
      unknown: unknown

  ObjectWithDocumentedUnknownType:
    docs: |
      Tests that unknown types are able to preserve their type names.
    properties:
      documentedUnknownType: DocumentedUnknownType

  DocumentedUnknownType:
    docs: |
      Tests that unknown types are able to preserve their docstrings.
    type: unknown

  MapOfDocumentedUnknownType:
    docs: Tests that map value types with unknown types don't get spurious | undefined.
    type: map<string, DocumentedUnknownType>

  ObjectWithMixedRequiredAndOptionalFields:
    docs: |
      Tests that dynamic snippets include all required properties even when
      the example data only provides a subset. In C#, properties marked as
      `required` must be set in the object initializer.
    properties:
      requiredString: string
      requiredInteger: integer
      optionalString: optional<string>
      requiredLong: long

  ObjectWithRequiredNestedObject:
    docs: |
      Tests that dynamic snippets recursively construct default objects for
      required properties whose type is a named object. The nested object's
      own required properties should also be filled with defaults.
    properties:
      requiredString: string
      requiredObject: NestedObjectWithRequiredField

  ObjectWithInheritedRequiredEnum:
    docs: |
      A base object that has a required enum field, preventing Default derive
      in Rust because enums don't implement Default.
    properties:
      requiredEnum: enums.WeatherReport
      requiredString: string

  ExtendedObjectWithInheritedEnum:
    docs: |
      Extends ObjectWithInheritedRequiredEnum, inheriting the required enum field.
      This type should NOT derive Default in Rust because the parent type
      has a required enum field.
    extends: ObjectWithInheritedRequiredEnum
    properties:
      optionalDescription: optional<string>

  ObjectWithRequiredExtendedField:
    docs: |
      Tests that a struct with a required field whose type extends a non-Default
      base type does NOT incorrectly derive Default in Rust. Reproduces the bug
      where namedTypeSupportsDefault only checked properties but not extends.
    properties:
      requiredExtended: ExtendedObjectWithInheritedEnum

errors:
  ObjectWithOptionalFieldError:
    status-code: 400
    type: ObjectWithOptionalField

  ObjectWithRequiredFieldError:
    status-code: 400
    type: ObjectWithRequiredField

  NestedObjectWithOptionalFieldError:
    status-code: 400
    type: NestedObjectWithOptionalField

  NestedObjectWithRequiredFieldError:
    status-code: 400
    type: NestedObjectWithRequiredField
