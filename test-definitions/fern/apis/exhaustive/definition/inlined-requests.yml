imports:
  objects: ./types/object.yml
  enums: ./types/enum.yml
  errors: ./general-errors.yml

# test req bodies, path params, query params, multiple query params, etc.
# test union and enum as well

service:
  auth: false
  base-path: /req-bodies
  endpoints:
    postWithObjectBodyandResponse:
      docs: POST with custom object in request body, response is an object
      path: /object
      method: POST
      request:
        name: PostWithObjectBody
        body:
          properties:
            string: string
            integer: integer
            NestedObject: objects.ObjectWithOptionalField
      response: objects.ObjectWithOptionalField
      errors:
        - errors.BadRequestBody

    postWithBooleanLiteralInRequest:
      docs: POST with boolean literal in request body to test that snippets wrap boolean literals correctly
      path: /boolean-literal
      method: POST
      request:
        name: PostWithBooleanLiteralRequest
        body:
          properties:
            stream: literal<false>
            query: string
      response: string

    getWithEnumPathParam:
      docs: GET with enum path parameter to test that enum path params emit string wire values instead of enum case shorthand
      path: /enum/{weather}
      method: GET
      request:
        name: GetWithEnumPathParam
        path-parameters:
          weather: enums.WeatherReport
        query-parameters:
          query: string
      response: string

    postWithChildResource:
      docs: POST returning ChildResource to test that inherited property ordering matches Swift struct initializer order
      path: /child-resource
      method: POST
      request:
        name: PostWithChildResource
        body:
          properties:
            childResource: objects.ChildResource
      response: objects.ChildResource
