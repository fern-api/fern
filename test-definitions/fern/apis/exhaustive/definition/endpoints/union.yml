imports:
  unions: ../types/union.yml
  objects: ../types/object.yml

service:
  auth: true
  base-path: /union
  endpoints:
    getAndReturnUnion:
      method: POST
      path: ""
      request: unions.Animal
      response: unions.Animal
    getAndReturnObjectWithUnionField:
      method: POST
      path: /object
      request: objects.ObjectWithUnionField
      response: objects.ObjectWithUnionField
