imports:
  objects: ../types/object.yml

service:
  auth: true
  base-path: /http-methods

  endpoints:
    testGet:
      method: GET
      path: /{id}
      path-parameters:
        id: string
      response: string

    testPost:
      method: POST
      path: ""
      request: objects.ObjectWithRequiredField
      response: objects.ObjectWithOptionalField
      availability: deprecated

    testPut:
      method: PUT
      path: /{id}
      path-parameters:
        id: string
      request: objects.ObjectWithRequiredField
      response: objects.ObjectWithOptionalField
      availability:
        status: deprecated
        message: Use testPatch instead.

    testPatch:
      method: PATCH
      path: /{id}
      path-parameters:
        id: string
      request: objects.ObjectWithOptionalField
      response: objects.ObjectWithOptionalField
      availability: pre-release

    testDelete:
      method: DELETE
      path: /{id}
      path-parameters:
        id: string
      response: boolean
      availability: in-development
