    typesObjectWithDocs:
      title: typesObjectWithDocs
      type: object
      properties:
        string:
          type: string
          description: |-
            Characters that could lead to broken generated SDKs:

            Markdown Escapes:
            - \_: Escaped underscore (e.g., FOO\_BAR)
            - \*: Escaped asterisk

            JSDoc (JavaScript/TypeScript):
            - @: Used for JSDoc tags
            - {: }: Used for type definitions
            - <: >: HTML tags
            - *: Can interfere with comment blocks
            - /**: JSDoc comment start
            - ** /: JSDoc comment end
            - &: HTML entities

            XMLDoc (C#):
            - <: >: XML tags
            - &: ': ": <: >: XML special characters
            - {: }: Used for interpolated strings
            - ///: Comment marker
            - /**: Block comment start
            - ** /: Block comment end

            XMLDoc (C#) (Example of actual XML tags):
            See <a href="https://example.com/docs">the docs</a> for more info.
            Use <code>getValue()</code> to retrieve the value.
            Note: when count < 10 or count > 100, special handling applies.

            Javadoc (Java):
            - @: Used for Javadoc tags
            - <: >: HTML tags
            - &: HTML entities
            - *: Can interfere with comment blocks
            - /**: Javadoc comment start
            - ** /: Javadoc comment end

            Doxygen (C++):
            - \: Used for Doxygen commands
            - @: Alternative command prefix
            - <: >: XML/HTML tags
            - &: HTML entities
            - /**: C-style comment start
            - ** /: C-style comment end

            RDoc (Ruby):
            - :: Used in symbol notation
            - =: Section markers
            - #: Comment marker
            - =begin: Block comment start
            - =end: Block comment end
            - @: Instance variable prefix
            - $: Global variable prefix
            - %: String literal delimiter
            - #{: String interpolation start
            - }: String interpolation end

            PHPDoc (PHP):
            - @: Used for PHPDoc tags
            - {: }: Used for type definitions
            - $: Variable prefix
            - /**: PHPDoc comment start
            - ** /: PHPDoc comment end
            - *: Can interfere with comment blocks
            - &: HTML entities
      required:
        - string
    typesWeatherReport:
      title: typesWeatherReport
      type: string
      enum:
        - SUNNY
        - CLOUDY
        - RAINING
        - SNOWING
    typesObjectWithOptionalField:
      title: typesObjectWithOptionalField
      type: object
      properties:
        string:
          type: string
          nullable: true
          description: >-
            This is a rather long descriptor of this single field in a more
            complex type. If you ask me I think this is a pretty good
            description for this field all things considered.
        integer:
          type: integer
          nullable: true
        long:
          type: integer
          format: int64
          nullable: true
        double:
          type: number
          format: double
          nullable: true
        bool:
          type: boolean
          nullable: true
        datetime:
          type: string
          format: date-time
          nullable: true
        date:
          type: string
          format: date
          nullable: true
        uuid:
          type: string
          format: uuid
          nullable: true
        base64:
          type: string
          format: byte
          nullable: true
        list:
          type: array
          items:
            type: string
          nullable: true
        set:
          type: array
          items:
            type: string
          nullable: true
        map:
          type: object
          additionalProperties:
            type: string
          nullable: true
        bigint:
          type: integer
          format: bigint
          nullable: true
    typesObjectWithRequiredField:
      title: typesObjectWithRequiredField
      type: object
      properties:
        string:
          type: string
      required:
        - string
    typesObjectWithMapOfMap:
      title: typesObjectWithMapOfMap
      type: object
      properties:
        map:
          type: object
