      nullable: true
    typesObjectWithDatetimeLikeString:
      title: typesObjectWithDatetimeLikeString
      type: object
      description: |-
        This type tests that string fields containing datetime-like values
        are NOT reformatted by the wire test generator. The string field
        should preserve its exact value even if it looks like a datetime.
      properties:
        datetimeLikeString:
          type: string
          description: A string field that happens to contain a datetime-like value
        actualDatetime:
          type: string
          format: date-time
          description: An actual datetime field for comparison
      required:
        - datetimeLikeString
        - actualDatetime
    typesObjectWithUnknownField:
      title: typesObjectWithUnknownField
      type: object
      description: |-
        Tests that unknown/any values containing backslashes in map keys
        are properly escaped in Go string literals.
      properties:
        unknown: {}
      required:
        - unknown
