service:
  auth: false
  base-path: ""
  endpoints:
    upload:
      path: /upload-content
      method: POST
      request:
        content-type: "application/octet-stream"
        body: bytes
      examples:
        - {}
    uploadWithQueryParams:
      path: /upload-content-with-query-params
      method: POST
      request:
        name: UploadWithQueryParamsRequest
        content-type: "application/octet-stream"
        body: bytes
        query-parameters:
          model:
            type: string
            docs: The model to use for processing
          language:
            type: optional<string>
            docs: The language of the content
      examples:
        - query-parameters:
            model: "nova-2"
