openapi: 3.1.0
info:
  title: api
  version: 0.0.0
paths:
  /movies/create-movie:
    post:
      description: Add a movie to the database
      operationId: imdb_createMovie
      tags:
        - Imdb
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMovieRequest'
components:
  schemas:
    CreateMovieRequest:
      title: CreateMovieRequest
      type: object
      properties:
        title:
          type: string
        rating:
          type: number
          format: double
      required:
        - title
        - rating
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
