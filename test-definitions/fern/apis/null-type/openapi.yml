openapi: 3.1.0
info:
  title: null-type
  description: Tests handling of OpenAPI 3.1 type "null" in response schemas
  version: ""
paths:
  /conversations/outbound-call:
    post:
      tags:
        - Conversations
      summary: Outbound Call
      description: Place an outbound call or validate call setup with dry_run.
      operationId: conversations_outboundCall
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                to_phone_number:
                  type: string
                  description: The phone number to call in E.164 format.
                dry_run:
                  type: boolean
                  description: If true, validates the outbound call setup without placing a call.
              required:
                - to_phone_number
      responses:
        "200":
          description: Dry run succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation_id:
                    type: "null"
                    description: Always null when dry_run is true.
                  dry_run:
                    type: boolean
                    enum: [true]
                    description: Always true for this response.
                required:
                  - conversation_id
                  - dry_run
        "201":
          description: Call initiated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation_id:
                    type: string
                    description: The ID of the created conversation.
                  dry_run:
                    type: boolean
                    enum: [false]
                    description: Always false when a conversation was created.
                required:
                  - conversation_id
                  - dry_run
      x-fern-sdk-group-name: conversations
      x-fern-sdk-method-name: outboundCall
  /users/{id}:
    get:
      tags:
        - Users
      summary: Get User
      description: Gets a user by ID. The deleted_at field uses type null.
      operationId: users_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
      x-fern-sdk-group-name: users
      x-fern-sdk-method-name: get
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        deleted_at:
          type: "null"
          description: Always null for active users.
      required:
        - id
        - name
        - deleted_at
