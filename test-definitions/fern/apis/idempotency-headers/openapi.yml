openapi: 3.1.0
info:
  title: idempotency-headers
  version: 0.0.0
paths:
  /payment:
    post:
      operationId: payment_create
      tags:
        - Payment
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
                format: uuid
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                currency:
                  $ref: '#/components/schemas/Currency'
              required:
                - amount
                - currency
  /payment/{paymentId}:
    delete:
      operationId: payment_delete
      tags:
        - Payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
      security:
        - Bearer: []
components:
  schemas:
    Currency:
      title: Currency
      type: string
      enum:
        - USD
        - YEN
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
