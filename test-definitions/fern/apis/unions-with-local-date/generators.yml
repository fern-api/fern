# yaml-language-server: $schema=../../../../generators-yml.schema.json
api:
  specs:
    - openapi: ./openapi.yml
groups:
  java-sdk:
    generators:
      - name: fernapi/fern-java-sdk
        version: latest
        output:
          location: local-file-system
          path: ../../../seed/java-sdk/unions-with-local-date
        config:
          use-local-date-for-dates: true
          package-prefix: com.unions.localdate
          enable-wire-tests: true
  php-sdk:
    generators:
      - name: fernapi/fern-php-sdk
        version: latest
        ir-version: v61
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/php-sdk-tests
          branch: unions-with-local-date
  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: latest
        ir-version: v61
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/go-sdk-tests
          branch: unions-with-local-date
