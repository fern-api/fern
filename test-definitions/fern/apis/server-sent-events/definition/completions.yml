types:
  StreamedCompletion:
    properties:
      delta: string
      tokens: optional<integer>

service:
  auth: false
  base-path: ""
  endpoints:
    stream:
      method: POST
      path: /stream
      request:
        name: StreamCompletionRequest
        body:
          properties:
            query: string
      response-stream:
        type: StreamedCompletion
        format: sse
        terminator: "[[DONE]]"

    streamWithoutTerminator:
      method: POST
      path: /stream-no-terminator
      request:
        name: StreamCompletionRequestWithoutTerminator
        body:
          properties:
            query: string
      response-stream:
        type: StreamedCompletion
        format: sse
