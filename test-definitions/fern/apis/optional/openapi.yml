openapi: 3.1.0
info:
  title: objects-with-imports
  version: 0.0.0
paths:
  /send-optional-body:
    post:
      operationId: optional_sendOptionalBody
      tags:
        - Optional
      parameters: []
      responses:
        '200':
          description: Id of the created resource
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type:
                - object
                - 'null'
  /send-optional-typed-body:
    post:
      operationId: optional_sendOptionalTypedBody
      tags:
        - Optional
      parameters: []
      responses:
        '200':
          description: Id of the created resource
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/SendOptionalBodyRequest'
                - type: 'null'
  /deploy/{actionId}/versions/{id}:
    post:
      description: >-
        Tests optional(nullable(T)) where T has only optional properties.

        This should not generate wire tests expecting {} when Optional.empty()
        is passed.
      operationId: optional_sendOptionalNullableWithAllOptionalProperties
      tags:
        - Optional
      parameters:
        - name: actionId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployResponse'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/DeployParams'
                - type: 'null'
components:
  schemas:
    SendOptionalBodyRequest:
      title: SendOptionalBodyRequest
      type: object
      properties:
        message:
          type: string
      required:
        - message
    DeployParams:
      title: DeployParams
      type: object
      properties:
        updateDraft:
          type:
            - boolean
            - 'null'
    DeployResponse:
      title: DeployResponse
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
  securitySchemes: {}
