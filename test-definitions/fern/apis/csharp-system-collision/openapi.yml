openapi: 3.1.0
info:
  title: csharp-system-collision
  version: 0.0.0
paths:
  /users/create-user:
    post:
      operationId: createUser
      tags:
      - CsharpSystemCollision
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
  /users/create-task:
    post:
      operationId: createTask
      tags:
      - CsharpSystemCollision
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
  /users/empty:
    post:
      operationId: emptyResponse
      tags:
      - CsharpSystemCollision
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
components:
  schemas:
    Task:
      title: Task
      type: object
      properties:
        name:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - name
      - user
    User:
      title: User
      type: object
      properties:
        line1:
          type: string
        line2:
          type:
          - string
          - 'null'
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string
          const: USA
      required:
      - line1
      - city
      - state
      - zip
      - country
  securitySchemes: {}
