openapi: 3.0.1
info:
  title: python-backslash-escape
  version: ""
paths:
  /users/{id}:
    get:
      description: |-
        Get a user by their ID.
        For Windows authentication, use DOMAIN\username format.
        Other backslash examples: FOO\_BAR, path\to\file, C:\Users\name
      operationId: user_get
      tags:
        - User
      parameters:
        - name: id
          in: path
          description: |-
            The user ID.
            Can be in DOMAIN\username format for Windows users.
          required: true
          schema:
            type: string
        - name: domain
          in: query
          description: |-
            The domain name.
            Example: CORP\username or DOMAIN\user
          required: false
          schema:
            type: string
            nullable: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
components:
  schemas:
    User:
      title: User
      type: object
      description: |-
        Represents a user in the system.
        Windows users should use DOMAIN\username format.
      properties:
        id:
          type: string
          description: The unique identifier
        name:
          type: string
          description: |-
            The user's name.
            For Windows: DOMAIN\username
        email:
          type: string
          description: The user's email address
      required:
        - id
        - name
        - email
  securitySchemes: {}
