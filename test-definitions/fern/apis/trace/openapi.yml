          application/json:
            schema:
              type: object
              properties:
                inputParams:
                  type: array
                  items:
                    $ref: '#/components/schemas/VariableTypeAndName'
                outputType:
                  $ref: '#/components/schemas/VariableType'
                methodName:
                  type: string
                  description: |-
                    The name of the `method` that the student has to complete.
                    The method name cannot include the following characters:
                      - Greater Than `>`
                      - Less Than `<``
                      - Equals `=`
                      - Period `.`
              required:
