      type: string
    NodeId:
      title: NodeId
      type: string
    VariableType:
      title: VariableType
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - integerType
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              enum:
