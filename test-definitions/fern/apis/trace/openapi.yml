            $ref: '#/components/schemas/PlaylistId'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
                nullable: true
        '404':
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      errorName:
                        type: string
                        enum:
                          - PlaylistIdNotFoundError
                      content:
                        $ref: '#/components/schemas/PlaylistIdNotFoundErrorBody'
      security: *ref_0
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlaylistRequest'
              nullable: true
