      operationId: playlist_getPlaylist
      tags:
        - Playlist
      parameters:
        - name: serviceParam
          in: path
          required: true
          schema:
            type: integer
        - name: playlistId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/PlaylistId'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '401':
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      errorName:
                        type: string
                        enum:
                          - UnauthorizedError
        '404':
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      errorName:
                        type: string
                        enum:
                          - PlaylistIdNotFoundError
