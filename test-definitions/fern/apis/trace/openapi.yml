          $ref: '#/components/schemas/VariableType'
        valueType:
          $ref: '#/components/schemas/VariableType'
      required:
        - keyType
        - valueType
    VariableValue:
      title: VariableValue
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - integerValue
            value:
              type: integer
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              enum:
                - booleanValue
            value:
              type: boolean
          required:
            - type
        - type: object
          properties:
            type:
              type: string
