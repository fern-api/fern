# yaml-language-server: $schema=../../../../generators-yml.schema.json
api:
  specs:
    - openapi: ./openapi.yml
groups:
  ts-sdk:
    generators:
      - name: fernapi/fern-typescript-sdk
        version: latest
        config:
          noSerdeLayer: true
          enableInlineTypes: true
          resolveQueryParameterNameConflicts: true
