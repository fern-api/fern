# yaml-language-server: $schema=../../../../generators-yml.schema.json
api:
  specs:
    - openapi: ./openapi.yml
groups:
  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: latest
        ir-version: v61
        config:
          union: v1
          enableWireTests: true
        github:
          token: ${GITHUB_TOKEN}
          mode: push
          uri: fern-api/go-sdk-tests
          branch: go-deterministic-ordering
