openapi: 3.0.3
info:
  title: x-fern-default test
  version: 1.0.0
paths:
  /test:
    get:
      operationId: test_get
      parameters:
        - name: X-API-Version
          in: header
          required: false
          schema:
            type: string
          x-fern-default: "2024-02-08"
        - name: X-Enable-Audit
          in: header
          required: false
          schema:
            type: boolean
          x-fern-default: true
        - name: limit
          in: query
          required: false
          schema:
            type: string
          x-fern-default: "100"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
