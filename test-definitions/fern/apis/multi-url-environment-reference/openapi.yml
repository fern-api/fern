openapi: 3.0.1
info:
  title: multi-url-environment-reference
  version: ""
servers:
  - url: https://api.example.com/2.0
    x-fern-server-name: Production
  - url: https://auth.example.com/oauth2
    x-fern-server-name: Auth
  - url: https://upload.example.com/2.0
    x-fern-server-name: Upload
paths:
  /items:
    get:
      operationId: listItems
      tags:
        - Items
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: string
      security: &ref_0
        - BearerAuth: []
  /oauth/token:
    post:
      operationId: auth_getToken
      tags:
        - Auth
      servers:
        - url: https://auth.example.com/oauth2
          x-fern-server-name: Auth
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                required:
                  - access_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                client_secret:
                  type: string
              required:
                - client_id
                - client_secret
  /files/content:
    post:
      operationId: files_upload
      tags:
        - Files
      servers:
        - url: https://upload.example.com/2.0
          x-fern-server-name: Upload
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: string
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                parent_id:
                  type: string
              required:
                - name
                - parent_id
components:
  schemas: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
