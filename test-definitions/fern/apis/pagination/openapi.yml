components:
  schemas:
    UsernameCursor:
      title: UsernameCursor
      type: object
      properties:
        cursor:
          $ref: "#/components/schemas/UsernamePage"
      required:
        - cursor
    UsernamePage:
      title: UsernamePage
      type: object
      properties:
        after:
          type: string
          nullable: true
        data:
          type: array
          items:
            type: string
      required:
        - data
    SearchRequestQuery:
      title: SearchRequestQuery
      oneOf:
        - $ref: "#/components/schemas/SingleFilterSearchRequest"
        - $ref: "#/components/schemas/MultipleFilterSearchRequest"
    MultipleFilterSearchRequest:
      title: MultipleFilterSearchRequest
      type: object
      properties:
        operator:
          $ref: "#/components/schemas/MultipleFilterSearchRequestOperator"
          nullable: true
        value:
          $ref: "#/components/schemas/MultipleFilterSearchRequestValue"
          nullable: true
    MultipleFilterSearchRequestOperator:
      title: MultipleFilterSearchRequestOperator
      type: string
      enum:
        - AND
        - OR
    MultipleFilterSearchRequestValue:
      title: MultipleFilterSearchRequestValue
      oneOf:
        - type: array
          items:
            $ref: "#/components/schemas/MultipleFilterSearchRequest"
        - type: array
          items:
            $ref: "#/components/schemas/SingleFilterSearchRequest"
    SingleFilterSearchRequest:
      title: SingleFilterSearchRequest
      type: object
      properties:
        field:
          type: string
          nullable: true
        operator:
          $ref: "#/components/schemas/SingleFilterSearchRequestOperator"
          nullable: true
        value:
          type: string
          nullable: true
    SingleFilterSearchRequestOperator:
      title: SingleFilterSearchRequestOperator
      type: string
      enum:
        - "="
        - "!="
        - IN
        - NIN
        - <
        - ">"
        - "~"
        - "!~"
        - ^
        - $
    SearchRequest:
      title: SearchRequest
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/StartingAfterPaging"
          nullable: true
        query:
          $ref: "#/components/schemas/SearchRequestQuery"
      required:
        - query
    PaginatedConversationResponse:
      title: PaginatedConversationResponse
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        pages:
          $ref: "#/components/schemas/CursorPages"
          nullable: true
        total_count:
          type: integer
        type:
          type: string
          const: conversation.list
      required:
        - conversations
        - total_count
        - type
    CursorPages:
      title: CursorPages
      type: object
      properties:
        next:
          $ref: "#/components/schemas/StartingAfterPaging"
          nullable: true
        page:
          type: integer
          nullable: true
        per_page:
          type: integer
          nullable: true
        total_pages:
          type: integer
          nullable: true
        type:
          type: string
          const: pages
      required:
        - type
    StartingAfterPaging:
      title: StartingAfterPaging
      type: object
      properties:
        per_page:
          type: integer
        starting_after:
          type: string
          nullable: true
      required:
        - per_page
    Conversation:
      title: Conversation
      type: object
      properties:
        foo:
          type: string
      required:
        - foo
    inline-usersOrder:
      title: inline-usersOrder
      type: string
      enum:
        - asc
        - desc
    inline-usersWithPage:
      title: inline-usersWithPage
      type: object
      properties:
        page:
          type: integer
          nullable: true
    inline-usersWithCursor:
      title: inline-usersWithCursor
      type: object
      properties:
        cursor:
          type: string
          nullable: true
    inline-usersUserListContainer:
      title: inline-usersUserListContainer
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/inline-usersUser"
      required:
        - users
    inline-usersUserPage:
      title: inline-usersUserPage
      type: object
      properties:
        data:
          $ref: "#/components/schemas/inline-usersUserListContainer"
        next:
          type: string
          format: uuid
          nullable: true
      required:
        - data
    inline-usersUserOptionalListContainer:
      title: inline-usersUserOptionalListContainer
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/inline-usersUser"
          nullable: true
    inline-usersUserOptionalListPage:
      title: inline-usersUserOptionalListPage
      type: object
      properties:
        data:
          $ref: "#/components/schemas/inline-usersUserOptionalListContainer"
        next:
          type: string
          format: uuid
          nullable: true
      required:
        - data
    inline-usersUsernameContainer:
      title: inline-usersUsernameContainer
      type: object
      properties:
        results:
          type: array
          items:
            type: string
      required:
        - results
    inline-usersListUsersExtendedResponse:
      title: inline-usersListUsersExtendedResponse
      type: object
      properties:
        total_count:
          type: integer
          description: The totall number of /users
      required:
        - total_count
      allOf:
        - $ref: "#/components/schemas/inline-usersUserPage"
    inline-usersListUsersExtendedOptionalListResponse:
      title: inline-usersListUsersExtendedOptionalListResponse
      type: object
      properties:
        total_count:
          type: integer
          description: The totall number of /users
      required:
        - total_count
      allOf:
        - $ref: "#/components/schemas/inline-usersUserOptionalListPage"
    inline-usersListUsersPaginationResponse:
      title: inline-usersListUsersPaginationResponse
      type: object
      properties:
        hasNextPage:
          type: boolean
          nullable: true
        page:
          $ref: "#/components/schemas/inline-usersPage"
          nullable: true
        total_count:
          type: integer
          description: The totall number of /users
        data:
          $ref: "#/components/schemas/inline-usersUsers"
      required:
        - total_count
        - data
    inline-usersListUsersMixedTypePaginationResponse:
      title: inline-usersListUsersMixedTypePaginationResponse
      type: object
      properties:
        next:
