components:
  schemas:
    UsernameCursor:
      title: UsernameCursor
      type: object
      properties:
        cursor:
          $ref: '#/components/schemas/UsernamePage'
      required:
        - cursor
    UsernamePage:
      title: UsernamePage
      type: object
      properties:
        after:
          type:
            - string
            - 'null'
        data:
          type: array
          items:
            type: string
      required:
        - data
    SearchRequestQuery:
      title: SearchRequestQuery
      oneOf:
        - $ref: '#/components/schemas/SingleFilterSearchRequest'
        - $ref: '#/components/schemas/MultipleFilterSearchRequest'
    MultipleFilterSearchRequest:
      title: MultipleFilterSearchRequest
      type: object
      properties:
        operator:
          anyOf:
            - $ref: '#/components/schemas/MultipleFilterSearchRequestOperator'
            - type: 'null'
        value:
          anyOf:
            - $ref: '#/components/schemas/MultipleFilterSearchRequestValue'
            - type: 'null'
    MultipleFilterSearchRequestOperator:
      title: MultipleFilterSearchRequestOperator
      type: string
      enum:
        - AND
        - OR
    MultipleFilterSearchRequestValue:
      title: MultipleFilterSearchRequestValue
      oneOf:
        - type: array
          items:
            $ref: '#/components/schemas/MultipleFilterSearchRequest'
        - type: array
          items:
            $ref: '#/components/schemas/SingleFilterSearchRequest'
    SingleFilterSearchRequest:
      title: SingleFilterSearchRequest
      type: object
      properties:
        field:
          type:
            - string
            - 'null'
        operator:
          anyOf:
            - $ref: '#/components/schemas/SingleFilterSearchRequestOperator'
            - type: 'null'
        value:
          type:
            - string
            - 'null'
    SingleFilterSearchRequestOperator:
      title: SingleFilterSearchRequestOperator
      type: string
      enum:
        - '='
        - '!='
        - IN
        - NIN
        - <
        - '>'
        - '~'
        - '!~'
        - ^
        - $
    SearchRequest:
      title: SearchRequest
      type: object
      properties:
        pagination:
