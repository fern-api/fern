  /users/top-level-cursor:
    post:
      description: |-
        Pagination endpoint with a top-level cursor field in the request body.
        This tests that the mock server correctly ignores cursor mismatches
        when getNextPage() is called with a different cursor value.
      operationId: users_listWithTopLevelBodyCursorPagination
      tags:
        - Users
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersTopLevelCursorPaginationResponse'
              examples:
                WithCursor:
                  value:
                    next_cursor: next_cursor_value
                    data:
                      - name: Alice
                        id: 1
                      - name: Bob
                        id: 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cursor:
                  type:
                    - string
                    - 'null'
                  description: |-
                    The cursor used for pagination in order to fetch
                    the next page of results.
                filter:
                  type:
                    - string
                    - 'null'
                  description: An optional filter to apply to the results.
            examples:
              WithCursor:
                value:
                  cursor: initial_cursor
                  filter: active
