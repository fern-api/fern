[package]
name = "seed_websocket_auth"
version = "0.0.1"
edition = "2021"
description = "Rust SDK for seed_websocket_auth generated by Fern"
license = "MIT"
repository = "https://github.com/fern-api/fern"
documentation = "https://docs.rs/seed_websocket_auth"

[lib]
doctest = false

[dependencies]
bytes = "1.0"
futures = "0.3"
rand = { version = "0.9", optional = true }
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["native-tls"], optional = true }
urlencoding = { version = "2.1", optional = true }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = ["websocket"]
websocket = ["tokio-tungstenite", "urlencoding", "rand"]
