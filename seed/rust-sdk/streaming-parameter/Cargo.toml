[package]
name = "seed_streaming"
version = "0.0.1"
edition = "2021"
description = "Rust SDK for seed_streaming generated by Fern"
license = "MIT"
repository = "https://github.com/fern-api/fern"
documentation = "https://docs.rs/seed_streaming"

[lib]
doctest = false

[dependencies]
bytes = "1.0"
futures = "0.3"
pin-project = { version = "1.1", optional = true }
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
reqwest-sse = { version = "0.1", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = ["sse"]
sse = ["reqwest-sse", "pin-project"]
