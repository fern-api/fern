[package]
name = "seed_single_url_environment_no_default"
version = "0.0.1"
edition = "2021"
description = "Rust SDK for seed_single_url_environment_no_default generated by Fern"
license = "MIT"
repository = "https://github.com/fern-api/fern"
documentation = "https://docs.rs/seed_single_url_environment_no_default"

[lib]
doctest = false

[dependencies]
bytes = "1.0"
futures = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
