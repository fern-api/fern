[package]
name = "server_sent_events_openapi_sdk"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for server_sent_events_openapi_sdk generated by Fern"
license = "MIT"
repository = "https://github.com/fern-api/fern"
documentation = "https://docs.rs/server_sent_events_openapi_sdk"

[lib]
doctest = false

[dependencies]
bytes = "1.0"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
pin-project = { version = "1.1", optional = true }
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
reqwest-sse = { version = "0.1", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = ["sse"]
sse = ["reqwest-sse", "pin-project"]

[dependencies.server_sent_events_openapi_types]
path = "../server-sent-events-openapi-types"
