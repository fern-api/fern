name: ci

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RUSTFLAGS: "-A warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check
        run: cargo check

  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Compile
        run: cargo build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Test
        run: cargo test

  publish:
    needs: [check, compile, test]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - rust-target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-platform-suffix: linux-x64
          - rust-target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-platform-suffix: linux-arm64
          - rust-target: x86_64-apple-darwin
            runner: macos-latest
            npm-platform-suffix: darwin-x64
          - rust-target: aarch64-apple-darwin
            runner: macos-latest
            npm-platform-suffix: darwin-arm64
          - rust-target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-platform-suffix: win32-x64
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.rust-target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Install cross-compilation tools
        if: matrix.rust-target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.rust-target }}

      - name: Package and publish npm platform package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PLATFORM_PKG="@fern/query-parameters-openapi-${{ matrix.npm-platform-suffix }}"
          PKG_DIR="npm-pkg/${PLATFORM_PKG}"
          mkdir -p "${PKG_DIR}"

          # Locate the compiled binary
          BINARY_NAME="query-parameters-api"
          if [[ "${{ matrix.rust-target }}" == *"windows"* ]]; then
            BINARY_NAME="query-parameters-api.exe"
          fi
          cp "target/${{ matrix.rust-target }}/release/${BINARY_NAME}" "${PKG_DIR}/"

          # Write platform package.json
          cat > "${PKG_DIR}/package.json" <<PKGJSON
          {
            "name": "${PLATFORM_PKG}",
            "version": "${VERSION}",
            "description": "Platform-specific binary for query-parameters-api (${{ matrix.npm-platform-suffix }})",
            "os": ["$(echo ${{ matrix.npm-platform-suffix }} | cut -d- -f1)"],
            "cpu": ["$(echo ${{ matrix.npm-platform-suffix }} | cut -d- -f2)"],
            "main": "${BINARY_NAME}",
            "files": ["${BINARY_NAME}"]
          }
          PKGJSON

          cd "${PKG_DIR}"
          if [[ "${VERSION}" == *alpha* ]]; then
            npm publish --access public --tag alpha
          elif [[ "${VERSION}" == *beta* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi

  publish-launcher:
    needs: [publish]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Publish launcher package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="npm-pkg/launcher"
          mkdir -p "${PKG_DIR}"

          BINARY_NAME="query-parameters-api"

          # Build optionalDependencies map
          OPTIONAL_DEPS=""
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@fern/query-parameters-openapi-linux-x64\": \"${VERSION}\","
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@fern/query-parameters-openapi-linux-arm64\": \"${VERSION}\","
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@fern/query-parameters-openapi-darwin-x64\": \"${VERSION}\","
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@fern/query-parameters-openapi-darwin-arm64\": \"${VERSION}\","
          OPTIONAL_DEPS="${OPTIONAL_DEPS}\"@fern/query-parameters-openapi-win32-x64\": \"${VERSION}\""

          cat > "${PKG_DIR}/package.json" <<PKGJSON
          {
            "name": "@fern/query-parameters-openapi",
            "version": "${VERSION}",
            "description": "CLI for query-parameters-api",
            "bin": {
              "query-parameters-api": "bin/cli.js"
            },
            "optionalDependencies": {
              ${OPTIONAL_DEPS}
            },
            "files": ["bin/"]
          }
          PKGJSON

          # Write launcher script
          mkdir -p "${PKG_DIR}/bin"
          cat > "${PKG_DIR}/bin/cli.js" <<'LAUNCHER'
          #!/usr/bin/env node
          "use strict";
          const { execFileSync } = require("child_process");
          const path = require("path");
          const os = require("os");

          const PLATFORMS = {
            "linux-x64": "@fern/query-parameters-openapi-linux-x64",
            "linux-arm64": "@fern/query-parameters-openapi-linux-arm64",
            "darwin-x64": "@fern/query-parameters-openapi-darwin-x64",
            "darwin-arm64": "@fern/query-parameters-openapi-darwin-arm64",
            "win32-x64": "@fern/query-parameters-openapi-win32-x64",
          };

          const platformKey = os.platform() + "-" + os.arch();
          const pkg = PLATFORMS[platformKey];
          if (!pkg) {
            console.error("Unsupported platform: " + platformKey);
            process.exit(1);
          }

          const binName = os.platform() === "win32" ? "query-parameters-api.exe" : "query-parameters-api";
          const binPath = path.join(require.resolve(pkg + "/package.json"), "..", binName);

          try {
            execFileSync(binPath, process.argv.slice(2), { stdio: "inherit" });
          } catch (e) {
            if (e && typeof e === "object" && "status" in e) {
              process.exit(e.status);
            }
            throw e;
          }
          LAUNCHER

          cd "${PKG_DIR}"
          if [[ "${VERSION}" == *alpha* ]]; then
            npm publish --access public --tag alpha
          elif [[ "${VERSION}" == *beta* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
