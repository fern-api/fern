[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# Build each app with `cargo build --package` instead of a workspace-wide
# build. Without this, cargo-dist also compiles the non-distributed root
# crate, whose default features pull in native-tls/OpenSSL and break the
# musl builds.
precise-builds = true
# The installers to generate for each app
installers = ["shell", "powershell", "npm"]
# Whether to enable GitHub Attestations
github-attestations = true
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Which actions to run on pull requests
pr-run-mode = "plan"
# Publish jobs to run (npm publishing deferred until pipeline is validated)
publish-jobs = []
# Don't overwrite release.yml on `dist init` (preserves customizations)
allow-dirty = ["ci"]
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".zip"
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.gz"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
