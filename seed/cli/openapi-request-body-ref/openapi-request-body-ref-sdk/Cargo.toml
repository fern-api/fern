[package]
name = "openapi_request_body_ref_sdk"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for openapi_request_body_ref_sdk generated by Fern"
license = "MIT"
repository = "https://github.com/fern-api/fern"
documentation = "https://docs.rs/openapi_request_body_ref_sdk"

[lib]
doctest = false

[dependencies]
base64 = "0.22"
bytes = "1.0"
futures = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = ["multipart"]
multipart = ["reqwest/multipart"]

[dependencies.openapi_request_body_ref_types]
path = "../openapi-request-body-ref-types"
