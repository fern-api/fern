[package]
name = "acme_cli_sdk"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for acme_cli_sdk generated by Fern"
license = "MIT"
repository = "https://github.com/fern-api/fern"
documentation = "https://docs.rs/acme_cli_sdk"

[lib]
doctest = false

[dependencies]
bytes = "1.0"
futures = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"

[dependencies.acme_cli_types]
path = "../acme-cli-types"
