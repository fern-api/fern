irVersion: v66
displayName: Python SDK
image: fernapi/fern-python-sdk
changelogLocation: ../../generators/python/sdk/versions.yml

buildScripts:
  installScript:
    commands:
      - poetry install
  compileScript:
    commands:
      - poetry run mypy .
      - PYTHONWARNINGS=error::SyntaxWarning python -m compileall -q -f .

publish:
  workingDirectory: generators/python
  preBuildCommands:
    - pnpm turbo run dist:cli --filter @fern-api/python-sdk
    - pip install poetry
    - poetry config virtualenvs.in-project true
    - poetry install
  docker:
    file: ./generators/python/sdk/Dockerfile
    image: fernapi/fern-python-sdk
    context: .
test:
  docker:
    image: fernapi/fern-python-sdk:latest
    command: pnpm turbo run dist:cli --filter @fern-api/python-sdk && docker build -f ./generators/python/sdk/Dockerfile -t fernapi/fern-python-sdk:latest .
  local:
    workingDirectory: generators/python
    buildCommand:
      - chmod +x setup-python.sh && ./setup-python.sh
      - poetry config virtualenvs.in-project true
      - poetry install
      - (cd ../../ && pnpm turbo run dist:cli --filter @fern-api/python-sdk)
    runCommand: poetry run python -m src.fern_python.generators.sdk.cli {CONFIG_PATH}
    env:
      PYTEST_CURRENT_TEST: "some value"
      PYTHON_V2_PATH: ../../generators/python-v2/sdk/dist/cli.cjs
      FERN_CORE_UTILITIES_PATH: ../../generators/python/core_utilities/sdk:../../generators/python/core_utilities/shared
      FERN_ASSETS_PATH: ../../generators/python
      FERN_FEATURES_YML_PATH: ../../generators/python/sdk/features.yml

language: python
generatorType: SDK
defaultOutputMode: github
customFixtureConfig:
  customConfig:
    use_typeddict_requests: true
  outputFolder: client-filename
fixtures:
