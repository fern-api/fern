            version: "^0.4.3"
            extras: ["toml"]
        pyproject_toml: |
          [tool.covcheck.group.unit.coverage]
          branch = 26.0
          line = 62.0

          [tool.covcheck.group.service.coverage]
          branch = 30.0
          line = 67.0
