displayName: Swift SDK
irVersion: v66
image: fernapi/fern-swift-sdk
changelogLocation: ../../generators/swift/sdk/versions.yml

publish:
  preBuildCommands:
  - pnpm turbo run dist:cli --filter @fern-api/swift-sdk
  docker:
    file: ./generators/swift/sdk/Dockerfile
    image: fernapi/fern-swift-sdk
    context: .
  sentry:
    name: fern-swift-sdk
    project: swift-sdk
    sourceMaps:
    - dir: generators/swift/sdk/dist

test:
  docker:
    image: fernapi/fern-swift-sdk:latest
    command: pnpm turbo run dockerTagLatest --filter @fern-api/swift-sdk
  podman:
    image: fernapi/fern-swift-sdk:latest
    command: pnpm turbo run podmanTagLatest --filter @fern-api/swift-sdk
  local:
    workingDirectory: generators/swift
    buildCommand:
    - pnpm turbo run dist:cli --filter @fern-api/swift-sdk
    runCommand: node --enable-source-maps sdk/dist/cli.cjs {CONFIG_PATH}

language: swift
generatorType: SDK
defaultOutputMode: github
defaultCustomConfig: {}

scripts:
  docker:
  - image: swift:6.1.2
    commands:
      build:
      - swift build -c release --build-tests
      test:
      - swift test
  local:
  - commands:
      build:
      - if [ -d /Applications/Xcode.app/Contents/Developer ]; then export DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer; else export DEVELOPER_DIR=/Library/Developer/CommandLineTools; fi
      - if [ -d /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk ]; then export SDKROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk; else export SDKROOT=/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk; fi
      - export PATH="$HOME/.local/bin:$PATH"
      - swift build -c release --build-tests
      test:
      - if [ -d /Applications/Xcode.app/Contents/Developer ]; then export DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer; else export DEVELOPER_DIR=/Library/Developer/CommandLineTools; fi
      - if [ -d /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk ]; then export SDKROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk; else export SDKROOT=/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk; fi
      - export PATH="$HOME/.local/bin:$PATH"
      - swift test

fixtures:
  client-side-params:
  - customConfig:
      moduleName: MyCustomModule
      clientClassName: MyCustomClient
    outputFolder: with-custom-config
  examples:
  - customConfig:
      customReadmeSections:
      - title: "Override Section"
        content: "Override Content"
      - title: "Generator Invocation Custom Section"
        content: "Generator Invocation Custom Content for {{ gitUrl }}:{{ minVersion }}"
    readmeConfig:
      apiName: "CustomName"
      disabledSections:
      - apiReference
      bannerLink: https://www.fernapi.com
      apiReferenceLink: https://www.docs.fernapi.com
      defaultEndpoint: POST /movie
      customSections:
      - title: "Base Readme Custom Section"
        language: swift
        content: "Base Readme Custom Content for {{ gitUrl }}:{{ minVersion }}"
      - title: "Override Section"
        language: swift
        content: "Base Content"
      features:
        timeouts:
        - GET /movie/{movieId}
    outputFolder: readme-config
  nullable:
  - customConfig:
      decodeNullableToOptional: true
    outputFolder: nullable-as-optional
  nullable-optional:
  - customConfig:
      decodeNullableToOptional: true
    outputFolder: nullable-as-optional
  pagination:
  - customConfig:
      custom-pager-name: MyPager
    outputFolder: custom-pager
  - customConfig:
      custom-pager-name: MyPager
      include-exception-handler: true
    outputFolder: custom-pager-with-exception-handler
  required-nullable:
  - customConfig:
      decodeNullableToOptional: true
    outputFolder: nullable-as-optional
  single-url-environment-default:
  - customConfig:
      maxRetries: 5
    outputFolder: maxRetries
  - customConfig:
      environmentEnumName: MyCustomEnvironment
    outputFolder: with-custom-config

allowedFailures:
- schemaless-request-body-examples:baseline
- api-wide-base-path:baseline
- bytes-upload:baseline
- audiences:baseline
- header-auth-environment-variable:baseline
- client-side-params:with-custom-config
- client-side-params:baseline
- cross-package-type-names:baseline
- enum:baseline
- errors:baseline
- examples:baseline
- examples:readme-config
- exhaustive:baseline
- extra-properties:baseline
- file-upload-openapi:baseline
- idempotency-headers:baseline
- inferred-auth-explicit:baseline
- inferred-auth-implicit:baseline
- inferred-auth-implicit-no-expiry:baseline
- inferred-auth-implicit-api-key:baseline
- inferred-auth-implicit-reference:baseline
- literal:baseline
- mixed-case:baseline
- mixed-file-directory:baseline
- multi-url-environment:baseline
- multi-url-environment-no-default:baseline
- multi-url-environment-reference:baseline
- nullable:baseline
- nullable:nullable-as-optional
- nullable-optional:baseline
- nullable-optional:nullable-as-optional
- nullable-request-body:baseline
- oauth-client-credentials-custom:baseline
- oauth-client-credentials-with-variables:baseline
- pagination:baseline
- pagination:custom-pager
- pagination:custom-pager-with-exception-handler
- path-parameters:baseline
- plain-text:baseline
- query-parameters:baseline
- request-parameters:baseline
- required-nullable:baseline
- required-nullable:nullable-as-optional
- reserved-keywords:baseline
- response-property:baseline
- streaming:baseline
- streaming-parameter:baseline
- trace:baseline
- undiscriminated-unions:baseline
  # Java-specific fixture for LocalDate support
- unions-with-local-date:baseline
  # Server URL templating not yet supported in Swift SDK
- server-sent-events-openapi:baseline
- server-url-templating:baseline
- variables:baseline
- websocket-inferred-auth:baseline
  # Intermediate failures
- any-auth:baseline
- imdb:baseline
  # Boolean literal enum changes require seed snapshot regeneration
- null-type:baseline
