openapi: 3.1.0
info:
  title: examples
  version: 0.0.0
paths:
  /echo:
    post:
      operationId: _echo
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: Hello world!\n\nwith\n\tnewlines
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
            examples:
              Example1:
                value: Hello world!\n\nwith\n\tnewlines
  /create-type:
    post:
      operationId: _createType
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identifier'
              examples:
                Example1:
                  value:
                    type: primitive
                    value: value
                    label: label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Type'
            examples:
              Example1:
                value: primitive
  /file/notification/{notificationId}:
    get:
      operationId: fileNotificationService_file_notification_service_getException
      tags:
        - FileNotificationService
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: notification-hsy129x
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
              examples:
                Example1:
                  value:
                    exceptionType: Unavailable
                    exceptionMessage: This component is unavailable!
                    exceptionStacktrace: <logs>
                    type: generic
      security:
        - Bearer: []
  /file/{filename}:
    get:
      description: This endpoint returns a file by its name.
      operationId: fileService_file_service_getFile
      tags:
        - FileService
      parameters:
        - name: filename
          in: path
          description: This is a filename
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: file.txt
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              examples:
                Example1:
                  value:
                    name: file.txt
                    contents: ...
        '404':
          description: NotFoundError
          content:
            application/json:
              schema:
                type: string
      security:
        - Bearer: []
  /check/{id}:
    get:
      description: This endpoint checks the health of a resource.
      operationId: healthService_health_service_check
      tags:
        - HealthService
      parameters:
        - name: id
          in: path
          description: The id to check
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: id-2sdx82h
      responses:
        '204':
          description: No content
      security:
        - Bearer: []
  /ping:
    get:
      description: This endpoint checks the health of the service.
      operationId: healthService_health_service_ping
      tags:
        - HealthService
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: boolean
              examples:
                Example0:
                  value: true
      security:
        - Bearer: []
  /movie/{movieId}:
    get:
      operationId: service_getmovie
      tags:
        - Service
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MovieId'
          examples:
            Example1:
              value: movieId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              examples:
                Example1:
                  value:
                    id: movie-c06a4ad7
                    prequel: movie-cv9b914f
                    title: The Boy and the Heron
                    from: Hayao Miyazaki
                    rating: 8
                    type: movie
                    tag: tag-wf9as23d
                    book: book
                    metadata:
                      actors:
                        - Christian Bale
                        - Florence Pugh
                        - Willem Dafoe
                      releaseDate: '2023-12-08'
                      ratings:
                        rottenTomatoes: 97
                        imdb: 7.6
                    revenue: 1000000
  /movie:
    post:
      operationId: service_createmovie
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieId'
              examples:
                Example1:
                  value: movie-c06a4ad7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Movie'
            examples:
              Example1:
                value:
                  id: movie-c06a4ad7
                  prequel: movie-cv9b914f
                  title: The Boy and the Heron
                  from: Hayao Miyazaki
                  rating: 8
                  type: movie
                  tag: tag-wf9as23d
                  metadata:
                    actors:
                      - Christian Bale
                      - Florence Pugh
                      - Willem Dafoe
                    releaseDate: '2023-12-08'
                    ratings:
                      rottenTomatoes: 97
                      imdb: 7.6
                  revenue: 1000000
  /metadata:
    get:
      operationId: service_getmetadata
      tags:
        - Service
      parameters:
        - name: shallow
          in: query
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: tag
          in: query
          required: false
          schema:
            type: array
            items:
              type:
                - string
                - 'null'
        - name: X-API-Version
          in: header
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: 0.0.1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
              examples:
                Example1:
                  value:
                    type: html
                    value: <head>...</head>
                    extra:
                      version: 0.0.1
                      tenancy: test
                    tags:
                      - development
                      - public
  /big-entity:
    post:
      operationId: service_createbigentity
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                Example1:
                  value:
                    response:
                      key: value
                    identifiers:
                      - type: primitive
                        value: value
                        label: label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                castMember:
                  anyOf:
                    - $ref: '#/components/schemas/CastMember'
                    - type: 'null'
                extendedMovie:
                  anyOf:
                    - $ref: '#/components/schemas/ExtendedMovie'
                    - type: 'null'
                entity:
                  anyOf:
                    - $ref: '#/components/schemas/Entity'
                    - type: 'null'
                metadata:
                  anyOf:
                    - $ref: '#/components/schemas/Metadata'
                    - type: 'null'
                commonMetadata:
                  anyOf:
                    - $ref: '#/components/schemas/CommonsMetadata'
                    - type: 'null'
                eventInfo:
                  anyOf:
                    - $ref: '#/components/schemas/CommonsEventInfo'
                    - type: 'null'
                data:
                  anyOf:
                    - $ref: '#/components/schemas/CommonsData'
                    - type: 'null'
                migration:
                  anyOf:
                    - $ref: '#/components/schemas/Migration'
                    - type: 'null'
                exception:
                  anyOf:
                    - $ref: '#/components/schemas/Exception'
                    - type: 'null'
                test:
                  anyOf:
                    - $ref: '#/components/schemas/Test'
                    - type: 'null'
                node:
                  anyOf:
                    - $ref: '#/components/schemas/Node'
                    - type: 'null'
                directory:
                  anyOf:
                    - $ref: '#/components/schemas/Directory'
                    - type: 'null'
                moment:
                  anyOf:
                    - $ref: '#/components/schemas/Moment'
                    - type: 'null'
            examples:
              Example1:
                value: {}
  /refresh-token:
    post:
      operationId: service_refreshtoken
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/RefreshTokenRequest'
                - type: 'null'
            examples:
              Example1:
                value:
                  ttl: 1
              Example2:
                value:
                  ttl: 420
components:
  schemas:
    Type:
      title: Type
      oneOf:
        - $ref: '#/components/schemas/BasicType'
        - $ref: '#/components/schemas/ComplexType'
    Identifier:
      title: Identifier
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
        value:
          type: string
          examples:
            - value
        label:
          type: string
          examples:
            - label
      required:
        - type
        - value
        - label
    BasicType:
      title: BasicType
      type: string
      enum:
        - primitive
        - literal
    ComplexType:
      title: ComplexType
      type: string
      enum:
        - object
        - union
        - unknown
    TypeWithSingleCharPropertyEqualToTypeStartingLetter:
      title: TypeWithSingleCharPropertyEqualToTypeStartingLetter
      type: object
      properties:
        t:
          type: string
        ty:
          type: string
      required:
        - t
        - ty
    CommonsTag:
      title: CommonsTag
      type: string
    CommonsMetadata:
      title: CommonsMetadata
      type: object
      properties:
        id:
          type: string
        data:
          type:
            - object
            - 'null'
          additionalProperties:
            type:
              - string
              - 'null'
        jsonString:
          type:
            - string
            - 'null'
      required:
        - id
    CommonsEventInfoZeroType:
      title: CommonsEventInfoZeroType
      type: string
      const: metadata
    CommonsEventInfoZero:
      title: CommonsEventInfoZero
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CommonsEventInfoZeroType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/CommonsMetadata'
    CommonsEventInfoTypeType:
      title: CommonsEventInfoTypeType
      type: string
      const: tag
    CommonsEventInfoType:
      title: CommonsEventInfoType
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CommonsEventInfoTypeType'
        value:
          anyOf:
            - $ref: '#/components/schemas/CommonsTag'
            - type: 'null'
      required:
        - type
    CommonsEventInfo:
      title: CommonsEventInfo
      oneOf:
        - $ref: '#/components/schemas/CommonsEventInfoZero'
        - $ref: '#/components/schemas/CommonsEventInfoType'
    CommonsDataString:
      title: CommonsDataString
      type: object
      properties:
        value:
          type:
            - string
            - 'null'
    CommonsDataBase64:
      title: CommonsDataBase64
      type: object
      properties:
        value:
          type:
            - string
            - 'null'
          format: byte
    CommonsData:
      title: CommonsData
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: string
            - $ref: '#/components/schemas/CommonsDataString'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: base64
            - $ref: '#/components/schemas/CommonsDataBase64'
          required:
            - type
    FileFilename:
      title: FileFilename
      type: string
    MovieId:
      title: MovieId
      type: string
    MovieType:
      title: MovieType
      type: string
      const: movie
    Movie:
      title: Movie
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MovieId'
        prequel:
          anyOf:
            - $ref: '#/components/schemas/MovieId'
            - type: 'null'
        title:
          type: string
          examples:
            - The Boy and the Heron
        from:
          type: string
          examples:
            - Hayao Miyazaki
        rating:
          type: number
          format: double
          description: The rating scale is one to five stars
          examples:
            - 8
        type:
          $ref: '#/components/schemas/MovieType'
        tag:
          $ref: '#/components/schemas/CommonsTag'
        book:
          type:
            - string
            - 'null'
        metadata:
          type: object
        revenue:
          type: integer
          format: int64
          examples:
            - 1000000
      required:
        - id
        - title
        - from
        - rating
        - type
        - tag
        - metadata
        - revenue
    CastMember:
      title: CastMember
      oneOf:
        - $ref: '#/components/schemas/Actor'
        - $ref: '#/components/schemas/Actress'
        - $ref: '#/components/schemas/StuntDouble'
    Actor:
      title: Actor
      type: object
      properties:
        name:
          type: string
        id:
          type: string
      required:
        - name
        - id
    Actress:
      title: Actress
      type: object
      properties:
        name:
          type: string
        id:
          type: string
      required:
        - name
        - id
    StuntDouble:
      title: StuntDouble
      type: object
      properties:
        name:
          type: string
        actorOrActressId:
          type: string
      required:
        - name
        - actorOrActressId
    ExtendedMovie:
      title: ExtendedMovie
      type: object
      properties:
        cast:
          type: array
          items:
            type: string
      required:
        - cast
      allOf:
        - $ref: '#/components/schemas/Movie'
    Moment:
      title: Moment
      type: object
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        datetime:
          type: string
          format: date-time
      required:
        - id
        - date
        - datetime
    File:
      title: File
      type: object
      properties:
        name:
          type: string
          examples:
            - file.txt
        contents:
          type: string
          examples:
            - ...
      required:
        - name
        - contents
    Directory:
      title: Directory
      type: object
      properties:
        name:
          type: string
        files:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/File'
        directories:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Directory'
      required:
        - name
    Node:
      title: Node
      type: object
      properties:
        name:
          type: string
        nodes:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Node'
        trees:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Tree'
      required:
        - name
    Tree:
      title: Tree
      type: object
      properties:
        nodes:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Node'
    MetadataHtml:
      title: MetadataHtml
      type: object
      properties:
        value:
          type:
            - string
            - 'null'
    MetadataMarkdown:
      title: MetadataMarkdown
      type: object
      properties:
        value:
          type:
            - string
            - 'null'
    Metadata:
      title: Metadata
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: html
            - $ref: '#/components/schemas/MetadataHtml'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: markdown
            - $ref: '#/components/schemas/MetadataMarkdown'
          required:
            - type
      required:
        - extra
        - tags
      properties:
        extra:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
    ExceptionZeroType:
      title: ExceptionZeroType
      type: string
      const: generic
    ExceptionZero:
      title: ExceptionZero
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ExceptionZeroType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/ExceptionInfo'
    ExceptionTypeType:
      title: ExceptionTypeType
      type: string
      const: timeout
    ExceptionType:
      title: ExceptionType
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ExceptionTypeType'
      required:
        - type
    Exception:
      title: Exception
      oneOf:
        - $ref: '#/components/schemas/ExceptionZero'
        - $ref: '#/components/schemas/ExceptionType'
    ExceptionInfo:
      title: ExceptionInfo
      type: object
      properties:
        exceptionType:
          type: string
        exceptionMessage:
          type: string
        exceptionStacktrace:
          type: string
      required:
        - exceptionType
        - exceptionMessage
        - exceptionStacktrace
    MigrationStatus:
      title: MigrationStatus
      type: string
      enum:
        - RUNNING
        - FAILED
        - FINISHED
    Migration:
      title: Migration
      type: object
      properties:
        name:
          type: string
        status:
          $ref: '#/components/schemas/MigrationStatus'
      required:
        - name
        - status
    Request:
      title: Request
      type: object
      properties:
        request: {}
      required:
        - request
    Response:
      title: Response
      type: object
      properties:
        response: {}
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
      required:
        - response
        - identifiers
    ResponseType:
      title: ResponseType
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
      required:
        - type
    TestAnd:
      title: TestAnd
      type: object
      properties:
        value:
          type:
            - boolean
            - 'null'
    TestOr:
      title: TestOr
      type: object
      properties:
        value:
          type:
            - boolean
            - 'null'
    Test:
      title: Test
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: and
            - $ref: '#/components/schemas/TestAnd'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: or
            - $ref: '#/components/schemas/TestOr'
          required:
            - type
    Entity:
      title: Entity
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
        name:
          type: string
      required:
        - type
        - name
    CronJob:
      title: CronJob
      type: object
      properties:
        expression:
          type: string
      required:
        - expression
    RefreshTokenRequest:
      title: RefreshTokenRequest
      type: object
      properties:
        ttl:
          type: integer
      required:
        - ttl
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
servers:
  - url: https://production.com/api
    description: Production
