openapi: 3.0.1
info:
  title: examples
  version: ''
paths:
  /echo:
    post:
      operationId: _echo
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
            examples:
              Example1:
                value: string
  /type:
    post:
      operationId: _createType
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identifier'
              examples:
                Example1:
                  value:
                    type: primitive
                    value: value
                    label: label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Type'
            examples:
              Example1:
                value: primitive
  /file/notification/{notificationId}:
    get:
      operationId: fileNotificationService_file_notification_service_getException
      tags:
        - FileNotificationService
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
          example: notificationId
          examples:
            Example1:
              value: notificationId
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
              examples:
                Example1:
                  value:
                    exceptionType: exceptionType
                    exceptionMessage: exceptionMessage
                    exceptionStacktrace: exceptionStacktrace
                    type: generic
      security:
        - BearerAuth: []
  /file/{filename}:
    get:
      description: This endpoint returns a file by its name.
      operationId: fileService_file_service_getFile
      tags:
        - FileService
      parameters:
        - name: filename
          in: path
          description: This is a filename
          required: true
          schema:
            type: string
          example: filename
          examples:
            Example1:
              value: filename
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
              examples:
                Example1:
                  value:
                    name: name
                    contents: contents
        '404':
          description: ''
          content:
            application/json:
              schema:
                type: string
      security:
        - BearerAuth: []
  /check/{id}:
    get:
      description: This endpoint checks the health of a resource.
      operationId: healthService_health_service_check
      tags:
        - HealthService
      parameters:
        - name: id
          in: path
          description: The id to check
          required: true
          schema:
            type: string
          example: id
          examples:
            Example1:
              value: id
      responses:
        '204':
          description: ''
      security:
        - BearerAuth: []
  /ping:
    get:
      description: This endpoint checks the health of the service.
      operationId: healthService_health_service_ping
      tags:
        - HealthService
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: boolean
              examples:
                Example1:
                  value: true
      security:
        - BearerAuth: []
  /movie/{movieId}:
    get:
      operationId: service_getmovie
      tags:
        - Service
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MovieId'
          example: movieId
          examples:
            Example1:
              value: movieId
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              examples:
                Example1:
                  value:
                    id: id
                    prequel: prequel
                    title: title
                    from: from
                    rating: 1.1
                    type: movie
                    tag: tag
                    book: book
                    metadata:
                      key: value
                    revenue: 1000000
  /movie:
    post:
      operationId: service_createmovie
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieId'
              examples:
                Example1:
                  value: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Movie'
            examples:
              Example1:
                value:
                  id: id
                  title: title
                  from: from
                  rating: 1.1
                  type: movie
                  tag: tag
                  metadata:
                    key: value
                  revenue: 1000000
  /metadata:
    get:
      operationId: service_getmetadata
      tags:
        - Service
      parameters:
        - name: shallow
          in: query
          required: false
          schema:
            type: boolean
            nullable: true
        - name: tag
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              nullable: true
        - name: X-API-Version
          in: header
          required: true
          schema:
            type: string
          example: X-API-Version
          examples:
            Example1:
              value: X-API-Version
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
              examples:
                Example1:
                  value:
                    value: value
                    type: html
                    extra:
                      key: value
                    tags:
                      - string
  /big-entity:
    post:
      operationId: service_createbigentity
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              examples:
                Example1:
                  value:
                    response:
                      key: value
                    identifiers:
                      - type: primitive
                        value: value
                        label: label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                castMember:
                  $ref: '#/components/schemas/CastMember'
                  nullable: true
                extendedMovie:
                  $ref: '#/components/schemas/ExtendedMovie'
                  nullable: true
                entity:
                  $ref: '#/components/schemas/Entity'
                  nullable: true
                metadata:
                  $ref: '#/components/schemas/Metadata'
                  nullable: true
                commonMetadata:
                  $ref: '#/components/schemas/CommonsMetadata'
                  nullable: true
                eventInfo:
                  $ref: '#/components/schemas/CommonsEventInfo'
                  nullable: true
                data:
                  $ref: '#/components/schemas/CommonsData'
                  nullable: true
                migration:
                  $ref: '#/components/schemas/Migration'
                  nullable: true
                exception:
                  $ref: '#/components/schemas/Exception'
                  nullable: true
                test:
                  $ref: '#/components/schemas/Test'
                  nullable: true
                node:
                  $ref: '#/components/schemas/Node'
                  nullable: true
                directory:
                  $ref: '#/components/schemas/Directory'
                  nullable: true
                moment:
                  $ref: '#/components/schemas/Moment'
                  nullable: true
            examples:
              Example1:
                value: {}
  /refresh-token:
    post:
      operationId: service_refreshtoken
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: ''
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl:
                  type: integer
                  example: 1
              required:
                - ttl
            examples:
              Example1:
                value:
                  ttl: 1
components:
  schemas:
    Type:
      title: Type
      oneOf:
        - $ref: '#/components/schemas/BasicType'
        - $ref: '#/components/schemas/ComplexType'
    Identifier:
      title: Identifier
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
        value:
          type: string
          example: value
        label:
          type: string
          example: label
      required:
        - type
        - value
        - label
    BasicType:
      title: BasicType
      type: string
      enum:
        - primitive
        - literal
    ComplexType:
      title: ComplexType
      type: string
      enum:
        - object
        - union
        - unknown
    TypeWithSingleCharPropertyEqualToTypeStartingLetter:
      title: TypeWithSingleCharPropertyEqualToTypeStartingLetter
      type: object
      properties:
        t:
          type: string
        ty:
          type: string
      required:
        - t
        - ty
    CommonsTag:
      title: CommonsTag
      type: string
    CommonsMetadata:
      title: CommonsMetadata
      type: object
      properties:
        id:
          type: string
        data:
          type: object
          additionalProperties:
            type: string
            nullable: true
          nullable: true
        jsonString:
          type: string
          nullable: true
      required:
        - id
    CommonsEventInfoZeroType:
      title: CommonsEventInfoZeroType
      type: string
      enum:
        - metadata
    CommonsEventInfoZero:
      title: CommonsEventInfoZero
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CommonsEventInfoZeroType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/CommonsMetadata'
    CommonsEventInfoTypeType:
      title: CommonsEventInfoTypeType
      type: string
      enum:
        - tag
    CommonsEventInfoType:
      title: CommonsEventInfoType
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CommonsEventInfoTypeType'
        value:
          $ref: '#/components/schemas/CommonsTag'
          nullable: true
      required:
        - type
    CommonsEventInfo:
      title: CommonsEventInfo
      oneOf:
        - $ref: '#/components/schemas/CommonsEventInfoZero'
        - $ref: '#/components/schemas/CommonsEventInfoType'
    CommonsDataString:
      title: CommonsDataString
      type: object
      properties:
        value:
          type: string
          nullable: true
    CommonsDataBase64:
      title: CommonsDataBase64
      type: object
      properties:
        value:
          type: string
          format: byte
          nullable: true
    CommonsData:
      title: CommonsData
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - string
            - $ref: '#/components/schemas/CommonsDataString'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - base64
            - $ref: '#/components/schemas/CommonsDataBase64'
          required:
            - type
    FileFilename:
      title: FileFilename
      type: string
    MovieId:
      title: MovieId
      type: string
    MovieType:
      title: MovieType
      type: string
      enum:
        - movie
    Movie:
      title: Movie
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MovieId'
        prequel:
          $ref: '#/components/schemas/MovieId'
          nullable: true
        title:
          type: string
          example: title
        from:
          type: string
          example: from
        rating:
          type: number
          format: double
          description: The rating scale is one to five stars
          example: 1.1
        type:
          $ref: '#/components/schemas/MovieType'
        tag:
          $ref: '#/components/schemas/CommonsTag'
        book:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        revenue:
          type: integer
          format: int64
          example: 1000000
      required:
        - id
        - title
        - from
        - rating
        - type
        - tag
        - metadata
        - revenue
    CastMember:
      title: CastMember
      oneOf:
        - $ref: '#/components/schemas/Actor'
        - $ref: '#/components/schemas/Actress'
        - $ref: '#/components/schemas/StuntDouble'
    Actor:
      title: Actor
      type: object
      properties:
        name:
          type: string
        id:
          type: string
      required:
        - name
        - id
    Actress:
      title: Actress
      type: object
      properties:
        name:
          type: string
        id:
          type: string
      required:
        - name
        - id
    StuntDouble:
      title: StuntDouble
      type: object
      properties:
        name:
          type: string
        actorOrActressId:
          type: string
      required:
        - name
        - actorOrActressId
    ExtendedMovie:
      title: ExtendedMovie
      type: object
      properties:
        cast:
          type: array
          items:
            type: string
      required:
        - cast
      allOf:
        - $ref: '#/components/schemas/Movie'
    Moment:
      title: Moment
      type: object
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        datetime:
          type: string
          format: date-time
      required:
        - id
        - date
        - datetime
    File:
      title: File
      type: object
      properties:
        name:
          type: string
          example: name
        contents:
          type: string
          example: contents
      required:
        - name
        - contents
    Directory:
      title: Directory
      type: object
      properties:
        name:
          type: string
        files:
          type: array
          items:
            $ref: '#/components/schemas/File'
          nullable: true
        directories:
          type: array
          items:
            $ref: '#/components/schemas/Directory'
          nullable: true
      required:
        - name
    Node:
      title: Node
      type: object
      properties:
        name:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'
          nullable: true
        trees:
          type: array
          items:
            $ref: '#/components/schemas/Tree'
          nullable: true
      required:
        - name
    Tree:
      title: Tree
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'
          nullable: true
    MetadataHtml:
      title: MetadataHtml
      type: object
      properties:
        value:
          type: string
          nullable: true
    MetadataMarkdown:
      title: MetadataMarkdown
      type: object
      properties:
        value:
          type: string
          nullable: true
    Metadata:
      title: Metadata
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - html
            - $ref: '#/components/schemas/MetadataHtml'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - markdown
            - $ref: '#/components/schemas/MetadataMarkdown'
          required:
            - type
      required:
        - extra
        - tags
      properties:
        extra:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
    ExceptionZeroType:
      title: ExceptionZeroType
      type: string
      enum:
        - generic
    ExceptionZero:
      title: ExceptionZero
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ExceptionZeroType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/ExceptionInfo'
    ExceptionTypeType:
      title: ExceptionTypeType
      type: string
      enum:
        - timeout
    ExceptionType:
      title: ExceptionType
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ExceptionTypeType'
      required:
        - type
    Exception:
      title: Exception
      oneOf:
        - $ref: '#/components/schemas/ExceptionZero'
        - $ref: '#/components/schemas/ExceptionType'
    ExceptionInfo:
      title: ExceptionInfo
      type: object
      properties:
        exceptionType:
          type: string
        exceptionMessage:
          type: string
        exceptionStacktrace:
          type: string
      required:
        - exceptionType
        - exceptionMessage
        - exceptionStacktrace
    MigrationStatus:
      title: MigrationStatus
      type: string
      enum:
        - RUNNING
        - FAILED
        - FINISHED
    Migration:
      title: Migration
      type: object
      properties:
        name:
          type: string
        status:
          $ref: '#/components/schemas/MigrationStatus'
      required:
        - name
        - status
    Request:
      title: Request
      type: object
      properties:
        request: {}
      required:
        - request
    Response:
      title: Response
      type: object
      properties:
        response: {}
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
      required:
        - response
        - identifiers
    ResponseType:
      title: ResponseType
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
      required:
        - type
    TestAnd:
      title: TestAnd
      type: object
      properties:
        value:
          type: boolean
          nullable: true
    TestOr:
      title: TestOr
      type: object
      properties:
        value:
          type: boolean
          nullable: true
    Test:
      title: Test
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - and
            - $ref: '#/components/schemas/TestAnd'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - or
            - $ref: '#/components/schemas/TestOr'
          required:
            - type
    Entity:
      title: Entity
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
        name:
          type: string
      required:
        - type
        - name
    CronJob:
      title: CronJob
      type: object
      properties:
        expression:
          type: string
      required:
        - expression
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
servers:
  - url: https://production.com/api
    description: Production
