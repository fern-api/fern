openapi: 3.1.0
info:
  title: examples
  version: 0.0.0
paths:
  /echo:
    post:
      operationId: echo
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: Hello world!\n\nwith\n\tnewlines
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
            examples:
              Example1:
                value: Hello world!\n\nwith\n\tnewlines
  /create-type:
    post:
      operationId: createType
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identifier'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Type'
  /file/notification/{notificationId}:
    get:
      operationId: file_notification_service_getException
      tags:
        - FileNotificationService
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: notification-hsy129x
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
              examples:
                Example1:
                  value:
                    type: generic
                    exceptionType: Unavailable
                    exceptionMessage: This component is unavailable!
                    exceptionStacktrace: <logs>
      security:
        - Bearer: []
  /file/{filename}:
    get:
      description: This endpoint returns a file by its name.
      operationId: file_service_getFile
      tags:
        - FileService
      parameters:
        - name: filename
          in: path
          description: This is a filename
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: file.txt
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
        '404':
          description: NotFoundError
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: A file with that name was not found!
      security:
        - Bearer: []
  /check/{id}:
    get:
      description: This endpoint checks the health of a resource.
      operationId: health_service_check
      tags:
        - HealthService
      parameters:
        - name: id
          in: path
          description: The id to check
          required: true
          schema:
            type: string
          examples:
            Example0:
              value: id-2sdx82h
            Example2:
              value: id-3tey93i
      responses:
        '204':
          description: No content
      security:
        - Bearer: []
  /ping:
    get:
      description: This endpoint checks the health of the service.
      operationId: health_service_ping
      tags:
        - HealthService
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: boolean
              examples:
                Example0:
                  value: true
      security:
        - Bearer: []
  /movie/{movieId}:
    get:
      operationId: service_getMovie
      tags:
        - Service
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MovieId'
          examples:
            Example1:
              value: movie-c06a4ad7
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              examples:
                Example1:
                  value:
                    id: movie-c06a4ad7
                    prequel: movie-cv9b914f
                    title: The Boy and the Heron
                    from: Hayao Miyazaki
                    rating: 8
                    type: movie
                    tag: tag-wf9as23d
                    metadata:
                      actors:
                        - Christian Bale
                        - Florence Pugh
                        - Willem Dafoe
                      releaseDate: '2023-12-08'
                      ratings:
                        rottenTomatoes: 97
                        imdb: 7.6
                    revenue: 1000000
  /movie:
    post:
      operationId: service_createMovie
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieId'
              examples:
                Example1:
                  value: movie-c06a4ad7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Movie'
            examples:
              Example1:
                value:
                  id: movie-c06a4ad7
                  prequel: movie-cv9b914f
                  title: The Boy and the Heron
                  from: Hayao Miyazaki
                  rating: 8
                  type: movie
                  tag: tag-wf9as23d
                  metadata:
                    actors:
                      - Christian Bale
                      - Florence Pugh
                      - Willem Dafoe
                    releaseDate: '2023-12-08'
                    ratings:
                      rottenTomatoes: 97
                      imdb: 7.6
                  revenue: 1000000
  /metadata:
    get:
      operationId: service_getMetadata
      tags:
        - Service
      parameters:
        - name: shallow
          in: query
          required: false
          schema:
            type:
              - boolean
              - 'null'
          examples:
            Example1:
              value: false
        - name: tag
          in: query
          required: false
          schema:
            type: array
            items:
              type:
                - string
                - 'null'
          examples:
            Example1:
              value: development
        - name: X-API-Version
          in: header
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: 0.0.1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
              examples:
                Example1:
                  value:
                    type: html
                    extra:
                      version: 0.0.1
                      tenancy: test
                    tags:
                      - development
                      - public
                    value: <head>...</head>
  /big-entity:
    post:
      operationId: service_createBigEntity
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BigEntity'
  /refresh-token:
    post:
      operationId: service_refreshToken
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: false
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/RefreshTokenRequest'
                - type: 'null'
            examples:
              Example1: {}
              Example2:
                value:
                  ttl: 420
components:
  schemas:
    Type:
      title: Type
      oneOf:
        - $ref: '#/components/schemas/BasicType'
        - $ref: '#/components/schemas/ComplexType'
    Identifier:
      title: Identifier
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
        value:
          type: string
        label:
          type: string
      required:
        - type
        - value
        - label
    BasicType:
      title: BasicType
      type: string
      enum:
        - primitive
        - literal
    ComplexType:
      title: ComplexType
      type: string
      enum:
        - object
        - union
        - unknown
    TypeWithSingleCharPropertyEqualToTypeStartingLetter:
      title: TypeWithSingleCharPropertyEqualToTypeStartingLetter
      type: object
      properties:
        t:
          type: string
        ty:
          type: string
      required:
        - t
        - ty
    commonsTag:
      title: commonsTag
      type: string
    commonsMetadata:
      title: commonsMetadata
      type: object
      properties:
        id:
          type: string
          examples:
            - metadata-js8dg24b
        data:
          type:
            - object
            - 'null'
          additionalProperties:
            type: string
        jsonString:
          type:
            - string
            - 'null'
      required:
        - id
    commonsEventInfo:
      title: commonsEventInfo
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: metadata
            - $ref: '#/components/schemas/commonsMetadata'
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: tag
            value:
              $ref: '#/components/schemas/commonsTag'
          required:
            - type
    commonsData:
      title: commonsData
      oneOf:
        - type: object
          properties:
            type:
              type: string
              const: string
            value:
              type: string
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: base64
            value:
              type: string
              format: byte
          required:
            - type
    fileFilename:
      title: fileFilename
      type: string
    MovieId:
      title: MovieId
      type: string
    Movie:
      title: Movie
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MovieId'
        prequel:
          anyOf:
            - $ref: '#/components/schemas/MovieId'
            - type: 'null'
        title:
          type: string
          examples:
            - The Boy and the Heron
        from:
          type: string
          examples:
            - Hayao Miyazaki
        rating:
          type: number
          format: double
          description: The rating scale is one to five stars
          examples:
            - 8
        type:
          type: string
          const: movie
        tag:
          $ref: '#/components/schemas/commonsTag'
        book:
          type:
            - string
            - 'null'
        metadata:
          type: object
        revenue:
          type: integer
          format: int64
          examples:
            - 1000000
      required:
        - id
        - title
        - from
        - rating
        - type
        - tag
        - metadata
        - revenue
    CastMember:
      title: CastMember
      oneOf:
        - $ref: '#/components/schemas/Actor'
        - $ref: '#/components/schemas/Actress'
        - $ref: '#/components/schemas/StuntDouble'
    Actor:
      title: Actor
      type: object
      properties:
        name:
          type: string
        id:
          type: string
      required:
        - name
        - id
    Actress:
      title: Actress
      type: object
      properties:
        name:
          type: string
          examples:
            - Jennifer Lawrence
        id:
          type: string
          examples:
            - actor_456
      required:
        - name
        - id
    StuntDouble:
      title: StuntDouble
      type: object
      properties:
        name:
          type: string
        actorOrActressId:
          type: string
      required:
        - name
        - actorOrActressId
    ExtendedMovie:
      title: ExtendedMovie
      type: object
      properties:
        cast:
          type: array
          items:
            type: string
          examples:
            - - John Travolta
              - Samuel L. Jackson
              - Uma Thurman
              - Bruce Willis
      required:
        - cast
      allOf:
        - $ref: '#/components/schemas/Movie'
    Moment:
      title: Moment
      type: object
      properties:
        id:
          type: string
          format: uuid
          examples:
            - 656f12d6-f592-444c-a1d3-a3cfd46d5b39
        date:
          type: string
          format: date
          examples:
            - '1994-01-01'
        datetime:
          type: string
          format: date-time
          examples:
            - '1994-01-01T01:01:01Z'
      required:
        - id
        - date
        - datetime
    File:
      title: File
      type: object
      properties:
        name:
          type: string
          examples:
            - file.txt
        contents:
          type: string
          examples:
            - ...
      required:
        - name
        - contents
    Directory:
      title: Directory
      type: object
      properties:
        name:
          type: string
          examples:
            - root
        files:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/File'
        directories:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Directory'
      required:
        - name
    Node:
      title: Node
      type: object
      properties:
        name:
          type: string
          examples:
            - root
        nodes:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Node'
        trees:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Tree'
      required:
        - name
    Tree:
      title: Tree
      type: object
      properties:
        nodes:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Node'
    Metadata:
      title: Metadata
      oneOf:
        - type: object
          properties:
            type:
              type: string
              const: html
            value:
              type: string
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: markdown
            value:
              type: string
          required:
            - type
      required:
        - extra
        - tags
      properties:
        extra:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
    Exception:
      title: Exception
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: generic
            - $ref: '#/components/schemas/ExceptionInfo'
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: timeout
          required:
            - type
    ExceptionInfo:
      title: ExceptionInfo
      type: object
      properties:
        exceptionType:
          type: string
          examples:
            - Unavailable
        exceptionMessage:
          type: string
          examples:
            - This component is unavailable!
        exceptionStacktrace:
          type: string
          examples:
            - <logs>
      required:
        - exceptionType
        - exceptionMessage
        - exceptionStacktrace
    MigrationStatus:
      title: MigrationStatus
      type: string
      enum:
        - RUNNING
        - FAILED
        - FINISHED
    Migration:
      title: Migration
      type: object
      properties:
        name:
          type: string
          examples:
            - 001_init
        status:
          $ref: '#/components/schemas/MigrationStatus'
      required:
        - name
        - status
    Request:
      title: Request
      type: object
      properties:
        request: {}
      required:
        - request
    Response:
      title: Response
      type: object
      properties:
        response: {}
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
      required:
        - response
        - identifiers
    ResponseType:
      title: ResponseType
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
      required:
        - type
    Test:
      title: Test
      oneOf:
        - type: object
          properties:
            type:
              type: string
              const: and
            value:
              type: boolean
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: or
            value:
              type: boolean
          required:
            - type
    Entity:
      title: Entity
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
        name:
          type: string
          examples:
            - unknown
      required:
        - type
        - name
    BigEntity:
      title: BigEntity
      type: object
      properties:
        castMember:
          anyOf:
            - $ref: '#/components/schemas/CastMember'
            - type: 'null'
        extendedMovie:
          anyOf:
            - $ref: '#/components/schemas/ExtendedMovie'
            - type: 'null'
        entity:
          anyOf:
            - $ref: '#/components/schemas/Entity'
            - type: 'null'
        metadata:
          anyOf:
            - $ref: '#/components/schemas/Metadata'
            - type: 'null'
        commonMetadata:
          anyOf:
            - $ref: '#/components/schemas/commonsMetadata'
            - type: 'null'
        eventInfo:
          anyOf:
            - $ref: '#/components/schemas/commonsEventInfo'
            - type: 'null'
        data:
          anyOf:
            - $ref: '#/components/schemas/commonsData'
            - type: 'null'
        migration:
          anyOf:
            - $ref: '#/components/schemas/Migration'
            - type: 'null'
        exception:
          anyOf:
            - $ref: '#/components/schemas/Exception'
            - type: 'null'
        test:
          anyOf:
            - $ref: '#/components/schemas/Test'
            - type: 'null'
        node:
          anyOf:
            - $ref: '#/components/schemas/Node'
            - type: 'null'
        directory:
          anyOf:
            - $ref: '#/components/schemas/Directory'
            - type: 'null'
        moment:
          anyOf:
            - $ref: '#/components/schemas/Moment'
            - type: 'null'
    CronJob:
      title: CronJob
      type: object
      properties:
        expression:
          type: string
          examples:
            - 0 */6 * * *
      required:
        - expression
    RefreshTokenRequest:
      title: RefreshTokenRequest
      type: object
      properties:
        ttl:
          type: integer
      required:
        - ttl
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
servers:
  - url: https://production.com/api
    description: Production
  - url: https://staging.com/api
    description: Staging
