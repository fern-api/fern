openapi: 3.1.0
info:
  title: oauth-client-credentials-default
  version: 0.0.0
paths:
  /token:
    post:
      operationId: auth_gettoken
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    expires_in: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  example: client_id
                client_secret:
                  type: string
                  example: client_secret
                grant_type:
                  $ref: '#/components/schemas/AuthGetTokenRequestGrantType'
              required:
                - client_id
                - client_secret
                - grant_type
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
                  grant_type: client_credentials
  /nested-no-auth/get-something:
    get:
      operationId: nestedNoAuthAPI_nestedNoAuth_api_getSomething
      tags:
        - NestedNoAuthAPI
      parameters: []
      responses:
        '204':
          description: No content
  /nested/get-something:
    get:
      operationId: nestedAPI_nested_api_getSomething
      tags:
        - NestedAPI
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - BearerAuth: []
  /get-something:
    get:
      operationId: simple_getsomething
      tags:
        - Simple
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - BearerAuth: []
components:
  schemas:
    AuthGetTokenRequestGrantType:
      title: AuthGetTokenRequestGrantType
      type: string
      enum:
        - client_credentials
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
          example: access_token
        expires_in:
          type: integer
          example: 1
      required:
        - access_token
        - expires_in
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
