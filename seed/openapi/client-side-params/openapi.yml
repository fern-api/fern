openapi: 3.1.0
info:
  title: client-side-params
  version: 0.0.0
paths:
  /api/resources:
    get:
      description: List resources with pagination
      operationId: service_listResources
      tags:
        - Service
      parameters:
        - name: page
          in: query
          description: Zero-indexed page number
          required: true
          schema:
            type: integer
        - name: per_page
          in: query
          description: Number of items per page
          required: true
          schema:
            type: integer
        - name: sort
          in: query
          description: Sort field
          required: true
          schema:
            type: string
        - name: order
          in: query
          description: Sort order (asc or desc)
          required: true
          schema:
            type: string
        - name: include_totals
          in: query
          description: Whether to include total count
          required: true
          schema:
            type: boolean
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: search
          in: query
          description: Search query
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
  /api/resources/{resourceId}:
    get:
      description: Get a single resource
      operationId: service_getResource
      tags:
        - Service
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
        - name: include_metadata
          in: query
          description: Include metadata in response
          required: true
          schema:
            type: boolean
        - name: format
          in: query
          description: Response format
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
  /api/resources/search:
    post:
      description: Search resources with complex parameters
      operationId: service_searchResources
      tags:
        - Service
      parameters:
        - name: limit
          in: query
          description: Maximum results to return
          required: true
          schema:
            type: integer
        - name: offset
          in: query
          description: Offset for pagination
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type:
                    - string
                    - 'null'
                  description: Search query text
                filters:
                  type:
                    - object
                    - 'null'
  /api/users:
    get:
      description: List or search for users
      operationId: service_listUsers
      tags:
        - Service
      parameters:
        - name: page
          in: query
          description: Page index of the results to return. First page is 0.
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: per_page
          in: query
          description: Number of results per page.
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: include_totals
          in: query
          description: >-
            Return results inside an object that contains the total result count
            (true) or as a direct array of results (false, default).
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: sort
          in: query
          description: >-
            Field to sort by. Use field:order where order is 1 for ascending and
            -1 for descending.
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: connection
          in: query
          description: Connection filter
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: q
          in: query
          description: Query string following Lucene query string syntax
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: search_engine
          in: query
          description: Search engine version (v1, v2, or v3)
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: fields
          in: query
          description: Comma-separated list of fields to include or exclude
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: >-
            Returns either PaginatedUserResponse (if include_totals=true) or
            list<User> (if include_totals=false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserResponse'
    post:
      description: Create a new user
      operationId: service_createUser
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
  /api/users/{userId}:
    get:
      description: Get a user by ID
      operationId: service_getUserById
      tags:
        - Service
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: fields
          in: query
          description: Comma-separated list of fields to include or exclude
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: include_fields
          in: query
          description: true to include the fields specified, false to exclude them
          required: false
          schema:
            type:
              - boolean
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      description: Update a user
      operationId: service_updateUser
      tags:
        - Service
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
    delete:
      description: Delete a user
      operationId: service_deleteUser
      tags:
        - Service
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/connections:
    get:
      description: List all connections
      operationId: service_listConnections
      tags:
        - Service
      parameters:
        - name: strategy
          in: query
          description: Filter by strategy type (e.g., auth0, google-oauth2, samlp)
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: name
          in: query
          description: Filter by connection name
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Connection'
  /api/connections/{connectionId}:
    get:
      description: Get a connection by ID
      operationId: service_getConnection
      tags:
        - Service
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
  /api/clients:
    get:
      description: List all clients/applications
      operationId: service_listClients
      tags:
        - Service
      parameters:
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: include_fields
          in: query
          description: Whether specified fields are included or excluded
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: page
          in: query
          description: Page number (zero-based)
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: per_page
          in: query
          description: Number of results per page
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: include_totals
          in: query
          description: Include total count in response
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: is_global
          in: query
          description: Filter by global clients
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: is_first_party
          in: query
          description: Filter by first party clients
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: app_type
          in: query
          description: >-
            Filter by application type (spa, native, regular_web,
            non_interactive)
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClientResponse'
  /api/clients/{clientId}:
    get:
      description: Get a client by ID
      operationId: service_getClient
      tags:
        - Service
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: include_fields
          in: query
          description: Whether specified fields are included or excluded
          required: false
          schema:
            type:
              - boolean
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
components:
  schemas:
    Resource:
      title: Resource
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type:
            - object
            - 'null'
      required:
        - id
        - name
        - created_at
        - updated_at
    SearchResponse:
      title: SearchResponse
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        total:
          type:
            - integer
            - 'null'
        next_offset:
          type:
            - integer
            - 'null'
      required:
        - results
    User:
      title: User
      type: object
      description: User object similar to Auth0 users
      properties:
        user_id:
          type: string
        email:
          type: string
        email_verified:
          type: boolean
        username:
          type:
            - string
            - 'null'
        phone_number:
          type:
            - string
            - 'null'
        phone_verified:
          type:
            - boolean
            - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        identities:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Identity'
        app_metadata:
          type:
            - object
            - 'null'
        user_metadata:
          type:
            - object
            - 'null'
        picture:
          type:
            - string
            - 'null'
        name:
          type:
            - string
            - 'null'
        nickname:
          type:
            - string
            - 'null'
        multifactor:
          type:
            - array
            - 'null'
          items:
            type: string
        last_ip:
          type:
            - string
            - 'null'
        last_login:
          type:
            - string
            - 'null'
          format: date-time
        logins_count:
          type:
            - integer
            - 'null'
        blocked:
          type:
            - boolean
            - 'null'
        given_name:
          type:
            - string
            - 'null'
        family_name:
          type:
            - string
            - 'null'
      required:
        - user_id
        - email
        - email_verified
        - created_at
        - updated_at
    Identity:
      title: Identity
      type: object
      properties:
        connection:
          type: string
        user_id:
          type: string
        provider:
          type: string
        is_social:
          type: boolean
        access_token:
          type:
            - string
            - 'null'
        expires_in:
          type:
            - integer
            - 'null'
      required:
        - connection
        - user_id
        - provider
        - is_social
    PaginatedUserResponse:
      title: PaginatedUserResponse
      type: object
      description: Response with pagination info like Auth0
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        start:
          type: integer
        limit:
          type: integer
        length:
          type: integer
        total:
          type:
            - integer
            - 'null'
      required:
        - users
        - start
        - limit
        - length
    CreateUserRequest:
      title: CreateUserRequest
      type: object
      properties:
        email:
          type: string
        email_verified:
          type:
            - boolean
            - 'null'
        username:
          type:
            - string
            - 'null'
        password:
          type:
            - string
            - 'null'
        phone_number:
          type:
            - string
            - 'null'
        phone_verified:
          type:
            - boolean
            - 'null'
        user_metadata:
          type:
            - object
            - 'null'
        app_metadata:
          type:
            - object
            - 'null'
        connection:
          type: string
      required:
        - email
        - connection
    UpdateUserRequest:
      title: UpdateUserRequest
      type: object
      properties:
        email:
          type:
            - string
            - 'null'
        email_verified:
          type:
            - boolean
            - 'null'
        username:
          type:
            - string
            - 'null'
        phone_number:
          type:
            - string
            - 'null'
        phone_verified:
          type:
            - boolean
            - 'null'
        user_metadata:
          type:
            - object
            - 'null'
        app_metadata:
          type:
            - object
            - 'null'
        password:
          type:
            - string
            - 'null'
        blocked:
          type:
            - boolean
            - 'null'
    Connection:
      title: Connection
      type: object
      description: Represents an identity provider connection
      properties:
        id:
          type: string
          description: Connection identifier
        name:
          type: string
          description: Connection name
        display_name:
          type:
            - string
            - 'null'
          description: Display name for the connection
        strategy:
          type: string
          description: >-
            The identity provider identifier (auth0, google-oauth2, facebook,
            etc.)
        options:
          type:
            - object
            - 'null'
          description: Connection-specific configuration options
        enabled_clients:
          type:
            - array
            - 'null'
          items:
            type: string
          description: List of client IDs that can use this connection
        realms:
          type:
            - array
            - 'null'
          items:
            type: string
          description: Applicable realms for enterprise connections
        is_domain_connection:
          type:
            - boolean
            - 'null'
          description: Whether this is a domain connection
        metadata:
          type:
            - object
            - 'null'
          description: Additional metadata
      required:
        - id
        - name
        - strategy
    Client:
      title: Client
      type: object
      description: Represents a client application
      properties:
        client_id:
          type: string
          description: The unique client identifier
        tenant:
          type:
            - string
            - 'null'
          description: The tenant name
        name:
          type: string
          description: Name of the client
        description:
          type:
            - string
            - 'null'
          description: Free text description of the client
        global:
          type:
            - boolean
            - 'null'
          description: Whether this is a global client
        client_secret:
          type:
            - string
            - 'null'
          description: The client secret (only for non-public clients)
        app_type:
          type:
            - string
            - 'null'
          description: The type of application (spa, native, regular_web, non_interactive)
        logo_uri:
          type:
            - string
            - 'null'
          description: URL of the client logo
        is_first_party:
          type:
            - boolean
            - 'null'
          description: Whether this client is a first party client
        oidc_conformant:
          type:
            - boolean
            - 'null'
          description: Whether this client conforms to OIDC specifications
        callbacks:
          type:
            - array
            - 'null'
          items:
            type: string
          description: Allowed callback URLs
        allowed_origins:
          type:
            - array
            - 'null'
          items:
            type: string
          description: Allowed origins for CORS
        web_origins:
          type:
            - array
            - 'null'
          items:
            type: string
          description: Allowed web origins for CORS
        grant_types:
          type:
            - array
            - 'null'
          items:
            type: string
          description: Allowed grant types
        jwt_configuration:
          type:
            - object
            - 'null'
          description: JWT configuration for the client
        signing_keys:
          type:
            - array
            - 'null'
          items:
            type: object
          description: Client signing keys
        encryption_key:
          type:
            - object
            - 'null'
          description: Encryption key
        sso:
          type:
            - boolean
            - 'null'
          description: Whether SSO is enabled
        sso_disabled:
          type:
            - boolean
            - 'null'
          description: Whether SSO is disabled
        cross_origin_auth:
          type:
            - boolean
            - 'null'
          description: Whether to use cross-origin authentication
        cross_origin_loc:
          type:
            - string
            - 'null'
          description: URL for cross-origin authentication
        custom_login_page_on:
          type:
            - boolean
            - 'null'
          description: Whether a custom login page is enabled
        custom_login_page:
          type:
            - string
            - 'null'
          description: Custom login page URL
        custom_login_page_preview:
          type:
            - string
            - 'null'
          description: Custom login page preview URL
        form_template:
          type:
            - string
            - 'null'
          description: Form template for WS-Federation
        is_heroku_app:
          type:
            - boolean
            - 'null'
          description: Whether this is a Heroku application
        addons:
          type:
            - object
            - 'null'
          description: Addons enabled for this client
        token_endpoint_auth_method:
          type:
            - string
            - 'null'
          description: Requested authentication method for the token endpoint
        client_metadata:
          type:
            - object
            - 'null'
          description: Metadata associated with the client
        mobile:
          type:
            - object
            - 'null'
          description: Mobile app settings
      required:
        - client_id
        - name
    PaginatedClientResponse:
      title: PaginatedClientResponse
      type: object
      description: Paginated response for clients listing
      properties:
        start:
          type: integer
          description: Starting index (zero-based)
        limit:
          type: integer
          description: Number of items requested
        length:
          type: integer
          description: Number of items returned
        total:
          type:
            - integer
            - 'null'
          description: Total number of items (when include_totals=true)
        clients:
          type: array
          items:
            $ref: '#/components/schemas/Client'
          description: List of clients
      required:
        - start
        - limit
        - length
        - clients
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
