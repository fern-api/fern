openapi: 3.1.0
info:
  title: client-side-params
  version: 0.0.0
paths:
  /api/resources:
    get:
      description: List resources with pagination
      operationId: service_listresources
      tags:
        - Service
      parameters:
        - name: page
          in: query
          description: Zero-indexed page number
          required: true
          schema:
            type: integer
          example: 1
          examples:
            Example1:
              value: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: true
          schema:
            type: integer
          example: 1
          examples:
            Example1:
              value: 1
        - name: sort
          in: query
          description: Sort field
          required: true
          schema:
            type: string
          example: sort
          examples:
            Example1:
              value: sort
        - name: order
          in: query
          description: Sort order (asc or desc)
          required: true
          schema:
            type: string
          example: order
          examples:
            Example1:
              value: order
        - name: include_totals
          in: query
          description: Whether to include total count
          required: true
          schema:
            type: boolean
          example: true
          examples:
            Example1:
              value: true
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: search
          in: query
          description: Search query
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
                      description: description
                      created_at: '2024-01-15T09:30:00Z'
                      updated_at: '2024-01-15T09:30:00Z'
                      metadata:
                        key: value
  /api/resources/{resourceId}:
    get:
      description: Get a single resource
      operationId: service_getresource
      tags:
        - Service
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
          example: resourceId
          examples:
            Example1:
              value: resourceId
        - name: include_metadata
          in: query
          description: Include metadata in response
          required: true
          schema:
            type: boolean
          example: true
          examples:
            Example1:
              value: true
        - name: format
          in: query
          description: Response format
          required: true
          schema:
            type: string
          example: format
          examples:
            Example1:
              value: format
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
              examples:
                Example1:
                  value:
                    id: id
                    name: name
                    description: description
                    created_at: '2024-01-15T09:30:00Z'
                    updated_at: '2024-01-15T09:30:00Z'
                    metadata:
                      key: value
  /api/resources/search:
    post:
      description: Search resources with complex parameters
      operationId: service_searchresources
      tags:
        - Service
      parameters:
        - name: limit
          in: query
          description: Maximum results to return
          required: true
          schema:
            type: integer
          example: 1
          examples:
            Example1:
              value: 1
        - name: offset
          in: query
          description: Offset for pagination
          required: true
          schema:
            type: integer
          example: 1
          examples:
            Example1:
              value: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              examples:
                Example1:
                  value:
                    results:
                      - id: id
                        name: name
                        description: description
                        created_at: '2024-01-15T09:30:00Z'
                        updated_at: '2024-01-15T09:30:00Z'
                        metadata:
                          key: value
                    total: 1
                    next_offset: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type:
                    - string
                    - 'null'
                  description: Search query text
                filters:
                  type:
                    - object
                    - 'null'
  /api/users:
    get:
      description: List or search for users
      operationId: service_listusers
      tags:
        - Service
      parameters:
        - name: page
          in: query
          description: Page index of the results to return. First page is 0.
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: per_page
          in: query
          description: Number of results per page.
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: include_totals
          in: query
          description: >-
            Return results inside an object that contains the total result count
            (true) or as a direct array of results (false, default).
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: sort
          in: query
          description: >-
            Field to sort by. Use field:order where order is 1 for ascending and
            -1 for descending.
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: connection
          in: query
          description: Connection filter
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: q
          in: query
          description: Query string following Lucene query string syntax
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: search_engine
          in: query
          description: Search engine version (v1, v2, or v3)
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: fields
          in: query
          description: Comma-separated list of fields to include or exclude
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: >-
            Returns either PaginatedUserResponse (if include_totals=true) or
            list<User> (if include_totals=false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserResponse'
              examples:
                Example1:
                  value:
                    users:
                      - user_id: user_id
                        email: email
                        email_verified: true
                        username: username
                        phone_number: phone_number
                        phone_verified: true
                        created_at: '2024-01-15T09:30:00Z'
                        updated_at: '2024-01-15T09:30:00Z'
                        identities:
                          - connection: connection
                            user_id: user_id
                            provider: provider
                            is_social: true
                        app_metadata:
                          key: value
                        user_metadata:
                          key: value
                        picture: picture
                        name: name
                        nickname: nickname
                        multifactor:
                          - multifactor
                        last_ip: last_ip
                        last_login: '2024-01-15T09:30:00Z'
                        logins_count: 1
                        blocked: true
                        given_name: given_name
                        family_name: family_name
                    start: 1
                    limit: 1
                    length: 1
                    total: 1
    post:
      description: Create a new user
      operationId: service_createuser
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    user_id: user_id
                    email: email
                    email_verified: true
                    username: username
                    phone_number: phone_number
                    phone_verified: true
                    created_at: '2024-01-15T09:30:00Z'
                    updated_at: '2024-01-15T09:30:00Z'
                    identities:
                      - connection: connection
                        user_id: user_id
                        provider: provider
                        is_social: true
                        access_token: access_token
                        expires_in: 1
                    app_metadata:
                      key: value
                    user_metadata:
                      key: value
                    picture: picture
                    name: name
                    nickname: nickname
                    multifactor:
                      - multifactor
                    last_ip: last_ip
                    last_login: '2024-01-15T09:30:00Z'
                    logins_count: 1
                    blocked: true
                    given_name: given_name
                    family_name: family_name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: email
                email_verified:
                  type: boolean
                  nullable: true
                username:
                  type: string
                  nullable: true
                password:
                  type: string
                  nullable: true
                phone_number:
                  type: string
                  nullable: true
                phone_verified:
                  type: boolean
                  nullable: true
                user_metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
                app_metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
                connection:
                  type: string
                  example: connection
              required:
                - email
                - connection
            examples:
              Example1:
                value:
                  email: email
                  connection: connection
  /api/users/{userId}:
    get:
      description: Get a user by ID
      operationId: service_getuserbyid
      tags:
        - Service
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: userId
          examples:
            Example1:
              value: userId
        - name: fields
          in: query
          description: Comma-separated list of fields to include or exclude
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: include_fields
          in: query
          description: true to include the fields specified, false to exclude them
          required: false
          schema:
            type:
              - boolean
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    user_id: user_id
                    email: email
                    email_verified: true
                    username: username
                    phone_number: phone_number
                    phone_verified: true
                    created_at: '2024-01-15T09:30:00Z'
                    updated_at: '2024-01-15T09:30:00Z'
                    identities:
                      - connection: connection
                        user_id: user_id
                        provider: provider
                        is_social: true
                        access_token: access_token
                        expires_in: 1
                    app_metadata:
                      key: value
                    user_metadata:
                      key: value
                    picture: picture
                    name: name
                    nickname: nickname
                    multifactor:
                      - multifactor
                    last_ip: last_ip
                    last_login: '2024-01-15T09:30:00Z'
                    logins_count: 1
                    blocked: true
                    given_name: given_name
                    family_name: family_name
    delete:
      description: Delete a user
      operationId: service_deleteuser
      tags:
        - Service
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: userId
          examples:
            Example1:
              value: userId
      responses:
        '204':
          description: ''
    patch:
      description: Update a user
      operationId: service_updateuser
      tags:
        - Service
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: userId
          examples:
            Example1:
              value: userId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    user_id: user_id
                    email: email
                    email_verified: true
                    username: username
                    phone_number: phone_number
                    phone_verified: true
                    created_at: '2024-01-15T09:30:00Z'
                    updated_at: '2024-01-15T09:30:00Z'
                    identities:
                      - connection: connection
                        user_id: user_id
                        provider: provider
                        is_social: true
                        access_token: access_token
                        expires_in: 1
                    app_metadata:
                      key: value
                    user_metadata:
                      key: value
                    picture: picture
                    name: name
                    nickname: nickname
                    multifactor:
                      - multifactor
                    last_ip: last_ip
                    last_login: '2024-01-15T09:30:00Z'
                    logins_count: 1
                    blocked: true
                    given_name: given_name
                    family_name: family_name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
    delete:
      description: Delete a user
      operationId: service_deleteUser
      tags:
        - Service
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/connections:
    get:
      description: List all connections
      operationId: service_listconnections
      tags:
        - Service
      parameters:
        - name: strategy
          in: query
          description: Filter by strategy type (e.g., auth0, google-oauth2, samlp)
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: name
          in: query
          description: Filter by connection name
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Connection'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
                      display_name: display_name
                      strategy: strategy
                      options:
                        key: value
                      enabled_clients:
                        - enabled_clients
                      realms:
                        - realms
                      is_domain_connection: true
                      metadata:
                        key: value
  /api/connections/{connectionId}:
    get:
      description: Get a connection by ID
      operationId: service_getconnection
      tags:
        - Service
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
          example: connectionId
          examples:
            Example1:
              value: connectionId
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
              examples:
                Example1:
                  value:
                    id: id
                    name: name
                    display_name: display_name
                    strategy: strategy
                    options:
                      key: value
                    enabled_clients:
                      - enabled_clients
                    realms:
                      - realms
                    is_domain_connection: true
                    metadata:
                      key: value
  /api/clients:
    get:
      description: List all clients/applications
      operationId: service_listclients
      tags:
        - Service
      parameters:
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: include_fields
          in: query
          description: Whether specified fields are included or excluded
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: page
          in: query
          description: Page number (zero-based)
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: per_page
          in: query
          description: Number of results per page
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: include_totals
          in: query
          description: Include total count in response
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: is_global
          in: query
          description: Filter by global clients
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: is_first_party
          in: query
          description: Filter by first party clients
          required: false
          schema:
            type:
              - boolean
              - 'null'
        - name: app_type
          in: query
          description: >-
            Filter by application type (spa, native, regular_web,
            non_interactive)
          required: false
          schema:
            type:
              - array
              - 'null'
            items:
              type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClientResponse'
              examples:
                Example1:
                  value:
                    start: 1
                    limit: 1
                    length: 1
                    total: 1
                    clients:
                      - client_id: client_id
                        tenant: tenant
                        name: name
                        description: description
                        global: true
                        client_secret: client_secret
                        app_type: app_type
                        logo_uri: logo_uri
                        is_first_party: true
                        oidc_conformant: true
                        callbacks:
                          - callbacks
                        allowed_origins:
                          - allowed_origins
                        web_origins:
                          - web_origins
                        grant_types:
                          - grant_types
                        jwt_configuration:
                          key: value
                        signing_keys:
                          - key: value
                        encryption_key:
                          key: value
                        sso: true
                        sso_disabled: true
                        cross_origin_auth: true
                        cross_origin_loc: cross_origin_loc
                        custom_login_page_on: true
                        custom_login_page: custom_login_page
                        custom_login_page_preview: custom_login_page_preview
                        form_template: form_template
                        is_heroku_app: true
                        addons:
                          key: value
                        token_endpoint_auth_method: token_endpoint_auth_method
                        client_metadata:
                          key: value
                        mobile:
                          key: value
  /api/clients/{clientId}:
    get:
      description: Get a client by ID
      operationId: service_getclient
      tags:
        - Service
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: clientId
          examples:
            Example1:
              value: clientId
        - name: fields
          in: query
          description: Comma-separated list of fields to include
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: include_fields
          in: query
          description: Whether specified fields are included or excluded
          required: false
          schema:
            type:
              - boolean
              - 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
              examples:
                Example1:
                  value:
                    client_id: client_id
                    tenant: tenant
                    name: name
                    description: description
                    global: true
                    client_secret: client_secret
                    app_type: app_type
                    logo_uri: logo_uri
                    is_first_party: true
                    oidc_conformant: true
                    callbacks:
                      - callbacks
                    allowed_origins:
                      - allowed_origins
                    web_origins:
                      - web_origins
                    grant_types:
                      - grant_types
                    jwt_configuration:
                      key: value
                    signing_keys:
                      - key: value
                    encryption_key:
                      key: value
                    sso: true
                    sso_disabled: true
                    cross_origin_auth: true
                    cross_origin_loc: cross_origin_loc
                    custom_login_page_on: true
                    custom_login_page: custom_login_page
                    custom_login_page_preview: custom_login_page_preview
                    form_template: form_template
                    is_heroku_app: true
                    addons:
                      key: value
                    token_endpoint_auth_method: token_endpoint_auth_method
                    client_metadata:
                      key: value
                    mobile:
                      key: value
components:
  schemas:
    Resource:
      title: Resource
      type: object
      properties:
        id:
          type: string
          example: id
        name:
          type: string
          example: name
        description:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
          example: '2024-01-15T09:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2024-01-15T09:30:00Z'
        metadata:
          type:
            - object
            - 'null'
      required:
        - id
        - name
        - created_at
        - updated_at
    SearchResponse:
      title: SearchResponse
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        total:
          type:
            - integer
            - 'null'
        next_offset:
          type:
            - integer
            - 'null'
      required:
        - results
    User:
      title: User
      type: object
      description: User object similar to Auth0 users
      properties:
        user_id:
          type: string
          example: user_id
        email:
          type: string
          example: email
        email_verified:
          type: boolean
          example: true
        username:
          type:
            - string
            - 'null'
        phone_number:
          type:
            - string
            - 'null'
        phone_verified:
          type:
            - boolean
            - 'null'
        created_at:
          type: string
          format: date-time
          example: '2024-01-15T09:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2024-01-15T09:30:00Z'
        identities:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Identity'
        app_metadata:
          type:
            - object
            - 'null'
        user_metadata:
          type:
            - object
            - 'null'
        picture:
          type:
            - string
            - 'null'
        name:
          type:
            - string
            - 'null'
        nickname:
          type:
            - string
            - 'null'
        multifactor:
          type:
            - array
            - 'null'
          items:
            type: string
        last_ip:
          type:
            - string
            - 'null'
        last_login:
          type:
            - string
            - 'null'
          format: date-time
        logins_count:
          type:
            - integer
            - 'null'
        blocked:
          type:
            - boolean
            - 'null'
        given_name:
          type:
            - string
            - 'null'
        family_name:
          type:
            - string
            - 'null'
      required:
        - user_id
        - email
        - email_verified
        - created_at
        - updated_at
    Identity:
      title: Identity
      type: object
      properties:
        connection:
          type: string
        user_id:
          type: string
        provider:
          type: string
        is_social:
          type: boolean
        access_token:
          type:
            - string
            - 'null'
        expires_in:
          type:
            - integer
            - 'null'
      required:
        - connection
        - user_id
        - provider
        - is_social
    PaginatedUserResponse:
      title: PaginatedUserResponse
      type: object
      description: Response with pagination info like Auth0
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        start:
          type: integer
          example: 1
        limit:
          type: integer
          example: 1
        length:
          type: integer
          example: 1
        total:
          type:
            - integer
            - 'null'
      required:
        - users
        - start
        - limit
        - length
    CreateUserRequest:
      title: CreateUserRequest
      type: object
      properties:
        email:
          type: string
        email_verified:
          type:
            - boolean
            - 'null'
        username:
          type:
            - string
            - 'null'
        password:
          type:
            - string
            - 'null'
        phone_number:
          type:
            - string
            - 'null'
        phone_verified:
          type:
            - boolean
            - 'null'
        user_metadata:
          type:
            - object
            - 'null'
        app_metadata:
          type:
            - object
            - 'null'
        connection:
          type: string
      required:
        - email
        - connection
    UpdateUserRequest:
      title: UpdateUserRequest
      type: object
      properties:
        email:
          type:
            - string
            - 'null'
        email_verified:
          type:
            - boolean
            - 'null'
        username:
          type:
            - string
            - 'null'
