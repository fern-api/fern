openapi: 3.0.1
info:
  title: circular-references
  version: ''
paths: {}
components:
  schemas:
    ImportingA:
      title: ImportingA
      type: object
      properties:
        a:
          $ref: '#/components/schemas/A'
          nullable: true
    RootType:
      title: RootType
      type: object
      properties:
        s:
          type: string
      required:
        - s
    A:
      title: A
      $ref: '#/components/schemas/RootType'
    TorU:
      title: TorU
      oneOf:
        - $ref: '#/components/schemas/T'
        - $ref: '#/components/schemas/U'
    T:
      title: T
      type: object
      properties:
        child:
          $ref: '#/components/schemas/TorU'
      required:
        - child
    U:
      title: U
      type: object
      properties:
        child:
          $ref: '#/components/schemas/T'
      required:
        - child
    FieldValueZeroType:
      title: FieldValueZeroType
      type: string
      enum:
        - primitive_value
    FieldValueZero:
      title: FieldValueZero
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueZeroType'
        value:
          $ref: '#/components/schemas/PrimitiveValue'
          nullable: true
      required:
        - type
    FieldValueOneType:
      title: FieldValueOneType
      type: string
      enum:
        - object_value
    FieldValueOne:
      title: FieldValueOne
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueOneType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/ObjectValue'
    FieldValueTwoType:
      title: FieldValueTwoType
      type: string
      enum:
        - container_value
    FieldValueTwo:
      title: FieldValueTwo
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueTwoType'
        value:
          $ref: '#/components/schemas/ContainerValue'
          nullable: true
      required:
        - type
    FieldValue:
      title: FieldValue
      oneOf:
        - $ref: '#/components/schemas/FieldValueZero'
        - $ref: '#/components/schemas/FieldValueOne'
        - $ref: '#/components/schemas/FieldValueTwo'
    ContainerValueList:
      title: ContainerValueList
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/FieldValue'
          nullable: true
    ContainerValueOptional:
      title: ContainerValueOptional
      type: object
      properties:
        value:
          $ref: '#/components/schemas/FieldValue'
          nullable: true
    ContainerValue:
      title: ContainerValue
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - list
            - $ref: '#/components/schemas/ContainerValueList'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - optional
            - $ref: '#/components/schemas/ContainerValueOptional'
          required:
            - type
    PrimitiveValue:
      title: PrimitiveValue
      type: string
      enum:
        - STRING
        - NUMBER
    ObjectValue:
      title: ObjectValue
      type: object
      properties: {}
    JsonLike:
      title: JsonLike
      oneOf:
        - type: array
          items:
            $ref: '#/components/schemas/JsonLike'
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/JsonLike'
        - type: string
        - type: integer
        - type: boolean
    JsonLikeWithNullAndUndefined:
      title: JsonLikeWithNullAndUndefined
      oneOf:
        - type: array
          items:
            $ref: '#/components/schemas/JsonLikeWithNullAndUndefined'
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/JsonLikeWithNullAndUndefined'
        - type: string
          nullable: true
        - type: integer
          nullable: true
        - type: boolean
          nullable: true
  securitySchemes: {}
