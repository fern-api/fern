openapi: 3.1.0
info:
  title: api
  version: 0.0.0
paths: {}
components:
  schemas:
    ImportingA:
      title: ImportingA
      type: object
      properties:
        a:
          anyOf:
            - $ref: '#/components/schemas/A'
            - type: 'null'
    RootType:
      title: RootType
      type: object
      properties:
        s:
          type: string
      required:
        - s
    A:
      title: A
      $ref: '#/components/schemas/RootType'
    TorU:
      title: TorU
      oneOf:
        - $ref: '#/components/schemas/T'
        - $ref: '#/components/schemas/U'
    T:
      title: T
      type: object
      properties:
        child:
          $ref: '#/components/schemas/TorU'
      required:
        - child
    U:
      title: U
      type: object
      properties:
        child:
          $ref: '#/components/schemas/T'
      required:
        - child
    FieldValueZeroType:
      title: FieldValueZeroType
      type: string
      enum:
        - primitive_value
    FieldValueZero:
      title: FieldValueZero
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueZeroType'
        value:
          $ref: '#/components/schemas/PrimitiveValue'
          nullable: true
      required:
        - type
    FieldValueOneType:
      title: FieldValueOneType
      type: string
      enum:
        - object_value
    FieldValueOne:
      title: FieldValueOne
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueOneType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/ObjectValue'
    FieldValueTwoType:
      title: FieldValueTwoType
      type: string
      enum:
        - container_value
    FieldValueTwo:
      title: FieldValueTwo
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueTwoType'
        value:
          $ref: '#/components/schemas/ContainerValue'
          nullable: true
      required:
        - type
    FieldValue:
      title: FieldValue
      oneOf:
        - $ref: '#/components/schemas/FieldValueZero'
        - $ref: '#/components/schemas/FieldValueOne'
        - $ref: '#/components/schemas/FieldValueTwo'
    ContainerValueList:
      title: ContainerValueList
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/FieldValue'
          nullable: true
    ContainerValueOptional:
      title: ContainerValueOptional
      type: object
      properties:
        value:
          $ref: '#/components/schemas/FieldValue'
          nullable: true
    ContainerValue:
      title: ContainerValue
      oneOf:
        - type: object
          properties:
            type:
              type: string
              const: primitive_value
            value:
              $ref: '#/components/schemas/PrimitiveValue'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: object_value
            - $ref: '#/components/schemas/ObjectValue'
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: container_value
            value:
              $ref: '#/components/schemas/ContainerValue'
          required:
            - type
    ContainerValue:
      title: ContainerValue
      oneOf:
        - type: object
          properties:
            type:
              type: string
              const: list
            value:
              type: array
              items:
                $ref: '#/components/schemas/FieldValue'
          required:
            - type
        - type: object
          properties:
            type:
              type: string
              const: optional
            value:
              anyOf:
                - $ref: '#/components/schemas/FieldValue'
                - type: 'null'
          required:
            - type
    PrimitiveValue:
      title: PrimitiveValue
      type: string
      enum:
        - STRING
        - NUMBER
    ObjectValue:
      title: ObjectValue
      type: object
      properties: {}
    JsonLike:
      title: JsonLike
      oneOf:
        - type: array
          items:
            $ref: '#/components/schemas/JsonLike'
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/JsonLike'
        - type: string
        - type: integer
        - type: boolean
    JsonLikeWithNullAndUndefined:
      title: JsonLikeWithNullAndUndefined
      oneOf:
        - type: array
          items:
            anyOf:
              - $ref: '#/components/schemas/JsonLikeWithNullAndUndefined'
              - type: 'null'
        - type: object
          additionalProperties:
            anyOf:
              - $ref: '#/components/schemas/JsonLikeWithNullAndUndefined'
              - type: 'null'
        - type:
            - string
            - 'null'
        - type:
            - integer
            - 'null'
        - type:
            - boolean
            - 'null'
  securitySchemes: {}
