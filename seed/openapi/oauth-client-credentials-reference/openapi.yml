openapi: 3.0.1
info:
  title: oauth-client-credentials-reference
  version: ''
paths:
  /token:
    post:
      operationId: auth_gettoken
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    expires_in: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  example: client_id
                client_secret:
                  type: string
                  example: client_secret
              required:
                - client_id
                - client_secret
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
  /get-something:
    get:
      operationId: simple_getsomething
      tags:
        - Simple
      parameters: []
      responses:
        '204':
          description: ''
      security:
        - BearerAuth: []
components:
  schemas:
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
          example: access_token
        expires_in:
          type: integer
          example: 1
      required:
        - access_token
        - expires_in
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
