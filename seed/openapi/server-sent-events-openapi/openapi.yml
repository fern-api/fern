openapi: 3.0.1
info:
  title: server-sent-events-openapi
  version: ''
paths:
  /stream/protocol-no-collision:
    post:
      description: >-
        Uses discriminator with mapping, x-fern-discriminator-context set to
        protocol. Because the discriminant is at the protocol level, the data
        field can be any type or absent entirely. Demonstrates heartbeat (no
        data), string literal, number literal, and object data payloads.
      operationId: streamProtocolNoCollision
      tags:
        - ''
      parameters: []
      responses:
        '204':
          description: ''
      summary: Protocol context with no field collision and mixed data types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
            examples:
              Example1:
                value: {}
  /stream/protocol-collision:
    post:
      description: >-
        Same as endpoint 1, but the object data payload contains its own "event"
        property, which collides with the SSE envelope's "event" discriminator
        field. Tests whether generators correctly separate the protocol-level
        discriminant from the data-level field when context=protocol is
        specified.
      operationId: streamProtocolCollision
      tags:
        - ''
      parameters: []
      responses:
        '204':
          description: ''
      summary: Protocol context with event field collision and mixed data types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
            examples:
              Example1:
                value: {}
  /stream/data-context:
    post:
      description: >-
        x-fern-discriminator-context is explicitly set to "data" (the default
        value). Each variant uses allOf to extend a payload schema and adds the
        "event" discriminant property at the same level. There is no "data"
        wrapper. The discriminant and payload fields coexist in a single flat
        object. This matches the real-world pattern used by customers with
        context=data.
      operationId: streamDataContext
      tags:
        - ''
      parameters: []
      responses:
        '204':
          description: ''
      summary: Explicit data context with discriminant flattened via allOf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
            examples:
              Example1:
                value: {}
  /stream/no-context:
    post:
      description: >-
        The x-fern-discriminator-context extension is omitted entirely. Tests
        whether Fern correctly infers the default behavior (context=data) when
        the extension is absent. Same flat allOf pattern as endpoint 3.
      operationId: streamNoContext
      tags:
        - ''
      parameters: []
      responses:
        '204':
          description: ''
      summary: No context extension, defaults to data context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
            examples:
              Example1:
                value: {}
  /stream/protocol-with-flat-schema:
    post:
      description: >-
        Mismatched combination: context=protocol with the flat allOf schema
        pattern that is normally used with context=data. Shows what happens when
        the discriminant is declared as protocol-level but the schema uses allOf
        to flatten the event field alongside payload fields instead of wrapping
        them in a data field.
      operationId: streamProtocolWithFlatSchema
      tags:
        - ''
      parameters: []
      responses:
        '204':
          description: ''
      summary: Protocol context with flat allOf schema pattern
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
            examples:
              Example1:
                value: {}
  /stream/data-context-with-envelope-schema:
    post:
      description: >-
        Mismatched combination: context=data with the envelope+data schema
        pattern that is normally used with context=protocol. Shows what happens
        when the discriminant is declared as data-level but the schema separates
        the event field and data field into an envelope structure.
      operationId: streamDataContextWithEnvelopeSchema
      tags:
        - ''
      parameters: []
      responses:
        '204':
          description: ''
      summary: Data context with envelope+data schema pattern
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
            examples:
              Example1:
                value: {}
  /stream/oas-spec-native:
    post:
      description: >-
        Follows the pattern from the OAS 3.2 specification's own SSE example.
        The itemSchema extends a base Event schema via $ref and uses inline
        oneOf variants with const on the event field to distinguish event types.
        Data fields use contentSchema/contentMediaType for structured payloads.
        No discriminator object is used. Event type resolution relies on const
        matching.
      operationId: streamOasSpecNative
      tags:
        - ''
      parameters: []
      responses:
        '204':
          description: ''
      summary: OAS 3.2 spec-native SSE pattern with inline variants and contentSchema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
            examples:
              Example1:
                value: {}
components:
  schemas:
    StreamProtocolNoCollisionResponse:
      title: StreamProtocolNoCollisionResponse
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - heartbeat
            - $ref: '#/components/schemas/ProtocolHeartbeat'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - string_data
            - $ref: '#/components/schemas/ProtocolStringEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - number_data
            - $ref: '#/components/schemas/ProtocolNumberEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - object_data
            - $ref: '#/components/schemas/ProtocolObjectEvent'
          required:
            - event
    StreamProtocolCollisionResponse:
      title: StreamProtocolCollisionResponse
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - heartbeat
            - $ref: '#/components/schemas/ProtocolHeartbeat'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - string_data
            - $ref: '#/components/schemas/ProtocolStringEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - number_data
            - $ref: '#/components/schemas/ProtocolNumberEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - object_data
            - $ref: '#/components/schemas/ProtocolCollisionObjectEvent'
          required:
            - event
    StreamDataContextResponse:
      title: StreamDataContextResponse
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - heartbeat
            - $ref: '#/components/schemas/DataContextHeartbeat'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - entity
            - $ref: '#/components/schemas/DataContextEntityEvent'
          required:
            - event
    StreamNoContextResponse:
      title: StreamNoContextResponse
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - heartbeat
            - $ref: '#/components/schemas/DataContextHeartbeat'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - entity
            - $ref: '#/components/schemas/DataContextEntityEvent'
          required:
            - event
    StreamProtocolWithFlatSchemaResponse:
      title: StreamProtocolWithFlatSchemaResponse
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - heartbeat
            - $ref: '#/components/schemas/DataContextHeartbeat'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - entity
            - $ref: '#/components/schemas/DataContextEntityEvent'
          required:
            - event
    StreamDataContextWithEnvelopeSchemaResponse:
      title: StreamDataContextWithEnvelopeSchemaResponse
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - heartbeat
            - $ref: '#/components/schemas/ProtocolHeartbeat'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - string_data
            - $ref: '#/components/schemas/ProtocolStringEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - number_data
            - $ref: '#/components/schemas/ProtocolNumberEvent'
          required:
            - event
        - type: object
          allOf:
            - type: object
              properties:
                event:
                  type: string
                  enum:
                    - object_data
            - $ref: '#/components/schemas/ProtocolObjectEvent'
          required:
            - event
    StreamRequest:
      title: StreamRequest
      type: object
      properties:
        query:
          type: string
          nullable: true
    Event:
      title: Event
      type: object
      properties:
        data:
          type: string
        event:
          type: string
          nullable: true
        id:
          type: string
          nullable: true
        retry:
          type: integer
          minimum: 0
          nullable: true
      required:
        - data
    StatusPayload:
      title: StatusPayload
      type: object
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - message
        - timestamp
    ObjectPayloadWithEventField:
      title: ObjectPayloadWithEventField
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        event:
          type: string
          description: >-
            An event type field inside the data payload that collides with the
            SSE envelope's event field used for discrimination.
      required:
        - id
        - name
        - event
    HeartbeatPayload:
      title: HeartbeatPayload
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          nullable: true
    EntityEventPayloadEventType:
      title: EntityEventPayloadEventType
      type: string
      enum:
        - CREATED
        - UPDATED
        - DELETED
        - PREEXISTING
    EntityEventPayload:
      title: EntityEventPayload
      type: object
      properties:
        entityId:
          type: string
          nullable: true
        eventType:
          $ref: '#/components/schemas/EntityEventPayloadEventType'
          nullable: true
        updatedTime:
          type: string
          format: date-time
          nullable: true
    ProtocolHeartbeat:
      title: ProtocolHeartbeat
      type: object
      properties: {}
    ProtocolStringEvent:
      title: ProtocolStringEvent
      type: object
      properties:
        data:
          type: string
      required:
        - data
    ProtocolNumberEvent:
      title: ProtocolNumberEvent
      type: object
      properties:
        data:
          type: number
          format: double
      required:
        - data
    ProtocolObjectEvent:
      title: ProtocolObjectEvent
      type: object
      properties:
        data:
          $ref: '#/components/schemas/StatusPayload'
      required:
        - data
    ProtocolCollisionObjectEvent:
      title: ProtocolCollisionObjectEvent
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ObjectPayloadWithEventField'
      required:
        - data
    DataContextHeartbeat:
      title: DataContextHeartbeat
      type: object
      properties: {}
      allOf:
        - $ref: '#/components/schemas/HeartbeatPayload'
    DataContextEntityEvent:
      title: DataContextEntityEvent
      type: object
      properties: {}
      allOf:
        - $ref: '#/components/schemas/EntityEventPayload'
  securitySchemes: {}
