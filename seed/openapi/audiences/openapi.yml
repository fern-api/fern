openapi: 3.1.0
info:
  title: Audiences API
  version: 0.0.0
paths:
  /:
    get:
      operationId: folderAService_folderA_service_getDirectThread
      tags:
        - FolderAService
      parameters:
        - name: ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              nullable: true
        - name: tags
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              nullable: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderAResponse'
    post:
      operationId: foo_find
      tags:
        - Foo
      parameters:
        - name: optionalString
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OptionalString'
            nullable: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportingType'
              examples:
                Example1:
                  value:
                    imported: imported
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                publicProperty:
                  type:
                    - string
                    - 'null'
                privateProperty:
                  type:
                    - integer
                    - 'null'
  /partner-path:
    get:
      operationId: folderDService_folderD_service_getDirectThread
      tags:
        - FolderDService
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderDResponse'
              examples:
                Example1:
                  value:
                    foo: foo
components:
  schemas:
    Imported:
      title: Imported
      type: string
    FolderAResponse:
      title: FolderAResponse
      type: object
      properties:
        foo:
          anyOf:
            - $ref: '#/components/schemas/folder-bFoo'
            - type: 'null'
    folder-bFoo:
      title: folder-bFoo
      type: object
      properties:
        foo:
          anyOf:
            - $ref: '#/components/schemas/folder-cFolderCFoo'
            - type: 'null'
    folder-cFolderCFoo:
      title: folder-cFolderCFoo
      type: object
      properties:
        bar_property:
          type: string
          format: uuid
      required:
        - bar_property
    FolderDResponse:
      title: FolderDResponse
      type: object
      properties:
        foo:
          type: string
          example: foo
      required:
        - foo
    ImportingType:
      title: ImportingType
      type: object
      properties:
        imported:
          $ref: '#/components/schemas/Imported'
      required:
        - imported
    OptionalString:
      title: OptionalString
      type:
        - string
        - 'null'
    FilteredType:
      title: FilteredType
      type: object
      properties:
        public_property:
          type:
            - string
            - 'null'
        private_property:
          type: integer
      required:
        - private_property
  securitySchemes: {}
servers:
  - url: https://api.example.a.com
    description: Default
