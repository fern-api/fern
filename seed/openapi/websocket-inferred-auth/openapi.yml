openapi: 3.1.0
info:
  title: websocket-auth
  version: 0.0.0
paths:
  /token:
    post:
      operationId: auth_gettokenwithclientcredentials
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    refresh_token: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  example: client_id
                client_secret:
                  type: string
                  example: client_secret
                audience:
                  $ref: >-
                    #/components/schemas/AuthGetTokenWithClientCredentialsRequestAudience
                grant_type:
                  $ref: >-
                    #/components/schemas/AuthGetTokenWithClientCredentialsRequestGrantType
                scope:
                  type:
                    - string
                    - 'null'
              required:
                - client_id
                - client_secret
                - audience
                - grant_type
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
                  audience: https://api.example.com
                  grant_type: client_credentials
  /token/refresh:
    post:
      operationId: auth_refreshtoken
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    refresh_token: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  example: client_id
                client_secret:
                  type: string
                  example: client_secret
                refresh_token:
                  type: string
                  example: refresh_token
                audience:
                  $ref: '#/components/schemas/AuthRefreshTokenRequestAudience'
                grant_type:
                  $ref: '#/components/schemas/AuthRefreshTokenRequestGrantType'
                scope:
                  type:
                    - string
                    - 'null'
              required:
                - client_id
                - client_secret
                - refresh_token
                - audience
                - grant_type
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
                  refresh_token: refresh_token
                  audience: https://api.example.com
                  grant_type: refresh_token
components:
  schemas:
    AuthGetTokenWithClientCredentialsRequestAudience:
      title: AuthGetTokenWithClientCredentialsRequestAudience
      type: string
      enum:
        - https://api.example.com
    AuthGetTokenWithClientCredentialsRequestGrantType:
      title: AuthGetTokenWithClientCredentialsRequestGrantType
      type: string
      enum:
        - client_credentials
    AuthRefreshTokenRequestAudience:
      title: AuthRefreshTokenRequestAudience
      type: string
      enum:
        - https://api.example.com
    AuthRefreshTokenRequestGrantType:
      title: AuthRefreshTokenRequestGrantType
      type: string
      enum:
        - refresh_token
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
          example: access_token
        refresh_token:
          type:
            - string
            - 'null'
      required:
        - access_token
    SendEvent:
      title: SendEvent
      type: object
      properties:
        sendText:
          type: string
        sendParam:
          type: integer
      required:
        - sendText
        - sendParam
    SendSnakeCase:
      title: SendSnakeCase
      type: object
      properties:
        send_text:
          type: string
        send_param:
          type: integer
      required:
        - send_text
        - send_param
    ReceiveEvent:
      title: ReceiveEvent
      type: object
      properties:
        alpha:
          type: string
        beta:
          type: integer
      required:
        - alpha
        - beta
    ReceiveSnakeCase:
      title: ReceiveSnakeCase
      type: object
      properties:
        receive_text:
          type: string
        receive_int:
          type: integer
      required:
        - receive_text
        - receive_int
    SendEvent2:
      title: SendEvent2
      type: object
      properties:
        sendText2:
          type: string
        sendParam2:
          type: boolean
      required:
        - sendText2
        - sendParam2
    ReceiveEvent2:
      title: ReceiveEvent2
      type: object
      properties:
        gamma:
          type: string
        delta:
          type: integer
        epsilon:
          type: boolean
      required:
        - gamma
        - delta
        - epsilon
    ReceiveEvent3:
      title: ReceiveEvent3
      type: object
      properties:
        receiveText3:
          type: string
      required:
        - receiveText3
  securitySchemes: {}
