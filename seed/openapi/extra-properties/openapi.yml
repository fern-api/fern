openapi: 3.1.0
info:
  title: extra-properties
  version: 0.0.0
paths:
  /user:
    post:
      operationId: user_createuser
      tags:
        - User
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    name: name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                _type:
                  $ref: '#/components/schemas/UserCreateUserRequestType'
                _version:
                  $ref: '#/components/schemas/UserCreateUserRequestVersion'
                name:
                  type: string
                  examples:
                    - Alice
              required:
                - _type
                - _version
                - name
            examples:
              Example1:
                value:
                  _type: CreateUserRequest
                  _version: v1
                  name: name
components:
  schemas:
    UserCreateUserRequestType:
      title: UserCreateUserRequestType
      type: string
      enum:
        - CreateUserRequest
    UserCreateUserRequestVersion:
      title: UserCreateUserRequestVersion
      type: string
      enum:
        - v1
    FailureStatus:
      title: FailureStatus
      type: string
      enum:
        - failure
    Failure:
      title: Failure
      type: object
      properties:
        status:
          $ref: '#/components/schemas/FailureStatus'
      required:
        - status
    User:
      title: User
      type: object
      properties:
        name:
          type: string
          examples:
            - Alice
      required:
        - name
  securitySchemes: {}
