openapi: 3.1.0
info:
  title: error-property
  version: 0.0.0
paths:
  /property-based-error:
    get:
      description: GET request that always throws an error
      operationId: propertybasederror_throwerror
      tags:
        - Propertybasederror
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: string
        '400':
          description: BadRequestError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestErrorBody'
components:
  schemas:
    BadRequestErrorBodyErrorName:
      title: BadRequestErrorBodyErrorName
      type: string
      const: PropertyBasedErrorTest
    BadRequestErrorBody:
      title: BadRequestErrorBody
      type: object
      properties:
        errorName:
          anyOf:
            - $ref: '#/components/schemas/BadRequestErrorBodyErrorName'
            - type: 'null'
        content:
          anyOf:
            - $ref: '#/components/schemas/PropertyBasedErrorTestBody'
            - type: 'null'
    PropertyBasedErrorTestBody:
      title: PropertyBasedErrorTestBody
      type: object
      properties:
        message:
          type: string
      required:
        - message
  securitySchemes: {}
