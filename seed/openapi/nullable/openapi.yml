openapi: 3.0.1
info:
  title: nullable
  version: ''
paths:
  /users:
    get:
      operationId: nullable_getusers
      tags:
        - Nullable
      parameters:
        - name: usernames
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              nullable: true
        - name: avatar
          in: query
          required: false
          schema:
            type: string
            nullable: true
        - name: activated
          in: query
          required: false
          schema:
            type: array
            items:
              type: boolean
              nullable: true
        - name: tags
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              nullable: true
        - name: extra
          in: query
          required: false
          schema:
            type: boolean
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - name: name
                      id: id
                      tags:
                        - tags
                      metadata:
                        createdAt: '2024-01-15T09:30:00Z'
                        updatedAt: '2024-01-15T09:30:00Z'
                        avatar: avatar
                        activated: true
                        status:
                          type: active
                      email: email
                      favorite-number: 1
                      numbers:
                        - 1
                      strings:
                        key: value
    post:
      operationId: nullable_createuser
      tags:
        - Nullable
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    name: name
                    id: id
                    tags:
                      - tags
                    metadata:
                      createdAt: '2024-01-15T09:30:00Z'
                      updatedAt: '2024-01-15T09:30:00Z'
                      avatar: avatar
                      activated: true
                      status:
                        type: active
                      values:
                        key: value
                    email: email
                    favorite-number: 1
                    numbers:
                      - 1
                    strings:
                      key: value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: username
                tags:
                  type: array
                  items:
                    type: string
                  nullable: true
                metadata:
                  $ref: '#/components/schemas/Metadata'
                  nullable: true
                avatar:
                  type: string
                  nullable: true
              required:
                - username
            examples:
              Example1:
                value:
                  username: username
    delete:
      operationId: nullable_deleteuser
      tags:
        - Nullable
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: boolean
              examples:
                Example1:
                  value: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  nullable: true
                  description: The user to delete.
            examples:
              Example1:
                value: {}
components:
  schemas:
    Email:
      title: Email
      type: string
      nullable: true
    UserId:
      title: UserId
      type: string
    WeirdNumber:
      title: WeirdNumber
      oneOf:
        - type: integer
        - type: integer
          format: float
          nullable: true
        - type: string
          nullable: true
        - type: number
          format: double
    User:
      title: User
      type: object
      properties:
        name:
          type: string
          example: name
        id:
          $ref: '#/components/schemas/UserId'
        tags:
          type: array
          items:
            type: string
          nullable: true
        metadata:
          $ref: '#/components/schemas/Metadata'
          nullable: true
        email:
          $ref: '#/components/schemas/Email'
          nullable: true
        favorite-number:
          $ref: '#/components/schemas/WeirdNumber'
        numbers:
          type: array
          items:
            type: integer
          nullable: true
        strings:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - name
        - id
        - tags
        - email
        - favorite-number
    StatusActive:
      title: StatusActive
      type: object
      properties: {}
    StatusArchived:
      title: StatusArchived
      type: object
      properties:
        value:
          type: string
          format: date-time
          nullable: true
    StatusSoftDeleted:
      title: StatusSoftDeleted
      type: object
      properties:
        value:
          type: string
          format: date-time
          nullable: true
    Status:
      title: Status
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - active
            - $ref: '#/components/schemas/StatusActive'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - archived
            - $ref: '#/components/schemas/StatusArchived'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - soft-deleted
            - $ref: '#/components/schemas/StatusSoftDeleted'
          required:
            - type
    Metadata:
      title: Metadata
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        avatar:
          type: string
          nullable: true
        activated:
          type: boolean
          nullable: true
        status:
          $ref: '#/components/schemas/Status'
        values:
          type: object
          additionalProperties:
            type: string
            nullable: true
          nullable: true
      required:
        - createdAt
        - updatedAt
        - avatar
        - status
  securitySchemes: {}
