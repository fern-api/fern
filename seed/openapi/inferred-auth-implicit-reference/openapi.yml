openapi: 3.1.0
info:
  title: inferred-auth-implicit
  version: 0.0.0
paths:
  /token:
    post:
      operationId: auth_getTokenWithClientCredentials
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetTokenRequest'
  /token/refresh:
    post:
      operationId: auth_refreshToken
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
  /nested-no-auth/get-something:
    get:
      operationId: nestedNoAuth_api_getSomething
      tags:
        - NestedNoAuthAPI
      parameters: []
      responses:
        '204':
          description: No content
  /nested/get-something:
    get:
      operationId: nested_api_getSomething
      tags:
        - NestedAPI
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - InferredAuthScheme: []
  /get-something:
    get:
      operationId: simple_getSomething
      tags:
        - Simple
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - InferredAuthScheme: []
components:
  schemas:
    GetTokenRequest:
      title: GetTokenRequest
      type: object
      description: A request to obtain an OAuth token.
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        audience:
          type: string
          const: https://api.example.com
        grant_type:
          type: string
          const: client_credentials
        scope:
          type:
            - string
            - 'null'
      required:
        - client_id
        - client_secret
        - audience
        - grant_type
    RefreshTokenRequest:
      title: RefreshTokenRequest
      type: object
      description: A request to refresh an OAuth token.
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        refresh_token:
          type: string
        audience:
          type: string
          const: https://api.example.com
        grant_type:
          type: string
          const: refresh_token
        scope:
          type:
            - string
            - 'null'
      required:
        - client_id
        - client_secret
        - refresh_token
        - audience
        - grant_type
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type:
            - string
            - 'null'
      required:
        - access_token
        - expires_in
  securitySchemes:
    InferredAuthScheme:
      type: http
      scheme: bearer
