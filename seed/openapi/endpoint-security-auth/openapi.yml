openapi: 3.0.1
info:
  title: endpoint-security-auth
  version: ''
paths:
  /token:
    post:
      operationId: auth_gettoken
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    expires_in: 1
                    refresh_token: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  example: client_id
                client_secret:
                  type: string
                  example: client_secret
                audience:
                  $ref: '#/components/schemas/AuthGetTokenRequestAudience'
                grant_type:
                  $ref: '#/components/schemas/AuthGetTokenRequestGrantType'
              required:
                - client_id
                - client_secret
                - audience
                - grant_type
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
                  audience: https://api.example.com
                  grant_type: client_credentials
  /users/bearer:
    get:
      operationId: user_getwithbearer
      tags:
        - User
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
  /users/api-key:
    get:
      operationId: user_getwithapikey
      tags:
        - User
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
  /users/oauth:
    get:
      operationId: user_getwithoauth
      tags:
        - User
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
  /users/basic:
    get:
      operationId: user_getwithbasic
      tags:
        - User
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
  /users/inferred:
    get:
      operationId: user_getwithinferredauth
      tags:
        - User
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
  /users/any:
    get:
      operationId: user_getwithanyauth
      tags:
        - User
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
  /users/all:
    get:
      operationId: user_getwithallauth
      tags:
        - User
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
components:
  schemas:
    AuthGetTokenRequestAudience:
      title: AuthGetTokenRequestAudience
      type: string
      enum:
        - https://api.example.com
    AuthGetTokenRequestGrantType:
      title: AuthGetTokenRequestGrantType
      type: string
      enum:
        - client_credentials
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
          example: access_token
        expires_in:
          type: integer
          example: 1
        refresh_token:
          type: string
          nullable: true
      required:
        - access_token
        - expires_in
    User:
      title: User
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
