openapi: 3.1.0
info:
  title: query-parameters
  version: 0.0.0
paths:
  /user:
    get:
      operationId: user_getUsername
      tags:
        - User
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: deadline
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: bytes
          in: query
          required: true
          schema:
            type: string
            format: byte
        - name: user
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/User'
        - name: userList
          in: query
          required: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/User'
        - name: optionalDeadline
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            format: date-time
        - name: keyValue
          in: query
          required: true
          schema:
            type: object
            additionalProperties:
              type: string
        - name: optionalString
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: nestedUser
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/NestedUser'
        - name: optionalUser
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/User'
              - type: 'null'
        - name: excludeUser
          in: query
          required: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/User'
        - name: filter
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
components:
  schemas:
    User:
      title: User
      type: object
      properties:
        name:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - name
        - tags
    NestedUser:
      title: NestedUser
      type: object
      properties:
        name:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
        - name
        - user
  securitySchemes: {}
