openapi: 3.1.0
info:
  title: nullable-optional
  version: 0.0.0
paths:
  /api/users/{userId}:
    get:
      description: Get a user by ID
      operationId: nullableoptional_getuser
      tags:
        - Nullableoptional
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: userId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                Example1:
                  value:
                    id: id
                    username: username
                    email: email
                    phone: phone
                    createdAt: '2024-01-15T09:30:00Z'
                    updatedAt: '2024-01-15T09:30:00Z'
                    address:
                      street: street
                      city: city
                      state: state
                      zipCode: zipCode
                      country: country
                      buildingId: buildingId
                      tenantId: tenantId
    patch:
      description: Update a user (partial update)
      operationId: nullableoptional_updateuser
      tags:
        - Nullableoptional
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: userId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                Example1:
                  value:
                    id: id
                    username: username
                    email: email
                    phone: phone
                    createdAt: '2024-01-15T09:30:00Z'
                    updatedAt: '2024-01-15T09:30:00Z'
                    address:
                      street: street
                      city: city
                      state: state
                      zipCode: zipCode
                      country: country
                      buildingId: buildingId
                      tenantId: tenantId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type:
                    - string
                    - 'null'
                email:
                  type:
                    - string
                    - 'null'
                phone:
                  type:
                    - string
                    - 'null'
                address:
                  anyOf:
                    - $ref: '#/components/schemas/Address'
