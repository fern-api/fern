                      username: username
                      email: email
                      phone: phone
                      createdAt: '2024-01-15T09:30:00Z'
                      updatedAt: '2024-01-15T09:30:00Z'
                      address:
                        street: street
                        city: city
                        state: state
                        zipCode: zipCode
                        country: country
                        buildingId: buildingId
                        tenantId: tenantId
                      type: user
                    nullableArray:
                      - nullableArray
                    optionalArray:
                      - optionalArray
                    optionalNullableArray:
                      - optionalNullableArray
                    nullableListOfNullables:
                      - nullableListOfNullables
                    nullableMapOfNullables:
                      key:
                        street: street
                        city: city
                        state: state
                        zipCode: zipCode
                        country: country
                        buildingId: buildingId
                        tenantId: tenantId
                    nullableListOfUnions:
                      - emailAddress: emailAddress
                        subject: subject
                        htmlContent: htmlContent
                        type: email
                    optionalMapOfEnums:
                      key: ADMIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplexProfile'
            examples:
              Example1:
                value:
                  id: id
