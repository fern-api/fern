                        city: city
                        state: state
                        zipCode: zipCode
                        country: country
                        buildingId: buildingId
                        tenantId: tenantId
                      optionalObject:
                        id: id
                        name: name
                        domain: domain
                        employeeCount: 1
                    processedAt: '2024-01-15T09:30:00Z'
                    nullCount: 1
                    presentFieldsCount: 1
