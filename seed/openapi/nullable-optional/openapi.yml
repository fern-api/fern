components:
  schemas:
    NullableUserId:
      title: NullableUserId
      type:
        - string
        - 'null'
      description: An alias for a nullable user ID
    OptionalUserId:
      title: OptionalUserId
      type:
        - string
        - 'null'
      description: An alias for an optional user ID
    UserProfile:
      title: UserProfile
      type: object
      description: Test object with nullable and optional fields
      properties:
        id:
          type: string
        username:
          type: string
        nullableString:
          type:
            - string
            - 'null'
        nullableInteger:
          type:
            - integer
            - 'null'
        nullableBoolean:
          type:
            - boolean
            - 'null'
        nullableDate:
          type:
            - string
            - 'null'
          format: date-time
        nullableObject:
          anyOf:
            - $ref: '#/components/schemas/Address'
            - type: 'null'
        nullableList:
          type:
            - array
            - 'null'
          items:
            type: string
        nullableMap:
          type:
            - object
            - 'null'
          additionalProperties:
            type:
              - string
              - 'null'
        optionalString:
          type:
            - string
            - 'null'
        optionalInteger:
          type:
            - integer
            - 'null'
        optionalBoolean:
          type:
            - boolean
            - 'null'
        optionalDate:
          type:
            - string
            - 'null'
          format: date-time
        optionalObject:
          anyOf:
            - $ref: '#/components/schemas/Address'
            - type: 'null'
        optionalList:
          type:
            - array
            - 'null'
          items:
            type: string
        optionalMap:
          type:
            - object
            - 'null'
          additionalProperties:
            type:
              - string
              - 'null'
        optionalNullableString:
          type:
            - string
            - 'null'
        optionalNullableObject:
          anyOf:
            - $ref: '#/components/schemas/Address'
            - type: 'null'
      required:
        - id
        - username
        - nullableString
        - nullableInteger
        - nullableBoolean
        - nullableDate
        - nullableObject
        - nullableList
        - nullableMap
    Address:
      title: Address
      type: object
      description: Nested object for testing
      properties:
        street:
          type: string
        city:
          type:
            - string
            - 'null'
        state:
          type:
            - string
            - 'null'
        zipCode:
          type: string
        country:
          type:
            - string
            - 'null'
        buildingId:
          anyOf:
            - $ref: '#/components/schemas/NullableUserId'
            - type: 'null'
        tenantId:
          anyOf:
            - $ref: '#/components/schemas/OptionalUserId'
            - type: 'null'
      required:
        - street
        - city
        - zipCode
        - buildingId
        - tenantId
    UserRole:
      title: UserRole
      type: string
      enum:
        - ADMIN
        - USER
        - GUEST
        - MODERATOR
      description: Test enum for nullable enum fields
    UserStatus:
      title: UserStatus
      type: string
      enum:
        - active
        - inactive
        - suspended
        - deleted
      description: Test enum with values for optional enum fields
    NotificationMethodZeroType:
      title: NotificationMethodZeroType
      type: string
      const: email
    NotificationMethodZero:
      title: NotificationMethodZero
      type: object
      properties:
        type:
          $ref: '#/components/schemas/NotificationMethodZeroType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/EmailNotification'
    NotificationMethodOneType:
      title: NotificationMethodOneType
      type: string
      const: sms
    NotificationMethodOne:
      title: NotificationMethodOne
      type: object
      properties:
        type:
          $ref: '#/components/schemas/NotificationMethodOneType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/SmsNotification'
    NotificationMethodTwoType:
      title: NotificationMethodTwoType
      type: string
      const: push
    NotificationMethodTwo:
      title: NotificationMethodTwo
      type: object
      properties:
        type:
          $ref: '#/components/schemas/NotificationMethodTwoType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/PushNotification'
    NotificationMethod:
      title: NotificationMethod
      oneOf:
        - $ref: '#/components/schemas/NotificationMethodZero'
        - $ref: '#/components/schemas/NotificationMethodOne'
        - $ref: '#/components/schemas/NotificationMethodTwo'
      description: Discriminated union for testing nullable unions
    EmailNotification:
      title: EmailNotification
      type: object
      properties:
        emailAddress:
          type: string
        subject:
          type: string
        htmlContent:
