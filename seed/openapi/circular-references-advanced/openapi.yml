openapi: 3.1.0
info:
  title: api
  version: 0.0.0
paths: {}
components:
  schemas:
    ImportingA:
      title: ImportingA
      type: object
      properties:
        a:
          anyOf:
            - $ref: '#/components/schemas/A'
            - type: 'null'
    RootType:
      title: RootType
      type: object
      properties:
        s:
          type: string
      required:
        - s
    A:
      title: A
      $ref: '#/components/schemas/RootType'
    Animal:
      title: Animal
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
    Fruit:
      title: Fruit
      oneOf:
        - $ref: '#/components/schemas/Acai'
        - $ref: '#/components/schemas/Fig'
    Node:
      title: Node
      oneOf:
        - $ref: '#/components/schemas/BranchNode'
        - $ref: '#/components/schemas/LeafNode'
    Cat:
      title: Cat
      type: object
      properties:
        fruit:
          $ref: '#/components/schemas/Fruit'
      required:
        - fruit
    Dog:
      title: Dog
      type: object
      properties:
        fruit:
          $ref: '#/components/schemas/Fruit'
      required:
        - fruit
    Acai:
      title: Acai
      $ref: '#/components/schemas/Berry'
    Fig:
      title: Fig
      type: object
      properties:
        animal:
          $ref: '#/components/schemas/Animal'
      required:
        - animal
    Berry:
      title: Berry
      type: object
      properties:
        animal:
          $ref: '#/components/schemas/Animal'
      required:
        - animal
    BranchNode:
      title: BranchNode
      type: object
      properties:
        children:
          type: array
          items:
            $ref: '#/components/schemas/Node'
      required:
        - children
    LeafNode:
      title: LeafNode
      type: object
      properties: {}
    NodesWrapper:
      title: NodesWrapper
      type: object
      properties:
        nodes:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/Node'
      required:
        - nodes
    ContainerValueList:
      title: ContainerValueList
      type: object
      properties:
        value:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/FieldValue'
    ContainerValueOptional:
      title: ContainerValueOptional
      type: object
      properties:
        value:
          anyOf:
            - $ref: '#/components/schemas/FieldValue'
            - type: 'null'
    ContainerValue:
      title: ContainerValue
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: list
            - $ref: '#/components/schemas/ContainerValueList'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  const: optional
            - $ref: '#/components/schemas/ContainerValueOptional'
          required:
            - type
    PrimitiveValue:
      title: PrimitiveValue
      type: string
      enum:
        - STRING
        - NUMBER
    ObjectValue:
      title: ObjectValue
      type: object
      properties: {}
    FieldName:
      title: FieldName
      type: string
    FieldValueZeroType:
      title: FieldValueZeroType
      type: string
      const: primitive_value
    FieldValueZero:
      title: FieldValueZero
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueZeroType'
        value:
          anyOf:
            - $ref: '#/components/schemas/PrimitiveValue'
            - type: 'null'
      required:
        - type
    FieldValueOneType:
      title: FieldValueOneType
      type: string
      const: object_value
    FieldValueOne:
      title: FieldValueOne
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueOneType'
      required:
        - type
      allOf:
        - $ref: '#/components/schemas/ObjectValue'
    FieldValueTwoType:
      title: FieldValueTwoType
      type: string
      const: container_value
    FieldValueTwo:
      title: FieldValueTwo
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldValueTwoType'
        value:
          anyOf:
            - $ref: '#/components/schemas/ContainerValue'
            - type: 'null'
      required:
        - type
    FieldValue:
      title: FieldValue
      oneOf:
        - $ref: '#/components/schemas/FieldValueZero'
        - $ref: '#/components/schemas/FieldValueOne'
        - $ref: '#/components/schemas/FieldValueTwo'
    ObjectFieldValue:
      title: ObjectFieldValue
      type: object
      description: >-
        This type allows us to test a circular reference with a union type (see
        FieldValue).
      properties:
        name:
          $ref: '#/components/schemas/FieldName'
        value:
          $ref: '#/components/schemas/FieldValue'
      required:
        - name
        - value
  securitySchemes: {}
