openapi: 3.1.0
info:
  title: objects-with-imports
  version: 0.0.0
paths:
  /send-optional-body:
    post:
      operationId: optional_sendoptionalbody
      tags:
        - Optional
      parameters: []
      responses:
        '200':
          description: Id of the created resource
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type:
                - object
                - 'null'
            examples:
              Example1:
                value:
                  key: value
  /send-optional-typed-body:
    post:
      operationId: optional_sendoptionaltypedbody
      tags:
        - Optional
      parameters: []
      responses:
        '200':
          description: Id of the created resource
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/SendOptionalBodyRequest'
                - type: 'null'
            examples:
              Example1:
                value:
                  message: message
  /deploy/{actionId}/versions/{id}:
    post:
      description: >-
        Tests optional(nullable(T)) where T has only optional properties.

        This should not generate wire tests expecting {} when Optional.empty()
        is passed.
      operationId: optional_sendoptionalnullablewithalloptionalproperties
      tags:
        - Optional
      parameters:
        - name: actionId
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: actionId
        - name: id
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployResponse'
              examples:
                Example1:
                  value:
                    success: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/DeployParams'
                - type: 'null'
            examples:
              Example1:
                value: {}
components:
  schemas:
    SendOptionalBodyRequest:
      title: SendOptionalBodyRequest
      type: object
      properties:
        message:
          type: string
      required:
        - message
    DeployParams:
      title: DeployParams
      type: object
      properties:
        updateDraft:
          type:
            - boolean
            - 'null'
    DeployResponse:
      title: DeployResponse
      type: object
      properties:
        success:
          type: boolean
          examples:
            - true
      required:
        - success
  securitySchemes: {}
