openapi: 3.0.1
info:
  title: server-sent-event-examples
  version: ''
paths:
  /stream:
    post:
      operationId: completions_stream
      tags:
        - Completions
      parameters: []
      responses:
        '204':
          description: ''
        '400':
          description: ''
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required:
                - query
  /stream-events:
    post:
      operationId: completions_streamevents
      tags:
        - Completions
      parameters: []
      responses:
        '204':
          description: ''
        '400':
          description: ''
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required:
                - query
  /stream-events-context-protocol:
    post:
      operationId: completions_streameventscontextprotocol
      tags:
        - Completions
      parameters: []
      responses:
        '204':
          description: ''
        '400':
          description: ''
          content:
            application/json:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required:
                - query
components:
  schemas:
    StreamedCompletion:
      title: StreamedCompletion
      type: object
      properties:
        delta:
          type: string
        tokens:
          type: integer
          nullable: true
      required:
        - delta
    CompletionEvent:
      title: CompletionEvent
      type: object
      properties:
        content:
          type: string
      required:
        - content
    EventEvent:
      title: EventEvent
      type: object
      properties:
        event:
          type: string
        name:
          type: string
      required:
        - event
        - name
    ErrorEvent:
      title: ErrorEvent
      type: object
      properties:
        error:
          type: string
        code:
          type: integer
          nullable: true
      required:
        - error
    StreamEventContextProtocolZeroEvent:
      title: StreamEventContextProtocolZeroEvent
      type: string
      enum:
        - completion
    StreamEventContextProtocolZero:
      title: StreamEventContextProtocolZero
      type: object
      properties:
        event:
          $ref: '#/components/schemas/StreamEventContextProtocolZeroEvent'
      required:
        - event
      allOf:
        - $ref: '#/components/schemas/CompletionEvent'
    StreamEventContextProtocolOneEvent:
      title: StreamEventContextProtocolOneEvent
      type: string
      enum:
        - error
    StreamEventContextProtocolOne:
      title: StreamEventContextProtocolOne
      type: object
      properties:
        event:
          $ref: '#/components/schemas/StreamEventContextProtocolOneEvent'
      required:
        - event
      allOf:
        - $ref: '#/components/schemas/ErrorEvent'
    StreamEventContextProtocolTwoEvent:
      title: StreamEventContextProtocolTwoEvent
      type: string
      enum:
        - event
    StreamEventContextProtocolTwo:
      title: StreamEventContextProtocolTwo
      type: object
      properties:
        event:
          $ref: '#/components/schemas/StreamEventContextProtocolTwoEvent'
        name:
          type: string
      required:
        - event
        - name
    StreamEventContextProtocol:
      title: StreamEventContextProtocol
      oneOf:
        - $ref: '#/components/schemas/StreamEventContextProtocolZero'
        - $ref: '#/components/schemas/StreamEventContextProtocolOne'
        - $ref: '#/components/schemas/StreamEventContextProtocolTwo'
    StreamEventZeroEvent:
      title: StreamEventZeroEvent
      type: string
      enum:
        - completion
    StreamEventZero:
      title: StreamEventZero
      type: object
      properties:
        event:
          $ref: '#/components/schemas/StreamEventZeroEvent'
      required:
        - event
      allOf:
        - $ref: '#/components/schemas/CompletionEvent'
    StreamEventOneEvent:
      title: StreamEventOneEvent
      type: string
      enum:
        - error
    StreamEventOne:
      title: StreamEventOne
      type: object
      properties:
        event:
          $ref: '#/components/schemas/StreamEventOneEvent'
      required:
        - event
      allOf:
        - $ref: '#/components/schemas/ErrorEvent'
    StreamEvent:
      title: StreamEvent
      oneOf:
        - $ref: '#/components/schemas/StreamEventZero'
        - $ref: '#/components/schemas/StreamEventOne'
  securitySchemes: {}
