openapi: 3.1.0
info:
  title: file-upload
  version: 0.0.0
paths:
  /:
    post:
      operationId: service_post
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                maybe_string:
                  type:
                    - string
                    - 'null'
                integer:
                  type:
                    - integer
                    - 'null'
                file:
                  type: string
                  format: binary
                file_list:
                  type: string
                  format: binary
                maybe_file:
                  type: string
                  format: binary
                maybe_file_list:
                  type: string
                  format: binary
                maybe_integer:
                  type:
                    - integer
                    - 'null'
                optional_list_of_strings:
                  type:
                    - array
                    - 'null'
                  items:
                    type: string
                list_of_objects:
                  type:
                    - array
                    - 'null'
                  items:
                    $ref: '#/components/schemas/MyObject'
                optional_metadata: {}
                optional_object_type:
                  anyOf:
                    - $ref: '#/components/schemas/ObjectType'
                    - type: 'null'
                optional_id:
                  anyOf:
                    - $ref: '#/components/schemas/Id'
                    - type: 'null'
                alias_object:
                  anyOf:
                    - $ref: '#/components/schemas/MyAliasObject'
                    - type: 'null'
                list_of_alias_object:
                  type:
                    - array
                    - 'null'
                  items:
                    $ref: '#/components/schemas/MyAliasObject'
                alias_list_of_object:
                  anyOf:
                    - $ref: '#/components/schemas/MyCollectionAliasObject'
                    - type: 'null'
  /just-file:
    post:
      operationId: service_justfile
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
  /just-file-with-query-params:
    post:
      operationId: service_justfilewithqueryparams
      tags:
        - Service
      parameters:
        - name: maybeString
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: integer
          in: query
          required: true
          schema:
            type: integer
        - name: maybeInteger
          in: query
          required: false
          schema:
            type:
              - integer
              - 'null'
        - name: listOfStrings
          in: query
          required: false
          schema:
            type: array
            items:
              type:
                - string
                - 'null'
        - name: optionalListOfStrings
          in: query
          required: false
          schema:
            type: array
            items:
              type:
                - string
                - 'null'
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
  /just-file-with-optional-query-params:
    post:
      operationId: service_justfilewithoptionalqueryparams
      tags:
        - Service
      parameters:
        - name: maybeString
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: maybeInteger
          in: query
          required: false
          schema:
            type:
              - integer
              - 'null'
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
  /with-content-type:
    post:
      operationId: service_withcontenttype
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                foo:
                  type:
                    - string
                    - 'null'
                bar:
                  anyOf:
                    - $ref: '#/components/schemas/MyObject'
                    - type: 'null'
                foo_bar:
                  anyOf:
                    - $ref: '#/components/schemas/MyObject'
                    - type: 'null'
  /with-form-encoding:
    post:
      operationId: service_withformencoding
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                foo:
                  type:
                    - string
                    - 'null'
                bar:
                  anyOf:
                    - $ref: '#/components/schemas/MyObject'
                    - type: 'null'
  /form-encoded-containers:
    post:
      operationId: service_withformencodedcontainers
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                maybe_string:
                  type:
                    - string
                    - 'null'
                integer:
                  type:
                    - integer
                    - 'null'
                file:
                  type: string
                  format: binary
                file_list:
                  type: string
                  format: binary
                maybe_file:
                  type: string
                  format: binary
                maybe_file_list:
                  type: string
                  format: binary
                maybe_integer:
                  type:
                    - integer
                    - 'null'
                optional_list_of_strings:
                  type:
                    - array
                    - 'null'
                  items:
                    type: string
                list_of_objects:
                  type:
                    - array
                    - 'null'
                  items:
                    $ref: '#/components/schemas/MyObject'
                optional_metadata: {}
                optional_object_type:
                  anyOf:
                    - $ref: '#/components/schemas/ObjectType'
                    - type: 'null'
                optional_id:
                  anyOf:
                    - $ref: '#/components/schemas/Id'
                    - type: 'null'
                list_of_objects_with_optionals:
                  type:
                    - array
                    - 'null'
                  items:
                    $ref: '#/components/schemas/MyObjectWithOptional'
                alias_object:
                  anyOf:
                    - $ref: '#/components/schemas/MyAliasObject'
                    - type: 'null'
                list_of_alias_object:
                  type:
                    - array
                    - 'null'
                  items:
                    $ref: '#/components/schemas/MyAliasObject'
                alias_list_of_object:
                  anyOf:
                    - $ref: '#/components/schemas/MyCollectionAliasObject'
                    - type: 'null'
  /optional-args:
    post:
      operationId: service_optionalargs
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: Foo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image_file:
                  type: string
                  format: binary
                request: {}
  /inline-type:
    post:
      operationId: service_withinlinetype
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                request:
                  anyOf:
                    - $ref: '#/components/schemas/MyInlineType'
                    - type: 'null'
  /with-json-property:
    post:
      operationId: service_withjsonproperty
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                json:
                  anyOf:
                    - $ref: '#/components/schemas/MyObject'
                    - type: 'null'
  /snippet:
    post:
      operationId: service_simple
      tags:
        - Service
      parameters: []
      responses:
        '204':
          description: No content
  /with-literal-enum:
    post:
      operationId: service_withliteralandenumtypes
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                model_type:
                  anyOf:
                    - $ref: '#/components/schemas/ModelType'
                    - type: 'null'
                open_enum:
                  anyOf:
                    - $ref: '#/components/schemas/OpenEnumType'
                    - type: 'null'
                maybe_name:
                  type:
                    - string
                    - 'null'
components:
  schemas:
    Id:
      title: Id
      type: string
    MyObjectWithOptional:
      title: MyObjectWithOptional
      type: object
      properties:
        prop:
          type: string
        optionalProp:
          type:
            - string
            - 'null'
      required:
        - prop
    MyAliasObject:
      title: MyAliasObject
      $ref: '#/components/schemas/MyObject'
    MyCollectionAliasObject:
      title: MyCollectionAliasObject
      type: array
      items:
        $ref: '#/components/schemas/MyObject'
    MyObject:
      title: MyObject
      type: object
      properties:
        foo:
          type: string
      required:
        - foo
    ObjectType:
      title: ObjectType
      type: string
      enum:
        - FOO
        - BAR
    MyInlineType:
      title: MyInlineType
      type: object
      properties:
        bar:
          type: string
      required:
        - bar
    ModelType:
      title: ModelType
      type: string
      const: model_v1
    OpenEnumType:
      title: OpenEnumType
      type: string
      enum:
        - OPTION_A
        - OPTION_B
        - OPTION_C
  securitySchemes: {}
