openapi: 3.0.1
info:
  title: URL Form Encoded API
  version: ''
paths:
  /submit:
    post:
      operationId: submitFormData
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSubmitResponse'
              examples:
                Example1:
                  value:
                    status: success
                    message: Data received successfully.
      summary: Submit form data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: The user's username
                  example: johndoe
                email:
                  type: string
                  format: email
                  description: The user's email address
                  example: john@example.com
              required:
                - username
                - email
            examples:
              Example1:
                value:
                  username: johndoe
                  email: john@example.com
  /token:
    post:
      operationId: get_token
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    expires_in: 1
      summary: Get OAuth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
components:
  schemas:
    PostSubmitResponse:
      title: PostSubmitResponse
      type: object
      properties:
        status:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
    TokenRequest:
      title: TokenRequest
      type: object
      properties:
        client_id:
          type: string
          description: Client identifier
          example: client_id
        client_secret:
          type: string
          description: Client secret
          example: client_secret
      required:
        - client_id
        - client_secret
    TokenResponse:
      title: TokenResponse
      type: object
      properties:
        access_token:
          type: string
          nullable: true
        expires_in:
          type: integer
          nullable: true
  securitySchemes: {}
