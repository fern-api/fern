openapi: 3.1.0
info:
  title: objects-with-imports
  version: 0.0.0
paths: {}
components:
  schemas:
    Node:
      title: Node
      type: object
      properties:
        id:
          type: string
        label:
          type:
            - string
            - 'null'
        metadata:
          anyOf:
            - $ref: '#/components/schemas/CommonsMetadata'
            - type: 'null'
      required:
        - id
    Tree:
      title: Tree
      type: object
      properties:
        nodes:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/Node'
    CommonsMetadata:
      title: CommonsMetadata
      type: object
      properties:
        id:
          type: string
        data:
          type:
            - object
            - 'null'
          additionalProperties:
            type:
              - string
              - 'null'
      required:
        - id
    File:
      title: File
      type: object
      properties:
        name:
          type: string
        contents:
          type: string
        info:
          $ref: '#/components/schemas/FileInfo'
      required:
        - name
        - contents
        - info
    FileInfo:
      title: FileInfo
      type: string
      enum:
        - REGULAR
        - DIRECTORY
    FileDirectory:
      title: FileDirectory
      type: object
      properties:
        name:
          type: string
        files:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/File'
        directories:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/FileDirectory'
      required:
        - name
  securitySchemes: {}
