irVersion: v66
displayName: OpenAPI
image: fernapi/fern-openapi
changelogLocation: ../../generators/openapi/versions.yml
publish:
  preBuildCommands:
    - pnpm turbo run dist:cli --filter @fern-api/openapi-generator
  docker:
    file: ./generators/openapi/Dockerfile
    image: fernapi/fern-openapi
    context: ./generators/openapi
test:
  docker:
    image: fernapi/fern-openapi:latest
    command: pnpm turbo run dockerTagLatest --filter @fern-api/openapi-generator
  local:
    workingDirectory: generators/openapi
    buildCommand:
      - pnpm turbo run dist:cli --filter @fern-api/openapi-generator
    runCommand: node --enable-source-maps dist/cli.cjs openapi {CONFIG_PATH}
generatorType: Documentation
defaultOutputMode: local_files
fixtures:
  imdb:
    - customConfig: null
      outputFolder: no-custom-config
    - customConfig:
        customOverrides:
          components:
            schemas:
              MovieId:
                type: null
      outputFolder: override
    - customConfig:
        customOverrides:
          info:
            license:
              name: MIT
      outputFolder: custom-overrides
    - customConfig:
        filename: imdb.yaml
      outputFolder: custom-filename
      skipScripts:
        - spectral-lint
    - customConfig:
        format: json
      outputFolder: json-format
      skipScripts:
        - spectral-lint
  enum:
    - customConfig: null
      outputFolder: no-custom-config
    - customConfig:
        customOverrides:
          components:
            schemas:
              Operand:
                type: null
      outputFolder: custom-overrides
scripts:
  docker:
    - image: fernapi/fern-openapi:latest
      name: spectral-lint
      commands:
        test:
          - spectral lint openapi.yml --ruleset /.spectral.yml --fail-severity error
  local:
    - name: spectral-lint
      commands:
        test:
          - |
            echo 'extends: ["spectral:oas"]' > .spectral.yml
            npx --yes @stoplight/spectral-cli lint openapi.yml --fail-severity error
            rm -f .spectral.yml
allowedFailures:
  # CLI/IR layer: auto-generated examples don't conform to OAS schema constraints.
  # The Fern IR produces placeholder example values (e.g. empty objects, plain strings
  # for uuid fields, values violating multipleOf/oneOf) that the openapi generator
  # faithfully emits. Spectral's oas3-valid-media-example rule then flags these.
  # Fixing this requires example validation in the IR layer, not the openapi generator.
  - content-type
  - cross-package-type-names
  - csharp-grpc-proto
  - csharp-grpc-proto-exhaustive
  - exhaustive
  - go-deterministic-ordering
  - multiple-request-bodies
  - nullable
  - nullable-optional
  - pagination
  - trace
  - validation
  # OpenAPI generator: these OpenAPI-input fixtures produce only snippet.json (no
  # openapi.yml), so the spectral lint script finds no file to validate. The generator
  # doesn't re-emit an OAS spec when the input was already OpenAPI.
  - python-streaming-parameter-openapi
  - server-sent-events-openapi
