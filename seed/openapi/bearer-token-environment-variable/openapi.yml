openapi: 3.1.0
info:
  title: bearer-token-environment-variable
  version: 0.0.0
paths:
  /apiKey:
    get:
      description: GET request with custom api key
      operationId: service_getWithBearerToken
      tags:
        - Service
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
      security:
        - Bearer: []
components:
  schemas: {}
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
