openapi: 3.1.0
info:
  title: alias-extends
  version: 0.0.0
  description: A Test Definition for extending an alias
paths:
  /extends/extended-inline-request-body:
    post:
      operationId: extendedInlineRequestBody
      tags:
        - ''
      parameters: []
      responses:
        '204':
          description: No content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                child:
                  type: string
              required:
                - child
              allOf:
                - $ref: '#/components/schemas/AliasType'
components:
  schemas:
    AliasType:
      title: AliasType
      $ref: '#/components/schemas/Parent'
    Parent:
      title: Parent
      type: object
      properties:
        parent:
          type: string
          examples:
            - Property from the parent
      required:
        - parent
    Child:
      title: Child
      type: object
      properties:
        child:
          type: string
          examples:
            - Property from the child
      required:
        - child
      allOf:
        - $ref: '#/components/schemas/Parent'
  securitySchemes: {}
