openapi: 3.1.0
info:
  title: cross-package-type-names
  version: 0.0.0
paths:
  /folder-a:
    get:
      operationId: folderA_service_getDirectThread
      tags:
        - FolderAService
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/folder-aResponse'
  /folder-d:
    get:
      operationId: folderD_service_getDirectThread
      tags:
        - FolderDService
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/folder-dResponse'
  /:
    post:
      operationId: foo_find
      tags:
        - Foo
      parameters:
        - name: optionalString
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OptionalString'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportingType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                publicProperty:
                  type:
                    - string
                    - 'null'
                privateProperty:
                  type:
                    - integer
                    - 'null'
components:
  schemas:
    Imported:
      title: Imported
      type: string
    folder-aResponse:
      title: folder-aResponse
      type: object
      properties:
        foo:
          anyOf:
            - $ref: '#/components/schemas/folder-bFoo'
            - type: 'null'
    folder-bFoo:
      title: folder-bFoo
      type: object
      properties:
        foo:
          anyOf:
            - $ref: '#/components/schemas/folder-cFoo'
            - type: 'null'
    folder-cFoo:
      title: folder-cFoo
      type: object
      properties:
        bar_property:
          type: string
          format: uuid
      required:
        - bar_property
    folder-dResponse:
      title: folder-dResponse
      type: object
      properties:
        foo:
          anyOf:
            - $ref: '#/components/schemas/folder-bFoo'
            - type: 'null'
    ImportingType:
      title: ImportingType
      type: object
      properties:
        imported:
          $ref: '#/components/schemas/Imported'
      required:
        - imported
    OptionalString:
      title: OptionalString
      type:
        - string
        - 'null'
  securitySchemes: {}
