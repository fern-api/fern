openapi: 3.1.0
info:
  title: cross-package-type-names
  version: 0.0.0
paths:
  /folder-a:
    get:
      operationId: folderAService_folderA_service_getDirectThread
      tags:
        - FolderAService
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderAResponse'
              examples:
                Example1:
                  value:
                    foo:
                      foo:
                        bar_property: bar_property
  /folder-d:
    get:
      operationId: folderDService_folderD_service_getDirectThread
      tags:
        - FolderDService
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderDResponse'
              examples:
                Example1:
                  value:
                    foo:
                      foo:
                        bar_property: bar_property
  /:
    post:
      operationId: foo_find
      tags:
        - Foo
      parameters:
        - name: optionalString
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/OptionalString'
              - type: 'null'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportingType'
              examples:
                Example1:
                  value:
                    imported: imported
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                publicProperty:
                  type:
                    - string
                    - 'null'
                privateProperty:
                  type:
                    - integer
                    - 'null'
            examples:
              Example1:
                value: {}
components:
  schemas:
    Imported:
      title: Imported
      type: string
    FolderAResponse:
      title: FolderAResponse
      type: object
      properties:
        foo:
          anyOf:
            - $ref: '#/components/schemas/FolderBFoo'
            - type: 'null'
    FolderBFoo:
      title: FolderBFoo
      type: object
      properties:
        foo:
          anyOf:
            - $ref: '#/components/schemas/FolderCFoo'
            - type: 'null'
    FolderCFoo:
      title: FolderCFoo
      type: object
      properties:
        bar_property:
          type: string
          format: uuid
      required:
        - bar_property
    FolderDResponse:
      title: FolderDResponse
      type: object
      properties:
        foo:
          anyOf:
            - $ref: '#/components/schemas/FolderBFoo'
            - type: 'null'
    ImportingType:
      title: ImportingType
      type: object
      properties:
        imported:
          $ref: '#/components/schemas/Imported'
      required:
        - imported
    OptionalString:
      title: OptionalString
      type:
        - string
        - 'null'
  securitySchemes: {}
