openapi: 3.1.0
info:
  title: inferred-auth-implicit-no-expiry
  version: 0.0.0
paths:
  /token:
    post:
      operationId: auth_gettokenwithclientcredentials
      tags:
        - Auth
      parameters:
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: X-Api-Key
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    refresh_token: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  examples:
                    - client_id
                client_secret:
                  type: string
                  examples:
                    - client_secret
                audience:
                  $ref: >-
                    #/components/schemas/AuthGetTokenWithClientCredentialsRequestAudience
                grant_type:
                  $ref: >-
                    #/components/schemas/AuthGetTokenWithClientCredentialsRequestGrantType
                scope:
                  type:
                    - string
                    - 'null'
              required:
                - client_id
                - client_secret
                - audience
                - grant_type
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
                  audience: https://api.example.com
                  grant_type: client_credentials
  /token/refresh:
    post:
      operationId: auth_refreshtoken
      tags:
        - Auth
      parameters:
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: X-Api-Key
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    refresh_token: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  examples:
                    - client_id
                client_secret:
                  type: string
                  examples:
                    - client_secret
                refresh_token:
                  type: string
                  examples:
                    - refresh_token
                audience:
                  $ref: '#/components/schemas/AuthRefreshTokenRequestAudience'
                grant_type:
                  $ref: '#/components/schemas/AuthRefreshTokenRequestGrantType'
                scope:
                  type:
                    - string
                    - 'null'
              required:
                - client_id
                - client_secret
                - refresh_token
                - audience
                - grant_type
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
                  refresh_token: refresh_token
                  audience: https://api.example.com
                  grant_type: refresh_token
  /nested-no-auth/get-something:
    get:
      operationId: nestedNoAuthAPI_nestedNoAuth_api_getSomething
      tags:
        - NestedNoAuthAPI
      parameters: []
      responses:
        '204':
          description: No content
  /nested/get-something:
    get:
      operationId: nestedAPI_nested_api_getSomething
      tags:
        - NestedAPI
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - InferredAuthScheme: []
  /get-something:
    get:
      operationId: simple_getsomething
      tags:
        - Simple
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - InferredAuthScheme: []
components:
  schemas:
    AuthGetTokenWithClientCredentialsRequestAudience:
      title: AuthGetTokenWithClientCredentialsRequestAudience
      type: string
      const: https://api.example.com
    AuthGetTokenWithClientCredentialsRequestGrantType:
      title: AuthGetTokenWithClientCredentialsRequestGrantType
      type: string
      const: client_credentials
    AuthRefreshTokenRequestAudience:
      title: AuthRefreshTokenRequestAudience
      type: string
      const: https://api.example.com
    AuthRefreshTokenRequestGrantType:
      title: AuthRefreshTokenRequestGrantType
      type: string
      const: refresh_token
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
          examples:
            - access_token
        refresh_token:
          type:
            - string
            - 'null'
      required:
        - access_token
  securitySchemes:
    InferredAuthScheme:
      type: http
      scheme: bearer
