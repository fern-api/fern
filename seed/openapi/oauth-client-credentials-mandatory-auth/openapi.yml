openapi: 3.1.0
info:
  title: oauth-client-credentials-mandatory-auth
  version: 0.0.0
paths:
  /token:
    post:
      operationId: auth_getTokenWithClientCredentials
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    expires_in: 1
                    refresh_token: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  examples:
                    - my_oauth_app_123
                client_secret:
                  type: string
                  examples:
                    - sk_live_abcdef123456789
                audience:
                  type: string
                  const: https://api.example.com
                grant_type:
                  type: string
                  const: client_credentials
                scope:
                  type:
                    - string
                    - 'null'
              required:
                - client_id
                - client_secret
                - audience
                - grant_type
            examples:
              Example1:
                value:
                  client_id: my_oauth_app_123
                  client_secret: sk_live_abcdef123456789
                  audience: https://api.example.com
                  grant_type: client_credentials
                  scope: read:users
  /token/refresh:
    post:
      operationId: auth_refreshToken
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    expires_in: 1
                    refresh_token: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  examples:
                    - my_oauth_app_123
                client_secret:
                  type: string
                  examples:
                    - sk_live_abcdef123456789
                refresh_token:
                  type: string
                  examples:
                    - refresh_token
                audience:
                  type: string
                  const: https://api.example.com
                grant_type:
                  type: string
                  const: refresh_token
                scope:
                  type:
                    - string
                    - 'null'
              required:
                - client_id
                - client_secret
                - refresh_token
                - audience
                - grant_type
            examples:
              Example1:
                value:
                  client_id: my_oauth_app_123
                  client_secret: sk_live_abcdef123456789
                  refresh_token: refresh_token
                  audience: https://api.example.com
                  grant_type: refresh_token
                  scope: read:users
  /nested/get-something:
    get:
      operationId: nested_api_getSomething
      tags:
        - NestedAPI
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - OAuthScheme: []
  /get-something:
    get:
      operationId: simple_getSomething
      tags:
        - Simple
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - OAuthScheme: []
components:
  schemas:
    TokenResponse:
      title: TokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
          examples:
            - access_token
        expires_in:
          type: integer
          examples:
            - 1
        refresh_token:
          type:
            - string
            - 'null'
      required:
        - access_token
        - expires_in
  securitySchemes:
    OAuthScheme:
      type: http
      scheme: bearer
