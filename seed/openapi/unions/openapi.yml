openapi: 3.1.0
info:
  title: unions
  version: 0.0.0
paths:
  /bigunion/{id}:
    get:
      operationId: bigunion_get
      tags:
        - Bigunion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BigUnion'
              examples:
                Example1:
                  value:
                    value: example1
                    type: normalSweet
  /bigunion:
    patch:
      operationId: bigunion_update
      tags:
        - Bigunion
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: boolean
              examples:
                Example1:
                  value: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BigUnion'
            examples:
              Example1:
                value:
                  value: example1
                  type: normalSweet
  /bigunion/many:
    patch:
      operationId: bigunion_updateMany
      tags:
        - Bigunion
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: boolean
              examples:
                Example1:
                  value:
                    key: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/BigUnion'
            examples:
              Example1:
                value:
                  - value: example1
                    type: normalSweet
  /union/{id}:
    get:
      operationId: union_get
      tags:
        - Union
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          examples:
            Example1:
              value: id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shape'
              examples:
                Example1:
                  value:
                    radius: 1.1
                    type: circle
  /union:
    patch:
      operationId: union_update
      tags:
        - Union
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: boolean
              examples:
                Example1:
                  value: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shape'
            examples:
              Example1:
                value:
                  radius: 1.1
                  type: circle
