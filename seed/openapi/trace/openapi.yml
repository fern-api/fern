          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDefaultStarterFilesResponse'
              examples:
                Example1:
                  value:
                    files:
                      key:
                        solutionFile:
                          filename: filename
                          contents: contents
                        readOnlyFiles:
                          - filename: filename
                            contents: contents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputParams:
                  type: array
                  items:
                    $ref: '#/components/schemas/VariableTypeAndName'
                outputType:
                  $ref: '#/components/schemas/VariableType'
                methodName:
                  type: string
                  description: |-
                    The name of the `method` that the student has to complete.
                    The method name cannot include the following characters:
                      - Greater Than `>`
                      - Less Than `<``
                      - Equals `=`
                      - Period `.`
