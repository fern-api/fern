  /problems-v2/problem-info:
    get:
      description: Returns latest versions of all problems
      operationId: v2Problem_v2_problem_getProblems
      tags:
        - V2Problem
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/V2ProblemInfoV2'
              examples:
                Example1:
                  value:
                    - problemId: problemId
                      problemDescription:
                        boards:
                          - type: html
                      problemName: problemName
                      problemVersion: 1
                      supportedLanguages:
                        - JAVA
                      customFiles:
                        methodName: methodName
                        signature:
                          parameters:
                            - parameterId: parameterId
                              name: name
                              variableType:
                                type: integerType
                          returnType:
                            type: integerType
                        additionalFiles:
                          key:
                            files:
                              - filename: filename
                                directory: directory
                                contents: contents
                                editable: true
                        basicTestCaseTemplate:
                          templateId: templateId
                          name: name
                          description:
                            boards:
                              - type: html
                          expectedValueParameterId: expectedValueParameterId
                        type: basic
                      generatedFiles:
                        generatedTestCaseFiles:
                          key:
                            files:
                              - filename: filename
                                directory: directory
                                contents: contents
                                editable: true
                        generatedTemplateFiles:
                          key:
                            files:
                              - filename: filename
                                directory: directory
                                contents: contents
                                editable: true
                        other:
                          key:
                            files:
                              - filename: filename
                                directory: directory
                                contents: contents
                                editable: true
                      customTestCaseTemplates:
                        - templateId: templateId
                          name: name
                          implementation:
                            description:
                              boards:
                                - type: html
                            function:
                              getActualResult:
                                signature:
                                  parameters:
                                    - parameterId: parameterId
                                      name: name
                                      variableType:
                                        type: integerType
                                  returnType:
                                    type: integerType
                                code:
                                  codeByLanguage:
                                    key:
                                      impl: impl
                              assertCorrectnessCheck:
                                expectedValueParameterId: expectedValueParameterId
                                type: deepEquality
                              type: withActualResult
                      testcases:
                        - metadata:
                            id: id
                            name: name
                            hidden: true
                          implementation:
                            type: templateId
                          arguments:
                            key:
                              type: integerValue
                      isPublic: true
  /problems-v2/problem-info/{problemId}:
