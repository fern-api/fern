          in: path
          required: true
          schema:
            type: integer
          example: 1
          examples:
            Example1:
              value: 1
        - name: datetime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: '2024-01-15T09:30:00Z'
          examples:
            Example1:
              value: '2024-01-15T09:30:00Z'
        - name: optionalDatetime
          in: query
          required: false
          schema:
            type: string
            format: date-time
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
              examples:
                Example1:
                  value:
                    name: name
                    problems:
                      - problems
                    playlist_id: playlist_id
                    owner-id: owner-id
