            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
              examples:
                Example1:
                  value:
                    name: name
                    problems:
                      - problems
                    playlist_id: playlist_id
                    owner-id: owner-id
        '404':
          description: ''
          content:
            application/json:
              schema: {}
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: name
                problems:
                  type: array
                  items:
                    $ref: '#/components/schemas/ProblemId'
                  description: The problems that make up the playlist.
              required:
                - name
                - problems
            examples:
              Example1:
                value:
                  name: name
                  problems:
