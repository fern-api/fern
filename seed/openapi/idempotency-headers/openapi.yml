openapi: 3.1.0
info:
  title: idempotency-headers
  version: 0.0.0
paths:
  /payment:
    post:
      operationId: payment_create
      tags:
        - Payment
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
              examples:
                Example1:
                  value: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  example: 1
                currency:
                  $ref: '#/components/schemas/Currency'
              required:
                - amount
                - currency
            examples:
              Example1:
                value:
                  amount: 1
                  currency: USD
  /payment/{paymentId}:
    delete:
      operationId: payment_delete
      tags:
        - Payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
          example: paymentId
          examples:
            Example1:
              value: paymentId
      responses:
        '204':
          description: No content
      security:
        - BearerAuth: []
components:
  schemas:
    Currency:
      title: Currency
      type: string
      enum:
        - USD
        - YEN
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
