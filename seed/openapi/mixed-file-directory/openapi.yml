openapi: 3.0.1
info:
  title: mixed-file-directory
  version: ''
paths:
  /organizations/:
    post:
      description: Create a new organization.
      operationId: organization_create
      tags:
        - Organization
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              examples:
                Example1:
                  value:
                    id: id
                    name: name
                    users:
                      - id: id
                        name: name
                        age: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: name
              required:
                - name
            examples:
              Example1:
                value:
                  name: name
  /users/:
    get:
      description: List all users.
      operationId: user_list
      tags:
        - User
      parameters:
        - name: limit
          in: query
          description: The maximum number of results to return.
          required: false
          schema:
            type: integer
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
                      age: 1
  /users/events/:
    get:
      description: List all user events.
      operationId: userEvents_user_events_listEvents
      tags:
        - UserEvents
      parameters:
        - name: limit
          in: query
          description: The maximum number of results to return.
          required: false
          schema:
            type: integer
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserEvent'
              examples:
                Example1:
                  value:
                    - id: id
                      name: name
  /users/events/metadata/:
    get:
      description: Get event metadata.
      operationId: userEventsMetadata_user_events_metadata_getMetadata
      tags:
        - UserEventsMetadata
      parameters:
        - name: id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Id'
          example: id
          examples:
            Example1:
              value: id
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsereventsMetadata'
              examples:
                Example1:
                  value:
                    id: id
                    value:
                      key: value
components:
  schemas:
    Id:
      title: Id
      type: string
    Organization:
      title: Organization
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
          example: name
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
      required:
        - id
        - name
        - users
    User:
      title: User
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
        age:
          type: integer
      required:
        - id
        - name
        - age
    UserEvent:
      title: UserEvent
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
      required:
        - id
        - name
    UsereventsMetadata:
      title: UsereventsMetadata
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
        value: {}
      required:
        - id
        - value
  securitySchemes: {}
