openapi: 3.1.0
info:
  title: inferred-auth-implicit-api-key
  version: 0.0.0
paths:
  /token:
    post:
      operationId: auth_gettoken
      tags:
        - Auth
      parameters:
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
          example: X-Api-Key
          examples:
            Example1:
              value: X-Api-Key
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    token_type: token_type
                    expires_in: 1
                    scope: scope
  /nested-no-auth/get-something:
    get:
      operationId: nestedNoAuthAPI_nestedNoAuth_api_getSomething
      tags:
        - NestedNoAuthAPI
      parameters: []
      responses:
        '204':
          description: No content
  /nested/get-something:
    get:
      operationId: nestedAPI_nested_api_getSomething
      tags:
        - NestedAPI
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - InferredAuth: []
  /get-something:
    get:
      operationId: simple_getsomething
      tags:
        - Simple
      parameters: []
      responses:
        '204':
          description: No content
      security:
        - InferredAuth: []
components:
  schemas:
    TokenResponse:
      title: TokenResponse
      type: object
      description: An auth token response.
      properties:
        access_token:
          type: string
          example: access_token
        token_type:
          type: string
          example: token_type
        expires_in:
          type: integer
          example: 1
        scope:
          type:
            - string
            - 'null'
      required:
        - access_token
        - token_type
        - expires_in
  securitySchemes:
    InferredAuth:
      type: http
      scheme: bearer
