openapi: 3.0.1
info:
  title: pagination
  version: ''
paths:
  /{index}/conversations/search:
    post:
      operationId: complex_search
      tags:
        - Complex
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: string
          example: index
          examples:
            Example1:
              value: index
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversationResponse'
              examples:
                Example1:
                  value:
                    conversations:
                      - foo: foo
                    pages:
                      next:
                        per_page: 1
                        starting_after: starting_after
                      page: 1
                      per_page: 1
                      total_pages: 1
                      type: pages
                    total_count: 1
                    type: conversation.list
      summary: Search conversations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pagination:
                  $ref: '#/components/schemas/StartingAfterPaging'
                  nullable: true
                query:
                  $ref: '#/components/schemas/SearchRequestQuery'
              required:
                - query
            examples:
              Example1:
                value:
                  query: {}
  /inline-users/cursor:
