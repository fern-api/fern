            the next page of results.
          required: false
          schema:
            type: string
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InlineUsersListUsersPaginationResponse'
              examples:
                Example1:
                  value:
