openapi: 3.0.1
info:
  title: imdb
  version: ''
paths:
  /movies/create-movie:
    post:
      description: Add a movie to the database using the movies/* /... path.
      operationId: imdb_createmovie
      tags:
        - Imdb
      parameters: []
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieId'
              examples:
                Example1:
                  value: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: title
                rating:
                  type: number
                  format: double
                  example: 1.1
              required:
                - title
                - rating
            examples:
              Example1:
                value:
                  title: title
                  rating: 1.1
  /movies/{movieId}:
    get:
      operationId: imdb_getmovie
      tags:
        - Imdb
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MovieId'
          example: movieId
          examples:
            Example1:
              value: movieId
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              examples:
                Example1:
                  value:
                    id: id
                    title: title
                    rating: 1.1
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieId'
components:
  schemas:
    MovieId:
      title: MovieId
    Movie:
      title: Movie
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MovieId'
        title:
          type: string
          example: title
        rating:
          type: number
          format: double
          description: The rating scale is one to five stars
          example: 1.1
      required:
        - id
        - title
        - rating
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
