openapi: 3.1.0
info:
  title: '""'
  version: 0.0.0
paths:
  /users:
    post:
      operationId: userService_Create
      tags:
        - UserService
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
              examples:
                Example1:
                  value:
                    user:
                      username: username
                      email: email
                      age: 1
                      weight: 1.1
                      metadata:
                        key: 1.1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type:
                    - string
                    - 'null'
                email:
                  type:
                    - string
                    - 'null'
                age:
                  type:
                    - integer
                    - 'null'
                  format: int64
                weight:
                  type:
                    - integer
                    - 'null'
                  format: float
                metadata:
                  anyOf:
                    - $ref: '#/components/schemas/Metadata'
                    - type: 'null'
            examples:
              Example1:
                value: {}
components:
  schemas:
    CreateResponse:
      title: CreateResponse
      type: object
      properties:
        user:
          anyOf:
            - $ref: '#/components/schemas/UserModel'
            - type: 'null'
    UserModel:
      title: UserModel
      type: object
      properties:
        username:
          type:
            - string
            - 'null'
        email:
          type:
            - string
            - 'null'
        age:
          type:
            - integer
            - 'null'
          format: int64
        weight:
          type:
            - integer
            - 'null'
          format: float
        metadata:
          anyOf:
            - $ref: '#/components/schemas/Metadata'
            - type: 'null'
    Metadata:
      title: Metadata
      oneOf:
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
        - type: object
    MetadataValue:
      title: MetadataValue
      oneOf:
        - type: number
          format: double
        - type: string
        - type: boolean
  securitySchemes: {}
