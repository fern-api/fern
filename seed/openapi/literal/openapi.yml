openapi: 3.0.1
info:
  title: literal
  version: ''
paths:
  /headers:
    post:
      operationId: headers_send
      tags:
        - Headers
      parameters:
        - name: X-Endpoint-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/HeadersSendRequestXEndpointVersion'
          example: 02-12-2024
          examples:
            Example1:
              value: 02-12-2024
        - name: X-Async
          in: header
          required: true
          schema:
            type: boolean
          example: true
          examples:
            Example1:
              value: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResponse'
              examples:
                Example1:
                  value:
                    message: message
                    status: 1
                    success: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  example: query
              required:
                - query
            examples:
              Example1:
                value:
                  query: query
  /inlined:
    post:
      operationId: inlined_send
      tags:
        - Inlined
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResponse'
              examples:
                Example1:
                  value:
                    message: message
                    status: 1
                    success: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  $ref: '#/components/schemas/InlinedSendRequestPrompt'
                context:
                  $ref: '#/components/schemas/InlinedSendRequestContext'
                  nullable: true
                query:
                  type: string
                  example: query
                temperature:
                  type: number
                  format: double
                  nullable: true
                stream:
                  type: boolean
                  example: true
                aliasedContext:
                  $ref: '#/components/schemas/SomeAliasedLiteral'
                maybeContext:
                  $ref: '#/components/schemas/SomeAliasedLiteral'
                  nullable: true
                objectWithLiteral:
                  $ref: '#/components/schemas/ATopLevelLiteral'
              required:
                - prompt
                - query
                - stream
                - aliasedContext
                - objectWithLiteral
            examples:
              Example1:
                value:
                  prompt: You are a helpful assistant
                  query: query
                  stream: true
                  aliasedContext: You're super wise
                  objectWithLiteral:
                    nestedLiteral:
                      myLiteral: How super cool
  /path/{id}:
    post:
      operationId: path_send
      tags:
        - Path
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/PathSendRequestId'
          example: '123'
          examples:
            Example1:
              value: '123'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResponse'
              examples:
                Example1:
                  value:
                    message: message
                    status: 1
                    success: true
  /query:
    post:
      operationId: query_send
      tags:
        - Query
      parameters:
        - name: prompt
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/QuerySendRequestPrompt'
          example: You are a helpful assistant
          examples:
            Example1:
              value: You are a helpful assistant
        - name: optional_prompt
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/QuerySendRequestOptionalPrompt'
            nullable: true
        - name: alias_prompt
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/AliasToPrompt'
          example: You are a helpful assistant
          examples:
            Example1:
              value: You are a helpful assistant
        - name: alias_optional_prompt
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AliasToPrompt'
            nullable: true
        - name: query
          in: query
          required: true
          schema:
            type: string
          example: query
          examples:
            Example1:
              value: query
        - name: stream
          in: query
          required: true
          schema:
            type: boolean
          example: true
          examples:
            Example1:
              value: true
        - name: optional_stream
          in: query
          required: false
          schema:
            type: boolean
            nullable: true
        - name: alias_stream
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/AliasToStream'
          example: true
          examples:
            Example1:
              value: true
        - name: alias_optional_stream
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AliasToStream'
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResponse'
              examples:
                Example1:
                  value:
                    message: message
                    status: 1
                    success: true
  /reference:
    post:
      operationId: reference_send
      tags:
        - Reference
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResponse'
              examples:
                Example1:
                  value:
                    message: message
                    status: 1
                    success: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  $ref: '#/components/schemas/SendRequestPrompt'
                query:
                  type: string
                  example: query
                stream:
                  type: boolean
                  example: true
                ending:
                  $ref: '#/components/schemas/SendRequestEnding'
                context:
                  $ref: '#/components/schemas/SomeLiteral'
                maybeContext:
                  $ref: '#/components/schemas/SomeLiteral'
                  nullable: true
                containerObject:
                  $ref: '#/components/schemas/ContainerObject'
              required:
                - prompt
                - query
                - stream
                - ending
                - context
                - containerObject
            examples:
              Example1:
                value:
                  prompt: You are a helpful assistant
                  query: query
                  stream: true
                  ending: $ending
                  context: You're super wise
                  containerObject:
                    nestedObjects:
                      - literal1: literal1
                        literal2: literal2
                        strProp: strProp
components:
  schemas:
    HeadersSendRequestXEndpointVersion:
      title: HeadersSendRequestXEndpointVersion
      type: string
      enum:
        - 02-12-2024
    InlinedSendRequestPrompt:
      title: InlinedSendRequestPrompt
      type: string
      enum:
        - You are a helpful assistant
    InlinedSendRequestContext:
      title: InlinedSendRequestContext
      type: string
      enum:
        - You're super wise
    PathSendRequestId:
      title: PathSendRequestId
      type: string
      enum:
        - '123'
    QuerySendRequestPrompt:
      title: QuerySendRequestPrompt
      type: string
      enum:
        - You are a helpful assistant
    QuerySendRequestOptionalPrompt:
      title: QuerySendRequestOptionalPrompt
      type: string
      enum:
        - You are a helpful assistant
    SendRequestPrompt:
      title: SendRequestPrompt
      type: string
      enum:
        - You are a helpful assistant
    SendRequestEnding:
      title: SendRequestEnding
      type: string
      enum:
        - $ending
    SendResponse:
      title: SendResponse
      type: object
      properties:
        message:
          type: string
          example: message
        status:
          type: integer
          example: 1
        success:
          type: boolean
          example: true
      required:
        - message
        - status
        - success
    SomeAliasedLiteral:
      title: SomeAliasedLiteral
      type: string
      enum:
        - You're super wise
    ATopLevelLiteral:
      title: ATopLevelLiteral
      type: object
      properties:
        nestedLiteral:
          $ref: '#/components/schemas/ANestedLiteral'
      required:
        - nestedLiteral
    ANestedLiteralMyLiteral:
      title: ANestedLiteralMyLiteral
      type: string
      enum:
        - How super cool
    ANestedLiteral:
      title: ANestedLiteral
      type: object
      properties:
        myLiteral:
          $ref: '#/components/schemas/ANestedLiteralMyLiteral'
      required:
        - myLiteral
    DiscriminatedLiteralCustomName:
      title: DiscriminatedLiteralCustomName
      type: object
      properties:
        value:
          type: string
          nullable: true
    DiscriminatedLiteralDefaultNameValue:
      title: DiscriminatedLiteralDefaultNameValue
      type: string
      enum:
        - Bob
    DiscriminatedLiteralDefaultName:
      title: DiscriminatedLiteralDefaultName
      type: object
      properties:
        value:
          $ref: '#/components/schemas/DiscriminatedLiteralDefaultNameValue'
          nullable: true
    DiscriminatedLiteralGeorge:
      title: DiscriminatedLiteralGeorge
      type: object
      properties:
        value:
          type: boolean
          nullable: true
    DiscriminatedLiteralLiteralGeorge:
      title: DiscriminatedLiteralLiteralGeorge
      type: object
      properties:
        value:
          type: boolean
          nullable: true
    DiscriminatedLiteral:
      title: DiscriminatedLiteral
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - customName
            - $ref: '#/components/schemas/DiscriminatedLiteralCustomName'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - defaultName
            - $ref: '#/components/schemas/DiscriminatedLiteralDefaultName'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - george
            - $ref: '#/components/schemas/DiscriminatedLiteralGeorge'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - literalGeorge
            - $ref: '#/components/schemas/DiscriminatedLiteralLiteralGeorge'
          required:
            - type
    UndiscriminatedLiteralOne:
      title: UndiscriminatedLiteralOne
      type: string
      enum:
        - $ending
    UndiscriminatedLiteralTwo:
      title: UndiscriminatedLiteralTwo
      type: string
      enum:
        - >-
          10 non-alphanumeric string literals you're going to love & why (number
          8 will surprise you)
    UndiscriminatedLiteral:
      title: UndiscriminatedLiteral
      oneOf:
        - type: string
        - $ref: '#/components/schemas/UndiscriminatedLiteralOne'
        - $ref: '#/components/schemas/UndiscriminatedLiteralTwo'
        - type: boolean
    AliasToPrompt:
      title: AliasToPrompt
      type: string
      enum:
        - You are a helpful assistant
    AliasToStream:
      title: AliasToStream
      type: boolean
    ContainerObject:
      title: ContainerObject
      type: object
      properties:
        nestedObjects:
          type: array
          items:
            $ref: '#/components/schemas/NestedObjectWithLiterals'
      required:
        - nestedObjects
    NestedObjectWithLiteralsLiteral1:
      title: NestedObjectWithLiteralsLiteral1
      type: string
      enum:
        - literal1
    NestedObjectWithLiteralsLiteral2:
      title: NestedObjectWithLiteralsLiteral2
      type: string
      enum:
        - literal2
    NestedObjectWithLiterals:
      title: NestedObjectWithLiterals
      type: object
      properties:
        literal1:
          $ref: '#/components/schemas/NestedObjectWithLiteralsLiteral1'
        literal2:
          $ref: '#/components/schemas/NestedObjectWithLiteralsLiteral2'
        strProp:
          type: string
      required:
        - literal1
        - literal2
        - strProp
    SomeLiteral:
      title: SomeLiteral
      type: string
      enum:
        - You're super wise
  securitySchemes: {}
