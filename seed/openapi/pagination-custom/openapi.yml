openapi: 3.0.1
info:
  title: pagination-custom
  version: ''
paths:
  /users:
    get:
      operationId: users_listwithcustompager
      tags:
        - Users
      parameters:
        - name: limit
          in: query
          description: The maximum number of results to return.
          required: false
          schema:
            type: integer
            nullable: true
        - name: starting_after
          in: query
          description: The cursor used for pagination.
          required: false
          schema:
            type: string
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
              examples:
                Example1:
                  value:
                    limit: 1
                    count: 1
                    has_more: true
                    links:
                      - rel: rel
                        method: method
                        href: href
                    data:
                      - data
components:
  schemas:
    UsersListResponse:
      title: UsersListResponse
      type: object
      properties:
        limit:
          type: integer
          nullable: true
        count:
          type: integer
          nullable: true
        has_more:
          type: boolean
          nullable: true
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        data:
          type: array
          items:
            type: string
          example:
            - data
      required:
        - links
        - data
    Link:
      title: Link
      type: object
      properties:
        rel:
          type: string
        method:
          type: string
        href:
          type: string
      required:
        - rel
        - method
        - href
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
