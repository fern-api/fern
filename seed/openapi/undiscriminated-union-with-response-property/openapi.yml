openapi: 3.0.1
info:
  title: undiscriminated-union-with-response-property
  version: ''
paths:
  /union:
    get:
      operationId: _getUnion
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnionResponse'
              examples:
                Example1:
                  value:
                    data:
                      valueA: valueA
                      type: A
  /unions:
    get:
      operationId: _listUnions
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnionListResponse'
              examples:
                Example1:
                  value:
                    data:
                      - valueA: valueA
                        type: A
components:
  schemas:
    UnionResponse:
      title: UnionResponse
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MyUnion'
      required:
        - data
    UnionListResponse:
      title: UnionListResponse
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MyUnion'
      required:
        - data
    MyUnion:
      title: MyUnion
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - A
            - $ref: '#/components/schemas/VariantA'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - B
            - $ref: '#/components/schemas/VariantB'
          required:
            - type
        - type: object
          allOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - C
            - $ref: '#/components/schemas/VariantC'
          required:
            - type
      description: |-
        Undiscriminated union with multiple object variants.
        This reproduces the Pipedream issue where Emitter is a union of
        DeployedComponent, HttpInterface, and TimerInterface.
    VariantA:
      title: VariantA
      type: object
      properties:
        valueA:
          type: string
      required:
        - valueA
    VariantB:
      title: VariantB
      type: object
      properties:
        valueB:
          type: integer
      required:
        - valueB
    VariantC:
      title: VariantC
      type: object
      properties:
        valueC:
          type: boolean
      required:
        - valueC
  securitySchemes: {}
