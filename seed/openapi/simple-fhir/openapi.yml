openapi: 3.0.1
info:
  title: simple-fhir
  version: ''
paths:
  /account/{account_id}:
    get:
      operationId: _getAccount
      tags:
        - ''
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
          example: account_id
          examples:
            Example1:
              value: account_id
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
              examples:
                Example1:
                  value:
                    id: id
                    related_resources:
                      - id: id
                        related_resources: []
                        memo:
                          description: description
                        resource_type: Patient
                        name: name
                        scripts:
                          - id: id
                            related_resources: []
                            memo:
                              description: description
                            resource_type: Script
                            name: name
                    memo:
                      description: description
                    resource_type: Account
                    name: name
                    patient:
                      id: id
                      related_resources:
                        - id: id
                          related_resources: []
                          memo:
                            description: description
                          resource_type: Practitioner
                          name: name
                      memo:
                        description: description
                      resource_type: Patient
                      name: name
                      scripts:
                        - id: id
                          related_resources:
                            - id: id
                              related_resources: []
                              memo:
                                description: description
                              resource_type: Practitioner
                              name: name
                          memo:
                            description: description
                          resource_type: Script
                          name: name
                    practitioner:
                      id: id
                      related_resources:
                        - id: id
                          related_resources: []
                          memo:
                            description: description
                          resource_type: Patient
                          name: name
                          scripts:
                            - id: id
                              related_resources: []
                              memo:
                                description: description
                              resource_type: Script
                              name: name
                      memo:
                        description: description
                      resource_type: Practitioner
                      name: name
components:
  schemas:
    Memo:
      title: Memo
      type: object
      properties:
        description:
          type: string
        account:
          $ref: '#/components/schemas/Account'
          nullable: true
      required:
        - description
    BaseResource:
      title: BaseResource
      type: object
      properties:
        id:
          type: string
        related_resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceList'
        memo:
          $ref: '#/components/schemas/Memo'
      required:
        - id
        - related_resources
        - memo
    ResourceList:
      title: ResourceList
      oneOf:
        - type: object
          allOf:
            - type: object
              properties:
                resource_type:
                  type: string
                  enum:
                    - Account
            - $ref: '#/components/schemas/Account'
          required:
            - resource_type
        - type: object
          allOf:
            - type: object
              properties:
                resource_type:
                  type: string
                  enum:
                    - Patient
            - $ref: '#/components/schemas/Patient'
          required:
            - resource_type
        - type: object
          allOf:
            - type: object
              properties:
                resource_type:
                  type: string
                  enum:
                    - Practitioner
            - $ref: '#/components/schemas/Practitioner'
          required:
            - resource_type
        - type: object
          allOf:
            - type: object
              properties:
                resource_type:
                  type: string
                  enum:
                    - Script
            - $ref: '#/components/schemas/Script'
          required:
            - resource_type
    AccountResourceType:
      title: AccountResourceType
      type: string
      enum:
        - Account
    Account:
      title: Account
      type: object
      properties:
        resource_type:
          $ref: '#/components/schemas/AccountResourceType'
        name:
          type: string
          example: name
        patient:
          $ref: '#/components/schemas/Patient'
          nullable: true
        practitioner:
          $ref: '#/components/schemas/Practitioner'
          nullable: true
      required:
        - resource_type
        - name
      allOf:
        - $ref: '#/components/schemas/BaseResource'
    PatientResourceType:
      title: PatientResourceType
      type: string
      enum:
        - Patient
    Patient:
      title: Patient
      type: object
      properties:
        resource_type:
          $ref: '#/components/schemas/PatientResourceType'
        name:
          type: string
        scripts:
          type: array
          items:
            $ref: '#/components/schemas/Script'
      required:
        - resource_type
        - name
        - scripts
      allOf:
        - $ref: '#/components/schemas/BaseResource'
    PractitionerResourceType:
      title: PractitionerResourceType
      type: string
      enum:
        - Practitioner
    Practitioner:
      title: Practitioner
      type: object
      properties:
        resource_type:
          $ref: '#/components/schemas/PractitionerResourceType'
        name:
          type: string
      required:
        - resource_type
        - name
      allOf:
        - $ref: '#/components/schemas/BaseResource'
    ScriptResourceType:
      title: ScriptResourceType
      type: string
      enum:
        - Script
    Script:
      title: Script
      type: object
      properties:
        resource_type:
          $ref: '#/components/schemas/ScriptResourceType'
        name:
          type: string
      required:
        - resource_type
        - name
      allOf:
        - $ref: '#/components/schemas/BaseResource'
  securitySchemes: {}
