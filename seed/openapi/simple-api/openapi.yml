openapi: 3.1.0
info:
  title: simple-api
  version: 0.0.0
paths:
  /users/{id}:
    get:
      operationId: user_get
      tags:
        - User
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: id
          examples:
            Example1:
              value: id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                Example1:
                  value:
                    id: id
                    name: name
                    email: email
      security:
        - BearerAuth: []
components:
  schemas:
    User:
      title: User
      type: object
      properties:
        id:
          type: string
          example: id
        name:
          type: string
          example: name
        email:
          type: string
          example: email
      required:
        - id
        - name
        - email
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
servers:
  - url: https://api.example.com
    description: Production
