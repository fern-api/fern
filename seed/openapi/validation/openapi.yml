openapi: 3.0.1
info:
  title: validation
  version: ''
paths:
  /create:
    post:
      operationId: _create
      tags:
        - ''
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Type'
              examples:
                Example1:
                  value:
                    decimal: 1.1
                    even: 1
                    name: name
                    shape: SQUARE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decimal:
                  type: number
                  format: double
                  example: 1.1
                even:
                  type: integer
                  example: 1
                name:
                  type: string
                  pattern: ^[a-z]+$
                  example: name
                shape:
                  $ref: '#/components/schemas/Shape'
              required:
                - decimal
                - even
                - name
                - shape
            examples:
              Example1:
                value:
                  decimal: 1.1
                  even: 1
                  name: name
                  shape: SQUARE
  /:
    get:
      operationId: _get
      tags:
        - ''
      parameters:
        - name: decimal
          in: query
          required: true
          schema:
            type: number
            format: double
          example: 1.1
          examples:
            Example1:
              value: 1.1
        - name: even
          in: query
          required: true
          schema:
            type: integer
          example: 1
          examples:
            Example1:
              value: 1
        - name: name
          in: query
          required: true
          schema:
            type: string
            pattern: ^[a-z]+$
          example: name
          examples:
            Example1:
              value: name
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Type'
              examples:
                Example1:
                  value:
                    decimal: 1.1
                    even: 1
                    name: name
                    shape: SQUARE
components:
  schemas:
    SmallInteger:
      title: SmallInteger
      type: integer
    LargeInteger:
      title: LargeInteger
      type: integer
    Double:
      title: Double
      type: number
      format: double
    Word:
      title: Word
      type: string
    Sentence:
      title: Sentence
      type: string
    Shape:
      title: Shape
      type: string
      enum:
        - SQUARE
        - CIRCLE
        - TRIANGLE
    Type:
      title: Type
      type: object
      description: Defines properties with default values and validation rules.
      properties:
        decimal:
          type: number
          format: double
          example: 1.1
        even:
          type: integer
          example: 1
        name:
          type: string
          pattern: ^[a-z]+$
          example: name
        shape:
          $ref: '#/components/schemas/Shape'
      required:
        - decimal
        - even
        - name
        - shape
  securitySchemes: {}
