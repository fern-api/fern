openapi: 3.0.1
info:
  title: oauth-client-credentials-nested-root
  version: ''
paths:
  /token:
    post:
      operationId: auth_gettoken
      tags:
        - Auth
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              examples:
                Example1:
                  value:
                    access_token: access_token
                    expires_in: 1
                    refresh_token: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  example: client_id
                client_secret:
                  type: string
                  example: client_secret
                audience:
                  $ref: '#/components/schemas/AuthGetTokenRequestAudience'
                grant_type:
                  $ref: '#/components/schemas/AuthGetTokenRequestGrantType'
                scope:
                  type: string
                  nullable: true
              required:
                - client_id
                - client_secret
                - audience
                - grant_type
            examples:
              Example1:
                value:
                  client_id: client_id
                  client_secret: client_secret
                  audience: https://api.example.com
                  grant_type: client_credentials
  /nested-no-auth/get-something:
    get:
      operationId: nestedNoAuthAPI_nestedNoAuth_api_getSomething
      tags:
        - NestedNoAuthAPI
      parameters: []
      responses:
        '204':
          description: ''
  /nested/get-something:
    get:
      operationId: nestedAPI_nested_api_getSomething
      tags:
        - NestedAPI
      parameters: []
      responses:
        '204':
          description: ''
      security:
        - BearerAuth: []
  /get-something:
    get:
      operationId: simple_getsomething
      tags:
        - Simple
      parameters: []
      responses:
        '204':
          description: ''
      security:
        - BearerAuth: []
components:
  schemas:
    AuthGetTokenRequestAudience:
      title: AuthGetTokenRequestAudience
      type: string
      enum:
        - https://api.example.com
    AuthGetTokenRequestGrantType:
      title: AuthGetTokenRequestGrantType
      type: string
      enum:
        - client_credentials
    AuthTokenResponse:
      title: AuthTokenResponse
      type: object
      description: An OAuth token response.
      properties:
        access_token:
          type: string
          example: access_token
        expires_in:
          type: integer
          example: 1
        refresh_token:
          type: string
          nullable: true
      required:
        - access_token
        - expires_in
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
