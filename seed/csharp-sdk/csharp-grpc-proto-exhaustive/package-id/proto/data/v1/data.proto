syntax = "proto3";

package data.v1;

import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/rpc/status.proto";

option csharp_namespace = "Data.V1.Grpc";
option go_package = "github.com/acme.co/data-go-grpc";

enum IndexType {
  INDEX_TYPE_INVALID = 0;
  INDEX_TYPE_DEFAULT = 1;
  INDEX_TYPE_STRICT = 2;
}

enum AspectRatio {
  ASPECT_RATIO_UNSPECIFIED = 0;
  ASPECT_RATIO_1_1 = 1;
  ASPECT_RATIO_16_9 = 2;
  ASPECT_RATIO_9_16 = 3;
  ASPECT_RATIO_4_3 = 4;
}

message IndexedData {
  repeated uint32 indices = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  repeated float values = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message Column {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  repeated float values = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
  google.protobuf.Struct metadata = 3;
  IndexedData indexed_data = 4;
}

message ScoredColumn {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  float score = 2;
  repeated float values = 3;
  google.protobuf.Struct metadata = 4;
  IndexedData indexed_data = 5;
}

message UploadRequest {
  repeated Column columns = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  string namespace = 2;
}

message UploadResponse {
  uint32 count = 1;
}

message DeleteRequest {
  repeated string ids = 1;
  bool delete_all = 2;
  string namespace  = 3;
  google.protobuf.Struct filter = 4;
}

message DeleteResponse {}

message FetchRequest {
  repeated string ids = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  string namespace = 2;
}

message FetchResponse {
  map<string, Column> columns = 1;
  string namespace = 2;
  optional Usage usage = 3;
}

message ListRequest {
  optional string prefix = 1;
  optional uint32 limit = 2;
  optional string pagination_token = 3;
  string namespace = 4;
}

message Pagination {
  string next = 1;
}

message ListElement {
  string id = 1;
}

message ListResponse {
  repeated ListElement columns = 1;
  optional Pagination pagination = 2;
  string namespace = 3;
  optional Usage usage = 4;
}

message QueryColumn {
  repeated float values = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  uint32 top_k = 2;
  string namespace = 3;
  google.protobuf.Struct filter = 4;
  IndexedData indexed_data = 5;
}

message QueryRequest {
  string namespace = 1;
  uint32 top_k = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
  google.protobuf.Struct filter = 3;
  bool include_values = 4;
  bool include_metadata = 5;
  repeated QueryColumn queries = 6 [
    deprecated = true
  ];
  repeated float column = 7;
  string id = 8;
  IndexedData indexed_data = 9;
}

message QueryResult {
  repeated ScoredColumn matches = 1;
  string namespace = 2;
}

message QueryResponse {
  repeated QueryResult results = 1 [deprecated=true];
  repeated ScoredColumn matches = 2;
  string namespace = 3;
  optional Usage usage = 4;
}

message Usage {
  optional uint32 units = 1;
}

message UpdateRequest {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  repeated float values = 2;
  google.protobuf.Struct set_metadata = 3;
  string namespace = 4;
  IndexedData indexed_data = 5;
  IndexType index_type = 6;
  google.protobuf.Any details = 7;
  repeated IndexType index_types = 8;
  optional AspectRatio aspect_ratio = 9;
  optional google.rpc.Status status = 10;
  // Tests bytes field mapping (string <-> ByteString conversion).
  bytes content = 11;
}

message UpdateResponse {
  // Nested enum to test dot-separated naming for nested proto types.
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_PENDING = 1;
    STATUS_ACTIVE = 2;
    STATUS_FAILED = 3;
  }
  google.protobuf.Timestamp updated_at = 1;
  IndexType index_type = 2;
  google.protobuf.Any details = 3;
  repeated IndexType index_types = 4;
  Status status = 5;
}

enum ToolMode {
  // Invalid tool mode.
  TOOL_MODE_INVALID = 0;

  // Let the model decide if a tool shall be used.
  TOOL_MODE_AUTO = 1;

  // Force the model to not use tools.
  TOOL_MODE_NONE = 2;

  // Force the model to use tools.
  TOOL_MODE_REQUIRED = 3;
}

message ToolChoice {
  oneof tool_choice {
    // Force the model to perform in a given mode.
    ToolMode mode = 1;

    // Force the model to call a particular function.
    string function_name = 2;
  }
}

message CreateRequest {
  // The name of the resource to create.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED
  ];

  // A description of the resource.
  string description = 2;

  // The tool choice configuration.
  ToolChoice tool_choice = 3;

  oneof source {
    // A URL to fetch the resource from.
    string url = 4;

    // Inline content for the resource.
    string content = 5;
  }

  // Optional metadata for the resource.
  google.protobuf.Struct metadata = 6;
}

message CreateResponse {
  // The created resource.
  Column resource = 1;

  oneof status {
    // Indicates successful creation.
    bool success = 2;

    // Error message if creation failed.
    string error_message = 3;
  }
}

message DescribeRequest {
  google.protobuf.Struct filter = 1;
  google.protobuf.Timestamp after = 2;
}

message NamespaceSummary {
  uint32 count = 1;
}

message DescribeResponse {
  map<string, NamespaceSummary> namespaces = 1;
  uint32 dimension  = 2;
  float fullness = 3;
  uint32 total_count = 4;
}

message CheckResponse {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp updated_at = 2;
}

service DataService {
  rpc Check(google.protobuf.Empty) returns (CheckResponse);
  rpc Upload(UploadRequest) returns (UploadResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc Describe(DescribeRequest) returns (DescribeResponse);
  rpc Create(CreateRequest) returns (CreateResponse);

  rpc Fetch(FetchRequest) returns (FetchResponse) {
    option (google.api.http) = {
      get: "/data/fetch"
    };
  }

  rpc List(ListRequest) returns (ListResponse) {
    option (google.api.http) = {
      get: "/data/list"
    };
  }

  rpc Update(UpdateRequest) returns (UpdateResponse) {
    option (google.api.http) = {
      post: "/data/update"
      body: "*"
    };
  }
}
