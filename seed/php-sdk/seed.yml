irVersion: v66
displayName: PHP SDK
image: fernapi/fern-php-sdk
changelogLocation: ../../generators/php/sdk/versions.yml
publish:
  preBuildCommands:
    - pnpm turbo run dist:cli --filter @fern-api/php-sdk
  docker:
    file: ./generators/php/sdk/Dockerfile
    image: fernapi/fern-php-sdk
    context: .
  sentry:
    name: fern-php-sdk
    project: php-sdk
    sourceMaps:
      - dir: generators/php/sdk/dist
test:
  docker:
    image: fernapi/fern-php-sdk:latest
    command: pnpm turbo run dockerTagLatest --filter @fern-api/php-sdk
  podman:
    image: fernapi/fern-php-sdk:latest
    command: pnpm turbo run podmanTagLatest --filter @fern-api/php-sdk
  local:
    workingDirectory: generators/php
    buildCommand:
      - pnpm turbo run dist:cli --filter @fern-api/php-sdk
    runCommand: node --enable-source-maps sdk/dist/cli.cjs {CONFIG_PATH}
language: php
generatorType: SDK
defaultOutputMode: github
fixtures:
  basic-auth:
    - outputFolder: wire-tests
      customConfig:
        enable-wire-tests: true
  basic-auth-pw-omitted:
    - outputFolder: wire-tests
      customConfig:
        enable-wire-tests: true
  exhaustive:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: wire-tests
      customConfig:
        enable-wire-tests: true
  examples:
    - customConfig: null
      outputFolder: no-custom-config
    - customConfig:
        customReadmeSections:
          - title: "Override Section"
            content: "Override Content"
          - title: "Generator Invocation Custom Section"
            content: "Generator Invocation Custom Content for {{ packageName }}"
      readmeConfig:
        apiName: "CustomName"
        disabledSections:
          - "contributing"
        bannerLink: https://www.fernapi.com
        apiReferenceLink: https://www.docs.fernapi.com
        defaultEndpoint: POST /movie
        customSections:
          - title: "Base Readme Custom Section"
            language: php
            content: "Base Readme Custom Content for {{ packageName }}"
          - title: "Override Section"
            language: php
            content: "Base Content"
        features:
          timeouts:
            - GET /movie/{movieId}
            - method: POST
              path: /movie
      outputFolder: readme-config
  extends:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: private
      customConfig:
        propertyAccess: private
  imdb:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: clientName
      customConfig:
        clientName: FernClient
        maxRetries: 5
    - outputFolder: packageName
      customConfig:
        packageName: fern-api/imdb-php
    - outputFolder: namespace
      customConfig:
        namespace: Fern
    - outputFolder: private
      customConfig:
        propertyAccess: private
    - outputFolder: package-path
      customConfig:
        packagePath: Custom/Package/Path
        namespace: Custom\Package\Path
    - outputFolder: omit-fern-headers
      customConfig:
        omitFernHeaders: true
  package-yml:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: private
      customConfig:
        propertyAccess: private
  folders:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: with-interfaces
      customConfig:
        generateClientInterfaces: true
  path-parameters:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: inline-path-parameters
      customConfig:
        inlinePathParameters: true
    - outputFolder: inline-path-parameters-private
      customConfig:
        inlinePathParameters: true
        propertyAccess: private
  request-parameters:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: with-defaults
      customConfig:
        useDefaultRequestParameterValues: true
  query-parameters:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: private
      customConfig:
        propertyAccess: private
  pagination:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: property-accessors
      customConfig:
        propertyAccess: private
    - outputFolder: page-index-semantics
      customConfig:
        offsetSemantics: "page-index"
  unions:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: property-accessors
      customConfig:
        propertyAccess: private
  alias:
    - outputFolder: no-custom-config
      customConfig: null
    - outputFolder: composer-json
      customConfig:
        composerJson:
          name: fern/empty
          version: 1.0.0
          description: My Empty PHP Library
          keywords:
          - empty
          license:
          - "LGPL-2.1-only"
          - "GPL-3.0-or-later"
          scripts:
            build:
            - "@php -l src"
            - "@php -l tests"
            analyze: echo skip
            hello: echo hello
scripts:
  - image: fernapi/php-seed
    commands:
      build:
        # Retry composer install up to 3 times to handle intermittent network failures
        - for i in 1 2 3; do composer install --no-interaction && break || { echo "Attempt $i failed, retrying..."; sleep 5; }; done
        - composer build
        - composer analyze
      test:
        - composer test
allowedFailures:
  # Dynamic snippet: default-valued base-path param ordered before request body.
  - api-wide-base-path-with-default
  # Wire test: path param request failures unrelated to dynamic snippets.
  - exhaustive:wire-tests
  # Dynamic snippet: variable-typed path params not provided in snippet request.
  - variables
  - oauth-client-credentials-with-variables

  # PHPDoc unresolvable enum-as-map-key type + dynamic snippet errors (unrelated to union serialization).
  - trace
  # OAuth custom properties need non-literal property passthrough to the token request.
  - oauth-client-credentials-custom


