irVersion: v66
displayName: C# Model
image: fernapi/fern-csharp-model
changelogLocation: ../../generators/csharp/model/versions.yml

buildScripts:
  compileScript:
    commands:
      - |
        solution_file="$(find . -maxdepth 4 -name '*.slnx' | head -n 1)"
        if [ -z "$solution_file" ]; then
          echo "ERROR: No .slnx file found"
          exit 1
        fi
        dotnet build "$solution_file" -c Release

publish:
  preBuildCommands:
    - ./.github/actions/install
    - pnpm turbo run dist:cli --filter @fern-api/fern-csharp-model
  docker:
    file: ./generators/csharp/model/Dockerfile
    image: fernapi/fern-csharp-model
    context: .
test:
  docker:
    image: fernapi/fern-csharp-model:latest
    command: pnpm turbo run dockerTagLatest --filter @fern-api/fern-csharp-model
  podman:
    image: fernapi/fern-csharp-model:latest
    command: pnpm turbo run podmanTagLatest --filter @fern-api/fern-csharp-model
  local:
    workingDirectory: generators/csharp
    buildCommand:
      - pnpm turbo run dist:cli --filter @fern-api/fern-csharp-model
    runCommand: node --enable-source-maps model/dist/cli.cjs {CONFIG_PATH}

language: csharp
generatorType: Model
defaultOutputMode: github
fixtures:
  grpc-proto-exhaustive:
    - customConfig: null
      outputFolder: no-custom-config
    - customConfig:
        read-only-memory-types:
          - float
      outputFolder: read-only-memory
  enum:
    - customConfig:
        experimental-enable-forward-compatible-enums: true
      outputFolder: forward-compatible-enums
    - customConfig:
        experimental-enable-forward-compatible-enums: false
      outputFolder: plain-enums
  csharp-inline-types:
    - customConfig:
        enable-inline-types: true
      outputFolder: inline-types
scripts:
  - image: fernapi/csharp-seed
    commands:
      build:
        - |
          # Enforce global:: prefix for System namespace references in generated .cs files.
          # This prevents compile breaks when customers have namespace conflicts (e.g., a class named "System").
          #
          # Fixtures to skip (add fixture directory names here if they are fundamentally
          # incompatible with global:: enforcement, e.g. dotnet-format post-processing):
          SKIP_GLOBAL_VALIDATION="fully-qualified-namespaces"

          skip=false
          for pattern in $SKIP_GLOBAL_VALIDATION; do
            if echo "$(pwd)" | grep -q "$pattern"; then
              echo "Skipping global:: validation (matched skip-list entry: $pattern)"
              skip=true
              break
            fi
          done

          if [ "$skip" = false ]; then
            # Check 1: using directives — e.g. "using System.Linq;"
            using_violations=$(grep -rn --include='*.cs' -P '^\s*using\s+System[.;]' . | grep -v 'global::System' | grep -v -P ':\s*//' | grep -v 'DynamicSnippets' || true)
            # Check 2: inline references — e.g. "new System.Exception()", "System.Threading.Tasks.Task"
            # Excludes using directives (already caught above), comments (// and ///), strings, and DynamicSnippets.
            inline_violations=$(grep -rn --include='*.cs' -P '(?<!using |global::|\.| )System\.(Collections|IO|Linq|Net|Text|Threading|Runtime|Globalization|Diagnostics|Reflection)' . | grep -v 'global::System' | grep -v -P ':\s*//' | grep -v 'DynamicSnippets' | grep -v -P ':\s*using ' | grep -v '".*System\.' || true)
            violations="${using_violations}${using_violations:+\n}${inline_violations}"
            # Trim whitespace
            violations=$(echo "$violations" | sed '/^$/d')
            if [ -n "$violations" ]; then
              echo "ERROR: Found unqualified System namespace references. Use 'global::System' instead:"
              echo "$violations"
              exit 1
            fi
          fi
        - |        
          # Check for .NET 10
          # if you are getting an error from this and using docker, run `docker pull fernapi/csharp-seed:latest`
          # otherwise install .NET 10 
          command -v dotnet >/dev/null 2>&1 && ver=$(dotnet --version) && major=$(echo "$ver" | cut -d. -f1) && [ "$major" -ge 10 ] || { echo "ERROR: .NET SDK 10+ required (found ${ver:-not found})"; false; }

          # Find the solution file
          solution_file="$(find . -maxdepth 4 -name '*.slnx' | head -n 1)"
          if [ -z "$solution_file" ]; then
            echo "ERROR: No .slnx file found"
            exit 1
          fi
          
          dotnet restore "$solution_file"
          dotnet build "$solution_file" -c Release --no-restore
      test:
        - |        
          # Find the solution file
          solution_file="$(find . -maxdepth 4 -name '*.slnx' | head -n 1)"
          if [ -z "$solution_file" ]; then
            echo "ERROR: No .slnx file found"
            exit 1
          fi
          
          dotnet test "$solution_file" --no-restore --no-build -c Release
allowedFailures:
  - mixed-case
  - property-access
  - unions
  - unions-with-local-date
  - server-sent-event-examples
  - server-sent-events-openapi