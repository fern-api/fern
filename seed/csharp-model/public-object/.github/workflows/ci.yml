name: ci

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Install tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore src/SeedPublicObject/SeedPublicObject.csproj

      - name: Build
        run: dotnet build src/SeedPublicObject/SeedPublicObject.csproj --no-restore -c Release

      - name: Restore test dependencies
        run: dotnet restore src/SeedPublicObject.Test/SeedPublicObject.Test.csproj

      - name: Build tests
        run: dotnet build src/SeedPublicObject.Test/SeedPublicObject.Test.csproj --no-restore -c Release

      - name: Test
        run: dotnet test src/SeedPublicObject.Test/SeedPublicObject.Test.csproj --no-restore --no-build -c Release

      - name: Pack
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        run: dotnet pack src/SeedPublicObject/SeedPublicObject.csproj --no-build --no-restore -c Release

      - name: Publish to NuGet.org
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_TOKEN }}
        run: dotnet nuget push src/SeedPublicObject/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source "nuget.org"

