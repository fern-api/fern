imports:
  service: service.yml
  types: types.yml
  examples: examples.yml
  commons: commons.yml

types:
  WebSocketChannelSchema:
    extends:
      - commons.DeclarationSchema
      - commons.WithDisplayName
    properties:
      auth: boolean
      url: nullable<string>
      path: string
      connect-method-name: nullable<string>
      headers: nullable<map<string, service.HttpHeaderSchema>>
      path-parameters: nullable<map<string, service.HttpPathParameterSchema>>
      query-parameters: nullable<map<string, service.HttpQueryParameterSchema>>
      messages: nullable<map<string, WebSocketChannelMessageSchema>>
      examples: nullable<list<examples.ExampleWebSocketSession>>

  WebSocketChannelMessageSchema:
    extends:
      - commons.DeclarationSchema
      - commons.WithDisplayName
      - commons.WithMethodName
    properties:
      origin: WebSocketOrigin
      body: WebSocketChannelMessageBodySchema

  WebSocketOrigin:
    enum:
      - client
      - server

  WebSocketChannelMessageBodySchema:
    discriminated: false
    union:
      - string
      - WebSocketChannelReferencedMessageSchema
      - WebSocketChannelInlinedMessageSchema

  WebSocketChannelReferencedMessageSchema:
    extends:
      - commons.WithDocsSchema
    properties:
      type: string

  WebSocketChannelInlinedMessageSchema:
    properties:
      name: string
      extends: nullable<types.ObjectExtendsSchema>
      properties: nullable<map<string, types.ObjectPropertySchema>>
