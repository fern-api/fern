types:
  ValidationSchema:
    discriminated: false
    union:
      - StringValidationSchema
      - NumberValidationSchema
      - ListValidationSchema
      - MapValidationSchema

  StringValidationSchema:
    properties:
      minLength: nullable<integer>
      maxLength: nullable<integer>
      pattern: nullable<string>
      format: nullable<string>

  NumberValidationSchema:
    properties:
      min: nullable<double>
      max: nullable<double>
      exclusiveMin: nullable<boolean>
      exclusiveMax: nullable<boolean>
      multipleOf: nullable<double>

  ListValidationSchema:
    properties:
      minItems: nullable<integer>
      maxItems: nullable<integer>

  MapValidationSchema:
    properties:
      minProperties: nullable<integer>
      maxProperties: nullable<integer>
