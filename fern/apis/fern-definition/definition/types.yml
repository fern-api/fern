imports:
  commons: commons.yml
  encoding: encoding.yml
  validation: validation.yml
  examples: examples.yml
  source: source.yml

types:
  TypeDeclarationSchema:
    discriminated: false
    union:
      - string
      - ObjectSchema
      - EnumSchema
      - DiscriminatedUnionSchema
      - UndiscriminatedUnionSchema
      - AliasSchema

  # InlinedTypeDeclaration:
  #   discriminated: false
  #   union:
  #     - InlinedObjectSchema
  #     - InlinedEnumSchema
  #     - InlinedDiscriminatedUnionSchema
  #     - InlinedUndiscriminatedUnionSchema

  # InlinedObjectSchema:
  #   extends: ObjectSchema
  #   properties:
  #     name: string

  # InlinedEnumSchema:
  #   extends: EnumSchema
  #   properties:
  #     name: string

  # InlinedDiscriminatedUnionSchema:
  #   extends: DiscriminatedUnionSchema
  #   properties:
  #     name: string

  # InlinedUndiscriminatedUnionSchema:
  #   extends: UndiscriminatedUnionSchema
  #   properties:
  #     name: string

  TypeReferenceSchema:
    discriminated: false
    union:
      - string
      - TypeReferenceDetailedSchema

  BaseTypeReferenceSchema:
    extends:
      - commons.WithDocsSchema
      - commons.WithAvailability
    properties:
      default: nullable<unknown>
      encoding: nullable<encoding.EncodingSchema>
      validation: nullable<validation.ValidationSchema>

  TypeReferenceDetailedSchema:
    extends:
      - BaseTypeReferenceSchema
      - commons.WithName
      - commons.WithAudiences
    properties:
      type: string

  TypeReferenceDeclarationWithNameSchema:
    discriminated: false
    union:
      - string
      - TypeReferenceDeclarationWithName

  TypeReferenceDeclarationWithName:
    extends:
      - BaseTypeReferenceSchema
      - commons.WithName
      - commons.WithAudiences
    properties:
      type: string

  BaseTypeDeclarationSchema:
    extends:
      - commons.WithDocsSchema
      - commons.WithAvailability
      - commons.WithAudiences
    properties:
      examples: nullable<list<examples.ExampleTypeSchema>>
      encoding: nullable<encoding.EncodingSchema>
      source: nullable<source.SourceSchema>
      inline: nullable<boolean>

  ### Aliases ####

  AliasSchema:
    extends: BaseTypeDeclarationSchema
    properties:
      type: string
      validation: nullable<validation.ValidationSchema>

  #### Objects ####

  ObjectSchema:
    extends: BaseTypeDeclarationSchema
    properties:
      extends: nullable<ObjectExtendsSchema>
      properties: nullable<map<string, ObjectPropertySchema>>
      extra-properties: nullable<boolean>

  ObjectPropertySchema:
    discriminated: false
    union:
      - string
      - ObjectPropertyWithAccessSchema

  ObjectPropertyWithAccessSchema:
    extends:
      - TypeReferenceDeclarationWithName
    properties:
      access: nullable<ObjectPropertyAccess>

  ObjectPropertyAccess:
    enum:
      - value: read-only
        name: ReadOnly
      - value: write-only
        name: WriteOnly

  ObjectExtendsSchema:
    discriminated: false
    union:
      - string
      - list<string>

  # ObjectPropertyDeclaration:
  #   discriminated: false
  #   union:
  #     - TypeReference
  #     - InlinedTypeDeclaration

  #### Enums ####

  EnumSchema:
    extends: BaseTypeDeclarationSchema
    properties:
      default: nullable<string>
      enum: list<EnumValue>
      forward-compatible: nullable<boolean>

  EnumValue:
    discriminated: false
    union:
      - string
      - EnumValueSchema

  EnumValueSchema:
    extends:
      - commons.WithDocsSchema
      - commons.WithName
    properties:
      value: string
      casing: nullable<CasingOverridesSchema>

  CasingOverridesSchema:
    properties:
      camel: nullable<string>
      snake: nullable<string>
      pascal: nullable<string>
      screaming-snake: nullable<string>

  #### Discriminated Union ####

  SingleUnionTypeSchema:
    discriminated: false
    union:
      - string
      - SingleUnionTypeDetailedSchema

  SingleUnionTypeDetailedSchema:
    extends:
      - commons.WithDocsSchema
      - commons.WithName
      - commons.WithAvailability
      - commons.WithDisplayName
      - commons.WithValidation
    properties:
      type: nullable<string>
      key: nullable<SingleUnionTypeKey>

  SingleUnionTypeKey:
    discriminated: false
    union:
      - string
      - SingleUnionTypeKeySchema

  SingleUnionTypeKeySchema:
    extends:
      - commons.WithName
    properties:
      value: string

  DiscriminatedUnionSchema:
    extends: BaseTypeDeclarationSchema
    properties:
      discriminant: nullable<UnionDiscriminant>
      extends: nullable<ObjectExtendsSchema>
      base-properties: nullable<map<string, TypeReferenceSchema>>
      union: map<string, SingleUnionTypeSchema>

  UnionDiscriminant:
    discriminated: false
    union:
      - string
      - UnionDiscriminantSchema

  UnionDiscriminantSchema:
    extends:
      - commons.WithName
    properties:
      value: string
      context:
        type: nullable<UnionDiscriminatorContext>
        docs: |
          Context for where the discriminator exists. Defaults to "data" for backward compatibility.
          "data" means the discriminator is within the union data itself.
          "protocol" means the discriminator is at the SSE protocol level.

  UnionDiscriminatorContext:
    enum:
      - data
      - protocol

  #### Undiscriminated Union ####

  UndiscriminatedUnionSchema:
    extends: BaseTypeDeclarationSchema
    properties:
      discriminated: literal<false>
      union: list<SingleUndiscriminatedUnionTypeSchema>

  SingleUndiscriminatedUnionTypeSchema:
    discriminated: false
    union:
      - string
      - SingleUndiscriminatedUnionTypeDetailedSchema

  SingleUndiscriminatedUnionTypeDetailedSchema:
    extends:
      - commons.WithDocsSchema
      - commons.WithDisplayName
      - commons.WithValidation

    properties:
      type: string
