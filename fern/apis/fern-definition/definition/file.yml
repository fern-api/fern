imports:
  commons: commons.yml
  types: types.yml
  errors: errors.yml
  service: service.yml
  pagination: pagination.yml
  versioning: versioning.yml
  products: products.yml
  environments: environments.yml
  auth: auth.yml
  variables: variables.yml
  webhooks: webhooks.yml
  websocket: websocket.yml

types:
  ## Fern definition file ##
  DefinitionFileSchema:
    extends:
      - commons.WithDocsSchema
    properties:
      imports: nullable<map<string, string>>
      types: nullable<map<string, types.TypeDeclarationSchema>>
      service: nullable<service.HttpServiceSchema>
      errors: nullable<map<string, errors.ErrorDeclarationSchema>>
      webhooks: nullable<map<string, webhooks.WebhookSchema>>
      webhook-signature:
        type: nullable<webhooks.WebhookSignatureSchema>
        docs: |
          Default webhook signature verification configuration.
          Applied to all webhooks in this file that do not declare their own signature.
      channel: nullable<websocket.WebSocketChannelSchema>

  ## Package marker file ##
  PackageMarkerFileSchema:
    extends: DefinitionFileSchema
    properties:
      navigation:
        availability: deprecated
        type: nullable<Navigation>
      export: nullable<Export>

  Navigation:
    discriminated: false
    union:
      - string
      - list<string>

  Export:
    discriminated: false
    union:
      - string
      - ExportDetailed

  ExportDetailed:
    properties:
      dependency: string
      url: nullable<string>

  ## Root api.yml file ##
  WithHeadersSchema:
    properties:
      headers:
        type: nullable<map<string, service.HttpHeaderSchema>>
        docs: Global Headers for the entire API

  RootApiFileSchema:
    extends:
      - commons.WithDocsSchema
      - commons.WithDisplayName
      - environments.WithEnvironmentsSchema
      - auth.WithAuthSchema
      - WithHeadersSchema
    properties:
      name: string
      imports: nullable<map<string, string>>
      error-discrimination: nullable<ErrorDiscriminationSchema>
      audiences: nullable<list<string>>
      errors: nullable<list<string>>
      base-path: nullable<string>
      path-parameters: nullable<map<string, service.HttpPathParameterSchema>>
      idempotency-headers: nullable<map<string, service.HttpHeaderSchema>>
      variables: nullable<map<string, variables.VariableDeclarationSchema>>
      pagination: nullable<pagination.PaginationSchema>
      product: nullable<products.ProductDeclarationSchema>
      version: nullable<versioning.VersionDeclarationSchema>

  ErrorDiscriminationSchema:
    discriminated: false
    union:
      - PropertyBasedErrorDiscrimination
      - StatusCodeBasedErrorDiscrimination

  PropertyBasedErrorDiscrimination:
    properties:
      strategy: literal<"property">
      property-name: string

  StatusCodeBasedErrorDiscrimination:
    properties:
      strategy: literal<"status-code">
