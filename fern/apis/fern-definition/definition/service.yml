imports:
  commons: commons.yml
  types: types.yml
  examples: examples.yml
  pagination: pagination.yml
  source: source.yml
  variables: variables.yml
  auth: auth.yml

types:
  HttpServiceSchema:
    extends:
      - commons.DeclarationWithoutDocsSchema
      - commons.WithDisplayName
    properties:
      auth: boolean
      url: nullable<string>
      base-path: string
      path-parameters: nullable<map<string, types.TypeReferenceSchema>>
      idempotent: nullable<boolean>
      headers: nullable<map<string, types.TypeReferenceSchema>>
      transport: nullable<ServiceTransport>
      source: nullable<source.SourceSchema>
      endpoints: map<string, HttpEndpointSchema>

  ServiceTransport:
    properties:
      grpc: nullable<GrpcTransport>

  GrpcTransport:
    properties:
      service-name:
        type: string
        docs: "The name of the gRPC service."

  HttpEndpointSchema:
    extends:
      - commons.WithDisplayName
      - commons.DeclarationSchema
    properties:
      method: nullable<HttpMethodSchema>
      base-path: nullable<string>
      path: string
      url: nullable<string>
      path-parameters: nullable<map<string, HttpPathParameterSchema>>
      auth: nullable<HttpEndpointAuth>
      idempotent: nullable<boolean>
      stream-condition: nullable<string>
      request: nullable<HttpRequest>
      response: nullable<HttpResponseSchema>
      response-stream: nullable<HttpResponseStreamSchema>
      errors: nullable<ResponseErrorsSchema>
      examples: nullable<list<examples.ExampleEndpointCallSchema>>
      pagination: nullable<Pagination>
      transport: nullable<ServiceTransport>
      source: nullable<source.SourceSchema>
      retries: nullable<RetriesConfiguration>

  HttpEndpointAuth:
    discriminated: false
    union:
      - boolean
      - HttpEndpointSecurity

  HttpEndpointSecurity:
    type: list<HttpEndpointSecurityItem>
    docs: |
      A list of auth scheme collections. 
      To satisfy the security requirements, the caller must satisfy at least one collection of schemes.

  HttpEndpointSecurityItem:
    type: map<auth.AuthSchemeKey, list<auth.AuthScope>>
    docs: A collection of auth schemes that all need to be satisfied for the endpoint.

  RetriesConfiguration:
    discriminated: false
    union:
      - RetriesDisabledSchema

  RetriesDisabledSchema:
    properties:
      disabled: nullable<boolean>

  HttpMethodSchema:
    enum:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - HEAD

  HttpRequest:
    discriminated: false
    union:
      - string
      - HttpRequestSchema

  HttpRequestSchema:
    extends:
      - commons.WithName
      - commons.WithDocsSchema
    properties:
      content-type: nullable<string>
      path-parameters: nullable<map<string, HttpPathParameterSchema>>
      query-parameters: nullable<map<string, HttpQueryParameterSchema>>
      headers: nullable<map<string, HttpHeaderSchema>>
      body: nullable<HttpRequestBodySchema>

  TypeReferenceDeclarationWithEnvOverride:
    discriminated: false
    union:
      - string
      - TypeReferenceDeclarationWithEnvOverrideSchema

  TypeReferenceDeclarationWithEnvOverrideSchema:
    extends: types.TypeReferenceDeclarationWithName
    properties:
      env: nullable<string>

  HttpHeaderSchema: TypeReferenceDeclarationWithEnvOverride

  HttpRequestBodySchema:
    discriminated: false
    union:
      - string
      - HttpReferencedRequestBodySchema
      - HttpInlineRequestBodySchema

  HttpReferencedRequestBodySchema:
    extends:
      - commons.WithDocsSchema
    properties:
      type: string

  HttpInlineRequestBodySchema:
    properties:
      extends: nullable<types.ObjectExtendsSchema>
      extra-properties: nullable<boolean>
      properties: nullable<map<string, HttpInlineRequestBodyPropertySchema>>

  HttpInlineRequestBodyPropertySchema:
    discriminated: false
    union:
      - string
      - HttpInlineFileRequestBodyPropertySchema

  HttpInlineFileRequestBodyPropertySchema:
    extends: types.TypeReferenceDeclarationWithName
    properties:
      style:
        type: nullable<FormDataBodyEncodingStyle>
        docs: Defaults to json encoding
      content-type: nullable<string>

  FormDataBodyEncodingStyle:
    enum:
      - json
      - exploded
      - form

  HttpQueryParameterSchema:
    discriminated: false
    union:
      - string
      - QueryParameterTypeReferenceDetailed

  QueryParameterTypeReferenceDetailed:
    extends:
      - types.TypeReferenceDeclarationWithName
    properties:
      allow-multiple: nullable<boolean>

  HttpResponseSchema:
    discriminated: false
    union:
      - string
      - HttpResponseSchemaDetailed

  HttpResponseSchemaDetailed:
    extends:
      - commons.WithDocsSchema
    properties:
      type: nullable<string>
      property: nullable<string>
      status-code: nullable<integer>

  HttpResponseStreamSchema:
    discriminated: false
    union:
      - string
      - HttpResponseStreamSchemaDetailed

  HttpResponseStreamSchemaDetailed:
    extends:
      - commons.WithDocsSchema
    properties:
      type: string
      format: nullable<StreamFormat>
      terminator: nullable<string>

  StreamFormat:
    enum:
      - sse
      - json

  HttpPathParameterSchema:
    discriminated: false
    union:
      - types.TypeReferenceSchema
      - variables.VariableReferenceSchema

  Pagination:
    discriminated: false
    union:
      - pagination.PaginationSchema
      - boolean

  ResponseErrorsSchema:
    type: list<ResponseError>

  ResponseError:
    discriminated: false
    union:
      - string
      - ResponseErrorWithDocsSchema

  ResponseErrorWithDocsSchema:
    extends:
      - commons.WithDocsSchema
    properties:
      error: string
