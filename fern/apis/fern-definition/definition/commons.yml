imports:
  availability: availability.yml
  validation: validation.yml

types:
  WithDocsSchema:
    properties:
      docs: nullable<string>

  WithName:
    properties:
      name: nullable<string>

  WithAvailability:
    properties:
      availability: nullable<availability.AvailabilityUnionSchema>

  WithDisplayName:
    properties:
      display-name: nullable<string>

  WithMethodName:
    properties:
      method-name: nullable<string>

  WithValidation:
    properties:
      validation: nullable<validation.ValidationSchema>

  WithAudiences:
    properties:
      audiences: nullable<list<string>>

  DeclarationSchema:
    extends:
      - WithDocsSchema
      - WithAvailability
      - WithAudiences

  DeclarationWithoutDocsSchema:
    extends:
      - WithAvailability
      - WithAudiences

  DeclarationWithNameSchema:
    extends:
      - DeclarationSchema
      - WithName
