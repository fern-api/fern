types:
  AvailabilityUnionSchema:
    discriminated: false
    union:
      - AvailabilityStatusSchema
      - AvailabilitySchema

  AvailabilitySchema:
    properties:
      status: AvailabilityStatusSchema
      message: nullable<string>

  AvailabilityStatusSchema:
    enum:
      - value: in-development
        name: InDevelopment
      - value: pre-release
        name: PreRelease
      - deprecated
      - value: generally-available
        name: GenerallyAvailable
