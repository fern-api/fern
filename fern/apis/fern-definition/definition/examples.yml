imports:
  commons: commons.yml

types:
  ExampleTypeSchema:
    audiences:
      - docs-parsers
    extends:
      - commons.WithName
      - commons.WithDocsSchema
    properties:
      value: ExampleTypeValueSchema

  ExampleTypeValueSchema: unknown

  ExampleWebSocketSession:
    extends:
      - commons.WithName
      - commons.WithDocsSchema
    properties:
      path-parameters: nullable<map<string, ExampleTypeReferenceSchema>>
      query-parameters: nullable<map<string, ExampleTypeReferenceSchema>>
      headers: nullable<map<string, ExampleTypeReferenceSchema>>
      messages: list<ExampleWebSocketMessage>

  ExampleWebSocketMessage:
    properties:
      type: string
      body: unknown

  ExampleEndpointCallArraySchema: list<ExampleEndpointCallSchema>

  ExampleEndpointCallSchema:
    audiences:
      - docs-parsers
    extends:
      - commons.WithName
      - commons.WithDocsSchema
    properties:
      id: nullable<string>
      path-parameters: nullable<map<string, ExampleTypeReferenceSchema>>
      query-parameters: nullable<map<string, ExampleTypeReferenceSchema>>
      headers: nullable<map<string, ExampleTypeReferenceSchema>>
      request: nullable<ExampleTypeReferenceSchema>
      response: nullable<ExampleResponseSchema>
      code-samples: nullable<list<ExampleCodeSampleSchema>>

  ExampleWebhookCallSchema:
    audiences:
      - docs-parsers
    extends:
      - commons.WithName
      - commons.WithDocsSchema
    properties:
      id: nullable<string>
      payload: ExampleTypeReferenceSchema

  ExampleResponseSchema:
    discriminated: false
    union:
      - ExampleBodyResponseSchema
      - type: ExampleStreamResponseSchema
        docs: JSON Streams
      - type: ExampleSseResponseSchema
        docs: Server-Sent Event streams

  ExampleBodyResponseSchema:
    properties:
      error: nullable<string>
      body: nullable<ExampleTypeReferenceSchema>

  ExampleStreamResponseSchema:
    properties:
      stream: list<ExampleTypeReferenceSchema>

  ExampleSseResponseSchema:
    properties:
      stream: list<ExampleSseEventSchema>

  ExampleSseEventSchema:
    properties:
      event: string
      data: nullable<ExampleTypeReferenceSchema>

  ExampleTypeReferenceSchema: unknown

  ExampleCodeSampleSchema:
    discriminated: false
    union:
      - ExampleCodeSampleSchemaSdk
      - ExampleCodeSampleSchemaLanguage

  ExampleCodeSampleSchemaSdk:
    extends:
      - commons.WithDocsSchema
      - commons.WithName
    properties:
      sdk: SupportedSdkLanguageSchema
      code: string

  SupportedSdkLanguageSchema:
    enum:
      - curl
      - python
      - javascript
      - typescript
      - go
      - ruby
      - csharp
      - java
      - js
      - node
      - ts
      - nodets
      - golang
      - dotnet
      - jvm
      - value: c#
        name: csharp2

  ExampleCodeSampleSchemaLanguage:
    extends:
      - commons.WithDocsSchema
      - commons.WithName
    properties:
      language: string
      code: string
      install: nullable<string>
