imports:
  commons: commons.yml

types:
  WithEnvironmentsSchema:
    properties:
      default-url: nullable<string>
      default-environment: nullable<string>
      environments: nullable<map<string, EnvironmentSchema>>

  EnvironmentSchema:
    discriminated: false
    union:
      - string
      - SingleBaseUrlEnvironmentSchema
      - MultipleBaseUrlsEnvironmentSchema

  SingleBaseUrlEnvironmentSchema:
    extends:
      - commons.WithAudiences
      - commons.WithDocsSchema
    properties:
      url: string
      default-url:
        type: nullable<string>
        docs: A separate default URL to use when no variables are provided (from x-fern-default-url extension)
      url-template:
        type: nullable<string>
        docs: The original URL template with variable placeholders (e.g., "https://api.{region}.example.com")
      variables:
        type: nullable<list<ServerVariableSchema>>
        docs: Server variables for URL templating

  ServerVariableSchema:
    properties:
      id:
        type: string
        docs: The variable name as it appears in the URL template
      default:
        type: nullable<string>
        docs: The default value for this variable
      values:
        type: nullable<list<string>>
        docs: Allowed values for this variable (from enum)

  MultipleBaseUrlsEnvironmentSchema:
    extends:
      - commons.WithAudiences
      - commons.WithDocsSchema
    properties:
      urls: map<string, string>
      url-templates:
        type: nullable<map<string, string>>
        docs: URL templates with variable placeholders for each base URL (e.g., "https://api.{region}.example.com")
      default-urls:
        type: nullable<map<string, string>>
        docs: Default URLs to use when no variables are provided (from x-fern-default-url extension)
      variables:
        type: nullable<map<string, list<ServerVariableSchema>>>
        docs: Server variables for URL templating, keyed by base URL ID
