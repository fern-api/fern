# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
default-group: local
groups:
  local:
    generators:
      - name: fernapi/fern-typescript-sdk
        version: 3.49.0
        output:
          location: local-file-system
          path: ../../../packages/generator-cli/src/configuration/sdk
        config:
          outputSrcOnly: true
          includeUtilsOnUnionMembers: true
          useBrandedStringAliases: true
          outputSourceFiles: true
          noSerdeLayer: false
        smart-casing: false
  sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 0.51.4
        output:
          location: npm
          url: npm.buildwithfern.com
          package-name: "@fern-fern/generator-cli-sdk"
        config:
          includeUtilsOnUnionMembers: true
          useBrandedStringAliases: true
        smart-casing: false
      - name: fernapi/fern-python-sdk
        version: 4.2.8
        output:
          location: pypi
          url: pypi.buildwithfern.com
          package-name: fern-fern-generator-cli-sdk
        config:
          package_name: generatorcli
        smart-casing: false
      - name: fernapi/fern-go-sdk
        version: 1.33.2
        github:
          repository: fern-api/generator-cli-go
        config:
          union: v1
          packageName: generatorcli
        smart-casing: false
