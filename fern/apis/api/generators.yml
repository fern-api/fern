# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    - openapi: ./openapi.yml
default-group: ts-sdk
groups:
  ts-sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 0.57.10
        output:
          location: npm
          package-name: "@fern-demo/sdk-preview-test"
          token: ${NPM_TOKEN}
        github:
          repository: fern-demo/sdk-preview-push-diff-test-sdk
          mode: push
