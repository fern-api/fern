instances:
  - url: sarah-bawabe.docs.buildwithfern.com/learn
    custom-domain: buildwithfern.com/learn
    edit-this-page:
      github:
        owner: fern-api
        repo: fern
        branch: main
  - url: fern.docs.dev.buildwithfern.com/learn
    edit-this-page:
      github:
        owner: fern-api
        repo: fern
        branch: main
title: Fern

products:
  - display-name: SDKs
    value: sdks
    path: ./products/sdks/latest.yml
    slug: sdks
    # versions:
    #   - display-name: Latest
    #     path: ./products/sdks/latest.yml
    #     availability: ga
  - display-name: Docs
    value: docs
    path: ./products/docs/latest.yml
    slug: docs
      # versions:
      #   - display-name: Latest
      #     path: ./products/docs/latest.yml
      #     availability: ga

css: ./assets/styles.css

typography:
  bodyFont:
    name: GT-Planar
    paths:
      - path: ./assets/GT-Planar.woff2
        weight: 400
      - path: ./assets/GT-Planar-Medium.woff2
        weight: 500
      - path: ./assets/GT-Planar-Bold.woff2
        weight: 600 700
  headingsFont:
    name: GT-Planar-Bold
    path: ./assets/GT-Planar-Bold.woff2
    weight: 600 700

logo:
  href: https://www.buildwithfern.com
  light: ./images/logo-primary.svg
  dark: ./images/logo-white.svg
  height: 20
colors:
  accent-primary:
    dark: "#70E155"
    light: "#008700"
  background:
    dark: "#111113"
    light: "#F9F9FB"
  border: 
    dark: "#393A40"
    light: "#E0E1E6"
  header-background:
    dark: "#19191B"
    light: "#FFFFFF"
  card-background:
    dark: "#222325"
    light: "#FFFFFF"
favicon: ./images/favicon_32.png

layout:
  page-width: 1504px
  header-height: 75px
  searchbar-placement: header
  tabs-placement: header

analytics:
  posthog:
    api-key: ${POSTHOG_API_KEY}
  gtm:
    container-id: GTM-55W3VNDW

redirects:
  - source: /learn/welcome
    destination: /learn
    permanent: true
  - source: /learn/home
    destination: /learn
    permanent: true
