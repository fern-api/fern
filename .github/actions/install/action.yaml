name: Install Repo
description: Install the ts toolchain and dependencies

runs:
  using: "composite"

  steps:
    - name: ⎔ Setup pnpm
      uses: pnpm/action-setup@v5

    - name: ⎔ Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        registry-url: "https://registry.npmjs.org"
        cache: pnpm

    # npm >= 11.5.1 is required for OIDC trusted publishing (pnpm publish
    # delegates to npm under the hood). Node 22 ships with npm 10.x which
    # does not support OIDC, so we must upgrade explicitly.
    - name: ⎔ Update npm for OIDC publishing
      shell: bash
      run: npm install -g npm@latest

    - name: ⎔ Cache turbo build
      uses: actions/cache@v5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ github.job }}-
          ${{ runner.os }}-turbo-

    - name: 📥 Install dependencies
      shell: bash
      run: |
        for attempt in 1 2 3; do
          pnpm install --frozen-lockfile && break
          if [ "$attempt" -eq 3 ]; then
            echo "pnpm install failed after 3 attempts"
            exit 1
          fi
          echo "pnpm install failed (attempt $attempt/3), retrying in 10s..."
          sleep 10
        done
