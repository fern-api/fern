name: Run Docs Generation Benchmark
description: Run docs generation with --preview against benchmark fixture and record timing

inputs:
  fern-token:
    description: "Fern API token authorized for the benchmark org"
    required: true

runs:
  using: composite
  steps:
    - name: Build Fern CLI
      shell: bash
      run: pnpm run fern:build

    - name: Run docs benchmark
      shell: bash
      env:
        FERN_TOKEN: ${{ inputs.fern-token }}
      run: |
        RESULTS_DIR="${GITHUB_WORKSPACE}/benchmark-results"
        mkdir -p "$RESULTS_DIR"

        SPEC="square"

        # Check that the OpenAPI spec was fetched (needed for the API Reference section)
        if [ ! -f "benchmarks/fern/apis/${SPEC}/openapi.json" ]; then
          echo "::warning::Skipping docs benchmark — OpenAPI spec not available"
          echo "{\"type\":\"docs\",\"spec\":\"${SPEC}\",\"duration_seconds\":0,\"exit_code\":-1,\"skipped\":true}" \
            >> "${RESULTS_DIR}/docs.jsonl"
          exit 0
        fi

        echo "::group::Benchmarking docs generation (with ${SPEC} API reference)"

        # The fern CLI uses the current working directory to find the project
        # (fern.config.json). We need to cd into the benchmark fixture directory.
        cd benchmarks/fern

        # $EPOCHSECONDS requires bash 5+ (available on GitHub Actions Ubuntu runners)
        START_TIME=$EPOCHSECONDS
        EXIT_CODE=0

        # Run the actual docs generation command with --preview for safety.
        # --preview creates an ephemeral preview deployment, never touches production.
        # --id ensures repeated runs overwrite the same preview URL.
        # --no-prompt skips interactive confirmation prompts in CI.
        node --enable-source-maps "${GITHUB_WORKSPACE}/packages/cli/cli/dist/prod/cli.cjs" \
          generate --docs --preview --id benchmark-run --no-prompt \
          2>&1 || EXIT_CODE=$?

        END_TIME=$EPOCHSECONDS
        DURATION=$(( END_TIME - START_TIME ))

        if [ "$EXIT_CODE" -ne 0 ]; then
          echo "::warning::Docs benchmark exited with code ${EXIT_CODE} after ${DURATION}s"
        fi

        echo "Benchmark: docs x ${SPEC} = ${DURATION}s (exit ${EXIT_CODE})"

        # Write result as JSON (same format as SDK benchmarks for consistency)
        echo "{\"type\":\"docs\",\"spec\":\"${SPEC}\",\"duration_seconds\":${DURATION},\"exit_code\":${EXIT_CODE}}" \
          >> "${RESULTS_DIR}/docs.jsonl"

        echo "::endgroup::"
