name: Run Docs Generation Benchmark
description: Run docs generation with --preview against benchmark fixture and record timing

inputs:
  fern-token:
    description: "Fern API token authorized for the benchmark org"
    required: true

runs:
  using: composite
  steps:
    - name: Generate fixture pages
      shell: bash
      run: |
        PAGE_COUNT=37
        bash benchmarks/fern/generate-fixture-pages.sh "$PAGE_COUNT"
        echo "Generated ${PAGE_COUNT} fixture pages"

    - name: Fetch versioned specs (fallback)
      shell: bash
      run: |
        # If the shared artifact didn't include versioned specs, fetch them directly.
        # This handles cases where the benchmark-setup job's sparse-checkout or
        # artifact upload didn't include the versioned spec directories.
        VERSIONS_FILE="benchmarks/fern/square-versions.txt"
        if [ ! -f "$VERSIONS_FILE" ]; then
          echo "No square-versions.txt found, skipping versioned fetch"
          exit 0
        fi

        EXISTING=0
        for d in benchmarks/fern/apis/square-*/; do
          [ -f "${d}openapi.json" ] && EXISTING=$((EXISTING + 1))
        done

        if [ "$EXISTING" -gt 0 ]; then
          echo "Found ${EXISTING} versioned specs from artifact, skipping fallback fetch"
          exit 0
        fi

        echo "No versioned specs from artifact — fetching directly..."
        FETCHED=0
        FAILED=0
        PIDS=()
        VERSIONS=()
        while IFS='|' read -r SHA VERSION; do
          [[ "$SHA" =~ ^#.*$ || -z "$SHA" ]] && continue
          DIR="benchmarks/fern/apis/square-${VERSION}"
          mkdir -p "$DIR"
          ( curl -sSfL --retry 2 --retry-delay 3 \
              "https://raw.githubusercontent.com/square/connect-api-specification/${SHA}/api.json" \
              -o "${DIR}/openapi.json" 2>/dev/null ) &
          PIDS+=($!)
          VERSIONS+=("$VERSION")
        done < "$VERSIONS_FILE"

        echo "Launched ${#PIDS[@]} parallel downloads..."
        for i in "${!PIDS[@]}"; do
          if wait "${PIDS[$i]}"; then
            FILE="benchmarks/fern/apis/square-${VERSIONS[$i]}/openapi.json"
            if [ -f "$FILE" ] && [ "$(wc -c < "$FILE")" -ge 100000 ]; then
              FETCHED=$((FETCHED + 1))
            else
              rm -f "$FILE"
              FAILED=$((FAILED + 1))
            fi
          else
            rm -f "benchmarks/fern/apis/square-${VERSIONS[$i]}/openapi.json"
            FAILED=$((FAILED + 1))
          fi
        done
        echo "Fallback fetch: ${FETCHED}/${#PIDS[@]} succeeded, ${FAILED} failed"

    - name: Generate fixture versions
      shell: bash
      run: |
        PAGE_COUNT=37

        # Diagnostic: show what's in the apis directory
        echo "=== APIs directory contents ==="
        ls -la benchmarks/fern/apis/ 2>/dev/null || echo "apis/ directory not found"
        SPEC_COUNT=0
        for d in benchmarks/fern/apis/square-*/; do
          [ -f "${d}openapi.json" ] && SPEC_COUNT=$((SPEC_COUNT + 1))
        done
        echo "Versioned spec directories with openapi.json: ${SPEC_COUNT}"

        bash benchmarks/fern/generate-fixture-versions.sh "$PAGE_COUNT"

        # Validate: each version file should reference exactly PAGE_COUNT pages
        VERSIONS_DIR="benchmarks/fern/versions"
        if [ -d "$VERSIONS_DIR" ]; then
          for vfile in "$VERSIONS_DIR"/v*.yml; do
            [ -f "$vfile" ] || continue
            VPAGE_COUNT=$(grep -c 'path: ../pages/page-' "$vfile")
            if [ "$VPAGE_COUNT" -ne "$PAGE_COUNT" ]; then
              echo "::error::Page count mismatch in $(basename "$vfile"): expected ${PAGE_COUNT}, found ${VPAGE_COUNT}"
              exit 1
            fi
          done
          VERSION_COUNT=$(ls -1 "$VERSIONS_DIR"/v*.yml 2>/dev/null | wc -l)
          echo "Validated: ${VERSION_COUNT} versions, each with ${PAGE_COUNT} pages"
        else
          echo "No versions generated (unversioned mode)"
        fi

    - name: Build Fern CLI
      shell: bash
      run: pnpm run fern:build

    - name: Run docs benchmark
      shell: bash
      env:
        FERN_TOKEN: ${{ inputs.fern-token }}
      run: |
        RESULTS_DIR="${GITHUB_WORKSPACE}/benchmark-results"
        mkdir -p "$RESULTS_DIR"

        # Count versioned specs (square-YYYY-MM-DD directories)
        VERSIONS_FOUND=0
        for spec_dir in benchmarks/fern/apis/square-*/; do
          if [ -f "${spec_dir}openapi.json" ]; then
            VERSIONS_FOUND=$((VERSIONS_FOUND + 1))
          fi
        done

        if [ "$VERSIONS_FOUND" -eq 0 ]; then
          echo "::warning::Skipping docs benchmark — no versioned OpenAPI specs available"
          echo "{\"type\":\"docs\",\"spec\":\"none\",\"duration_seconds\":0,\"exit_code\":-1,\"skipped\":true}" \
            >> "${RESULTS_DIR}/docs.jsonl"
          exit 0
        fi

        echo "::group::Benchmarking docs generation (${VERSIONS_FOUND} API versions)"

        # Diagnostic: show the generated docs.yml structure
        echo "=== docs.yml (first 30 lines) ==="
        head -30 benchmarks/fern/docs.yml
        echo "=== API workspace directories ==="
        ls -d benchmarks/fern/apis/*/ 2>/dev/null | head -35

        # Use sub-second precision timing (date +%s.%N) since the benchmark
        # may run several minutes and we want accurate measurements.
        START_TIME=$(date +%s.%N)
        EXIT_CODE=0

        # Run the actual docs generation command with --preview for safety.
        # --preview creates an ephemeral preview deployment, never touches production.
        # --id ensures repeated runs overwrite the same preview URL.
        # --force skips any confirmation prompts.
        # FERN_CWD tells the CLI which project directory to use (avoids fragile `cd`).
        FERN_CWD="${GITHUB_WORKSPACE}/benchmarks/fern" \
        node --enable-source-maps "${GITHUB_WORKSPACE}/packages/cli/cli/dist/prod/cli.cjs" \
          generate --docs --preview --id benchmark-run --force \
          2>&1 || EXIT_CODE=$?

        END_TIME=$(date +%s.%N)
        DURATION=$(awk "BEGIN {printf \"%.1f\", ${END_TIME} - ${START_TIME}}")

        if [ "$EXIT_CODE" -ne 0 ]; then
          echo "::warning::Docs benchmark exited with code ${EXIT_CODE} after ${DURATION}s"
        fi

        echo "Duration: ${DURATION}s (exit ${EXIT_CODE}, ${VERSIONS_FOUND} versions)"

        # Write result as JSON.
        echo "{\"type\":\"docs\",\"spec\":\"combined\",\"versions_count\":${VERSIONS_FOUND},\"duration_seconds\":${DURATION},\"exit_code\":${EXIT_CODE}}" \
          >> "${RESULTS_DIR}/docs.jsonl"

        echo "::endgroup::"
