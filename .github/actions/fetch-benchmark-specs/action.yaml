name: Fetch Benchmark Specs
description: Download large public OpenAPI specs for SDK generation benchmarking

outputs:
  specs-fetched:
    description: "Space-separated list of spec names that were successfully fetched"
    value: ${{ steps.summary.outputs.specs-fetched }}

runs:
  using: composite
  steps:
    - name: Fetch Square OpenAPI spec
      id: fetch-square
      shell: bash
      run: |
        # Pinned to a specific commit SHA for reproducibility.
        # A live endpoint would be preferable but Square does not publish one.
        FETCH_OK=false
        for ATTEMPT in 1 2 3; do
          echo "Attempt ${ATTEMPT}/3: Fetching Square OpenAPI spec..."
          if curl -sSfL --retry 2 --retry-delay 5 \
            "https://raw.githubusercontent.com/square/connect-api-specification/ba11c0a1f006b81dcd3633adb9090e9b2f03fef7/api.json" \
            -o benchmarks/fern/apis/square/openapi.json; then
            BYTES=$(wc -c < benchmarks/fern/apis/square/openapi.json)
            echo "Downloaded Square OpenAPI spec (${BYTES} bytes)"
            if [ "$BYTES" -ge 100000 ]; then
              FETCH_OK=true
              break
            fi
            echo "::warning::Square spec unexpectedly small (${BYTES} bytes) on attempt ${ATTEMPT}"
          else
            echo "::warning::curl failed on attempt ${ATTEMPT}"
          fi
          [ "$ATTEMPT" -lt 3 ] && sleep 5
        done
        if [ "$FETCH_OK" = "true" ]; then
          echo "square-ok=true" >> $GITHUB_OUTPUT
        else
          echo "::warning::Failed to fetch Square spec after 3 attempts. Skipping Square benchmarks."
          rm -f benchmarks/fern/apis/square/openapi.json
          echo "square-ok=false" >> $GITHUB_OUTPUT
        fi

    # Fetch historical versions of the Square spec for multi-version docs benchmarking.
    # Each version is a real API release from the Square connect-api-specification repo.
    # Downloads run in parallel (background curl jobs) to minimize fetch time.
    - name: Fetch Square historical versions
      id: fetch-versions
      shell: bash
      run: |
        VERSIONS_FILE="benchmarks/fern/square-versions.txt"
        if [ ! -f "$VERSIONS_FILE" ]; then
          echo "::warning::No square-versions.txt found. Skipping versioned docs benchmark."
          echo "versions-fetched=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        FETCHED=0
        FAILED=0
        PIDS=()
        VERSIONS=()

        # Read manifest and launch parallel downloads
        while IFS='|' read -r SHA VERSION; do
          # Skip comments and empty lines
          [[ "$SHA" =~ ^#.*$ || -z "$SHA" ]] && continue

          DIR="benchmarks/fern/apis/square-${VERSION}"
          mkdir -p "$DIR"
          OUTPUT="${DIR}/openapi.json"
          VERSIONS+=("$VERSION")

          # Download in background
          (
            curl -sSfL --retry 2 --retry-delay 3 \
              "https://raw.githubusercontent.com/square/connect-api-specification/${SHA}/api.json" \
              -o "$OUTPUT" 2>/dev/null
          ) &
          PIDS+=($!)
        done < "$VERSIONS_FILE"

        echo "Launched ${#PIDS[@]} parallel downloads..."

        # Wait for all downloads and check results
        for i in "${!PIDS[@]}"; do
          if wait "${PIDS[$i]}"; then
            VERSION="${VERSIONS[$i]}"
            FILE="benchmarks/fern/apis/square-${VERSION}/openapi.json"
            if [ -f "$FILE" ]; then
              BYTES=$(wc -c < "$FILE")
              if [ "$BYTES" -ge 100000 ]; then
                FETCHED=$((FETCHED + 1))
              else
                echo "::warning::square-${VERSION} spec too small (${BYTES} bytes), removing"
                rm -f "$FILE"
                FAILED=$((FAILED + 1))
              fi
            else
              FAILED=$((FAILED + 1))
            fi
          else
            VERSION="${VERSIONS[$i]}"
            echo "::warning::Failed to fetch square-${VERSION}"
            rm -f "benchmarks/fern/apis/square-${VERSION}/openapi.json"
            FAILED=$((FAILED + 1))
          fi
        done

        echo "Fetched ${FETCHED}/${#PIDS[@]} historical Square spec versions (${FAILED} failed)"
        echo "versions-fetched=${FETCHED}" >> $GITHUB_OUTPUT

    - name: Summarize fetched specs
      id: summary
      shell: bash
      run: |
        SPECS=""
        if [ "${{ steps.fetch-square.outputs.square-ok }}" = "true" ]; then
          SPECS="square"
        fi
        if [ -z "$SPECS" ]; then
          echo "::error::No benchmark specs could be fetched. Benchmark will be skipped."
          exit 1
        fi
        echo "specs-fetched=$SPECS" >> $GITHUB_OUTPUT
        echo "Successfully fetched specs: $SPECS"
        VERSIONS="${{ steps.fetch-versions.outputs.versions-fetched }}"
        echo "Historical versions fetched: ${VERSIONS:-0}"
