name: Cached Seed Generation
description: Run seed generation with caching for a specific generator.

inputs:
  generator-name:
    description: Generator to use (e.g., go-sdk)
    required: true
  generator-path:
    description: The path to the source code of the generator (e.g., generators/go, generators/ruby)
    required: true
  fixtures-to-run:
    description: Specific fixtures to run. If not supplied, will run all fixtures. Note - for multiple fixtures at once, separate by space, not comma.
    required: false
    default: ""
  skip-scripts:
    description: Whether to skip running scripts during seed generation
    required: false
    default: "false"
  allow-unexpected-failures:
    description: Whether to allow unexpected failures during seed generation
    required: false
    default: "false"
  dockerhub-username:
    description: Docker Hub username for authenticated pulls (avoids rate limits)
    required: false
    default: ""
  dockerhub-token:
    description: Docker Hub token for authenticated pulls (avoids rate limits)
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install
      uses: ./.github/actions/install

    - name: Log in to Docker Hub
      id: docker-login
      if: ${{ inputs.dockerhub-username != '' }}
      uses: docker/login-action@v4
      continue-on-error: true
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Retry Docker Hub login
      id: docker-login-retry
      if: ${{ inputs.dockerhub-username != '' && steps.docker-login.outcome == 'failure' }}
      uses: docker/login-action@v4
      continue-on-error: true
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Docker Hub login status
      if: ${{ inputs.dockerhub-username != '' }}
      shell: bash
      run: |
        if [[ "${{ steps.docker-login.outcome }}" == "success" ]]; then
          echo "Docker Hub login succeeded on first attempt"
        elif [[ "${{ steps.docker-login-retry.outcome }}" == "success" ]]; then
          echo "Docker Hub login succeeded on retry"
        else
          echo "::warning::Docker Hub login failed after 2 attempts — continuing without authentication (may hit rate limits)"
        fi

    - name: Clear stale Docker image cache
      shell: bash
      run: rm -rf /tmp/docker-cache

    - name: Cache Docker images
      id: docker-cache
      uses: actions/cache@v5
      with:
        path: /tmp/docker-cache
        key: ${{ runner.os }}-docker-${{ inputs.generator-name }}-${{ hashFiles('**/Dockerfile*') }}
        restore-keys: |
          ${{ runner.os }}-docker-${{ inputs.generator-name }}-

    - name: Load cached Docker images
      shell: bash
      run: |
        for f in /tmp/docker-cache/*.tar; do
          [ -f "$f" ] && docker load -i "$f" || true
        done

    - name: Record pre-existing Docker images
      shell: bash
      run: docker images -q | sort -u > /tmp/docker-images-before.txt

    - name: Seed Test
      shell: bash
      env:
        FORCE_COLOR: "2"
      run: |
        FORMATTED_FIXTURES_COMMAND=""
        if [[ "${{ inputs.fixtures-to-run }}" != "all" ]]; then
          FORMATTED_FIXTURES_COMMAND="--fixture ${{ inputs.fixtures-to-run }}"
        fi

        SEED_CMD="pnpm seed:local test \
          --generator ${{ inputs.generator-name }} \
          --parallel 16 \
          ${FORMATTED_FIXTURES_COMMAND} \
          ${{ inputs.skip-scripts == 'true' && '--skip-scripts' || '' }} \
          ${{ inputs.allow-unexpected-failures == 'true' && '--allow-unexpected-failures' || '' }}"

        for attempt in 1 2 3; do
          if eval "$SEED_CMD" | tee output.log; then
            break
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "Seed test failed after 3 attempts"
            exit 1
          fi
          echo "Seed test failed (attempt $attempt/3), retrying in 10s..."
          sleep 10
        done

    - name: Save Docker images for cache
      if: always()
      shell: bash
      run: |
        if [ ! -f /tmp/docker-images-before.txt ]; then
          echo "Skipping cache save: docker-images-before.txt not found"
          exit 0
        fi
        mkdir -p /tmp/docker-cache
        comm -13 /tmp/docker-images-before.txt <(docker images -q | sort -u) | while read -r id; do
          img=$(docker inspect --format '{{index .RepoTags 0}}' "$id" 2>/dev/null || true)
          [ -z "$img" ] && continue
          fname=$(echo "$img" | tr '/:' '_')
          docker save "$img" -o "/tmp/docker-cache/${fname}.tar" 2>/dev/null || true
        done
