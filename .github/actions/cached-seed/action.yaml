name: Cached Seed Generation
description: Run seed generation with caching for a specific generator.

inputs:
  generator-name:
    description: Generator to use (e.g., go-sdk)
    required: true
  generator-path:
    description: The path to the source code of the generator (e.g., generators/go, generators/ruby)
    required: true
  fixtures-to-run:
    description: Specific fixtures to run. If not supplied, will run all fixtures. Note - for multiple fixtures at once, separate by space, not comma.
    required: false
    default: ""
  skip-scripts:
    description: Whether to skip running scripts during seed generation
    required: false
    default: "false"
  allow-unexpected-failures:
    description: Whether to allow unexpected failures during seed generation
    required: false
    default: "false"
  dockerhub-username:
    description: Docker Hub username for authenticated pulls (avoids rate limits)
    required: false
    default: ""
  dockerhub-token:
    description: Docker Hub token for authenticated pulls (avoids rate limits)
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install
      uses: ./.github/actions/install

    - name: Log in to Docker Hub
      if: ${{ inputs.dockerhub-username != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Cache Docker images
      uses: actions/cache@v4
      with:
        path: /tmp/docker-cache
        key: ${{ runner.os }}-docker-${{ hashFiles('**/Dockerfile*') }}
        restore-keys: |
          ${{ runner.os }}-docker-

    - name: Load cached Docker images
      shell: bash
      run: |
        if [ -d /tmp/docker-cache ]; then
          for f in /tmp/docker-cache/*.tar; do
            [ -f "$f" ] && docker load -i "$f" || true
          done
        fi

    - name: Seed Test
      shell: bash
      env:
        FORCE_COLOR: "2"
      run: |
        FORMATTED_FIXTURES_COMMAND=""
        if [[ "${{ inputs.fixtures-to-run }}" != "all" ]]; then
          FORMATTED_FIXTURES_COMMAND="--fixture ${{ inputs.fixtures-to-run }}"
        fi

        SEED_CMD="pnpm seed:local test \
          --generator ${{ inputs.generator-name }} \
          --parallel 16 \
          ${FORMATTED_FIXTURES_COMMAND} \
          ${{ inputs.skip-scripts == 'true' && '--skip-scripts' || '' }} \
          ${{ inputs.allow-unexpected-failures == 'true' && '--allow-unexpected-failures' || '' }}"

        for attempt in 1 2 3; do
          if eval "$SEED_CMD" | tee output.log; then
            break
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "Seed test failed after 3 attempts"
            exit 1
          fi
          echo "Seed test failed (attempt $attempt/3), retrying in 10s..."
          sleep 10
        done

    - name: Save Docker images for cache
      if: always()
      shell: bash
      run: |
        mkdir -p /tmp/docker-cache
        docker images --format '{{.Repository}}:{{.Tag}}' | grep -v '<none>' | while read -r img; do
          fname=$(echo "$img" | tr '/:' '_')
          docker save "$img" -o "/tmp/docker-cache/${fname}.tar" 2>/dev/null || true
        done
