name: Publish Fern CLI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "fern/**"
      - "guides/**"
      - ".vscode/**"
      - "docker/seed/**"
      - "test-definitions/**"
      - "test-definitions-openapi/**"
      - "seed/**"
  workflow_dispatch:
    inputs:
      version:
        description: "The version of the CLI to publish."
        required: true
        type: string

permissions:
  contents: read # Required for checkout
  id-token: write # Required for OIDC

env:
  DO_NOT_TRACK: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: "buildwithfern"
  TURBO_REMOTE_CACHE_TIMEOUT: 10
  TURBO_NO_UPDATE_NOTIFIER: "1"
  TURBO_DAEMON: "false"

jobs:
  detect-release-bump:
    if: ${{ inputs.version == null && github.repository == 'fern-api/fern' }}
    runs-on: ubuntu-latest
    outputs:
      is_release_bump: ${{ steps.check_versions_yml.outputs.is_release_bump }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if versions.yml changed
        id: check_versions_yml
        run: |
          if git diff --name-only HEAD~1..HEAD | grep -q '^packages/cli/cli/versions.yml$'; then
            echo "is_release_bump=true" >> $GITHUB_OUTPUT
          else
            echo "is_release_bump=false" >> $GITHUB_OUTPUT
          fi

  dev:
    needs: [detect-release-bump]
    if: ${{ inputs.version == null && github.repository == 'fern-api/fern' && needs.detect-release-bump.outputs.is_release_bump == 'false' }}
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.FERN_NPM_TOKEN }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-tags: false

      - name: Install
        uses: ./.github/actions/install

      - name: Build Seed
        run: |
          pnpm seed:build

      - name: Compute git version
        id: git-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Replicate git describe --tags --always --first-parent using GitHub API
          # This avoids needing full git history + all tags (saves fetching ~750 branches)
          CURRENT_SHA="${{ github.sha }}"
          SHORT_SHA="${CURRENT_SHA:0:7}"

          # Check if current commit is tagged
          EXACT_TAG=$(gh api "/repos/${{ github.repository }}/git/matching-refs/tags/" --jq \
            "[.[] | select(.object.sha == \"${CURRENT_SHA}\")] | first | .ref // empty" 2>/dev/null | sed 's|refs/tags/||' || true)

          if [ -n "$EXACT_TAG" ]; then
            echo "version=$EXACT_TAG" >> $GITHUB_OUTPUT
          else
            # Find the latest tag and distance from HEAD
            LATEST_TAG=$(gh api "/repos/${{ github.repository }}/tags?per_page=1" --jq '.[0].name')
            AHEAD_BY=$(gh api "/repos/${{ github.repository }}/compare/${LATEST_TAG}...${{ github.sha }}" --jq '.ahead_by')
            echo "version=${LATEST_TAG}-${AHEAD_BY}-g${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi
          echo "Publishing version: $(cat $GITHUB_OUTPUT | grep version= | cut -d= -f2)"

      - name: Publish Dev CLI
        run: |
          pnpm seed publish cli --ver ${{ steps.git-version.outputs.version }} --dev --log-level debug

  live-test:
    if: ${{ inputs.version == null && github.repository == 'fern-api/fern' }}
    environment: Fern Prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install
        uses: ./.github/actions/install

      - name: Check API definition is valid
        env:
          FORCE_COLOR: "2"
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
        run: |
          pnpm turbo run dist:cli:prod --filter @fern-api/cli
          cli_path="$(pwd)/packages/cli/cli/dist/prod/cli.cjs"
          ./scripts/live-test.sh "$cli_path" "$FERN_TOKEN" "true"

  prod:
    needs: [live-test, detect-release-bump]
    if: ${{ inputs.version == null && needs.detect-release-bump.outputs.is_release_bump == 'true' }}
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.FERN_NPM_TOKEN }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-tags: false

      - name: Install
        uses: ./.github/actions/install

      - name: Build Seed
        run: |
          pnpm seed:build

      - name: Publish + Register CLI
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the previous version of versions.yml using GitHub API (avoids fetching all branches)
          previous_sha=$(gh api "/repos/${{ github.repository }}/commits?path=packages/cli/cli/versions.yml&per_page=2" --jq '.[1].sha')
          current_sha=$(gh api "/repos/${{ github.repository }}/commits?path=packages/cli/cli/versions.yml&per_page=1" --jq '.[0].sha')

          gh api "/repos/${{ github.repository }}/contents/packages/cli/cli/versions.yml?ref=${previous_sha}" --jq '.content' | base64 -d > tmp_cli_previous_versions.yml

          echo "Preview of the previous file (${previous_sha:0:7})"
          head tmp_cli_previous_versions.yml

          echo "Preview of the current file (${current_sha:0:7})"
          head packages/cli/cli/versions.yml

          # Publish dev CLI at the same version as prod
          pnpm seed publish cli --changelog packages/cli/cli/versions.yml --previous-changelog tmp_cli_previous_versions.yml --log-level debug --dev
          
          # Publish prod CLI
          pnpm seed publish cli --changelog packages/cli/cli/versions.yml --previous-changelog tmp_cli_previous_versions.yml --log-level debug
          pnpm seed register cli

  manual:
    runs-on: ubuntu-latest
    if: ${{ inputs.version != null }}
    env:
      NPM_TOKEN: ${{ secrets.FERN_NPM_TOKEN }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-tags: false

      - name: Install
        uses: ./.github/actions/install

      - name: Build Seed
        run: |
          pnpm seed:build

      - name: Publish Dev CLI
        run: |
          pnpm seed publish cli --ver ${{ inputs.version }} --dev --log-level debug

      - name: Publish + Register CLI
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: |
          pnpm seed publish cli --ver ${{ inputs.version }} --log-level debug
          pnpm seed register cli

  bulk-update-cli:
    runs-on: ubuntu-latest
    needs: [prod, manual]
    if: ${{ always() && (needs.prod.result == 'success' || needs.manual.result == 'success') }}
    env:
      # Autopilot host URL (should include scheme, e.g., https://autopilot.example.com)
      AUTOPILOT_HOST: ${{ vars.AUTOPILOT_HOST != '' && vars.AUTOPILOT_HOST || 'https://autopilot.buildwithfern.com' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get CLI version
        id: get_version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Manual publish - use the input version
            echo "CLI_VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Automatic publish - extract from versions.yml
            version=$(head -n 20 packages/cli/cli/versions.yml | grep -m 1 "version:" | awk '{print $2}')
            echo "CLI_VERSION=${version}" >> $GITHUB_OUTPUT
          fi

      - name: Trigger bulk update
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: |
          version="${{ steps.get_version.outputs.CLI_VERSION }}"
          host="${AUTOPILOT_HOST%/}"
          echo "Using autopilot host: ${host}"
          echo "Triggering bulk update for CLI version: ${version}"

          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${host}/api/bulk-update-cli" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${FERN_TOKEN}" \
            -d "{\"newVersion\": \"latest\", \"changeMode\": \"pull-request\"}")

          http_code=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')

          echo "Response status: ${http_code}"
          echo "Response body: ${body}"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✓ Bulk update triggered successfully"
            exit 0
          else
            echo "✗ Bulk update failed with status ${http_code}"
            exit 1
          fi
