name: Go Generator

on:
  pull_request:
    paths:
      - "generators/go/**"
    branches:
      - main
  workflow_call:

env:
  DO_NOT_TRACK: "1"

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compile
        working-directory: ./generators/go
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Tests
        working-directory: ./generators/go
        run: make test
