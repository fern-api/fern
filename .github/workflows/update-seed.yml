name: Update Seed

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-seed.yml"
      - "packages/seed/**"
      - "packages/ir-sdk/fern/apis/**"
      - "packages/cli/generation/ir-generator/**"
      - "test-definitions/**"
      - "test-definitions-openapi/**"
      - "generators/**"
      - "seed/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:

# Cancel previous workflows on previous push
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write

env:
  DOCKER_BUILDKIT: 1

jobs:
  setup:
    if: github.repository == 'fern-api/fern'
    runs-on: ubuntu-latest
    outputs:
      skip-scripts: ${{ steps.set-update-options.outputs.skip-scripts }}
      create-artifacts: ${{ steps.set-update-options.outputs.create-artifacts }}
      create-pr: ${{ steps.set-update-options.outputs.create-pr }}
    steps:
      # Apply by commit for PR to main, apply by PR for push to main or workflow_dispatch
      - name: Set update options
        id: set-update-options
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "skip-scripts=true" >> $GITHUB_OUTPUT
            echo "create-artifacts=true" >> $GITHUB_OUTPUT
            echo "create-pr=false" >> $GITHUB_OUTPUT
          else
            echo "skip-scripts=false" >> $GITHUB_OUTPUT
            echo "create-artifacts=false" >> $GITHUB_OUTPUT
            echo "create-pr=true" >> $GITHUB_OUTPUT
          fi
  changes:
    if: github.repository == 'fern-api/fern'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        generator-name: [seed, ruby, ruby-v2, openapi, python, postman, java, typescript, go, csharp, php, swift, rust]
        include:
          - files: |
              .github/actions/cached-seed/action.yaml
              .github/actions/check-for-changed-files/action.yaml
              .github/actions/install/action.yaml
              .github/workflows/seed.yml
              packages/seed/**
              packages/ir-sdk/fern/apis/**
              packages/cli/generation/ir-generator/**
              test-definitions/**
              test-definitions-openapi/**
            generator-name: seed
          - files: |
              generators/ruby/
              seed/ruby-sdk/
              seed/ruby-model/
            generator-name: ruby
          - files: |
              generators/ruby-v2/
              seed/ruby-sdk-v2/
            generator-name: ruby-v2
          - files: |
              generators/openapi/
              seed/openapi/
            generator-name: openapi
          - files: |
              generators/python/
              seed/pydantic/
              seed/pydantic-v2/
              seed/python-sdk/
              seed/fastapi/
            generator-name: python
          - files: |
              generators/postman/
              seed/postman/
            generator-name: postman
          - files: |
              generators/java/
              seed/java-sdk/
              seed/java-model/
              seed/java-spring/
            generator-name: java
          - files: |
              generators/typescript/
              seed/ts-sdk/
              seed/ts-express/
            generator-name: typescript
          - files: |
              generators/go/
              seed/go-sdk/
              seed/go-model/
              seed/go-fiber/
            generator-name: go
          - files: |
              generators/csharp/
              seed/csharp-sdk/
              seed/csharp-model/
            generator-name: csharp
          - files: |
              generators/php/
              seed/php-sdk/
              seed/php-model/
            generator-name: php
          - files: |
              generators/swift/
              seed/swift-sdk/
            generator-name: swift
          - files: |
              generators/rust/
              seed/rust-model/
              seed/rust-sdk/
            generator-name: rust
    outputs:
      seed: ${{ github.event_name == 'workflow_dispatch' ||  steps.set-output.outputs.seed-changes }}
      ruby: ${{ steps.set-output.outputs.ruby-changes }}
      ruby-v2: ${{ steps.set-output.outputs.ruby-v2-changes }}
      openapi: ${{ steps.set-output.outputs.openapi-changes }}
      python: ${{ steps.set-output.outputs.python-changes }}
      postman: ${{ steps.set-output.outputs.postman-changes }}
      java: ${{ steps.set-output.outputs.java-changes }}
      typescript: ${{ steps.set-output.outputs.typescript-changes }}
      go: ${{ steps.set-output.outputs.go-changes }}
      csharp: ${{ steps.set-output.outputs.csharp-changes }}
      php: ${{ steps.set-output.outputs.php-changes }}
      swift: ${{ steps.set-output.outputs.swift-changes }}
      rust: ${{ steps.set-output.outputs.rust-changes }}

    steps:
      - if: github.event_name != 'workflow_dispatch'
        name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Get sufficient history to check for changes
          fetch-depth: 200
          sparse-checkout: |
            ${{ matrix.files }}
            .github/

      - name: Get generator changes for ${{ matrix.generator-name }}
        id: get-generator-changes
        uses: ./.github/actions/check-for-changed-files
        with:
          files: ${{ matrix.files }}

      - name: Set output
        id: set-output
        run: |
          echo "${{ matrix.generator-name }}-changes=${{ steps.get-generator-changes.outputs.any_changed }}" >> $GITHUB_OUTPUT
    
  build-matrices:
    runs-on: ubuntu-latest
    outputs:
      built-matrix: ${{ steps.combine-matrices.outputs.built-matrix }}
    steps:
      - name: Build ruby-model matrix
        id: build-ruby-model-matrix
        run: |
          SDK_NAME="ruby-model"
          GEN_PATH="generators/ruby"
          LANG_NAME="ruby"
          ALLOW_FAIL="true"
          BASH_VAR='{\"${SDK_NAME}\": {\"generator-path\": \"${GEN_PATH}\", "language-name": \"${LANG_NAME}\", \"allow-failures\": \"$ALLOW_FAIL\"}}'
          echo "ruby_model_matrix=$BASH_VAR" >> $GITHUB_OUTPUT
      - name: Build python-sdk matrix
        id: build-python-sdk-matrix
        run: |
          SDK_NAME="python-sdk"
          GEN_PATH="generators/python"
          LANG_NAME="python"
          ALLOW_FAIL="true"
          BASH_VAR='{\"${SDK_NAME}\": {\"generator-path\": \"${GEN_PATH}\", "language-name": \"${LANG_NAME}\", \"allow-failures\": \"$ALLOW_FAIL\"}}'
          echo "python_sdk_matrix=$BASH_VAR" >> $GITHUB_OUTPUT

          # debug
          echo "${BASH_VAR}" | jq .

      - name: Combine matrices
        id: combine-matrices
        run: |
          # debug
          echo "${{steps.build-ruby-model-matrix.outputs.ruby_model_matrix}}" | jq .
          echo "${{steps.build-python-sdk-matrix.outputs.python_sdk_matrix}}" | jq .

          # # Combine all built matrices into a single JSON object. Wrap in array for GitHub matrix
          # # strategy format.
          # combined=$(echo "${{steps.build-ruby-model-matrix.outputs.ruby_model_matrix}} ${{steps.build-python-sdk-matrix.outputs.python_sdk_matrix}}" | jq -s -c 'add')
          # matrix=$(echo "$combined" | jq '[.]')
          # echo "built-matrix=$matrix" >> $GITHUB_OUTPUT
          
          # # Output for debug
          # echo "${matrix}" | jq .


    

# bash-3.2$ GEN_PATH="folder/file"
# bash-3.2$ ruby_test="{\"ruby-model\": {\"generator-path\": \"${GEN_PATH}\", \"other\": 2}}"
# bash-3.2$ echo "${ruby_test}" | jq .


