    needs: [changes, setup]
    if: ${{ needs.changes.outputs.csharp == 'true' ||  needs.changes.outputs.seed == 'true' }}
    runs-on: Seed
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
