          create-pr: ${{ needs.setup.outputs.create-pr }}
          secret-fern-github-pat: ${{ secrets.FERN_GITHUB_PAT }}
          secret-pr-bot-gh-pat: ${{ secrets.PR_BOT_GH_PAT }}

  ruby-sdk-v2-seed-update:
