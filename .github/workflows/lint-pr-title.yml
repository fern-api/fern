name: Lint PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

env:
  DO_NOT_TRACK: "1"

jobs:
  run:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            fix
            feat
            revert
            break
            chore
          scopes: |
            docs
            changelog
            internal
            cli
            typescript
            python
            java
            csharp
            go
            php
            ruby
            seed
            ci
            lint
            openapi
            deps
            deps-dev
            pydantic
            ai-search
            swift
            rust
            generator-cli
            parser
            ir
            cli-v2
          requireScope: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
