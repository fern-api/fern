name: Validate Changelogs

on:
  pull_request:

jobs:
  validate-changelogs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install
        uses: ./.github/actions/install

      - name: Check for changelog entries
        env:
          BASE_REF: ${{ github.base_ref }}
        run: npx tsx scripts/validate-changelogs.ts
