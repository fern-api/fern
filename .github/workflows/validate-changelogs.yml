name: Validate Changelogs

on:
  pull_request:

jobs:
  validate-changelogs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changelog entries
        run: |
          # Read release-config.json and validate changelog entries for changed software

          if [ ! -f "release-config.json" ]; then
            echo "⚠️  release-config.json not found, skipping validation"
            exit 0
          fi

          # Get all changed files in the PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "✅ No files changed"
            exit 0
          fi

          echo "📂 Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          # Parse release-config.json and validate using Node.js
          node << 'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');

          // Read configuration
          const config = JSON.parse(fs.readFileSync('release-config.json', 'utf-8'));
          const changedFiles = execSync('git diff --name-only origin/${{ github.base_ref }}...HEAD', { encoding: 'utf-8' }).trim().split('\n');

          let hasErrors = false;
          const errors = [];

          // Check each configured software
          for (const [softwareName, softwareConfig] of Object.entries(config.software)) {
            const softwareDir = softwareConfig.softwareDirectory || softwareConfig.versionsFile.split('/').slice(0, -1).join('/');
            const changelogFolder = softwareConfig.changelogFolder || softwareDir + '/changes';
            const unreleasedDir = changelogFolder + '/unreleased';

            // Check if any files in the software directory were changed (excluding changelog directory)
            const softwareChanges = changedFiles.filter(file =>
              file.startsWith(softwareDir + '/') &&
              !file.startsWith(changelogFolder + '/')
            );

            if (softwareChanges.length === 0) {
              continue; // No changes to this software
            }

            console.log(`\n📝 ${softwareConfig.name} changes detected:`);
            softwareChanges.forEach(file => console.log(`   - ${file}`));

            // Check if any changelog entries were added
            const changelogChanges = changedFiles.filter(file =>
              file.startsWith(unreleasedDir + '/') &&
              (file.endsWith('.yml') || file.endsWith('.yaml')) &&
              !file.includes('/.template.') &&
              !file.includes('/.gitkeep')
            );

            if (changelogChanges.length === 0) {
              hasErrors = true;
              errors.push({
                software: softwareConfig.name,
                softwareDir,
                unreleasedDir,
                changesCount: softwareChanges.length
              });
            } else {
              console.log(`✅ Changelog entries found:`);
              changelogChanges.forEach(file => console.log(`   - ${file}`));
            }
          }

          // Report errors
          if (hasErrors) {
            console.log('\n❌ Missing changelog entries:\n');
            errors.forEach(error => {
              console.log(`Software: ${error.software}`);
              console.log(`  - ${error.changesCount} file(s) changed in ${error.softwareDir}/`);
              console.log(`  - No changelog entry found in ${error.unreleasedDir}/`);
              console.log('');
              console.log(`  Please create a changelog entry in ${error.unreleasedDir}/ with this format:`);
              console.log('');
              console.log('  # yaml-language-server: $schema=../../../../../fern-changes-yml.schema.json');
              console.log('');
              console.log('  - summary: |');
              console.log('      Your change description here');
              console.log('    type: fix|chore|feat|internal|break');
              console.log('    # Severity is auto-determined: fix/chore=patch, feat/internal=minor, break=major');
              console.log('');
            });
            process.exit(1);
          }

          console.log('\n✅ All required changelog entries are present');
          EOF
