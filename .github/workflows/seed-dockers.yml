name: Build seed containers

on:
  push:
    branches:
      - main
    paths:
      - "docker/seed/*"
      - ".github/workflows/seed-dockers.yml"
  workflow_dispatch:
    inputs:
      all:
        description: Rebuild all seed containers
        type: boolean
        default: false
      ts:
        description: Rebuild TypeScript seed container
        type: boolean
        default: false
      java:
        description: Rebuild Java seed container
        type: boolean
        default: false
      python:
        description: Rebuild Python seed container
        type: boolean
        default: false
      csharp:
        description: Rebuild C# seed container
        type: boolean
        default: false
      php:
        description: Rebuild PHP seed container
        type: boolean
        default: false
      go:
        description: Rebuild Go seed container
        type: boolean
        default: false

# Cancel previous workflows on previous push
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DO_NOT_TRACK: "1"
  DOCKER_BUILDKIT: 1

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.set-output.outputs.ts }}
      java: ${{ steps.set-output.outputs.java }}
      python: ${{ steps.set-output.outputs.python }}
      csharp: ${{ steps.set-output.outputs.csharp }}
      php: ${{ steps.set-output.outputs.php }}
      go: ${{ steps.set-output.outputs.go }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
          fetch-tags: false
          persist-credentials: false

      - name: Check for ts changes
        id: ts
        uses: ./.github/actions/check-for-changed-files
        with:
          files: docker/seed/Dockerfile.ts

      - name: Check for java changes
        id: java
        uses: ./.github/actions/check-for-changed-files
        with:
          files: docker/seed/Dockerfile.java

      - name: Check for python changes
        id: python
        uses: ./.github/actions/check-for-changed-files
        with:
          files: docker/seed/Dockerfile.python

      - name: Check for csharp changes
        id: csharp
        uses: ./.github/actions/check-for-changed-files
        with:
          files: docker/seed/Dockerfile.csharp

      - name: Check for php changes
        id: php
        uses: ./.github/actions/check-for-changed-files
        with:
          files: docker/seed/Dockerfile.php

      - name: Check for go changes
        id: go
        uses: ./.github/actions/check-for-changed-files
        with:
          files: docker/seed/Dockerfile.go

      - name: Check for workflow changes
        id: workflow
        uses: ./.github/actions/check-for-changed-files
        with:
          files: .github/workflows/seed-dockers.yml

      - name: Set outputs
        id: set-output
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual run: use inputs to select packages
            if [[ "${{ inputs.all }}" == "true" ]]; then
              echo "ts=true" >> $GITHUB_OUTPUT
              echo "java=true" >> $GITHUB_OUTPUT
              echo "python=true" >> $GITHUB_OUTPUT
              echo "csharp=true" >> $GITHUB_OUTPUT
              echo "php=true" >> $GITHUB_OUTPUT
              echo "go=true" >> $GITHUB_OUTPUT
              echo "Manual run: rebuilding all images"
            else
              echo "ts=${{ inputs.ts }}" >> $GITHUB_OUTPUT
              echo "java=${{ inputs.java }}" >> $GITHUB_OUTPUT
              echo "python=${{ inputs.python }}" >> $GITHUB_OUTPUT
              echo "csharp=${{ inputs.csharp }}" >> $GITHUB_OUTPUT
              echo "php=${{ inputs.php }}" >> $GITHUB_OUTPUT
              echo "go=${{ inputs.go }}" >> $GITHUB_OUTPUT
              echo "Manual run: selected images set from inputs"
            fi
          else
            # Push event: use path-based change detection
            if [[ "${STEPS_WORKFLOW_OUTPUTS_ANY_CHANGED}" == "true" ]]; then
              echo "ts=true" >> $GITHUB_OUTPUT
              echo "java=true" >> $GITHUB_OUTPUT
              echo "python=true" >> $GITHUB_OUTPUT
              echo "csharp=true" >> $GITHUB_OUTPUT
              echo "php=true" >> $GITHUB_OUTPUT
              echo "go=true" >> $GITHUB_OUTPUT
              echo "Workflow changed, rebuilding all images"
            else
              echo "ts=${STEPS_TS_OUTPUTS_ANY_CHANGED}" >> $GITHUB_OUTPUT
              echo "java=${STEPS_JAVA_OUTPUTS_ANY_CHANGED}" >> $GITHUB_OUTPUT
              echo "python=${STEPS_PYTHON_OUTPUTS_ANY_CHANGED}" >> $GITHUB_OUTPUT
              echo "csharp=${STEPS_CSHARP_OUTPUTS_ANY_CHANGED}" >> $GITHUB_OUTPUT
              echo "php=${STEPS_PHP_OUTPUTS_ANY_CHANGED}" >> $GITHUB_OUTPUT
              echo "go=${STEPS_GO_OUTPUTS_ANY_CHANGED}" >> $GITHUB_OUTPUT
              echo "Set outputs based on individual file changes"
            fi
          fi
        env:
          STEPS_WORKFLOW_OUTPUTS_ANY_CHANGED: ${{ steps.workflow.outputs.any_changed }}
          STEPS_TS_OUTPUTS_ANY_CHANGED: ${{ steps.ts.outputs.any_changed }}
          STEPS_JAVA_OUTPUTS_ANY_CHANGED: ${{ steps.java.outputs.any_changed }}
          STEPS_PYTHON_OUTPUTS_ANY_CHANGED: ${{ steps.python.outputs.any_changed }}
          STEPS_CSHARP_OUTPUTS_ANY_CHANGED: ${{ steps.csharp.outputs.any_changed }}
          STEPS_PHP_OUTPUTS_ANY_CHANGED: ${{ steps.php.outputs.any_changed }}
          STEPS_GO_OUTPUTS_ANY_CHANGED: ${{ steps.go.outputs.any_changed }}

  generate-sha:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build-ts:
    if: ${{ needs.changes.outputs.ts == 'true' }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        arch: [amd64, arm64]
        exclude:
          # Avoid building arm64 on amd64 runner and vice versa
          - runner: ubuntu-latest
            arch: arm64
          - runner: ubuntu-24.04-arm
            arch: amd64
    runs-on: ${{ matrix.runner }}
    needs: [changes, generate-sha]
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: fernapi/ts-seed
          tags: |
            type=raw,value=${{ needs.generate-sha.outputs.sha }}-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: fernapi
          password: ${{ secrets.FERN_API_DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./docker/seed/Dockerfile.ts
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-java:
    if: ${{ needs.changes.outputs.java == 'true' }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        arch: [amd64, arm64]
        exclude:
          - runner: ubuntu-latest
            arch: arm64
          - runner: ubuntu-24.04-arm
            arch: amd64
    runs-on: ${{ matrix.runner }}
    needs: [changes, generate-sha]
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: fernapi/java-seed
          tags: |
            type=raw,value=${{ needs.generate-sha.outputs.sha }}-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: fernapi
          password: ${{ secrets.FERN_API_DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./docker/seed/Dockerfile.java
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-python:
    if: ${{ needs.changes.outputs.python == 'true' }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        arch: [amd64, arm64]
        exclude:
          - runner: ubuntu-latest
            arch: arm64
          - runner: ubuntu-24.04-arm
            arch: amd64
    runs-on: ${{ matrix.runner }}
    needs: [changes, generate-sha]
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: fernapi/python-seed
          tags: |
            type=raw,value=${{ needs.generate-sha.outputs.sha }}-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: fernapi
          password: ${{ secrets.FERN_API_DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./docker/seed/Dockerfile.python
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-csharp:
    if: ${{ needs.changes.outputs.csharp == 'true' }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        arch: [amd64, arm64]
        exclude:
          - runner: ubuntu-latest
            arch: arm64
          - runner: ubuntu-24.04-arm
            arch: amd64
    runs-on: ${{ matrix.runner }}
    needs: [changes, generate-sha]
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: fernapi/csharp-seed
          tags: |
            type=raw,value=${{ needs.generate-sha.outputs.sha }}-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: fernapi
          password: ${{ secrets.FERN_API_DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./docker/seed/Dockerfile.csharp
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-php:
    if: ${{ needs.changes.outputs.php == 'true' }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        arch: [amd64, arm64]
        exclude:
          - runner: ubuntu-latest
            arch: arm64
          - runner: ubuntu-24.04-arm
            arch: amd64
    runs-on: ${{ matrix.runner }}
    needs: [changes, generate-sha]
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: fernapi/php-seed
          tags: |
            type=raw,value=${{ needs.generate-sha.outputs.sha }}-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: fernapi
          password: ${{ secrets.FERN_API_DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./docker/seed/Dockerfile.php
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-go:
    if: ${{ needs.changes.outputs.go == 'true' }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        arch: [amd64, arm64]
        exclude:
          - runner: ubuntu-latest
            arch: arm64
          - runner: ubuntu-24.04-arm
            arch: amd64
    runs-on: ${{ matrix.runner }}
    needs: [changes, generate-sha]
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: fernapi/go-seed
          tags: |
            type=raw,value=${{ needs.generate-sha.outputs.sha }}-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: fernapi
          password: ${{ secrets.FERN_API_DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./docker/seed/Dockerfile.go
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  merge-manifests:
    if: ${{ !cancelled() && (needs.changes.outputs.ts == 'true' || needs.changes.outputs.java == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.csharp == 'true' || needs.changes.outputs.php == 'true' || needs.changes.outputs.go == 'true') }}
    needs: [changes, build-ts, build-java, build-python, build-csharp, build-php, build-go, generate-sha]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: fernapi
          password: ${{ secrets.FERN_API_DOCKERHUB_PASSWORD }}

      - name: Build package list
        id: build-list
        run: |
          packages=""
          if [[ "${NEEDS_CHANGES_OUTPUTS_TS}" == "true" ]]; then
            packages+="ts "
          fi
          if [[ "${NEEDS_CHANGES_OUTPUTS_JAVA}" == "true" ]]; then
            packages+="java "
          fi
          if [[ "${NEEDS_CHANGES_OUTPUTS_PYTHON}" == "true" ]]; then
            packages+="python "
          fi
          if [[ "${NEEDS_CHANGES_OUTPUTS_CSHARP}" == "true" ]]; then
            packages+="csharp "
          fi
          if [[ "${NEEDS_CHANGES_OUTPUTS_PHP}" == "true" ]]; then
            packages+="php "
          fi
          if [[ "${NEEDS_CHANGES_OUTPUTS_GO}" == "true" ]]; then
            packages+="go "
          fi
          echo "packages=${packages% }" >> $GITHUB_OUTPUT
          echo "Building manifests for: ${packages% }"
        env:
          NEEDS_CHANGES_OUTPUTS_TS: ${{ needs.changes.outputs.ts }}
          NEEDS_CHANGES_OUTPUTS_JAVA: ${{ needs.changes.outputs.java }}
          NEEDS_CHANGES_OUTPUTS_PYTHON: ${{ needs.changes.outputs.python }}
          NEEDS_CHANGES_OUTPUTS_CSHARP: ${{ needs.changes.outputs.csharp }}
          NEEDS_CHANGES_OUTPUTS_PHP: ${{ needs.changes.outputs.php }}
          NEEDS_CHANGES_OUTPUTS_GO: ${{ needs.changes.outputs.go }}

      - name: Create and push manifest
        run: |
          packages='${STEPS_BUILD_LIST_OUTPUTS_PACKAGES}'
          sha='${NEEDS_GENERATE_SHA_OUTPUTS_SHA}'
          for package in $packages; do
            docker buildx imagetools create -t fernapi/${package}-seed:latest \
              fernapi/${package}-seed:latest-amd64 \
              fernapi/${package}-seed:latest-arm64

            docker buildx imagetools create -t fernapi/${package}-seed:${sha} \
              fernapi/${package}-seed:${sha}-amd64 \
              fernapi/${package}-seed:${sha}-arm64
          done
        env:
          STEPS_BUILD_LIST_OUTPUTS_PACKAGES: ${{ steps.build-list.outputs.packages }}
          NEEDS_GENERATE_SHA_OUTPUTS_SHA: ${{ needs.generate-sha.outputs.sha }}
