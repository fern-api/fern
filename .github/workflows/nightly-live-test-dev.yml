name: Nightly Live Test (Dev)

# Runs the `live-test-dev` checks against the dev2 environment on a nightly
# schedule, in addition to the existing push-to-main run in `ci.yml`. The
# scheduled cadence catches breakage caused by upstream services (Venus, Fiddle)
# deploying to dev2 even when no fern code changes — which is what happened
# during the PR #438 incident. See FER-10553.
#
# On failure, this workflow posts to Slack via the `SLACK_WEBHOOK_URL` secret.
# If that secret is unset, the notification step no-ops with a warning so the
# workflow can be enabled before the webhook is provisioned.

on:
  # Runs every night at 6:00 AM UTC (matches test-remote-vs-local-generation-parity).
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger for ad-hoc verification (e.g. after wiring up the Slack webhook).
  workflow_dispatch: {}

# Schedule + manual dispatches always target main. Cancel pending duplicate runs
# in favor of the newest invocation; let the in-flight run finish (the test
# generates real artifacts against dev2, killing it mid-flight can leave orphans).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DO_NOT_TRACK: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: "buildwithfern"
  TURBO_NO_UPDATE_NOTIFIER: "1"
  TURBO_DAEMON: "false"

jobs:
  live-test-dev:
    # Skip scheduled runs on forks: the dev environment secrets are not available
    # there and any failure alert would just be noise.
    if: github.repository == 'fern-api/fern'
    environment: Fern Dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install

      - name: Run live-test against dev2
        env:
          FORCE_COLOR: "2"
          FERN_ORG_TOKEN_DEV: ${{ secrets.FERN_ORG_TOKEN_DEV }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          DOCS_FIXTURE_DIR: ${{ github.workspace }}/windows
        run: |
          pnpm turbo run dist:cli:dev --filter @fern-api/cli
          cli_path="$(pwd)/packages/cli/cli/dist/dev/cli.cjs"
          ./scripts/live-test.sh "$cli_path" "$FERN_ORG_TOKEN_DEV"

      - name: Notify Slack on failure
        # Only alert on scheduled failures. Manual dispatches are usually
        # debugging runs; surfacing those would create false-positive noise.
        if: ${{ failure() && github.event_name == 'schedule' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not set; skipping Slack notification. Add it in the 'Fern Dev' environment to enable alerts."
            exit 0
          fi
          payload=$(jq -nc \
            --arg text ":rotating_light: Nightly \`live-test-dev\` failed on fern-api/fern. <${RUN_URL}|View run> — investigate before the next prod deploy (see FER-10553)." \
            '{text: $text}')
          curl -fsS -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
