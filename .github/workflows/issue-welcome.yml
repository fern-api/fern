name: Welcome New Issue Authors

on:
  issues:
    types: [opened]

permissions:
  issues: write

env:
  DO_NOT_TRACK: "1"

jobs:
  welcome:
    name: Post welcome comment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;

            // Check if this is the author's first issue in the repo
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: "all",
              per_page: 2,
            });

            // Filter out PRs (they appear in the issues API)
            const authorIssues = issues.filter(i => !i.pull_request);
            const isFirstIssue = authorIssues.length <= 1;

            // Build the welcome message
            let body = "";
            if (isFirstIssue) {
              body += `Thanks for opening your first issue, @${author}! Welcome to the Fern community. 🌿\n\n`;
            } else {
              body += `Thanks for opening this issue, @${author}!\n\n`;
            }

            body += `Our team will review this shortly. In the meantime:\n`;
            body += `- Check out our [documentation](https://buildwithfern.com/learn) for guides and references\n`;
            body += `- Join our [Discord](https://discord.com/invite/JkkXumPzcG) for real-time help and discussion\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: body,
            });
            console.log(`Posted welcome comment on #${issue.number} for @${author} (first issue: ${isFirstIssue})`);
