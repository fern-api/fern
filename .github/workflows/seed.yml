name: Seed Snapshot Tests

on:
  push:
    branches:
      - main
  # Note: pull request trigger will be removed once repository_dispatch trigger is verified
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  repository_dispatch:
    types: [seed-tests]
  workflow_call:
  workflow_dispatch:

# Cancel previous workflows on previous push
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # Note: purposely excluding seed. Running every generator at once will lock up all of our runners.
      ruby: ${{ steps.get-generator-changes.outputs.ruby }}
      ruby-v2: ${{ steps.get-generator-changes.outputs.ruby-v2 }}
      openapi: ${{ steps.get-generator-changes.outputs.openapi }}
      python: ${{ steps.get-generator-changes.outputs.python }}
      postman: ${{ steps.get-generator-changes.outputs.postman }}
      java: ${{ steps.get-generator-changes.outputs.java }}
      typescript: ${{ steps.get-generator-changes.outputs.typescript }}
      go: ${{ steps.get-generator-changes.outputs.go }}
      csharp: ${{ steps.get-generator-changes.outputs.csharp }}
      php: ${{ steps.get-generator-changes.outputs.php }}
      swift: ${{ steps.get-generator-changes.outputs.swift }}
      rust: ${{ steps.get-generator-changes.outputs.rust }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Get sufficient history to check for changes
          fetch-depth: 200
      - name: Get generator changes
        id: get-generator-changes
        uses: ./.github/actions/get-generator-changes

  get-all-test-matrices:
    runs-on: ubuntu-latest
    outputs:
      ruby-model: ${{ steps.get-test-matrices.outputs.ruby-model }}
      ruby-sdk: ${{ steps.get-test-matrices.outputs.ruby-sdk }}
      ruby-sdk-v2: ${{ steps.get-test-matrices.outputs.ruby-sdk-v2 }}
      pydantic: ${{ steps.get-test-matrices.outputs.pydantic }}
      python-sdk: ${{ steps.get-test-matrices.outputs.python-sdk }}
      fastapi: ${{ steps.get-test-matrices.outputs.fastapi }}
      openapi: ${{ steps.get-test-matrices.outputs.openapi }}
      postman: ${{ steps.get-test-matrices.outputs.postman }}
      java-sdk: ${{ steps.get-test-matrices.outputs.java-sdk }}
      java-model: ${{ steps.get-test-matrices.outputs.java-model }}
      java-spring: ${{ steps.get-test-matrices.outputs.java-spring }}
      ts-sdk: ${{ steps.get-test-matrices.outputs.ts-sdk }}
      ts-express: ${{ steps.get-test-matrices.outputs.ts-express }}
      go-fiber: ${{ steps.get-test-matrices.outputs.go-fiber }}
      go-model: ${{ steps.get-test-matrices.outputs.go-model }}
      go-sdk: ${{ steps.get-test-matrices.outputs.go-sdk }}
      csharp-model: ${{ steps.get-test-matrices.outputs.csharp-model }}
      csharp-sdk: ${{ steps.get-test-matrices.outputs.csharp-sdk }}
      php-model: ${{ steps.get-test-matrices.outputs.php-model }}
      php-sdk: ${{ steps.get-test-matrices.outputs.php-sdk }}
      swift-sdk: ${{ steps.get-test-matrices.outputs.swift-sdk }}
      rust-model: ${{ steps.get-test-matrices.outputs.rust-model }}
      rust-sdk: ${{ steps.get-test-matrices.outputs.rust-sdk }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get Test Matrices
        id: get-test-matrices
        uses: ./.github/actions/get-test-matrices


  ruby-model:
    runs-on: ubuntu-latest
    needs: [changes, get-all-test-matrices]
    if: >-
      ${{
        (needs.changes.outputs.ruby == 'true'
        && github.event.pull_request.draft == false) || github.event_name == 'workflow_dispatch'
      }}
    strategy:
      fail-fast: false # Let all tests run, even if some fail
      matrix: 
        fixtures: ${{ fromJSON(needs.get-all-test-matrices.outputs.ruby-model) }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run seed
        uses: ./.github/actions/cached-seed
        with:
          generator-name: ruby-model
          generator-path: generators/ruby
          fixtures-to-run: ${{ matrix.fixtures }}

  ruby-sdk:
