    timeout-minutes: 15
    needs: [setup, get-all-test-matrices]
    # if: >-
    #   ${{
    #     (needs.get-all-test-matrices.outputs.rust-model != ''
    #     && github.event.pull_request.draft == false) || github.event_name == 'workflow_dispatch'
    #   }}
    if: false # generator not actively supported
