name: Java Generator

on:
  pull_request:
    paths:
      - "generators/java/**"
    branches:
      - main
  workflow_call:

env:
  DO_NOT_TRACK: "1"

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "adopt"
          java-version: "11"

      - name: Build with Gradle
        working-directory: ./generators/java
        run: ./gradlew compileJava

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "adopt"
          java-version: "11"

      - name: Build with Gradle
        working-directory: ./generators/java
        env:
          TERM: dumb
        run: ./gradlew test

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "adopt"
          java-version: "11"

      - env:
          TERM: dumb
        name: Build with Gradle
        working-directory: ./generators/java
        run: ./gradlew check -x test
