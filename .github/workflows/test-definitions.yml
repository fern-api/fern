name: Validate Test Definitions

on:
  push:
    paths:
      - "packages/**"
      - "test-definitions/**"
      - "test-definitions-openapi/**"
    branches:
      - main
  pull_request:
    paths:
      - "packages/**"
      - "test-definitions/**"
      - "test-definitions-openapi/**"
    branches:
      - main

# Cancel previous workflows on previous push
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DO_NOT_TRACK: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: "buildwithfern"
  TURBO_REMOTE_CACHE_TIMEOUT: 10
  TURBO_NO_UPDATE_NOTIFIER: "1"
  TURBO_DAEMON: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install

      - uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ github.token }}

      - name: Cache protoc-gen-openapi binary
        uses: actions/cache@v4
        with:
          path: ~/.fern/bin/protoc-gen-openapi
          key: protoc-gen-openapi-v0.1.13-${{ runner.os }}-${{ runner.arch }}

      - name: Install protoc-gen-openapi
        run: |
          mkdir -p "$HOME/.fern/bin"
          if [ ! -x "$HOME/.fern/bin/protoc-gen-openapi" ]; then
            curl -fsSL -o "$HOME/.fern/bin/protoc-gen-openapi" \
              "https://github.com/fern-api/protoc-gen-openapi/releases/download/v0.1.13/protoc-gen-openapi-linux-amd64"
            chmod +x "$HOME/.fern/bin/protoc-gen-openapi"
          fi
          echo "$HOME/.fern/bin" >> $GITHUB_PATH

      - name: Fern check
        env:
          FORCE_COLOR: "2"
        run: |
          pnpm turbo run dist:cli:dev --filter @fern-api/cli
          cli_path="$(pwd)/packages/cli/cli/dist/dev/cli.cjs" 
          cd test-definitions
          FERN_NO_VERSION_REDIRECTION=true node $cli_path check
          cd ../test-definitions-openapi
          FERN_NO_VERSION_REDIRECTION=true node $cli_path check
