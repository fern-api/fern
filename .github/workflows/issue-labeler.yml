name: Auto-label Issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

env:
  DO_NOT_TRACK: "1"

jobs:
  label:
    name: Apply labels from issue form
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const labelsToAdd = [];

            // --- Component labels ---
            const componentSection = body.match(/### Which Fern component\?\s*\n\n(.+)/);
            if (componentSection) {
              const component = componentSection[1].trim();
              const componentMap = {
                "CLI": "component:cli",
                "SDKs": "component:sdks",
                "Docs": "component:docs",
                "Dashboard": "component:dashboard",
                "Fern's Documentation": "component:fern-docs",
                "Other": "component:other",
              };
              if (componentMap[component]) {
                labelsToAdd.push(componentMap[component]);
              }
            }

            // --- Priority labels ---
            const prioritySection = body.match(/### How (?:urgent|important) is this\?\s*\n\n(.+)/);
            if (prioritySection) {
              const priority = prioritySection[1].trim();
              const priorityMap = {
                "P0 - Critical (Blocking work)": "priority:p0-critical",
                "P1 - High (Strongly needed)": "priority:p1-high",
                "P2 - Medium (Would be helpful)": "priority:p2-medium",
                "P3 - Low (Nice to have)": "priority:p3-low",
              };
              if (priorityMap[priority]) {
                labelsToAdd.push(priorityMap[priority]);
              }
            }

            // --- SDK language labels ---
            const langSection = body.match(/### Which SDK language\(s\)\?\s*\n\n([\s\S]*?)(?=\n###|\n*$)/);
            if (langSection) {
              const langText = langSection[1].trim();
              if (langText && langText !== "_No response_") {
                const langMap = {
                  "TypeScript": "lang:typescript",
                  "Python": "lang:python",
                  "Java": "lang:java",
                  "Go": "lang:go",
                  "C#": "lang:csharp",
                  "PHP": "lang:php",
                  "Ruby": "lang:ruby",
                  "Swift": "lang:swift",
                  "Rust": "lang:rust",
                };
                for (const [lang, label] of Object.entries(langMap)) {
                  if (langText.includes(lang)) {
                    labelsToAdd.push(label);
                  }
                }
              }
            }

            if (labelsToAdd.length === 0) {
              console.log("No labels to add.");
              return;
            }

            // Ensure labels exist (create if missing)
            const existingLabels = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingLabelNames = existingLabels.data.map(l => l.name);

            const colorMap = {
              "component:": "0075ca",
              "priority:p0": "b60205",
              "priority:p1": "d93f0b",
              "priority:p2": "fbca04",
              "priority:p3": "0e8a16",
              "lang:": "5319e7",
            };

            for (const label of labelsToAdd) {
              if (!existingLabelNames.includes(label)) {
                let color = "ededed";
                for (const [prefix, c] of Object.entries(colorMap)) {
                  if (label.startsWith(prefix)) {
                    color = c;
                    break;
                  }
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: color,
                });
                console.log(`Created label: ${label}`);
              }
            }

            // Apply labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labelsToAdd,
            });
            console.log(`Applied labels: ${labelsToAdd.join(", ")}`);
