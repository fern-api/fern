name: Publish @fern-api/snippets-core

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version of the library to publish."
        required: true
        type: string

env:
  DO_NOT_TRACK: "1"
  PACKAGE_NAME: "@fern-api/snippets-core"
  GITHUB_TOKEN: ${{ secrets.FERN_GITHUB_TOKEN }}

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    if: ${{ inputs.version != null }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: 📥 Install
        uses: ./.github/actions/install

      - name: Cache Fern bin dependencies
        uses: actions/cache@v4
        with:
          path: ~/.fern/bin
          key: ${{ runner.os }}-fern-bin-${{ hashFiles('packages/cli/workspace/lazy-fern-workspace/src/protobuf/BufDownloader.ts', 'packages/cli/workspace/lazy-fern-workspace/src/protobuf/ProtocGenOpenAPIDownloader.ts') }}
          restore-keys: |
            ${{ runner.os }}-fern-bin-

      - name: Build CLI for install-dependencies
        run: pnpm turbo run dist:cli:dev --filter=@fern-api/cli

      - name: Install protobuf dependencies (buf + protoc-gen-openapi)
        run: |
          FERN_NO_VERSION_REDIRECTION=true node packages/cli/cli/dist/dev/cli.cjs install-dependencies
          echo "$HOME/.fern/bin" >> $GITHUB_PATH

      - name: 🧪 Build
        run: pnpm turbo run compile --filter=${{ env.PACKAGE_NAME }}

      - name: 🧪 Test
        run: pnpm turbo run test --filter=${{ env.PACKAGE_NAME }}

      - name: Publish @fern-api/snippets-core
        run: |
          cd packages/snippets/core
          pnpm turbo run dist --filter=${{ env.PACKAGE_NAME }} -- ${{ inputs.version }}
          cd dist
          npx -y npm@11 publish --access public --tag latest
