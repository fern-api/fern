name: Publish @fern-api/snippets-core

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version of the library to publish."
        required: true
        type: string

env:
  DO_NOT_TRACK: "1"
  PACKAGE_NAME: "@fern-api/snippets-core"
  GITHUB_TOKEN: ${{ secrets.FERN_GITHUB_TOKEN }}

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    if: ${{ inputs.version != null }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: 📥 Install
        uses: ./.github/actions/install

      - uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ github.token }}

      - name: Cache protoc-gen-openapi binary
        uses: actions/cache@v4
        with:
          path: ~/.fern/bin/protoc-gen-openapi
          key: protoc-gen-openapi-v0.1.13-${{ runner.os }}-${{ runner.arch }}

      - name: Install protoc-gen-openapi
        run: |
          mkdir -p "$HOME/.fern/bin"
          if [ ! -x "$HOME/.fern/bin/protoc-gen-openapi" ]; then
            curl -fsSL -o "$HOME/.fern/bin/protoc-gen-openapi" \
              "https://github.com/fern-api/protoc-gen-openapi/releases/download/v0.1.13/protoc-gen-openapi-linux-amd64"
            chmod +x "$HOME/.fern/bin/protoc-gen-openapi"
          fi
          echo "$HOME/.fern/bin" >> $GITHUB_PATH

      - name: 🧪 Build
        run: pnpm turbo run compile --filter=${{ env.PACKAGE_NAME }}

      - name: 🧪 Test
        run: pnpm turbo run test --filter=${{ env.PACKAGE_NAME }}

      - name: Publish @fern-api/snippets-core
        run: |
          cd packages/snippets/core
          pnpm turbo run dist --filter=${{ env.PACKAGE_NAME }} -- ${{ inputs.version }}
          cd dist
          npx -y npm@11 publish --access public --tag latest
