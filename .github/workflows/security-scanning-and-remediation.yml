name: Create PRs to Remediate vulns

# ============================================================
# This workflow runs two independent security scans:
#
# 1. Dependabot Alerts (create-dependabot-prs job)
#    - Fetches open Dependabot alerts from GitHub
#    - Creates PRs for each alert with instructions for Devin AI
#
# 2. Grype Container Scans (matrix jobs)
#    - create-grype-pr-generators: scans every published
#      fernapi/fern-* generator image
#    - create-grype-pr-seed: scans every fernapi/*-seed image
#    - Each entry builds the container, scans it with grype, and
#      creates a PR if actionable vulnerabilities are found.
#
# TOKEN REQUIREMENTS:
# - FERN_GITHUB_TOKEN: PAT with `security_events` scope for Dependabot alerts
# - GITHUB_TOKEN: Default token for creating branches and PRs
# - DEVIN_AI_PR_BOT_SLACK_TOKEN: For Slack notifications to Devin AI
# ============================================================

on:
  schedule:
    # Run nightly at 8pm EST (1am UTC next day)
    - cron: "0 1 * * *"
  workflow_dispatch: # Allow manual triggering
    inputs:
      scan_only:
        description: 'Skip PR creation & Slack notifications'
        required: false
        default: true
        type: boolean

env:
  DO_NOT_TRACK: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: "buildwithfern"
  TURBO_NO_UPDATE_NOTIFIER: "1"
  TURBO_DAEMON: "false"

jobs:
  create-dependabot-prs:
    name: Check Dependabot alerts
    # Skip this job when triggered by cron schedule
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fetch Dependabot alerts
        id: fetch-alerts
        uses: actions/github-script@v8
        env:
          ALERTS_FILE: ${{ runner.temp }}/dependabot-alerts.json
        with:
          github-token: ${{ secrets.FERN_GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const alertsFile = process.env.ALERTS_FILE;

            // Fetch all open Dependabot alerts using FERN_GITHUB_TOKEN
            let alerts = [];
            try {
              const response = await github.rest.dependabot.listAlertsForRepo({
                owner,
                repo,
                state: 'open',
                per_page: 100
              });
              alerts = response.data;
            } catch (error) {
              if (error.status === 403) {
                console.log('ERROR: Unable to access Dependabot alerts. This is likely because:');
                console.log('1. The FERN_GITHUB_TOKEN secret is not set, OR');
                console.log('2. The token does not have the required `security_events` scope');
                console.log('');
                console.log('To fix: Ensure FERN_GITHUB_TOKEN is a PAT (classic) with `security_events` scope');
                fs.writeFileSync(alertsFile, '[]');
                core.setOutput('alerts_count', '0');
                return;
              }
              throw error;
            }

            // Persist alerts to a file on disk rather than passing the JSON
            // through step outputs/env vars. The full alert payload can exceed
            // the OS exec arg/env size limit (E2BIG "Argument list too long")
            // when there are many alerts or long advisory descriptions.
            fs.writeFileSync(alertsFile, JSON.stringify(alerts));
            console.log(`Found ${alerts.length} open Dependabot alerts. Wrote to ${alertsFile}.`);
            core.setOutput('alerts_count', String(alerts.length));
      - name: Create PRs and send Slack notifications
        id: create-prs
        if: ${{ steps.fetch-alerts.outputs.alerts_count != '0' && inputs.scan_only != true }}
        uses: actions/github-script@v8
        env:
          # ============================================================
          # DEVIN PROMPT CONFIGURATION
          # Edit the prompt below to customize instructions for Devin
          # ============================================================
          DEVIN_PROMPT: |
            @devin-ai-integration Please resolve this Dependabot security alert.

            **Instructions:**
            1. Analyze the vulnerability and understand its impact
            2. Update the affected dependency to a secure version. If updating a poetry lock file, use the same version of poetry used to generate the existing one.
            3. Ideally resolve this without using an override - prefer updating the dependency directly
            4. If an override is absolutely necessary, document why in the PR description
            5. Run tests to ensure the update doesn't break anything
            6. Push your fix to this PR branch and tag @davidkonigsberg for review
            7. Delete the scaffold file (.github/dependabot-alerts/alert-*.md) as part of your fix
            8. Update the PR title, if needed, to pass CI checks

            **Alert Details:**
          ALERTS_FILE: ${{ runner.temp }}/dependabot-alerts.json
          SLACK_TOKEN: ${{ secrets.DEVIN_AI_PR_BOT_SLACK_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const devinPrompt = process.env.DEVIN_PROMPT;
            const slackToken = process.env.SLACK_TOKEN;
            const slackChannelId = 'C0A23CZEFNF';
            const devinMention = '<@U088PL5FS3B>';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const baseBranch = 'main';

            const alertsFile = process.env.ALERTS_FILE;
            const alerts = fs.existsSync(alertsFile)
              ? JSON.parse(fs.readFileSync(alertsFile, 'utf8'))
              : [];
            if (alerts.length === 0) {
              console.log('No alerts to process.');
              return;
            }

            console.log(`Processing ${alerts.length} Dependabot alerts.`);

            // Fetch existing OPEN PRs to check for duplicates (closed PRs should not block new ones)
            const existingPRs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            // Create a set of alert numbers that already have open PRs
            const existingAlertNumbers = new Set();
            // Also track packages that already have open PRs to avoid creating multiple PRs for the same package
            const existingPackages = new Set();
            for (const pr of existingPRs) {
              const alertMatch = pr.title.match(/\[Dependabot Alert #(\d+)\]/);
              if (alertMatch) {
                existingAlertNumbers.add(parseInt(alertMatch[1]));
                // Extract package name from PR title (format: "[Dependabot Alert #N] SEVERITY: packageName vulnerability")
                const packageMatch = pr.title.match(/\[Dependabot Alert #\d+\] \w+: (.+) vulnerability/);
                if (packageMatch) {
                  existingPackages.add(packageMatch[1]);
                }
              }
            }

            console.log(`Found ${existingAlertNumbers.size} existing open PRs for Dependabot alerts.`);
            console.log(`Found ${existingPackages.size} packages with existing open PRs: ${[...existingPackages].join(', ')}`);

            // Track packages we create PRs for in this run to avoid duplicates within the same run
            const packagesWithNewPRs = new Set();

            // Get the base branch ref for creating new branches
            const baseRef = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${baseBranch}`,
            });
            const baseCommitSha = baseRef.data.object.sha;

            const baseCommit = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: baseCommitSha,
            });
            const baseTreeSha = baseCommit.data.tree.sha;

            // Helper function to send Slack notification
            async function sendSlackNotification(prInfo) {
              const message = `${devinMention} *New Dependabot Alert PR Created*\nNew PR created for Dependabot security alert. Please update the existing PR in the \`fern\` repo to address the dependabot alert "<${prInfo.alertUrl}|${prInfo.alertName}>". Follow the instructions in the existing <${prInfo.url}|PR>.`;
              
              try {
                const response = await fetch('https://slack.com/api/chat.postMessage', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${slackToken}`
                  },
                  body: JSON.stringify({
                    channel: slackChannelId,
                    text: message,
                    mrkdwn: true
                  })
                });
                
                const result = await response.json();
                if (result.ok) {
                  console.log(`Sent Slack notification for PR #${prInfo.number}: ${prInfo.alertName}`);
                } else {
                  console.error(`Failed to send Slack notification for PR #${prInfo.number}: ${result.error}`);
                }
              } catch (error) {
                console.error(`Error sending Slack notification for PR #${prInfo.number}: ${error.message}`);
              }
            }

            // Create PRs for new alerts
            let createdCount = 0;
            let skippedDueToPackage = 0;
            for (const alert of alerts) {
              if (existingAlertNumbers.has(alert.number)) {
                console.log(`PR already exists for alert #${alert.number}, skipping.`);
                continue;
              }

              const severity = alert.security_advisory?.severity || 'unknown';
              const packageName = alert.security_vulnerability?.package?.name || 'unknown package';

              // Skip if there's already an open PR for this package (either existing or created in this run)
              if (existingPackages.has(packageName) || packagesWithNewPRs.has(packageName)) {
                console.log(`PR already exists for package "${packageName}" (alert #${alert.number}), skipping to avoid duplicate PRs.`);
                skippedDueToPackage++;
                continue;
              }
              const ecosystem = alert.security_vulnerability?.package?.ecosystem || 'unknown';
              const vulnerableVersionRange = alert.security_vulnerability?.vulnerable_version_range || 'unknown';
              const patchedVersions = alert.security_vulnerability?.first_patched_version?.identifier || 'No patch available';
              const cveId = alert.security_advisory?.cve_id || 'N/A';
              const ghsaId = alert.security_advisory?.ghsa_id || 'N/A';
              const summary = alert.security_advisory?.summary || 'No summary available';
              const description = alert.security_advisory?.description || 'No description available';
              const manifestPath = alert.dependency?.manifest_path || 'unknown';

              const branchName = `dependabot-alert-${alert.number}-devin`;
              const filePath = `.github/dependabot-alerts/alert-${alert.number}.md`;

              // Check if branch already exists - if so, delete it (it's from a closed PR)
              try {
                await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${branchName}`,
                });
                // Branch exists but no open PR (we already checked for open PRs above)
                // Delete the old branch so we can create a fresh one
                console.log(`Deleting old branch ${branchName} from closed PR...`);
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branchName}`,
                });
              } catch (e) {
                if (e.status !== 404) throw e;
                // Branch doesn't exist, which is fine
              }

              const prTitle = `[Dependabot Alert #${alert.number}] ${severity.toUpperCase()}: ${packageName} vulnerability`;

              const alertContent = `${devinPrompt}
            - **Package:** ${packageName} (${ecosystem})
            - **Severity:** ${severity.toUpperCase()}
            - **Vulnerable versions:** ${vulnerableVersionRange}
            - **Patched version:** ${patchedVersions}
            - **CVE:** ${cveId}
            - **GHSA:** ${ghsaId}
            - **Manifest:** ${manifestPath}

            **Summary:**
            ${summary}

            **Description:**
            ${description}

            ---
            [View Dependabot Alert](https://github.com/${owner}/${repo}/security/dependabot/${alert.number})
            `;

              try {
                // Create a blob with the alert content
                const blob = await github.rest.git.createBlob({
                  owner,
                  repo,
                  content: alertContent,
                  encoding: 'utf-8',
                });

                // Create a tree with the new file
                const tree = await github.rest.git.createTree({
                  owner,
                  repo,
                  base_tree: baseTreeSha,
                  tree: [
                    {
                      path: filePath,
                      mode: '100644',
                      type: 'blob',
                      sha: blob.data.sha,
                    },
                  ],
                });

                // Create a commit
                const commit = await github.rest.git.createCommit({
                  owner,
                  repo,
                  message: `[Dependabot Alert #${alert.number}] Scaffold PR for ${packageName}`,
                  tree: tree.data.sha,
                  parents: [baseCommitSha],
                });

                // Create the branch
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${branchName}`,
                  sha: commit.data.sha,
                });

                // Create the PR
                const pr = await github.rest.pulls.create({
                  owner,
                  repo,
                  title: prTitle,
                  head: branchName,
                  base: baseBranch,
                  body: alertContent,
                  draft: true,
                });

                console.log(`Created PR for alert #${alert.number}: ${packageName}`);
                createdCount++;

                // Track this package so we don't create duplicate PRs for other alerts affecting the same package
                packagesWithNewPRs.add(packageName);

                // Send Slack notification immediately after creating the PR
                const alertUrl = `https://github.com/${owner}/${repo}/security/dependabot/${alert.number}`;
                await sendSlackNotification({
                  number: pr.data.number,
                  url: pr.data.html_url,
                  alertName: summary,
                  alertUrl
                });
              } catch (error) {
                console.error(`Failed to create PR for alert #${alert.number}: ${error.message}`);
              }
            }

            console.log(`Created ${createdCount} new PRs from Dependabot alerts.`);
            if (skippedDueToPackage > 0) {
              console.log(`Skipped ${skippedDueToPackage} alerts because PRs already exist for those packages.`);
            }

  # ============================================================
  # GRYPE CONTAINER VULNERABILITY SCANS
  #
  # Two matrix jobs scan every container we publish:
  #   - create-grype-pr-generators: fernapi/fern-* generator images
  #     (built via the seed `img` command, which uses each
  #     generator's `publish.docker` / `test.docker` config to
  #     run any required pre-build steps).
  #   - create-grype-pr-seed: fernapi/*-seed images (built
  #     directly from docker/seed/Dockerfile.<lang>).
  #
  # Each matrix entry runs in parallel with `fail-fast: false`
  # so a single broken build does not stop the rest of the scans.
  #
  # Adding a new container: append a new entry to the relevant
  # matrix list. `image` is the docker image name we scan, `seed`
  # is the seed workspace name (folder under /seed), and
  # `container` is the slug used in the resulting PR title and
  # branch name.
  # ============================================================

  create-grype-pr-generators:
    name: Run grype scan - ${{ matrix.generator.image }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        generator:
          - image: fernapi/fern-csharp-sdk
            seed: csharp-sdk
            container: csharp-sdk
          - image: fernapi/fern-go-sdk
            seed: go-sdk
            container: go-sdk
          - image: fernapi/fern-java-sdk
            seed: java-sdk
            container: java-sdk
          - image: fernapi/fern-openapi
            seed: openapi
            container: openapi
          - image: fernapi/fern-php-sdk
            seed: php-sdk
            container: php-sdk
          - image: fernapi/fern-pydantic-model-v2
            seed: pydantic-v2
            container: pydantic-model-v2
          - image: fernapi/fern-python-sdk
            seed: python-sdk
            container: python-sdk
          # Builds the fernapi/fern-ruby-sdk image (also tagged
          # fernapi/fern-ruby-sdk-v2 via the seed config alias).
          - image: fernapi/fern-ruby-sdk
            seed: ruby-sdk-v2
            container: ruby-sdk
          - image: fernapi/fern-rust-sdk
            seed: rust-sdk
            container: rust-sdk
          - image: fernapi/fern-swift-sdk
            seed: swift-sdk
            container: swift-sdk
          # Builds the fernapi/fern-typescript-sdk image (also
          # tagged fernapi/fern-typescript-node-sdk via alias).
          - image: fernapi/fern-typescript-sdk
            seed: ts-sdk
            container: typescript-sdk
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: "arn:aws:iam::985111089818:role/github-ci"
          aws-region: "us-east-1"

      - name: Install
        uses: ./.github/actions/install

      - name: Build seed CLI
        run: pnpm seed:build

      - name: Build generator container via seed img
        run: |
          for attempt in 1 2 3; do
            if node --enable-source-maps packages/seed/dist/cli.cjs img "${{ matrix.generator.seed }}" --tag 99.99.99 --log-level debug; then
              exit 0
            fi
            echo "::warning::seed img attempt $attempt/3 failed. Retrying in 15 seconds..."
            sleep 15
          done
          echo "::error::seed img failed after 3 attempts"
          exit 1

      - name: Resolve grype scan target
        id: scan-target
        env:
          IMAGE: ${{ matrix.generator.image }}
        run: |
          # Generators with a `publish.docker` config are tagged :99.99.99.
          # Generators that fall back to `test.docker.command` (e.g.
          # pydantic-v2's `dockerTagLatest` script) tag :latest, so retag
          # so the rest of the job can rely on a single tag.
          if ! docker image inspect "$IMAGE:99.99.99" >/dev/null 2>&1; then
            if docker image inspect "$IMAGE:latest" >/dev/null 2>&1; then
              docker tag "$IMAGE:latest" "$IMAGE:99.99.99"
            else
              echo "::error::Neither $IMAGE:99.99.99 nor $IMAGE:latest exists in the local docker daemon"
              docker image ls
              exit 1
            fi
          fi
          echo "image=$IMAGE:99.99.99" >> "$GITHUB_OUTPUT"

      - name: Push to ECR (to keep AWS scans up to date)
        # Best-effort. Skipped on PR / unauthenticated runs and tolerant of
        # missing repositories so a failure here doesn't block the scan.
        continue-on-error: true
        env:
          ECR_REGISTRY: 985111089818.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPO: dev/${{ matrix.generator.container }}-generator
          IMAGE: ${{ steps.scan-target.outputs.image }}
        run: |
          aws sts get-caller-identity
          aws ecr describe-repositories --repository-names "$ECR_REPO" --region us-east-1 >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPO" --region us-east-1
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker tag "$IMAGE" "$ECR_REGISTRY/$ECR_REPO:latest-${{ github.sha }}"
          docker push "$ECR_REGISTRY/$ECR_REPO:latest-${{ github.sha }}"

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run grype scan
        env:
          IMAGE: ${{ steps.scan-target.outputs.image }}
        run: grype "docker:$IMAGE" -o json > grype-report.json

      - name: Upload grype scan results
        uses: actions/upload-artifact@v6
        with:
          name: grype-scan-results-${{ matrix.generator.container }}
          path: grype-report.json
          retention-days: 30

      # ============================================================
      # IGNORED CVEs CONFIGURATION
      # Add CVEs here that have been reviewed and accepted as risks.
      # Format: One CVE ID per line in the ignored_cves input.
      # If you need per-generator ignore lists, replace the empty
      # string below with a lookup keyed off matrix.generator.container.
      # ============================================================
      - name: Process vulnerabilities and create PR
        # Skip PR creation for cron runs (scan_only=true) or when explicitly set
        if: ${{ github.event_name != 'schedule' && inputs.scan_only != true }}
        uses: ./.github/actions/process-grype-vulns
        with:
          container_name: ${{ matrix.generator.container }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          slack_token: ${{ secrets.DEVIN_AI_PR_BOT_SLACK_TOKEN }}
          ignored_cves: ""

  create-grype-pr-seed:
    name: Run grype scan - fernapi/${{ matrix.seed.lang }}-seed
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        seed:
          - lang: csharp
          - lang: java
          - lang: go
          - lang: python
          - lang: php
          - lang: ts
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: "arn:aws:iam::985111089818:role/github-ci"
          aws-region: "us-east-1"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container
        env:
          IMAGE: fernapi/${{ matrix.seed.lang }}-seed:grype-scan
        run: |
          docker build \
            -f docker/seed/Dockerfile.${{ matrix.seed.lang }} \
            -t "$IMAGE" \
            .

      - name: Push to ECR (to keep AWS scans up to date)
        # Best-effort. Tolerant of missing repositories so a failure here
        # doesn't block the scan.
        continue-on-error: true
        env:
          ECR_REGISTRY: 985111089818.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPO: dev/${{ matrix.seed.lang }}-seed
          IMAGE: fernapi/${{ matrix.seed.lang }}-seed:grype-scan
        run: |
          aws sts get-caller-identity
          aws ecr describe-repositories --repository-names "$ECR_REPO" --region us-east-1 >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPO" --region us-east-1
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker tag "$IMAGE" "$ECR_REGISTRY/$ECR_REPO:latest-${{ github.sha }}"
          docker push "$ECR_REGISTRY/$ECR_REPO:latest-${{ github.sha }}"

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run grype scan
        env:
          IMAGE: fernapi/${{ matrix.seed.lang }}-seed:grype-scan
        run: grype "docker:$IMAGE" -o json > grype-report.json

      - name: Upload grype scan results
        uses: actions/upload-artifact@v6
        with:
          name: grype-scan-results-${{ matrix.seed.lang }}-seed
          path: grype-report.json
          retention-days: 30

      - name: Process vulnerabilities and create PR
        # Skip PR creation for cron runs (scan_only=true) or when explicitly set
        if: ${{ github.event_name != 'schedule' && inputs.scan_only != true }}
        uses: ./.github/actions/process-grype-vulns
        with:
          container_name: ${{ matrix.seed.lang }}-seed
          github_token: ${{ secrets.GITHUB_TOKEN }}
          slack_token: ${{ secrets.DEVIN_AI_PR_BOT_SLACK_TOKEN }}
          ignored_cves: ""
