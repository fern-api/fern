name: Auto Release CLI

on:
  pull_request:
    types: [closed]
  workflow_run:
    workflows: ["Publish Fern CLI"]
    types:
      - completed

concurrency:
  group: cli-release-queue
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: "buildwithfern"

jobs:
  prepare-release:
    # Run if: PR merged with !autorelease OR publish workflow completed successfully
    if: |
      github.repository == 'fern-api/fern' && (
        (github.event_name == 'pull_request' &&
         github.event.pull_request.merged == true &&
         contains(github.event.pull_request.title, '!autorelease')) ||
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Uses GITHUB_TOKEN by default (automatically provided)

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install
        uses: ./.github/actions/install

      - name: Check for existing release PR
        id: check_release_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all open PRs and filter for release/cli-* pattern
          OPEN_RELEASE_PRS=$(gh pr list \
            --state open \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("release/cli-"))] | length')

          if [ "$OPEN_RELEASE_PRS" -gt 0 ]; then
            echo "has_release_pr=true" >> $GITHUB_OUTPUT
            echo "ℹ️ Found $OPEN_RELEASE_PRS existing release PR(s)"

            # List the existing PRs for visibility
            echo "Existing release PRs:"
            gh pr list --state open --head "release/cli-" --json number,title,url --jq '.[] | "  #\(.number): \(.title) - \(.url)"'
          else
            echo "has_release_pr=false" >> $GITHUB_OUTPUT
            echo "✅ No existing release PRs found"
          fi

      - name: Skip if release PR exists
        if: steps.check_release_pr.outputs.has_release_pr == 'true'
        run: |
          echo "## ⏸️ Release Queued" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A release PR is already open. Your changes have been queued and will be included in the next release." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**What happens next:**" >> $GITHUB_STEP_SUMMARY
          echo "1. The current release PR gets merged" >> $GITHUB_STEP_SUMMARY
          echo "2. CLI publishes to npm" >> $GITHUB_STEP_SUMMARY
          echo "3. This workflow runs again automatically" >> $GITHUB_STEP_SUMMARY
          echo "4. A new release PR is created with your queued changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 View existing release PRs:" >> $GITHUB_STEP_SUMMARY
          gh pr list --state open --head "release/cli-" --json number,title,url --jq '.[] | "- [#\(.number): \(.title)](\(.url))"' >> $GITHUB_STEP_SUMMARY

      - name: Check for unreleased changes
        if: steps.check_release_pr.outputs.has_release_pr == 'false'
        id: check_unreleased
        run: |
          # Check for both .yml and .yaml files, excluding hidden files (starting with .)
          if [ -z "$(find packages/cli/cli/changes/unreleased -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) ! -name ".*" 2>/dev/null)" ]; then
            echo "No unreleased changes found. Skipping release preparation."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create release branch
        if: steps.check_release_pr.outputs.has_release_pr == 'false' && steps.check_unreleased.outputs.has_changes == 'true'
        id: create_branch
        run: |
          BRANCH_NAME="release/cli-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Prepare release
        if: steps.check_release_pr.outputs.has_release_pr == 'false' && steps.check_unreleased.outputs.has_changes == 'true'
        id: prepare_release
        run: |
          # Run the prepare-release script
          pnpm cli:prepare-release

          # Capture the version from versions.yml
          VERSION=$(grep -m 1 'version:' packages/cli/cli/versions.yml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push branch
        if: steps.check_release_pr.outputs.has_release_pr == 'false' && steps.check_unreleased.outputs.has_changes == 'true'
        run: |
          git add packages/cli/cli/versions.yml
          git add packages/cli/cli/changes/
          git commit -m "chore(cli): release ${{ steps.prepare_release.outputs.version }}"
          git push origin "${{ steps.create_branch.outputs.branch_name }}"

      - name: Create release PR
        if: steps.check_release_pr.outputs.has_release_pr == 'false' && steps.check_unreleased.outputs.has_changes == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "chore(cli): release ${{ steps.prepare_release.outputs.version }}" \
            --body "## Automated CLI Release

          **Version:** ${{ steps.prepare_release.outputs.version }}

          This PR was automatically created by the auto-release workflow.

          ### Changes
          - Updated \`versions.yml\` with new version and changelog entries
          - Moved unreleased change files to \`changes/${{ steps.prepare_release.outputs.version }}/\`

          **Merging this PR will trigger \`publish-cli.yml\`** to publish version ${{ steps.prepare_release.outputs.version }} to npm.

          🤖 [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --base main \
            --head "${{ steps.create_branch.outputs.branch_name }}")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "$PR_URL"

      - name: Summary
        if: steps.check_release_pr.outputs.has_release_pr == 'false' && steps.check_unreleased.outputs.has_changes == 'true'
        run: |
          echo "## 🎉 Release PR Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.prepare_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** ${{ steps.create_pr.outputs.pr_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review and merge the PR to publish this version to npm." >> $GITHUB_STEP_SUMMARY
