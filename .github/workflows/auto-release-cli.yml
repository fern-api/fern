name: Auto Release CLI

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: "buildwithfern"

jobs:
  prepare-release:
    # Only run if the PR was merged and has "!autorelease" in the title
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, '!autorelease') &&
      github.repository == 'fern-api/fern'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install
        uses: ./.github/actions/install

      - name: Check for unreleased changes
        id: check_unreleased
        run: |
          if [ -z "$(ls -A packages/cli/cli/changes/unreleased/*.yml 2>/dev/null)" ]; then
            echo "No unreleased changes found. Skipping release preparation."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release
        if: steps.check_unreleased.outputs.has_changes == 'true'
        id: prepare_release
        run: |
          # Run the prepare-release script
          pnpm cli:prepare-release

          # Capture the version from versions.yml
          VERSION=$(grep -m 1 'version:' packages/cli/cli/versions.yml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push to main
        if: steps.check_unreleased.outputs.has_changes == 'true'
        run: |
          git add packages/cli/cli/versions.yml
          git add packages/cli/cli/changes/
          git commit -m "chore(cli): release ${{ steps.prepare_release.outputs.version }}"
          git push origin main

      - name: Summary
        if: steps.check_unreleased.outputs.has_changes == 'true'
        run: |
          echo "✅ Release ${{ steps.prepare_release.outputs.version }} pushed to main"
          echo "🚀 This will trigger the publish-cli.yml workflow to publish the new CLI version"
