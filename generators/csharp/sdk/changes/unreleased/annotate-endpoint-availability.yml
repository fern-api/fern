- type: feat
  summary: |
    Generated C# SDK methods now surface endpoint availability
    (deprecated / in-development / pre-release) using the language's native
    deprecation mechanism where one exists, and fall back to doc comments
    otherwise. Deprecated endpoints are emitted with
    `[System.ObsoleteAttribute("message")]`; in-development and pre-release
    endpoints get an `@beta` note prepended to the XML doc summary.
