name: ci

on: [push]

env:
  CI: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  MSBUILDTERMINALLOGGER: off

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Install tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore <%= libraryProjectFilePath %>

      - name: Build
        id: build
        run: dotnet build <%= libraryProjectFilePath %> --no-restore -c Release

      - name: Restore test dependencies
        run: dotnet restore <%= testProjectFilePath %>

      - name: Build tests
        run: dotnet build <%= testProjectFilePath %> --no-restore -c Release

      - name: Test
        run: dotnet test <%= testProjectFilePath %> --no-restore --no-build -c Release
<% if (shouldWritePublishBlock) { %>
      - name: Pack
        if: always() && github.event_name == 'push' && contains(github.ref, 'refs/tags/') && steps.build.outcome == 'success'
        run: dotnet pack <%= libraryProjectFilePath %> --no-build --no-restore -c Release

      - name: Publish to NuGet.org
        if: always() && github.event_name == 'push' && contains(github.ref, 'refs/tags/') && steps.build.outcome == 'success'
        env:
          NUGET_API_KEY: $\{{ secrets.<%= nugetTokenEnvvar%> }}
        run: dotnet nuget push <%= libraryPath %>/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source "nuget.org"
<% } %>
