- version: 0.0.14
  changelogEntry:
    - summary: |
        Remove unnecessary NuGet package restore from the generator Dockerfile.
        NuGet packages are not needed at generation time since the generator only
        writes files and runs csharpier; no dotnet restore occurs during generation.
      type: chore
  createdAt: "2026-03-07"
  irVersion: 62

- version: 0.0.13
  changelogEntry:
    - summary: |
        Sync and cache NuGet dependencies across all C# Dockerfiles. Updates test
        framework packages to match generated SDK versions and adds NuGet restore
        caching to the generator Dockerfiles.
      type: chore
  createdAt: "2026-03-07"
  irVersion: 62

- version: 0.0.12
  changelogEntry:
    - summary: |
        Parallelize file writes during project persistence using batched concurrency
        (100 files per batch via `Promise.all`), significantly reducing generation time
        for large projects with thousands of files.
      type: chore
  createdAt: "2026-03-07"
  irVersion: 62

- version: 0.0.11
  changelogEntry:
    - summary: |
        Remove unused `using System.Text.Json.Serialization` import from `StringEnum.cs`.
      type: chore
  createdAt: "2026-03-03"
  irVersion: 62

- version: 0.0.10
  changelogEntry:
    - summary: |
        Modernize generated CI workflow: consolidate three separate jobs
        (compile, unit-tests, publish) into a single job, update to
        actions/checkout@v6 and actions/setup-dotnet@v5, remove redundant
        duplicate checkout step, and require tests to pass before publishing.
      type: chore
  createdAt: "2026-02-27"
  irVersion: 62

- version: 0.0.9
  changelogEntry:
    - summary: |
        Make OneOf single-type serialization test whitespace insensitive for
        consistency with all other JSON test assertions.
      type: chore
  createdAt: "2026-02-27"
  irVersion: 62

