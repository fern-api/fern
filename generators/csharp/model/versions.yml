# yaml-language-server: $schema=../../../fern-versions-yml.schema.json
- version: 0.4.0
  changelogEntry:
    - summary: |
        Add opt-in `enable-inline-types` configuration option. When enabled, types
        marked as inline in the API definition are generated as nested classes inside
        a static `Types` class within their parent type, following the C# protobuf
        convention. For example, an inline `Address` type on a `User` object becomes
        `User.Types.Address` instead of a separate top-level `Address` class.

        All type shapes are fully supported as inline types: objects (with full field
        generation, JSON serialization, and extension data), enums (both standard
        `enum` with `EnumMember` attributes and forward-compatible `StringEnum` record
        structs), discriminated unions (with `Match`/`Visit`, `Is`/`As`/`TryGet`,
        implicit operators, and `JsonConverter`), and undiscriminated unions.

        Recursive nesting is supported (e.g. `User.Types.Address.Types.Coordinate`).
        Collision avoidance is built in: if a parent type has a property named `Types`,
        the nested class is named `InnerTypes` instead (with further fallback to
        `InnerTypes2`, `InnerTypes3`, etc.).

        ```yaml
        generators:
          - name: fernapi/fern-csharp-model
            config:
              enable-inline-types: true
        ```
      type: feat
  createdAt: "2026-03-16"
  irVersion: 65

- version: 0.3.0
  changelogEntry:
    - summary: |
        Rework enum JSON serialization to eliminate reflection. Each enum now gets
        a generated serializer with static dictionary lookups instead of the generic
        `EnumSerializer<T>` / `StringEnumSerializer<T>` that used `Enum.GetValues`,
        `GetField`, `GetCustomAttributes`, and `Activator.CreateInstance` at runtime.
        Serializer initialization is ~1,000x faster (18 ns vs 18 us) and allocates
        160x less memory; steady-state throughput is unchanged. The generated code is
        also NativeAOT and IL-trimming compatible.
      type: feat
  createdAt: "2026-03-13"
  irVersion: 65

- version: 0.2.0
  changelogEntry:
    - summary: |
        Add `generate-literals` configuration option. When enabled, string and boolean
        literal properties emit a self-contained `readonly struct` with a built-in
        `JsonConverter` instead of using a string property with an `Assert` setter.
        The struct type validates the literal value at the JSON deserialization boundary
        and supports implicit conversion to `string` or `bool`.

        The previous `experimental-readonly-constants` option is now deprecated and
        will log a warning when used. Use `generate-literals` instead.
      type: feat
  createdAt: "2026-03-11"
  irVersion: 65

