- summary: |
    Always wrap IR-derived error fields in `Option` to match constructor code that
    assigns `None` for missing fields, preventing struct/constructor type mismatches.
    Fix thiserror format strings: `{{message}}` → `{message}` so field values are
    actually interpolated. Revert `RequestExecutor` trait to return `reqwest::Error`
    directly and remove `ApiError::Executor` variant.
  type: fix
