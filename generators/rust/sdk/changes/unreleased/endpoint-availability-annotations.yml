- type: feat
  summary: |
    Added a `generateEndpointAvailability` custom config flag (default `false`).
    When enabled, generated Rust SDK methods surface endpoint availability:
    `DEPRECATED` endpoints render `#[deprecated(note = "...")]`, and
    `IN_DEVELOPMENT` / `PRE_RELEASE` endpoints get an `@beta` doc comment
    matching the wording used by the TypeScript SDK generator. Because
    `#[deprecated]` emits a compiler warning (and breaks downstream builds
    compiled with `-D warnings`), the flag is opt-in until the next major
    version bump. Enable it in `generators.yml` via
    `generateEndpointAvailability: true`.
