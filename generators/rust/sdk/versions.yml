# yaml-language-server: $schema=../../../fern-versions-yml.schema.json
- version: 0.33.3
  changelogEntry:
    - summary: |
        Bump @fern-api/generator-cli to 0.9.11. The GitHub pipeline step now creates
        signed commits via the GitHub REST API (matching fiddle's legacy InMemoryGitRepo
        push path), restoring verified fern-api[bot] commits on replay-enabled orgs.
      type: chore
  createdAt: "2026-04-22"
  irVersion: 66
- version: 0.33.2
  changelogEntry:
    - summary: |
        Fix wire test verification for endpoints with multi-value array query parameters.
      type: fix
  createdAt: "2026-04-22"
  irVersion: 66
- version: 0.33.1
  changelogEntry:
    - summary: |
        Add crash reporting via Sentry to the generator runtime, and classify
        thrown errors using the new shared `GeneratorError` taxonomy so user-facing
        failures (config, validation, auth, network, environment) are kept distinct
        from internal Fern bugs — only the latter are forwarded to Sentry. No
        change to generated output.
      type: chore
  createdAt: "2026-04-22"
  irVersion: 66
- version: 0.33.0
  changelogEntry:
    - summary: |
        Expose HTTP response metadata (status code, headers, and full parsed response body) on paginated results.
        The `PaginationResult` struct now includes `status_code`, `headers`, and `response` fields, and both
        `AsyncPaginator` and `SyncPaginator` expose accessor methods for this metadata from the most recent page load.
        A new `RawResponse<T>` struct and `execute_request_raw` method on `HttpClient` support this functionality.
      type: feat
  createdAt: "2026-04-21"
  irVersion: 66
- version: 0.32.0
  changelogEntry:
    - summary: |
        Bump @fern-api/generator-cli to 0.9.8. Changelog URLs in generated PRs
        now use the commit SHA instead of the PR branch name, keeping the link
        valid after the branch is deleted or squash-merged.
      type: chore
  createdAt: "2026-04-16"
  irVersion: 66

- version: 0.32.0-rc.0
  changelogEntry:
    - summary: |
        Upgrade to IR v66 which compresses the IR Name type, reducing IR size and increasing performance.
      type: feat
  createdAt: "2026-04-01"
  irVersion: 66

- version: 0.31.1
  changelogEntry:
    - summary: |
        Ensure extraDependencies overrides take precedence over bundled dependency
        versions. Previously, conditional bundled deps (e.g., tokio-tungstenite,
        reqwest-sse) were added after user overrides, reverting pinned versions.
        Extra deps are now applied last so user-specified versions always win.
      type: fix
  createdAt: "2026-04-03"
  irVersion: 65

- version: 0.31.0
  changelogEntry:
    - summary: |
        Add `maxRetries` custom config option to override the default maximum
        number of retries for failed requests. The default remains 3 when not
        specified.
      type: feat
  createdAt: "2026-04-02"
  irVersion: 65
- version: 0.30.2
  changelogEntry:
    - summary: |
        Fix dynamic snippet generation for bytes endpoints with query parameters
        to use the request struct instead of positional arguments.
      type: fix
  createdAt: "2026-03-31"
  irVersion: 65
- version: 0.30.1
  changelogEntry:
    - summary: |
        Generate request structs for bytes (octet-stream) endpoints with query
        parameters, replacing positional arguments with a single struct that
        bundles the raw body and all query params with a builder pattern.
      type: fix
  createdAt: "2026-03-31"
  irVersion: 65

- version: 0.30.0
  changelogEntry:
    - summary: |
        Overhaul WebSocket reconnection: exponential backoff with jitter, auto-reset
        of retry counter after 5s of stable connection, and message queuing during
        reconnect (text and binary messages are buffered and flushed after reconnection
        instead of erroring).
      type: feat
    - summary: |
        Add `DisconnectInfo` struct to `WebSocketMessage::Close`, exposing the close
        code and reason string from the server. `recv()` now returns `None` on close
        frames to signal end-of-stream.
      type: feat
    - summary: |
        Generate typed `ConnectOptions` structs for WebSocket channels with query
        parameters, replacing positional `&str` arguments with a `#[derive(Default)]`
        struct that supports `..Default::default()` ergonomics. Uses `QueryBuilder`
        under the hood, matching the HTTP endpoint pattern.
      type: feat
      added:
        - |
          This is a breaking change for any code that previously passed query
          parameters as positional arguments to `connect()`.
    - summary: |
        Support custom connect and message method names from the IR
        (`channel.connectMethodName`, `msg.methodName`), falling back to `connect`
        and `send_{name}` respectively.
      type: feat
    - summary: |
        Add `generateWebSocketClients` config alias alongside `enableWebsockets`,
        matching the TypeScript/Python/Java generator config key.
      type: feat
    - summary: |
        Route each WebSocket connector through the correct environment URL method
        in multi-URL APIs (e.g., Deepgram's `wss://agent.deepgram.com` vs
        `wss://api.deepgram.com`).
      type: feat
    - summary: |
        Add `Unknown(serde_json::Value)` catch-all variant to generated
        `ServerMessage` enums for forward compatibility with new server message types.
      type: feat
    - summary: |
        Graceful WebSocket close: sends Close frame and waits up to 5s for the
        server's response, with double-close guard.
      type: feat
    - summary: |
        Change implicit auth parameter from required `&str` to `Option<&str>`,
        conditionally injecting the Authorization header only when a token is provided.
      type: fix
    - summary: |
        Fix connector auth forwarding for APIs with explicit Authorization headers
        (e.g., Deepgram) — the connector now correctly unwraps the `Option` to match
        the client's `&str` parameter type.
      type: fix
    - summary: |
        Fix `recv()` on JSON-only channels to return an error with frame size on
        unexpected binary frames instead of silently skipping them.
      type: fix
    - summary: |
        Derive channel names from the channel path instead of the channel ID, moving
        version segments to suffix position (e.g., `/v1/agent/converse` →
        `AgentConverseV1Client`).
      type: chore
    - summary: |
        Replace `#[serde(untagged)]` derive on `ServerMessage` enums with a custom
        `Deserialize` impl that uses round-trip scoring. Fixes silent mismatches
        where `#[serde(default)]` on struct fields caused every variant to match,
        always returning the first.
      type: fix
    - summary: |
        Introduce `ReconnectContext` struct to group reconnection state, replacing
        8 separate `Arc`-wrapped parameters in `read_loop` and `try_reconnect`.
      type: chore
    - summary: |
        Fix `try_reconnect` to retry with exponential backoff up to
        `max_reconnect_attempts`, instead of giving up after a single failed attempt.
      type: fix
    - summary: |
        Fix `flush_queues` to preserve messages on send failure by cloning before
        sending and pushing back to the front of the queue on error.
      type: fix
    - summary: |
        Remove dead `parse_websocket_message` function and unused
        `serde::de::DeserializeOwned` import from WebSocket client infrastructure.
      type: chore
    - summary: |
        Fix wire test generator to set `config.environment = None` for multi-URL
        APIs so requests route to the WireMock server instead of real API endpoints.
      type: fix
    - summary: |
        Fix `number_serializers` unit test assertion to use `1e+20` matching Rust's
        serde_json exponent formatting.
      type: fix
    - summary: |
        Fix WebSocket connectors to support `api_key` auth in addition to bearer
        token. The connector now receives a pre-computed Authorization header value
        from the root client, using the IR's api key prefix (e.g., `Token`) with
        `api_key` taking priority over `token`, matching the HTTP client's behavior.
      type: fix
  createdAt: "2026-03-31"
  irVersion: 65

- version: 0.29.0
  changelogEntry:
    - summary: |
        Add per-endpoint URL resolution for multi-URL environments. Each endpoint
        now resolves its base URL at call time from the environment object, matching
        the Python and Java SDK approach.
      type: feat
    - summary: |
        Generate `ApiClientBuilder` from code instead of a static template, enabling
        environment-aware builder methods for multi-URL APIs.
      type: feat
    - summary: |
        Add per-base-URL getter methods on the `Environment` enum (e.g.,
        `api_url()`, `agent_url()`) for multi-URL environments.
      type: feat
    - summary: |
        Add `Option<Environment>` field to `ClientConfig` for multi-URL environments
        to support per-endpoint URL resolution.
      type: feat
    - summary: |
        Add `base_url()`, `config()`, `execute_request_with_base_url()`, and
        `execute_stream_request_with_base_url()` accessors to `HttpClient` for
        multi-URL endpoint resolution.
      type: feat
    - summary: |
        Remove construction-time URL override from `RootClientGenerator`; all
        sub-clients now receive `config.clone()` uniformly.
      type: chore
  createdAt: "2026-03-31"
  irVersion: 65

- version: 0.28.0
  changelogEntry:
    - summary: |
        Add `number_serializers` module that serializes whole-number `f64` values
        without trailing `.0` (e.g., `24000.0` serializes as `24000`). Some APIs
        reject the decimal representation for integer-valued numbers. Includes
        range validation to prevent incorrect values for numbers outside `i64` range.
      type: feat
    - summary: |
        Add `execute_bytes_request` HTTP client method for endpoints with
        `application/octet-stream` request bodies, sending raw bytes instead of
        JSON-encoding them.
      type: feat
    - summary: |
        Support API key prefix from IR auth schemes. When a prefix like `Token`
        or `Bearer` is configured, the generated HTTP client prepends it to the
        API key header value.
      type: feat
    - summary: |
        Refactor query parameters on file-upload and inlined request bodies to be
        sent as URL query strings instead of being serialized into the request body.
        Query param fields are now marked with `#[serde(skip_serializing)]`.
      type: fix
    - summary: |
        Fix redundant `#[serde(skip_serializing_if = "Option::is_none")]` and
        `#[serde(skip_serializing)]` on optional query param fields. Only
        `skip_serializing` is now emitted.
      type: fix
    - summary: |
        Conditionally include `number_serializers.rs` only when the IR uses
        float/double types, consistent with other serializer modules.
      type: chore
    - summary: |
        Replace unsafe type cast on auth schemes with proper
        `FernIr.AuthScheme._visit()` pattern matching.
      type: chore
    - summary: |
        Upgrade IR SDK from v61 to v65.
      type: chore
  createdAt: "2026-03-31"
  irVersion: 65

- version: 0.27.2
  changelogEntry:
    - summary: |
        Fix dynamic snippet generation for extended objects with `additionalProperties`.
        The `convertExtendedObject` code path now passes `useDefault` to `structConstruction`,
        ensuring `..Default::default()` is emitted for types like `AchSetup` that have an
        `extra: HashMap<String, serde_json::Value>` field. Also skips optional fields without
        values when `useDefault` is true, producing cleaner output.
      type: fix
  createdAt: "2026-03-28"
  irVersion: 65

- version: 0.27.1
  changelogEntry:
    - summary: |
        Pretty-print generated wiremock-mappings.json with 2-space indentation
        to reduce diff sizes on subsequent SDK generations.
      type: chore
  createdAt: "2026-03-27"
  irVersion: 65

- version: 0.27.0
  changelogEntry:
    - summary: |
        Add Environments section to generated README showing how to select
        different environments (production/sandbox) when initializing the client.
      type: feat
  createdAt: "2026-03-27"
  irVersion: 65

- version: 0.26.7
  changelogEntry:
    - summary: |
        Thread endpoint ID through dynamic snippet generator to differentiate
        generated snippets by endpoint.
      type: fix
  createdAt: "2026-03-25"
  irVersion: 65

- version: 0.26.6
  changelogEntry:
    - summary: |
        Make multi-variant enums forward-compatible by default with `__Unknown(String)` catch-all,
        matching C#/TypeScript behavior. Single-variant enums (type discriminants used in
        `#[serde(untagged)]` unions) remain strict to preserve correct variant dispatch.
        Additionally, generate `#[serde(flatten)] pub extra: HashMap<String, serde_json::Value>`
        on structs with `extraProperties` to capture unknown fields from the server.
      type: chore
  createdAt: "2026-03-23"
  irVersion: 65

- version: 0.26.5
  changelogEntry:
    - summary: |
        Remove `Default` impl from `ApiClientBuilder` to improve forward compatibility.
        The `..Default::default()` spread pattern on builder types can silently swallow
        new required fields added in future versions. Removing `Default` ensures that
        consumers are guided by the compiler to handle any new fields explicitly.
        Updated README WebSocket snippets to use explicit `ClientConfig` construction
        instead of the `..Default::default()` spread.
      type: chore
  createdAt: "2026-03-23"
  irVersion: 65

- version: 0.26.4
  changelogEntry:
    - summary: |
        Add `Default` implementation for `ApiClientBuilder` and update README snippet generation
        to use a simpler struct-based client initialization pattern with `ClientConfig { token: ..., ..Default::default() }`.
      type: chore
  createdAt: "2026-03-23"
  irVersion: 65

- version: 0.26.3
  changelogEntry:
    - summary: |
        Skip the `Sec-WebSocket-Protocol` header in WebSocket connections. This header is
        reserved for RFC 6455 subprotocol negotiation and is handled internally by tungstenite.
        Previously, including it as a regular HTTP header caused tungstenite to fail the
        handshake when the server didn't echo it back.
      type: fix
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.26.2
  changelogEntry:
    - summary: |
        Include all optional fields as `Option<T>` parameters in convenience constructors.
        Previously, `{variant}_with_{field}` constructors only accepted the promoted field and
        defaulted all other optional fields to `None`. Now they accept all other optional fields
        as `Option<T>` parameters, giving callers full control over all fields. For example,
        `assistant_with_tool_calls` now accepts `(content: Option<Content>, ..., tool_calls: Vec<ToolCall>)`
        instead of just `(tool_calls: Vec<ToolCall>)`.
      type: chore
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.26.1
  changelogEntry:
    - summary: |
        Fix convenience constructors for union variants whose optional fields have nested
        optional/nullable IR wrappers (e.g. `optional<nullable<string>>` from OpenAPI).
        Previously only one layer was unwrapped, leaving the parameter as `Option<T>` instead
        of `T`, which caused `E0308 mismatched types` compilation errors. Now all
        optional/nullable layers are stripped to produce the correct bare type.
      type: fix
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.26.0
  changelogEntry:
    - summary: |
        Generate convenience constructors for discriminated union variants with optional fields.
        For each optional field in an inlined variant, a `{variant}_with_{field}` constructor is
        generated that accepts the field as a required parameter (unwrapped from `Option<T>`) while
        defaulting all other optional fields to `None`. For example, an `Assistant` variant with
        optional `tool_calls` now gets an `assistant_with_tool_calls(tool_calls: Vec<ToolCall>)`
        constructor.
      type: feat
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.25.1
  changelogEntry:
    - summary: |
        Stop generating empty HTTP client stubs for WebSocket-only subpackages. When an AsyncAPI
        channel creates a subpackage with no HTTP endpoints (e.g., `realtime`, `tts`), the generator
        no longer emits redundant empty client structs in `resources/`. The actual WebSocket
        functionality remains in `src/api/websocket/` via the `WebSocketChannelGenerator`. This
        removes confusing name collisions between the empty HTTP-based `RealtimeClient` in resources
        and the functional WebSocket-based `RealtimeClient` in the websocket module.
      type: fix
    - summary: |
        WebSocket connector now always auto-injects the Authorization header from the stored
        client token, matching the TypeScript SDK experience where `client.realtime.connect()`
        works without manually passing auth. Previously, channels with an explicit Authorization
        header in the AsyncAPI spec required users to pass the token themselves.
      type: fix
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.25.0
  changelogEntry:
    - summary: |
        Improve undiscriminated union design with `snake_case` method names, better variant naming,
        deduplicating type references, and more.
      type: feat
  createdAt: "2026-03-22"
  irVersion: 65
- version: 0.24.1
  changelogEntry:
    - summary: |
        Fix `mod.rs` module declarations not being removed for types inlined into discriminated
        union variants. The generator was deleting the struct files for inlined types but still
        emitting `pub mod` and `pub use` declarations for them, causing `error[E0583]: file not
        found for module` compilation errors in generated SDKs.
      type: fix
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.24.0
  changelogEntry:
    - summary: |
        Improve discriminated union design with inlined variants and constructors. When an inner
        type is only referenced by a single union variant, its fields are now inlined directly into
        the enum variant instead of using a wrapper struct with `#[serde(flatten)]`. All enum
        variants now include `#[non_exhaustive]` for forward compatibility, and constructor methods
        are generated for every variant (required since `#[non_exhaustive]` prevents direct
        construction outside the crate). Empty variants use struct syntax (`Variant {}`) instead
        of unit syntax.
      type: feat
  createdAt: "2026-03-21"
  irVersion: 65

- version: 0.23.0
  changelogEntry:
    - summary: |
        Generate builders for all struct types. The builder pattern is inspired by
        other popular Rust SDKs (e.g. AWS), so that users now have the option between the
        following:

        1. The explicit constructor pattern (i.e. specify `None` values for optional fields).
        2. The `..Default::default()` spread when a type has many optional fields.
        3. The builder pattern when a type has many optional fields and cannot support the `..Default::default()` approach.
      type: feat
  createdAt: "2026-03-21"
  irVersion: 65

- version: 0.22.1
  changelogEntry:
    - summary: |
        Fix double-pin compilation error in `SseStream` timeout implementation. The `deadline`
        field was declared as `Pin<Box<tokio::time::Sleep>>` with a `#[pin]` attribute, causing
        `pin_project` to produce `Pin<&mut Pin<Box<Sleep>>>` which lacks `reset()` and `poll()`
        methods. Changed the field type to `tokio::time::Sleep` (unpinned, letting `pin_project`
        handle pinning) so the projected type is `Pin<&mut Sleep>` which correctly exposes
        the required methods.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 65
- version: 0.22.0
  changelogEntry:
    - summary: |
        Add per-event timeout to SSE stream methods. The `SseStream` now accepts a timeout
        duration and yields `ApiError::StreamTimeout` if no event is received within that
        period. The timeout is derived from `RequestOptions.timeout_seconds` (per-request)
        or `ClientConfig.timeout` (client-level), preventing indefinite blocking when the
        server stops sending events.
      type: feat
  createdAt: "2026-03-20"
  irVersion: 65
- version: 0.21.0
  changelogEntry:
    - summary: |
        Add forward-compatible enum support. When `forward-compatible: true` is set on an enum
        type, the generated Rust enum includes a `#[non_exhaustive]` attribute, a hidden
        `__Unknown(String)` variant for unrecognized values, and custom Serialize/Deserialize
        implementations that gracefully handle unknown enum values from the server.
      type: feat
  createdAt: "2026-03-20"
  irVersion: 65

- version: 0.20.4
  changelogEntry:
    - summary: |
        Derive `Default` on request body types (inlined and query-parameter requests) when all
        fields have types that implement `Default` in Rust, not only when all fields are `Option<T>`.
        Previously, a request like `ChatRequest { stream: bool, ... }` would not get `Default`
        because `bool` is not `Option`, even though `bool` implements `Default`. Now the generator
        uses the same `canDeriveDefault()` logic already used for model structs.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 62

- version: 0.20.3
  changelogEntry:
    - summary: |
        Fix dynamic snippets and wire tests generating `Some(Some(value))` for optional+nullable
        fields. Since `Type.option()` now collapses `Option<Option<T>>` to `Option<T>`, the
        literal mapper must also collapse nested optional/nullable wrapping to produce `Some(value)`
        instead of `Some(Some(value))`.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 62

- version: 0.20.2
  changelogEntry:
    - summary: |
        Fix inlined request type documentation to use the schema-level description from the
        OpenAPI spec instead of a generic fallback. Previously, all inlined request types used
        the same `Request type for API operation` docstring. Now, the actual schema description
        is propagated and used when available.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 62

- version: 0.20.1
  changelogEntry:
    - summary: |
        Fix unexpected_cfgs warnings for multipart and sse features by conditionally including
        the execute_multipart_request and execute_sse_request methods in http_client.rs only when
        the corresponding features are needed. Also fix unused Utc import in query_parameter_builder.rs
        and unused SerdeError import in http_client.rs.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 62
- version: 0.20.0
  changelogEntry:
    - summary: |
        Reduce dependency footprint by conditionally including dependencies based on IR usage.
        Dependencies like chrono, uuid, num-bigint, ordered-float, and base64 are now only added
        to Cargo.toml when the corresponding types are actually used in the API spec. Associated
        as-is files (flexible_datetime.rs, base64_bytes.rs, bigint_string.rs) and their module
        declarations are also conditionally included. Template files for query_parameter_builder.rs,
        http_client.rs, and prelude.rs use template variables to omit unused code sections.
      type: feat
  createdAt: "2026-03-20"
  irVersion: 62
- version: 0.19.11
  changelogEntry:
    - summary: |
        Use `&str` instead of `&String` in generated method signatures, union getter methods,
        and undiscriminated union accessor methods. `&str` is more idiomatic Rust and more
        flexible, accepting both `&String` and string literals.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 62
- version: 0.19.10
  changelogEntry:
    - summary: |
        Replace `unwrap_or_default()` with proper error propagation via `map_err(ApiError::Serialization)?`
        when serializing request bodies with `serde_json::to_value`. Previously, serialization failures
        were silently swallowed and replaced with a default JSON null value. Now they correctly return
        an `ApiError::Serialization` error to the caller.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 62
- version: 0.19.9
  changelogEntry:
    - summary: |
        Fix undiscriminated union variant naming for container types with primitive inner types.
        Previously, variants like `Vec<f64>` produced index-based names (e.g. `List1`). Now they
        derive meaningful names from the inner type (e.g. `DoubleList`). Also applies to set, map,
        optional, and nullable containers.
      type: fix
  createdAt: "2026-03-19"
  irVersion: 62

- version: 0.19.8
  changelogEntry:
    - summary: |
        Fixes an issue where redundant, duplicative `Option<T>` type references were generated.
      type: fix
  createdAt: "2026-03-19"
  irVersion: 62

- version: 0.19.7
  changelogEntry:
    - summary: |
        Add root-level service endpoint support on the main client struct. WebSocket
        connectors now support implicit Bearer auth, auto-injecting the token from
        ClientConfig when no explicit Authorization header is defined.
      type: fix
  createdAt: "2026-03-19"
  irVersion: 62

- version: 0.19.6
  changelogEntry:
    - summary: |
        Handle empty HTTP response bodies by returning an ApiError::Http instead of
        attempting JSON deserialization. Normalize HTTP(S) URLs to WS(S) schemes for
        WebSocket connections. Switch WebSocket server message enums to untagged serde
        representation.
      type: fix
  createdAt: "2026-03-19"
  irVersion: 62

- version: 0.19.5
  changelogEntry:
    - summary: |
        Fix unresolved import error when WebSocket channels exist in the API spec but
        `enableWebsockets` is not enabled. The root client no longer emits
        `use crate::api::websocket::...` imports when WebSocket generation is disabled,
        preventing compilation failures on generated SDKs.
      type: fix
  createdAt: "2026-03-18"
  irVersion: 62

- version: 0.19.4
  changelogEntry:
    - summary: |
        Handle bytes endpoints, query name collisions, and WireMock mapping fixes
        for wire test generation. Bytes endpoints with query params now generate
        individual parameter arguments instead of a struct. Query request type names
        include subpackage prefixes when collisions exist. WireMock mappings strip
        .000 milliseconds from datetime strings and add fallback mappings for bytes
        endpoints. Allow-multiple query parameters are now correctly wrapped in list types.
      type: fix
  createdAt: "2026-03-12"
  irVersion: 62

- version: 0.19.3
  changelogEntry:
    - summary: |
        Add concurrency configuration to generated CI workflow with cancel-in-progress: false
        to prevent stacked runs from being cancelled when a newer run starts.
      type: chore
  createdAt: "2026-03-11"
  irVersion: 62

- version: 0.19.2
  changelogEntry:
    - summary: |
        Re-throw errors after logging for README.md and reference.md generation failures.
        Documentation generation errors now break the generation flow so they are treated
        as important to fix.
      type: fix
  createdAt: "2026-03-10"
  irVersion: 62

- version: 0.19.1
  changelogEntry:
    - summary: |
        Improve error logging for README.md and reference.md generation failures.
        The generator now logs the actual error message and stack trace instead
        of crashing the entire generation, making it easier to diagnose issues.
      type: fix
  createdAt: "2026-03-09"
  irVersion: 62

- version: 0.19.0
  changelogEntry:
    - summary: |
        Add WebSocket connector pattern and README code snippets when `enableWebsockets: true`.
        WebSocket channels are now accessible through the root client via connector structs
        (e.g., `client.realtime.connect(...)`) matching Python and Java generator patterns.
        Generated README includes a Websockets section with connect, send, receive, and close examples.
      type: feat
  createdAt: "2026-03-06"
  irVersion: 62

- version: 0.18.3
  changelogEntry:
    - summary: |
        Fix duplicate module declarations and WebSocket type name collisions when multiple
        subpackages (e.g., HTTP REST and AsyncAPI WebSocket) map to the same namespace. Deduplicates
        `pub mod` declarations, client re-exports, and doc comments. WebSocket channel generators
        now use collision-aware type names (e.g., `AuthResponse2` instead of `AuthResponse`) to
        correctly reference disambiguated types in the trading namespace.
      type: fix
  createdAt: "2026-03-06"
  irVersion: 62

- version: 0.18.2
  changelogEntry:
    - summary: |
        Fix Rust module naming collision when a subpackage has children that share the same
        directory name as the parent's client file. Previously, both `X.rs` and `X/mod.rs` could
        be generated in the same directory, causing `rustfmt` errors like "file for module found
        at both". Now the client code is inlined into the unified `mod.rs` when any children exist,
        and child re-exports are only emitted for subpackages with services or endpoints.
      type: fix
  createdAt: "2026-03-06"
  irVersion: 62

- version: 0.18.1
  changelogEntry:
    - summary: |
        Escape Rust reserved keywords (e.g., `type`, `match`, `self`) when used as path parameter
        names in generated client methods. Previously, reserved keywords like `type` were emitted
        as-is, causing `rustfmt` and compilation failures. Now they are properly escaped with the
        `r#` prefix (e.g., `r#type`).
      type: fix
  createdAt: "2026-03-06"
  irVersion: 62

- version: 0.18.0
  changelogEntry:
    - summary: |
        Add WebSocket (WSS) support with typed channel clients using tokio-tungstenite.
        Generates per-channel client structs with typed send/receive methods, auto-reconnection,
        and serde-based message serialization. Includes WebSocketClient runtime, feature-gated
        dependency management, and integration into the SDK generation pipeline.
      type: feat
  createdAt: "2026-02-16"
  irVersion: 62

- version: 0.17.4
  changelogEntry:
    - summary: |
        Standardize WireMock configuration to use `WIREMOCK_URL` environment variable
        (e.g., `http://localhost:8080`) instead of a hardcoded constant. Docker Compose
        now uses dynamic port mapping (`0:8080`) to avoid port conflicts when running
        multiple SDK tests in parallel. The `start_wiremock` function discovers the
        assigned port and sets `WIREMOCK_URL` automatically. Falls back to
        `http://localhost:8080` if the variable is not set.
      type: chore
  createdAt: "2026-03-02"
  irVersion: 62

- version: 0.17.3
  changelogEntry:
    - summary: |
        Use generator-cli JS API directly instead of subprocess spawning.
        Remove generator-cli from Docker image since it is now bundled via esbuild.
      type: chore
  createdAt: "2026-02-26"
  irVersion: 62
- version: 0.17.2
  changelogEntry:
    - summary: |
        Add serde helpers for base64 and BigInt types to properly serialize/deserialize these types
        in JSON. Add execute_request_base64 method for handling base64 primitive endpoint responses.
        Fix union variant serde rename to be case-sensitive for proper JSON deserialization.
      type: fix
  createdAt: "2026-01-26"
  irVersion: 62

- version: 0.17.1
  changelogEntry:
    - summary: |
        Fix compilation errors when generating SDKs without streaming endpoints by conditionally
        including sse_stream.rs only when streaming endpoints exist. Also fix missing FixedOffset
        import for DateTime types when dateTimeType is set to "offset" (the default).
      type: fix
  createdAt: "2026-01-26"
  irVersion: 62

- version: 0.17.0
  changelogEntry:
    - summary: |
        Add OAuthTokenProvider for automatic OAuth token management with caching and refresh support.
        The provider implements thread-safe token caching with a 2-minute expiration buffer,
        double-checked locking pattern for concurrent access, and automatic token refresh.
      type: feat
  createdAt: "2026-01-22"
  irVersion: 62

- version: 0.16.0
  changelogEntry:
    - summary: |
        Add `packageLicenseFile` config option to support custom license files. When set, uses `license-file` instead of `license` in Cargo.toml, allowing users to reference custom LICENSE.md files that are not standard SPDX identifiers.
      type: feat
  createdAt: "2026-01-21"
  irVersion: 62

