# yaml-language-server: $schema=../../../fern-versions-yml.schema.json
- version: 0.3.2
  changelogEntry:
    - summary: |
        Include all optional fields as `Option<T>` parameters in convenience constructors.
        Previously, `{variant}_with_{field}` constructors only accepted the promoted field and
        defaulted all other optional fields to `None`. Now they accept all other optional fields
        as `Option<T>` parameters, giving callers full control over all fields. For example,
        `assistant_with_tool_calls` now accepts `(content: Option<Content>, ..., tool_calls: Vec<ToolCall>)`
        instead of just `(tool_calls: Vec<ToolCall>)`.
      type: chore
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.3.1
  changelogEntry:
    - summary: |
        Fix convenience constructors for union variants whose optional fields have nested
        optional/nullable IR wrappers (e.g. `optional<nullable<string>>` from OpenAPI).
        Previously only one layer was unwrapped, leaving the parameter as `Option<T>` instead
        of `T`, which caused `E0308 mismatched types` compilation errors. Now all
        optional/nullable layers are stripped to produce the correct bare type.
      type: fix
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.3.0
  changelogEntry:
    - summary: |
        Generate convenience constructors for discriminated union variants with optional fields.
        For each optional field in an inlined variant, a `{variant}_with_{field}` constructor is
        generated that accepts the field as a required parameter (unwrapped from `Option<T>`) while
        defaulting all other optional fields to `None`. For example, an `Assistant` variant with
        optional `tool_calls` now gets an `assistant_with_tool_calls(tool_calls: Vec<ToolCall>)`
        constructor.
      type: feat
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.2.1
  changelogEntry:
    - summary: |
        Fix `mod.rs` module declarations not being removed for types inlined into discriminated
        union variants. The generator was deleting the struct files for inlined types but still
        emitting `pub mod` and `pub use` declarations for them, causing `error[E0583]: file not
        found for module` compilation errors in generated code.
      type: fix
  createdAt: "2026-03-22"
  irVersion: 65

- version: 0.2.0
  changelogEntry:
    - summary: |
        Add forward-compatible enum support. When `forward-compatible: true` is set on an enum
        type, the generated Rust enum includes a `#[non_exhaustive]` attribute, a hidden
        `__Unknown(String)` variant for unrecognized values, and custom Serialize/Deserialize
        implementations that gracefully handle unknown enum values from the server.
      type: feat
  createdAt: "2026-03-20"
  irVersion: 65

- version: 0.1.6
  changelogEntry:
    - summary: |
        Avoid applying `#[serde(transparent)]` to single-property structs whose sole field is an
        enum type. When used inside undiscriminated unions, transparent serialization would serialize
        the struct as just the inner enum variant string instead of the expected object wrapper.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 61
- version: 0.1.5
  changelogEntry:
    - summary: |
        Derive `Default` on request body types when all fields have types that implement `Default`
        in Rust, not only when all fields are `Option<T>`. Uses `hasDefaultImpl()` to check type
        compatibility instead of requiring all properties to be optional.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 61

- version: 0.1.4
  changelogEntry:
    - summary: |
        Use `&str` instead of `&String` in generated union getter methods and undiscriminated
        union accessor methods. `&str` is more idiomatic Rust and more flexible, accepting
        both `&String` and string literals.
      type: fix
  createdAt: "2026-03-20"
  irVersion: 61

- version: 0.1.3
  changelogEntry:
    - summary: |
        Use generator-cli JS API directly instead of subprocess spawning.
        Remove generator-cli from Docker image since it is now bundled via esbuild.
      type: chore
  createdAt: "2026-02-26"
  irVersion: 61

