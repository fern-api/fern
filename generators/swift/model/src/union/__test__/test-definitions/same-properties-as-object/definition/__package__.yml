# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

types:
  Animal:
    discriminant: animal
    union:
      dog: Dog
      cat: Cat

  Dog:
    properties:
      name: string
      likesToWoof: boolean

  Cat:
    properties:
      name: string
      likesToMeow: boolean
