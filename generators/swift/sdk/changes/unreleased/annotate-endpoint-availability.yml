# yaml-language-server: $schema=../../../../../fern-changes-yml.schema.json

- summary: |
    Generated Swift SDK methods can now surface endpoint availability
    (deprecated / in-development / pre-release) using the language's native
    deprecation mechanism where one exists, and fall back to doc comments
    otherwise. This behavior is opt-in behind a new `generateEndpointAvailability`
    custom config flag (default `false`). Set `generateEndpointAvailability: true`
    in `generators.yml` to enable the annotations; existing output is unchanged
    when the flag is off. The default will flip to `true` in the next major
    version of this generator.
  type: feat
