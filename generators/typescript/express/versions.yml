- changelogEntry:
    - summary: |
        Fix npm publish authentication failing when the registry URL includes a port number.
        The `.npmrc` auth token key was constructed using `URL.hostname` (which strips the port)
        instead of `URL.host` (which preserves it).
      type: fix
  irVersion: 65
  createdAt: "2026-03-18"
  version: 0.19.10

- changelogEntry:
    - summary: |
        Fix README generation in Docker by adding `ca-certificates` to the Debian slim
        base image. Since the switch from Alpine to Debian slim, the container was missing
        CA certificates, causing `git clone` over HTTPS to fail with "server certificate
        verification failed". This resulted in empty README files being generated.
      type: fix
  irVersion: 65
  createdAt: "2026-03-09"
  version: 0.19.9

- changelogEntry:
    - summary: |
        Fix map types with enum keys to generate `Partial<Record<EnumType, ValueType>>` instead of
        `Record<EnumType, ValueType | undefined>`. The previous type required all enum keys to be
        explicitly provided (even as `undefined`), while the new type correctly allows keys to be
        omitted entirely, matching the semantics of a sparse map.
      type: fix
  irVersion: 65
  createdAt: "2026-03-02"
  version: 0.19.8

- changelogEntry:
    - summary: |
        Fix TypeScript generator crash when discriminated union discriminant values start
        with digits (e.g., "1foo", "1bar"). The generated code now prefixes such identifiers
        with an underscore to produce valid TypeScript.
      type: fix
  irVersion: 65
  createdAt: "2026-02-27"
  version: 0.19.7

- changelogEntry:
    - summary: |
