          consoler.log(user);
        }
        ```

        Users can also paginate over data manually

        ```ts
        const page = client.users.list();
        for (const user of page.data) {
          consoler.log(user);
        }

        // Helper methods for manually paginating:
        while (page.hasNextPage()) {
          page = page.getNextPage();
