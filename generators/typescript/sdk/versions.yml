            GreaterThan: ">",
            EqualTo: "=",
            LessThan: "<",
        } as const;
        ```
        After:
        ```ts
        export const Operand = {
            GreaterThan: ">",
            EqualTo: "=",
            LessThan: "<",
        } as const;
        export type Operand = (typeof Operand)[keyof typeof Operand];
