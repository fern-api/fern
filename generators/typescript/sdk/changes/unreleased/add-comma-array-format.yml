- summary: |
    Add QueryStringBuilder for query parameter serialization with per-parameter format control.
    The generator now emits a fluent builder pattern for query string construction, where each
    parameter's serialization format (repeat vs comma) is decided at code-gen time via chained
    `.add()` / `.addComma()` calls. OpenAPI query parameters with `explode: false` use `.addComma()`
    to produce comma-separated values (e.g., `tags=a,b,c`).
  type: feat
