- summary: |
    Add "comma" array format support to the query string serializer (`qs.ts`),
    matching the `qs` npm library behavior for `{ arrayFormat: "comma" }`.
    Arrays are serialized as a single comma-separated value (e.g., `key=a,b,c`).
    The `createRequestUrl` function now accepts an optional `arrayFormat` parameter.
  type: feat
