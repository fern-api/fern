- summary: |
    Add full "comma" array format support for OpenAPI parameters with `explode: false`.
    The runtime query string serializer (`qs.ts`) now supports `{ arrayFormat: "comma" }`,
    serializing arrays as comma-separated values (e.g., `key=a,b,c`).
    The generator now emits `queryParameterArrayFormat: "comma"` in fetcher calls
    for endpoints with non-exploded query parameters.
  type: feat
