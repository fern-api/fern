# yaml-language-server: $schema=../../../../../fern-changes-yml.schema.json

- summary: |
    Fix `fixImportsForEsm` to respect `packagePath` custom config. Previously the
    ESM rewrite hardcoded `src/` as the source directory, which silently produced
    invalid ESM output for any SDK that combined `useLegacyExports: false` with a
    non-default `packagePath`.
  type: fix

- summary: |
    Restore `deleteGitIgnoredFiles` to the `git init` + `git clean -fdx` flow so
    full `.gitignore` semantics (nested globs, directory patterns like `.yarn/*`,
    negation entries) are honored on every generated SDK.
  type: fix

- summary: |
    Drop `--no-optional` from pnpm lockfile generation. The flag made lockfiles
    drop `optionalDependencies`, which would cause pnpm to re-resolve and mutate
    the committed lockfile on the first consumer install.
  type: fix

- summary: |
    Re-enable external source maps for the bundled SDK generator CLI. The minified
    bundle stays, but stack traces from production generator runs are once again
    resolvable against the original sources.
  type: internal

- summary: |
    Extend `fixImportsForEsm` regex to cover bare side-effect imports
    (`import "./polyfill"`). Previously only `from "..."` and `import("...")`
    forms were rewritten, leaving any side-effect import without a `.js`
    extension and unresolvable under Node ESM.
  type: fix

- summary: |
    Extract the manual snippet wire serializer from `SdkGenerator` into
    `serializeEndpointSnippetsForWire` and pin its output to Zurg's
    `FernGeneratorExecSerializers.Snippets.jsonOrThrow` via a unit test, so
    schema drift on `Endpoint` / `EndpointIdentifier` / per-language
    `EndpointSnippet` variants is caught at test time rather than producing
    silently-incorrect snippet payloads.
  type: internal

- summary: |
    Surface early-lockfile dependency-prediction drift via `logger.warn`. When
    `getEarlyLockfileConfig` falls out of sync with the real generator deps the
    pre-computed lockfile was previously discarded silently, leaving the
    optimization dead. The warning now reports exactly which deps drifted so
    the prediction can be re-synced.
  type: internal

- summary: |
    Serialize `generateLockfile` and `checkFixViaDlx` in the GitHub output
    path. `checkFixViaDlx` (and its `installCheckFixDependencies` fallback)
    invoke `pnpm dlx` / `pnpm add --save-dev` in the project directory, which
    write to `pnpm-lock.yaml` concurrently with `generateLockfile`'s
    `pnpm install --lockfile-only` and could corrupt the generated lockfile.
    `checkFixDirect` is still parallelized with `generateLockfile` because it
    invokes the tool binary directly and does not touch the lockfile.
  type: fix

- summary: |
    Log the underlying error when `checkFixDirect` / `checkFixViaDlx` fail to
    read the project `package.json` instead of swallowing it silently, so the
    cause of any unexpected fallback to the slower path is visible in
    debug logs.
  type: internal
