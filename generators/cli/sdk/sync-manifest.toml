# sync-manifest.toml — source of truth for classifying cli-sdk files
# for the fern vendor sync (generators/cli/sdk/).
#
# Consumed by:
#   fern's generators/cli/scripts/sync-sdk.sh  → derives rsync file set
#   fern's generators/cli/build.mjs            → derives SDK_IGNORE
#
# Categories:
#   ship         — vendored into generators/cli/sdk/ and shipped in customer output
#   dev-only     — vendored but excluded from Docker image / customer output
#   templatized  — projected or regenerated during sync (not a naive copy)
#   not-synced   — remains only in cli-sdk, never vendored
#
# Rules are evaluated top-to-bottom; first match wins.
# Optional `dest` overrides the destination path relative to the vendored root.
#
# CI enforces that every git-tracked file matches at least one rule.
# When you add or move a file, update this manifest in the same PR.

# --- Dev fixture binary (seed tests) ---
# Synced into cli/openapi-fixture/ (not src/bin/) because patchCargoToml.ts
# anchors on [[bin]] path = "cli/openapi-fixture/main.rs".
[[rules]]
globs = ["src/bin/openapi-fixture/**"]
category = "dev-only"
dest = "cli/openapi-fixture"

# --- CI helper binary ---
[[rules]]
globs = ["src/bin/strip_schema.rs"]
category = "dev-only"

# --- All other binaries (demo CLIs, test fixtures) ---
[[rules]]
globs = ["src/bin/**"]
category = "not-synced"

# --- Core library source ---
[[rules]]
globs = ["src/**"]
category = "ship"

# --- Cargo manifests (projected / regenerated by sync-sdk.sh) ---
[[rules]]
globs = ["Cargo.toml", "Cargo.lock"]
category = "templatized"

# --- Files shipped verbatim ---
[[rules]]
globs = ["dist-workspace.toml", "LICENSE"]
category = "ship"

# --- Build script (generates smoke-test constants from customer specs; not needed in vendor) ---
[[rules]]
globs = ["build.rs"]
category = "not-synced"

[[rules]]
globs = [".gitignore"]
category = "dev-only"

[[rules]]
globs = ["docs/**"]
category = "dev-only"

[[rules]]
globs = ["changes/**"]
category = "dev-only"

[[rules]]
globs = [".github/**"]
category = "dev-only"

# --- Everything else stays only in cli-sdk ---
[[rules]]
globs = ["**"]
category = "not-synced"
