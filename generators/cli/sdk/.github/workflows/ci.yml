name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sync-manifest:
    name: Sync manifest coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check all tracked files are classified
        run: python3 scripts/check-sync-manifest.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test with coverage
        run: cargo llvm-cov --no-report --all-features --workspace

      - name: Coverage report
        run: cargo llvm-cov report --summary-only --fail-under-lines 90

      - name: Coverage HTML report
        if: always()
        run: cargo llvm-cov report --html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/llvm-cov/html/
