        Populate `repository.url` in generated npm `package.json` files from
        the GitHub output mode's `repoUrl`. Fixes npm provenance verification
        failures (E422) when publishing with `--provenance`.
      type: fix
  createdAt: "2026-06-09"
  irVersion: 67
