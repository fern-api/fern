# yaml-language-server: $schema=../../../../../fern-changes-yml.schema.json

- summary: |
    Add opt-in support for annotating IR `availability` in the generated
    Go SDK. When `generateAvailabilityAnnotations: true` is set in
    `generators.yml`, deprecated endpoints emit a `// Deprecated: <message>`
    paragraph (recognized by `go doc` and staticcheck's SA1019), and
    in-development / pre-release endpoints emit an `// Experimental:`
    doc comment that mirrors the shape of Go's native `// Deprecated:`
    convention (the most idiomatic Go option, since the language has no
    standard "experimental" marker).
    `GENERAL_AVAILABILITY` endpoints are unaffected. Today the flag only
    governs `HttpEndpoint` annotations; it is named generically so future
    surfaces (services, types, object properties, enum values, webhooks,
    WebSocket channels/messages, errors) can opt in under the same flag
    without introducing another. The flag defaults to `false` so existing
    output is unchanged; it will become the default in the next major
    version.
  type: feat
