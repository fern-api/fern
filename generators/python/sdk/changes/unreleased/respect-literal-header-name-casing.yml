# yaml-language-server: $schema=../../../../../fern-changes-yml.schema.json

- summary: |
    When a literal global header declares a `name` that is a different casing of the same wire
    value (e.g. `headers: { user-agent: { name: "User-Agent", type: literal<"my-sdk"> } }`),
    the generated Python `client_wrapper.py` now uses the user-supplied name as the headers
    `dict` key. Previously the wire value was always used, which produced two distinct keys
    (`"User-Agent"` for the platform header and `"user-agent"` for the literal) and caused
    both to be sent on the wire. With this fix, the literal header value cleanly overrides
    Fern's platform `User-Agent`.
  type: fix
