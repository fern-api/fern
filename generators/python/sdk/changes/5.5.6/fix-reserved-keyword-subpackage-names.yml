- summary: |
    Escape Python reserved keywords (e.g., `import`, `class`, `from`) when used
    as subpackage names. Previously, a subpackage named after a Python keyword
    would produce a broken `__init__.py` (e.g., `from .import.client import
    ImportClient`) that fails to parse. Subpackage directories are now
    generated using the casings-generator's `safe_name` (e.g., `import_`),
    matching how other identifiers already handle reserved keywords.
  type: fix
