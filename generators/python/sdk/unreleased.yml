# Place to hold unreleased changes before a full release
# this file is meant to follow the same release format as versions.yml
# but is not processed, it's simply procedural
#
# Rack up changes here, then copy the block over to versions.yml when ready to release
- version: unreleased
  changelogEntry:
    - summary: |
        Add docstring emission for unknown/any type alias definitions. When a type alias
        resolves to `typing.Any` and has a description in the API definition, the generated
        Python code now includes the docstring below the type alias declaration.
      type: fix
  irVersion: 65
