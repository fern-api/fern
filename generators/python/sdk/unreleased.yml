# Place to hold unreleased changes before a full release
# this file is meant to follow the same release format as versions.yml
# but is not processed, it's simply procedural
#
# Rack up changes here, then copy the block over to versions.yml when ready to release
- version: unreleased
  changelogEntry:
    - summary: |
        Add `use_request_defaults` top-level config option with three modes: `"none"`,
        `"parameters"` (query params and headers only), and `"all"` (query params, headers,
        request body params, and pydantic model fields). This takes precedence over the
        existing `pydantic_config.use_provided_defaults` boolean, which will be deprecated
        in a future release.
      type: feat
