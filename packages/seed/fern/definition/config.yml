imports:
  features: features.yml
types:
  CliSeedWorkspaceConfiguration:
    properties:
      publishGa: PublishCommand
      publishRc: PublishCommand
      publishDev: PublishCommand
      changelogLocation:
        type: optional<string>
        docs: |
          The location of the changelog file, the schema of which must follow FDR's `GeneratorReleaseRequest` object.

  SeedWorkspaceConfiguration:
    properties:
      image: string
      imageAliases: optional<list<string>>
      displayName: string
      irVersion: string
      test: TestConfiguration
      publish: PublishConfiguration
      changelogLocation:
        type: optional<string>
        docs: |
          The location of the changelog file, the schema of which must follow FDR's `GeneratorReleaseRequest` object.

      language: optional<Language>
      defaultCustomConfig: optional<map<string, unknown>>
      defaultOutputMode: OutputMode
      generatorType: GeneratorType

      buildScripts: optional<BuildScripts>

      customFixtureConfig:
        type: optional<FixtureConfigurations>
        docs: |
          Configuration that will be used for any custom fixture specified by --custom-fixture
      fixtures:
        type: optional<map<string, list<FixtureConfigurations>>>
      scripts: optional<list<ContainerScriptConfig>>
      allowedFailures:
        type: optional<list<string>>
        docs: |
          List any fixtures that are okay to fail. For normal fixtures
          just list the fixture name. For configured fixture list {fixture}:{outputFolder}.
      features: optional<features.GeneratorFeatures>

      buildTestDocker:
        type: optional<BuildTestDockerConfig>
        docs: |
          Optional configuration for generator-managed build and test.
          When specified, the generator's own Docker container handles build and test
          instead of using external script containers defined in the scripts section.
          This allows generators to own their full lifecycle: generate → build → test.

  BuildTestDockerConfig:
    docs: |
      Configuration for a generator-managed build and test Docker container.
      When specified, the generator owns its build/test lifecycle instead of
      relying on external scripts in seed.yml.
    properties:
      dockerfile:
        type: string
        docs: Path to the Dockerfile for the build/test image, relative to the repo root.
      image:
        type: string
        docs: The Docker image name to tag the build/test image as.
      context:
        type: optional<string>
        docs: Build context for the Dockerfile. Defaults to the repo root.
      buildCommand:
        type: optional<DockerCommand>
        docs: Command(s) to build the Docker image. If not specified, a default docker build command is used.
      buildCommands:
        type: optional<list<string>>
        docs: Commands to run during the build phase inside the container.
      testCommands:
        type: optional<list<string>>
        docs: Commands to run during the test phase inside the container.

  PublishDockerConfiguration:
    properties:
      context: string
      image: string
      aliases: optional<list<string>>
      file: string

  PublishDocker:
    docs: |
      Configuration for publishing from a docker image, assuming a vanilla docker deployment.
    properties:
      workingDirectory: optional<string>
      preBuildCommands: optional<DockerCommand>
      docker: PublishDockerConfiguration

  PublishCommand:
    docs: |
      Configuration for publishing from a command, assuming something packaged up, like with the TypeScript generator.
      ex. `pnpm turbo run dockerTagVersion --filter @fern-typescript/express-generator-cli -- "$VERSION"`
      Commands can be multi-line, we'll run them all!
    properties:
      workingDirectory: optional<string>
      versionSubstitution:
        type: optional<string>
        docs: |
          The string to substitute for the version in the command. ex. `"$VERSION"`
      command: DockerCommand

  PublishConfiguration:
    discriminated: false
    union:
      - PublishDocker
      - PublishCommand

  TestContainerConfiguration:
    properties:
      image: string
      command: optional<DockerCommand>

  TestConfiguration:
    properties:
      docker: TestContainerConfiguration
      podman: optional<TestContainerConfiguration>
      local: optional<LocalBuildInfo>

  LocalBuildInfo:
    properties:
      workingDirectory:
        type: string
        docs: |
          The working directory for the generator.
      buildCommand:
        type: list<string>
        docs: |
          The command to build the generator locally.
          `yarn workspace @fern-api/openapi-generator build` for example.
      runCommand:
        type: string
        docs: |
          The command to run the generator locally.
          `node generators/openapi/dist/cli.cjs` for example.
      env:
        type: optional<map<string, string>>
        docs: |
          Environment variables to set when running the generator locally.

  BuildScripts:
    docs: Scripts pertaining to the artifact produced by this generator and how to build them (e.g. yarn install && yarn build for the TS SDK)
    properties:
      preInstallScript: optional<Script>
      installScript: optional<Script>
      compileScript: optional<Script>
      testScript: optional<Script>

  DockerCommand:
    discriminated: false
    union:
      - string
      - list<string>

  ScriptCommands:
    docs: |
      Commands can be either a simple list of strings (legacy format, treated as build commands),
      or an object with separate build and test command arrays.
    discriminated: false
    union:
      - list<string>
      - ScriptCommandsByPhase

  ScriptCommandsByPhase:
    docs: Commands separated by phase (build vs test)
    properties:
      build:
        docs: Commands to run during the build phase
        type: optional<list<string>>
      test:
        docs: Commands to run during the test phase
        type: optional<list<string>>

  Script:
    properties:
      name:
        docs: The name of the script. If provided, this enables fixtures to skip certain scripts.
        type: optional<string>
      commands: ScriptCommands

  ContainerScriptConfig:
    extends: Script
    properties:
      image: string

  Language:
    enum:
      - python
      - java
      - typescript
      - go
      - ruby
      - csharp
      - swift
      - php

  GeneratorType:
    enum:
      - SDK
      - Model
      - Server
      - Documentation

  FixtureConfigurations:
    properties:
      publishConfig: unknown
      publishMetadata: unknown
      customConfig: unknown
      readmeConfig: optional<ReadmeConfig>
      audiences: optional<list<string>>
      outputFolder: string
      outputVersion: optional<string>
      disableDynamicSnippetTests:
        type: optional<boolean>
        docs: |
          If true, dynamic snippet tests will not be generated for this fixture.
          This is useful for situations where the main parts of the sdk are working, but the dynamic snippet tests are not.
          Disabling the dynamic snippet tests allows the fixture to compile and run tests, surfacing issues when failures there start to occur.
      outputMode:
        type: optional<OutputMode>
        docs: Overrides the default output mode
      license: optional<unknown>
      skipScripts:
        docs: |
          Either a boolean to skip all scripts, or a list of script names to skip.
          When true, all build and test scripts will be skipped for this fixture.
        type: optional<SkipScripts>

  SkipScripts:
    discriminated: false
    union:
      - boolean
      - list<string>

  ReadmeConfig:
    properties:
      defaultEndpoint: optional<ReadmeEndpoint>
      bannerLink: optional<string>
      apiReferenceLink: optional<string>
      features: optional<map<string, list<ReadmeEndpoint>>>
      apiName: optional<string>
      disabledSections: optional<list<string>>

  ReadmeEndpoint:
    discriminated: false
    union:
      - string
      - ReadmeEndpointObject

  ReadmeEndpointObject:
    properties:
      method: string
      path: string
      stream: optional<boolean>

  OutputMode:
    enum:
      - github
      - local_files
      - publish
