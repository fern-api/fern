types:
  AnimalBase:
    properties:
      id: string
      name: string

  Dog:
    extends: AnimalBase
    properties:
      breed: string

  Cat:
    extends: AnimalBase
    properties:
      indoor: boolean

  # Discriminated union whose base-properties overlap with properties that
  # each variant ALSO inherits via its own `extends` chain. The union
  # validator must not falsely flag the inherited keys as missing on the
  # variant after filtering base-property keys for variant validation.
  Animal:
    discriminant: kind
    base-properties:
      id: string
      name: string
    union:
      dog: Dog
      cat: Cat
    examples:
      - value:
          kind: dog
          id: rex-1
          name: Rex
          breed: corgi
      - value:
          kind: cat
          id: whiskers-1
          name: Whiskers
          indoor: true

      # Invalid: missing required id (declared as base-property AND inherited
      # via Dog -> AnimalBase). Validator must surface this miss.
      - value:
          kind: dog
          name: Rex
          breed: corgi

  # Regression: variant whose inherited schema declares a key with a
  # DIFFERENT type than the union's base-properties. Before the fix, the
  # filter dropped the key before variant validation, so the type
  # mismatch was silent. The fix preserves the key on the example handed
  # to variant validation so the conflict surfaces.
  NumericIdBase:
    properties:
      id: integer

  Bird:
    extends: NumericIdBase
    properties:
      wingspan: integer

  # Union declares `id: string` in base-properties; Bird inherits `id:
  # integer` from NumericIdBase. The example value satisfies the union's
  # base check but not the variant's view — must produce a violation.
  BirdAware:
    discriminant: kind
    base-properties:
      id: string
    union:
      bird: Bird
    examples:
      - value:
          kind: bird
          id: tweety-1
          wingspan: 12
