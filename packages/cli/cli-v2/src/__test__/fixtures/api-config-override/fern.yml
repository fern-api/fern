edition: 2026-01-01
org: test-org

api:
  auth: BasicAuth
  authSchemes:
    BasicAuth:
      scheme: basic
  defaultEnvironment: production
  environments:
    production:
      url: https://api.production.example.com
    staging:
      url: https://api.staging.example.com
  specs:
    - openapi: openapi.yml

sdks:
  defaultGroup: local
  targets:
    typescript:
      lang: typescript
      version: 0.39.3
      output:
        path: ./generated/typescript
      group:
        - local
