types:
  MovieId:
    type: string
    docs: Unique identifier for a movie

  Movie:
    properties:
      id: MovieId
      title: string
      rating:
        type: double
        docs: Rating from 0.0 to 10.0
      releaseYear: optional<integer>
      genres: list<string>

  CreateMovieRequest:
    properties:
      title: string
      rating: double
      releaseYear: optional<integer>
      genres: optional<list<string>>

  UpdateMovieRequest:
    properties:
      title: optional<string>
      rating: optional<double>
      genres: optional<list<string>>

service:
  base-path: /movies
  auth: true
  endpoints:
    list:
      docs: Get all movies
      method: GET
      path: ""
      request:
        name: ListMoviesRequest
        query-parameters:
          limit:
            type: optional<integer>
            docs: Maximum number of movies to return
          genre:
            type: optional<string>
            docs: Filter by genre
      response: list<Movie>

    create:
      docs: Create a new movie
      method: POST
      path: ""
      request: CreateMovieRequest
      response: Movie

    get:
      docs: Get a movie by ID
      method: GET
      path: /{movieId}
      path-parameters:
        movieId: MovieId
      response: Movie

    update:
      docs: Update a movie
      method: PATCH
      path: /{movieId}
      path-parameters:
        movieId: MovieId
      request: UpdateMovieRequest
      response: Movie

    delete:
      docs: Delete a movie
      method: DELETE
      path: /{movieId}
      path-parameters:
        movieId: MovieId
