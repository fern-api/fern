      Symbols are formatted as CCY1CCY2 where prices are in CCY2 and quantities
      are in CCY1. To read more click
      [here](https://docs.sandbox.gemini.com/websocket-api/#symbols-and-minimums).
    enum:
      - btcusd
      - ethbtc
      - ethusd
      - zecusd
      - zecbtc
      - zeceth
      - zecbch
      - zecltc
      - bchusd
      - bchbtc
      - bcheth
      - ltcusd
      - ltcbtc
      - ltceth
      - ltcbch
      - batusd
      - daiusd
      - linkusd
      - oxtusd
      - batbtc
      - linkbtc
      - oxtbtc
      - bateth
      - linketh
      - oxteth
      - ampusd
      - compusd
      - paxgusd
      - mkrusd
      - zrxusd
      - kncusd
      - manausd
      - storjusd
      - snxusd
      - crvusd
      - balusd
      - uniusd
      - renusd
      - umausd
      - yfiusd
      - btcdai
      - ethdai
      - aaveusd
      - filusd
      - btceur
      - btcgbp
      - etheur
      - ethgbp
      - btcsgd
      - ethsgd
      - sklusd
      - grtusd
      - bntusd
      - name: OneInchusd
        value: 1inchusd
      - enjusd
      - lrcusd
      - sandusd
      - cubeusd
      - lptusd
      - bondusd
      - maticusd
      - injusd
      - sushiusd
    source:
      openapi: asyncapi/sample.yml
channel:
  auth: false
  examples:
    - messages:
        - body:
            socket_sequence: 1
            type: heartbeat
          type: marketData
  messages:
    marketData:
      body: streamRoot.Market
      origin: client
  path: /v1/marketdata/{symbol}
  query-parameters:
    auctions:
      default: true
      docs: Include auction events
      type: optional<boolean>
    bids:
      default: true
      docs: Include bids in change events
      type: optional<boolean>
    heartbeat:
      default: false
      docs: >-
        Optionally add this parameter and set to true to receive a heartbeat
        every 5 seconds
      type: optional<boolean>
    offers:
      default: true
      docs: Include asks in change events
      type: optional<boolean>
    symbol:
      docs: >
        Symbols are formatted as CCY1CCY2 where prices are in CCY2 and
        quantities are in CCY1. To read more click
        [here](https://docs.sandbox.gemini.com/websocket-api/#symbols-and-minimums).
      type: Symbol
    top_of_book:
      default: false
      docs: >-
        If absent or false, receive full order book depth; if present and true,
        receive top of book only. Only applies to bids and offers.
      type: optional<boolean>
    trades:
      default: true
      docs: Include trade events
      type: optional<boolean>
  url: public
