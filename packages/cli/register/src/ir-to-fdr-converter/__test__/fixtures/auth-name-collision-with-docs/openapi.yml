openapi: 3.0.3
info:
  title: Auth Name Collision With Docs Test API
  version: 1.0.0
  description: OpenAPI spec with security scheme that has same name as generators.yml auth scheme, but generators.yml has docs

servers:
  - url: https://api.example.com/v1

paths:
  /protected:
    get:
      operationId: getProtected
      summary: Get resource protected by conflicting auth scheme name
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Protected resource
          content:
            application/json:
              schema:
                type: string
                example: "protected data"

  /public:
    get:
      operationId: getPublic
      summary: Get public resource (should inherit from generators.yml)
      responses:
        "200":
          description: Public resource
          content:
            application/json:
              schema:
                type: string
                example: "public data"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OpenAPI version of bearerAuth (should be overridden by generators.yml docs)
