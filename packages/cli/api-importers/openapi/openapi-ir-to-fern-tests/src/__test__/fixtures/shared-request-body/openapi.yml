openapi: 3.0.3
info:
  title: Shared Request Body Test
  version: 1.0.0
paths:
  /chat:
    post:
      operationId: chat
      tags:
        - Chat
      summary: Send a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /chat/prompt:
    post:
      operationId: chatPrompt
      tags:
        - Chat
      summary: Get the prompt for a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptResponse"

components:
  schemas:
    ChatRequest:
      type: object
      properties:
        message:
          type: string
        model:
          type: string
        temperature:
          type: number
      required:
        - message

    ChatResponse:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
      required:
        - id
        - text

    PromptResponse:
      type: object
      properties:
        prompt:
          type: string
        token_count:
          type: integer
      required:
        - prompt
