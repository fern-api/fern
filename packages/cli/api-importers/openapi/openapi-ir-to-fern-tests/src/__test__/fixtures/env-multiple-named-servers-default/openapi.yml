openapi: "3.0.0"
info:
  version: 1.0.0
  title: Test API
# Two top-level servers, each with its own x-fern-server-name. Endpoints that
# override to one of these named servers should NOT collapse the two environments
# into a single multi-URL environment by default - they should remain distinct
# environments (e.g. Environment.PRODUCTION and Environment.AGENT).
#
# The new "group-servers-as-environment-urls" setting (default false) opts in to
# collapsing instead; this fixture exercises the default behavior.
servers:
  - url: https://api.example.com
    x-fern-server-name: Production
  - url: https://agent.example.com
    x-fern-server-name: Agent
paths:
  /status:
    get:
      operationId: getStatus
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: string
  /agent/think:
    get:
      operationId: getAgentThinkModels
      servers:
        - url: https://agent.example.com
          x-fern-server-name: Agent
      responses:
        "200":
          description: Agent think models
          content:
            application/json:
              schema:
                type: string
