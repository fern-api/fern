openapi: 3.1.0
info:
  title: Webhook Signature Verification Test
  version: 1.0.0

# Document-level default: all webhooks inherit HMAC unless overridden
x-fern-webhook-signature:
  type: hmac
  header: x-webhook-signature
  algorithm: sha256
  encoding: hex
  signature-prefix: "sha256="
  payload-format:
    components:
      - timestamp
      - body
    delimiter: "."
    body-sort: alphabetical
  timestamp:
    header: x-webhook-timestamp
    format: unix-seconds
    tolerance: 300

paths:
  # Webhook that explicitly inherits document-level config via boolean
  /webhooks/user-created:
    post:
      operationId: userCreated
      x-fern-webhook: true
      x-fern-webhook-signature: true
      x-fern-sdk-group-name: webhooks
      x-fern-sdk-method-name: userCreated
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserEvent"

  # Webhook that falls back to document-level config (no explicit extension)
  /webhooks/order-placed:
    post:
      operationId: orderPlaced
      x-fern-webhook: true
      x-fern-sdk-group-name: webhooks
      x-fern-sdk-method-name: orderPlaced
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderEvent"

  # Webhook that overrides with asymmetric RSA signature via JWKS
  /webhooks/payment-processed:
    post:
      operationId: paymentProcessed
      x-fern-webhook: true
      x-fern-sdk-group-name: webhooks
      x-fern-sdk-method-name: paymentProcessed
      x-fern-webhook-signature:
        type: asymmetric
        header: x-signature
        asymmetric-algorithm: rsa-sha256
        encoding: base64
        signature-prefix: "rsa="
        jwks-url: https://api.example.com/.well-known/jwks.json
        key-id-header: x-key-id
        timestamp:
          header: x-timestamp
          format: iso8601
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentEvent"

  # Webhook that overrides with asymmetric ECDSA signature using static public key
  /webhooks/refund-processed:
    post:
      operationId: refundProcessed
      x-fern-webhook: true
      x-fern-sdk-group-name: webhooks
      x-fern-sdk-method-name: refundProcessed
      x-fern-webhook-signature:
        type: asymmetric
        header: x-refund-signature
        asymmetric-algorithm: ecdsa-sha256
        encoding: hex
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundEvent"

components:
  schemas:
    UserEvent:
      type: object
      properties:
        userId:
          type: string
        action:
          type: string
      required:
        - userId
        - action

    OrderEvent:
      type: object
      properties:
        orderId:
          type: string
        total:
          type: number
      required:
        - orderId

    PaymentEvent:
      type: object
      properties:
        paymentId:
          type: string
        amount:
          type: number
        currency:
          type: string
      required:
        - paymentId
        - amount

    RefundEvent:
      type: object
      properties:
        refundId:
          type: string
        amount:
          type: number
        reason:
          type: string
      required:
        - refundId
        - amount
