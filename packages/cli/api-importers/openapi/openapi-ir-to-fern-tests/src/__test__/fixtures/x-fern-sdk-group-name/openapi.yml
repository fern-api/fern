openapi: 3.0.3
info:
  title: Test extension `x-fern-sdk-group-name` for schemas
  version: 1.0.0
paths:
  /auth/user:
    get:
      description: This endpoint should be in `auth/user.yml`
      x-fern-sdk-group-name: ["auth", "user"]
      x-fern-sdk-method-name: ["get"]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /v1/_internal/pets:
    get:
      description: This endpoint uses underscore-prefixed group name
      x-fern-sdk-group-name: ["v1", "_internal", "pets"]
      x-fern-sdk-method-name: list
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"

components:
  schemas:
    UserId:
      # Test nested group names
      x-fern-sdk-group-name: ["ids", "user"]
      type: string
    PersonId:
      # Test nested group names
      x-fern-sdk-group-name: ["ids", "person"]
      type: string
    Pet:
      # Test underscore-prefixed group name on schema
      x-fern-sdk-group-name: ["_internal"]
      type: object
      properties:
        name:
          type: string
    User:
      description: This user object should be in user.yml
      x-fern-sdk-group-name: user
      type: object
      properties:
        id:
          type: string
          format: uuid
        associatedPersons:
          type: array
          items:
            $ref: "#/components/schemas/Person"
    Person:
      type: object
      properties:
        id:
          type: string
          format: uuid
