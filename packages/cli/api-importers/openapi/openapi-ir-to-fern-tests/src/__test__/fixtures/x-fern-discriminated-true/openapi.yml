openapi: 3.0.3
info:
  title: Test x-fern-discriminated override with unions v1
  version: 1.0.0
paths: {}
components:
  schemas:
    Shape:
      type: object
      x-fern-discriminated: true
      discriminator:
        propertyName: type
      oneOf:
        - $ref: "#/components/schemas/Triangle"
        - $ref: "#/components/schemas/Square"
    UndiscriminatedShape:
      type: object
      discriminator:
        propertyName: type
      oneOf:
        - $ref: "#/components/schemas/Triangle"
        - $ref: "#/components/schemas/Square"
    Triangle:
      type: object
      properties:
        type:
          type: string
          enum: ["triangle"]
        base:
          type: number
        height:
          type: number
      required:
        - type
        - base
        - height
    Square:
      type: object
      properties:
        type:
          type: string
          enum: ["square"]
        sideLength:
          type: number
      required:
        - type
        - sideLength
