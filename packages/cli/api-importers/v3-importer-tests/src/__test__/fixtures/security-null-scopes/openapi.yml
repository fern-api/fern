openapi: 3.1.0
info:
  title: Security Null Scopes Test
  version: 1.0.0
  description: |
    Tests that null security scopes are sanitized to empty arrays.
    This is a common pattern in real-world specs (e.g., Square API) where
    oauth2 scopes are set to null instead of an empty array.
servers:
  - url: https://api.example.com/v1
security:
  - OAuth: null
paths:
  /tokens/revoke:
    post:
      summary: Revoke a token
      operationId: revokeToken
      security:
        - OAuth: null
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
  /tokens/create:
    post:
      summary: Create a token (with explicit scopes)
      operationId: createToken
      security:
        - OAuth:
            - tokens:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
  /tokens:
    get:
      summary: List tokens (inherits global null-scope security)
      operationId: listTokens
      responses:
        "200":
          description: List of tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
components:
  securitySchemes:
    OAuth:
      type: oauth2
      description: OAuth2 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://api.example.com/oauth/authorize
          tokenUrl: https://api.example.com/oauth/token
          scopes:
            tokens:write: Write access to tokens
            tokens:read: Read access to tokens
