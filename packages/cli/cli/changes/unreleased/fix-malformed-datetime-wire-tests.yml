- summary: |
    Normalize malformed date-time examples in WireMock response bodies so that
    strict SDK parsers (Go, Java) can deserialize them. Previously, date-time
    strings with a space instead of "T" (e.g. "2025-02-15 10:30:00+00:00") were
    copied verbatim into mock responses, causing wire test failures.
  type: fix
