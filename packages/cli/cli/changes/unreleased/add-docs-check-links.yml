- summary: |
    Add `fern docs link check` command to validate links on live documentation sites.
    Supports text, JSON, and CSV output formats via `--output` flag.
    Use `--url <url>` to specify which docs site to check, or auto-detect from fern.yml.
  type: feat
- summary: |
    Improve link check output formatting with colored `[broken-link]`/`[blocked-link]` prefixes,
    local file:line:column resolution for source references, and cli-progress progress bars
    matching the `fern docs dev` bundle download style.
  type: feat
