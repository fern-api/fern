- summary: |
    Fix allOf schema conversion dropping validation constraints (pattern, minLength, maxLength, minimum, maximum, exclusiveMinimum, exclusiveMaximum, multipleOf) when merging a $ref with inline primitive elements.
  type: fix
- summary: |
    Fix example generation for allOf compositions to use merged property schemas. When an allOf override specifies only `items` (without `type: array`), the base schema's `type: array` is now correctly inherited, producing properly typed array examples instead of null.
  type: fix
