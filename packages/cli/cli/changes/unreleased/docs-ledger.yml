- summary: |
    Add docs deployment ledger with dual-write support. Set
    FERN_DOCS_DEPLOY_MODE=dual to enable writing to both the legacy and
    new ledger backends. The ledger path uses content-addressed storage
    for incremental deploys and supports multi-locale translation
    publishing with locales[] wire format and defaultLocale, custom JS
    components, git provenance metadata, multi-domain forwarding,
    integrations mapping, stable file-path references in page markdown,
    correct MIME-type inference for file uploads, and a dedicated preview
    endpoint.
  type: feat
