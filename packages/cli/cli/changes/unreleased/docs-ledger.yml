- summary: |
    Add docs deployment ledger with dual-write support. Set
    FERN_DOCS_DEPLOY_MODE=dual to enable writing to both the legacy and
    new ledger backends. The ledger path uses content-addressed storage
    for incremental deploys and supports multi-locale translation
    publishing, custom JS components, git provenance metadata,
    multi-domain forwarding, and a dedicated preview endpoint.
