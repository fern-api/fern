- summary: |
    Add docs deployment ledger publishing. Set
    `FERN_DOCS_DEPLOY_MODE=ledger` to publish via the ledger backend;
    `legacy` (the default) publishes via the existing register flow.
    Each publish writes exactly one artifact, and the read path is
    determined by the artifact type. The ledger path uses
    content-addressed storage for incremental deploys and supports
    multi-locale translations, custom JS components, favicon resolution,
    git provenance metadata, multi-domain forwarding, stable file-path
    references in page markdown, MIME-type inference for uploads, and a
    dedicated preview endpoint.
  type: feat
