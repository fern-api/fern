openapi: 3.1.0
info:
  title: Section Summary Promotion Test API
  version: 1.0.0
servers:
  - url: /api/v1
tags:
  - name: customers
    description: Customer management
  - name: payments
    description: Payment processing
  - name: legacyPayments
    description: Legacy payment endpoints
paths:
  /customers:
    get:
      tags:
        - customers
      summary: List customers
      operationId: listCustomers
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
  /payments:
    post:
      tags:
        - payments
      summary: Create payment
      operationId: createPayment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                currency:
                  type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
  /legacy/payments:
    get:
      tags:
        - legacyPayments
      summary: List legacy payments
      operationId: listLegacyPayments
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    amount:
                      type: number
