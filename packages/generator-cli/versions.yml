  version: 0.6.12

- changelogEntry:
    - summary: |
        Clean PRs with local conflict resolution. Replay PRs are now always
        linear from HEAD with clean code (no conflict markers committed).
        When customizations conflict with new generated code, the PR body
        includes instructions to run locally.
      type: feat
  createdAt: "2026-03-02"
  version: 0.6.11

- changelogEntry:
    - summary: |
        Disable commit signing and skip hooks for the internal git commit in
        replay-init to avoid triggering prompts (e.g. Touch ID on macOS,
        1Password SSH agent).
      type: fix
  createdAt: "2026-02-28"
  version: 0.6.10

- changelogEntry:
    - summary: |
        Remove redundant conflict resolution comment from Replay PRs. The per-file
        guidance was duplicating information already present in the PR description.
      type: fix
  createdAt: "2026-02-26"
  version: 0.6.9

- changelogEntry:
    - summary: |
        Fix non-fast-forward push error when updating an existing fern-bot PR from a shallow clone.
      type: fix
  createdAt: "2026-02-26"
  version: 0.6.8

- changelogEntry:
    - summary: |
        `pipeline run --config` now accepts inline JSON, "-" for stdin,
        or a file path. Result JSON is written to stdout.
      type: feat
  createdAt: "2026-02-26"
  version: 0.6.7

- changelogEntry:
    - summary: |
        Handle shallow git clones in the pipeline. Add `git fetch --unshallow`
        at the start of GithubStep to ensure full history is available for
        replay operations, and use `--force` instead of `--force-with-lease`
        for fern-bot branch pushes to avoid stale ref failures.
      type: fix
  createdAt: "2026-02-25"
  version: 0.6.6

- changelogEntry:
    - summary: |
        Ensure commits are signed by fern-bot and remove specific customization counts from Replay PR descriptions in favor of generic messaging.
      type: fix
  createdAt: "2026-02-25"
  version: 0.6.5

- changelogEntry:
    - summary: |
        Update @fern-api/fern-replay to 0.6.1 which published as ESM and CJS.
        As a result, the generator-cli can also be ESM and CJS.
      type: fix
  createdAt: "2026-02-25"
  version: 0.6.4

- changelogEntry:
    - summary: |
        Publish package from dist directory with a generated package.json. Bundle all dependencies for the CLI binary, and keep published dependencies external for the JS API.
      type: fix
  createdAt: "2026-02-25"
  version: 0.6.3

- changelogEntry:
    - summary: |
        Use pnpm publish to properly resolve workspace directives when publishing to npm.
      type: fix
  createdAt: "2026-02-25"
  version: 0.6.2

- changelogEntry:
