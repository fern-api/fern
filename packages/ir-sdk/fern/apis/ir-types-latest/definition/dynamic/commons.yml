types:
  WithDocs:
    properties:
      docs: optional<string>
  FernFilepath:
    properties:
      allParts: list<NameOrString>
      packagePath: list<NameOrString>
      file: optional<NameOrString>

  # names
  Name:
    properties:
      originalName: string
      camelCase: SafeAndUnsafeString
      pascalCase: SafeAndUnsafeString
      snakeCase: SafeAndUnsafeString
      screamingSnakeCase: SafeAndUnsafeString
  NameOrString:
    discriminated: false
    union:
      - string
      - Name
  NameAndWireValue:
    properties:
      wireValue: string
      name: NameOrString
  SafeAndUnsafeString:
    properties:
      unsafeName:
        docs: this name might overlap with reserved keywords of the language being
          generated
        type: string
      safeName:
        docs: this name will NOT overlap with reserved keywords of the language being
          generated
        type: string

  # ids
  EndpointId: string
  TypeId: string
